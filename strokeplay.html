            </div>

            <div className="max-w-md mx-auto w-full px-4 -mt-10 relative z-10 space-y-6">
              <div className="bg-white rounded-[24px] shadow-sm p-5 flex justify-between text-center divide-x divide-gray-100">
                {players.map((player, idx) => {
                  const score = currentHoleData.scores[idx];
                  const par = currentHoleData.par;
                  const diff = score - par;
                  const bal = holeBalances[idx];

                  return (
                    <div key={idx} className={`flex-1 px-1 ${currentHoleData.excluded?.[idx] ? 'opacity-40' : ''}`}>
                      <div className="w-8 h-8 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-2 overflow-hidden">
                         {currentHoleData.excluded?.[idx] ? <Icon name="UserX" className="w-5 h-5 text-gray-400 mt-1" /> : <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${player}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>}
                      </div>
                      <div className="text-[10px] text-gray-500 font-bold mb-2 truncate px-1">{player}</div>
                      
                      {currentHoleData.excluded?.[idx] ? (
                        <div className="font-bold text-gray-400 text-xs mt-3 bg-gray-50 py-1 rounded-md">제외됨</div>
                      ) : (
                        <>
                          <div className={`font-bold text-[13px] mb-1 flex flex-col items-center justify-center gap-0.5 ${diff === -1 ? 'text-[#128853]' : diff <= -2 ? 'text-purple-600' : 'text-gray-800'}`}>
                            <div className="flex items-center gap-1">
                              {score}타 {usePutts && <span style={{fontSize:'10px', color:'#9ca3af'}}>({currentHoleData.putts?.[idx] || 0}펏)</span>}
                            </div>
                            {diff === -1 && <span className="text-[9px] bg-[#e5f5ec] text-[#128853] px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight">버디</span>}
                            {diff <= -2 && <span className="text-[9px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight">이글</span>}
                            
                            {currentHoleData.par === 3 && currentHoleData.near === idx && (
                              <span className={`text-[9px] px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight ${currentHoleData.isReverseNear ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>
                                {currentHoleData.isReverseNear ? '역니어' : '니어'}
                              </span>
                            )}
                            {currentHoleData.par >= 5 && currentHoleData.longest === idx && (
                              <span className={`text-[9px] px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight ${currentHoleData.isReverseLongest ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'}`}>
                                {currentHoleData.isReverseLongest ? '역롱기' : '롱기'}
                              </span>
                            )}
                          </div>
                          <div className={`text-[11px] font-black mt-1 ${bal > 0 ? 'text-[#1ea34a]' : bal < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                            {bal > 0 ? '+' : ''}{bal === 0 ? '-' : bal.toLocaleString()}
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>

              {currentHoleData.isHoleExcluded ? (
                <div className="bg-red-50 rounded-[20px] shadow-sm p-6 text-center text-red-500 font-bold border border-red-100 mb-6">
                  ⚠️ 이 홀은 전체 내기에서 제외되었습니다. (타수만 기록됨)
                </div>
              ) : (
                <div>
                  <div className="text-center text-[13px] font-bold text-gray-600 mb-4 flex items-center justify-center">
                    <div className="w-5 h-5 mr-1.5 bg-[#1ea34a] text-white rounded-full flex items-center justify-center font-bold text-[10px]">P</div> 포인트 이동 (주는 사람 기준)
                  </div>
                  
                  {Object.keys(transfers).length === 0 ? (
                    <div className="bg-white rounded-[24px] shadow-sm p-8 text-center text-gray-400 font-semibold border border-gray-100">
                      변동 포인트가 없습니다.
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {Object.entries(transfers).map(([fromId, data]) => (
                        <div key={fromId} className="bg-white rounded-[24px] border border-gray-100 p-5 shadow-sm">
                          <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-3">
                              <div className="w-10 h-10 bg-gray-100 rounded-full overflow-hidden shrink-0">
                                <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${players[fromId]}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>
                              </div>
                              <div>
                                <div className="text-[10px] text-gray-400 font-bold mb-0.5">주는 사람</div>
                                <div className="font-black text-base text-gray-800">{players[fromId]}</div>
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-[10px] text-gray-400 font-bold mb-0.5">총 이동 포인트</div>
                              <div className="font-black text-[19px] text-red-500">{data.total.toLocaleString()}P</div>
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-[16px] p-3 space-y-2 border border-gray-100">
                            {data.details.map((detail, idx) => (
                              <div key={idx} className="flex justify-between items-center text-[13px]">
                                <span className="text-gray-600 font-semibold flex items-center">
                                  <Icon name="ArrowRight" className="w-3.5 h-3.5 mx-2 text-gray-400" /> 
                                  {players[detail.to]}
                                </span>
                                <span className="font-bold text-blue-600">{detail.amount.toLocaleString()}P</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            
            <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 p-4 pb-8 z-20 flex gap-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
              {isAdmin ? (
               <div className="max-w-md mx-auto flex flex-col gap-2 w-full">
                 <div className="flex gap-2 w-full">
                   <button onClick={() => setStep('play')} className="flex-[1] py-4 rounded-[16px] font-bold flex flex-col items-center justify-center bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 transition text-[13px] shadow-sm active:scale-[0.98]">
                     <div className="flex items-center gap-1"><Icon name="Edit3" className="w-4 h-4"/> 수정하기</div>
                   </button>
                   <button onClick={() => setStep('scorecard')} className="flex-[1] py-4 rounded-[16px] font-bold flex flex-col items-center justify-center bg-gray-100 text-gray-600 hover:bg-gray-200 transition text-[13px] active:scale-[0.98]">
                    스코어보드
                  </button>
                  <button onClick={handleNextHole} className="flex-[1.5] bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 rounded-[16px] shadow-md flex items-center justify-center transition text-[14px] active:scale-[0.98]">
                    {currentHole === 17 ? '최종 완료' : '다음 홀'} <Icon name="ArrowRight" className="w-4 h-4 ml-1" />
                  </button>
                 </div>
               </div>
              ) : (
                <div className="max-w-md mx-auto flex gap-2 w-full">
                  <button onClick={() => setStep('scorecard')} className="flex-1 py-4 rounded-[16px] font-bold bg-gray-100 text-gray-600 transition text-[14px] active:scale-[0.98]">
                    전체 스코어
                  </button>
                  <div className="flex-[2] text-center font-bold text-[#128853] py-4 bg-white rounded-[16px] flex items-center justify-center gap-2 border border-[#128853]">
                    <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                    방장이 입력 중입니다...
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      } 
      else if (step === 'settlement') {
        content = (
          <div className="flex flex-col flex-1 relative pb-10">
            <div className="bg-[#128853] text-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-20">
              <button onClick={() => setStep('scorecard')} className="p-2 hover:bg-white/10 rounded-full transition active:scale-95"><Icon name="ArrowLeft" className="w-5 h-5"/></button>
              <div className="flex items-center gap-2">
                <h1 className="text-[17px] font-bold flex items-center"><Icon name="Calculator" className="w-5 h-5 mr-2"/> 최종 정산 내역</h1>
                {roomId && (
                  <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none ml-2 active:scale-95">
                    LIVE
                  </span>
                )}
              </div>
              <div className="flex items-center">
                {startTime && <div className="text-[11px] font-bold text-white bg-black/20 px-2 py-1 rounded-md flex items-center gap-1 whitespace-nowrap"><Icon name="Clock" className="w-3 h-3"/> {elapsedTime}</div>}
              </div> 
            </div>

            <div className={`max-w-md mx-auto w-full p-4 space-y-4 pt-6 ${!isAdmin ? 'pointer-events-none' : ''}`}>
              <div className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100">
                <h2 className="text-[15px] font-bold text-gray-800 mb-4 flex items-center">
                  <Icon name="Wallet" className="w-5 h-5 mr-2 text-[#128853]"/> 개평 비율 설정
                </h2>
                
                <div className={`mb-4 ${!isAdmin ? 'opacity-80' : ''}`}>
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => { setGaepyungRate(0); setIsCustomGaepyung(false); }} className={`col-span-2 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 0 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>개평 없음 (0%)</button>
                    <button onClick={() => { setGaepyungRate(10); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 10 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>10%</button>
                    <button onClick={() => { setGaepyungRate(20); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 20 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>20%</button>
                    <button onClick={() => { setGaepyungRate(30); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 30 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>30%</button>
                    <button onClick={() => { setGaepyungRate(50); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 50 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>50%</button>
                    <button onClick={() => { setGaepyungRate(70); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 70 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>70%</button>
                    {!isCustomGaepyung ? (
                      <button onClick={() => { setIsCustomGaepyung(true); setGaepyungRate(''); }} className="col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] bg-gray-100 text-gray-600 hover:bg-gray-200">직접입력</button>
                    ) : (
                      <div className="col-span-1 relative bg-[#128853] rounded-xl shadow-sm transition-all flex items-center overflow-hidden cursor-pointer focus-within:ring-2 focus-within:ring-green-300">
                        <input 
                          type="number" 
                          inputMode="numeric" 
                          value={gaepyungRate} 
                          onChange={(e) => setGaepyungRate(e.target.value === '' ? '' : Number(e.target.value))} 
                          className="w-full h-full py-3 bg-transparent text-white text-right font-bold text-[14px] outline-none pr-6 pl-1 placeholder-white/60 cursor-pointer focus:cursor-text" 
                          placeholder="0"
                          autoFocus
                        />
                        <span className="absolute right-2 text-white/90 text-[12px] font-bold pointer-events-none">%</span>
                      </div>
                    )}
                  </div>
                </div>

                <div className={`flex items-center justify-between py-2 border-t border-gray-100 mt-2 pt-4 ${!isAdmin ? 'opacity-80' : ''}`}>
                  <div className="flex flex-col"><span className="text-[13px] font-bold text-gray-800">1,000P 단위 절사</span><span className="text-[10px] text-gray-500 mt-0.5">1,000P 미만 금액 버림</span></div>
                  <button onClick={() => setIsRoundThousand(!isRoundThousand)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors shrink-0 ${isRoundThousand ? 'bg-[#128853]' : 'bg-gray-200'}`}><span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform shadow-sm ${isRoundThousand ? 'translate-x-5' : 'translate-x-0.5'}`} /></button>
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 ml-1 mt-6">
                  <h3 className="font-bold text-[15px] text-gray-700">플레이어별 최종 정산</h3>
                  <span className="text-[11px] text-[#128853] font-bold">* 핸디가 있을 경우, 핸디포함 계산됩니다</span>
                </div>
                
                <div className="space-y-4">
                  {settlementData.details.map((d, i) => (
                    <div key={i} className="bg-white rounded-[20px] p-0 shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                      <div className="flex justify-between items-center p-4 border-b border-gray-50">
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-gray-100 rounded-full overflow-hidden shrink-0"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${d.name}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div>
                          <span className="font-bold text-gray-800 text-[15px]">{d.name}</span>
                        </div>
                        <span className={`font-black text-[15px] ${d.original > 0 ? 'text-[#128853]' : d.original < 0 ? 'text-red-500' : 'text-gray-500'}`}>기존: {d.original > 0 ? '+' : ''}{d.original.toLocaleString()}P</span>
                      </div>
                      <div className="p-4 space-y-2">
                        <div className="flex justify-between items-center text-[12px]">
                          <span className="text-gray-500 font-medium">개평 ({d.original > 0 ? '지급할 포인트' : d.original < 0 ? '받을 포인트' : '해당 없음'})</span>
                          <span className={`font-black ${d.original > 0 ? 'text-red-500' : d.original < 0 ? 'text-blue-500' : 'text-gray-400'}`}>{d.original > 0 ? '-' + d.cut.toLocaleString() : d.original < 0 ? '+' + d.receive.toLocaleString() : '0'}P</span>
                        </div>
                      </div>
                      <div className="flex justify-between items-center bg-gray-50 p-4 border-t border-gray-100">
                        <span className="text-[13px] font-bold text-gray-800">최종 수령(지불) 포인트</span>
                        <span className={`text-[20px] tracking-tight font-black ${d.final > 0 ? 'text-[#128853]' : d.final < 0 ? 'text-red-500' : 'text-gray-600'}`}>{d.final > 0 ? '+' : ''}{d.final === 0 ? '0' : d.final.toLocaleString()}P</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="pt-6 pb-8 pointer-events-auto">
                {isAdmin ? (
                  <button onClick={() => setShowFinalResultModal(true)} className="w-full bg-[#128853] hover:bg-[#0f7646] text-white font-bold py-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[15px] active:scale-[0.98]">
                    <Icon name="Calculator" className="w-5 h-5 mr-2" /> 정산완료 및 개평 계산하기
                  </button>
                ) : (
                  <div className="w-full text-center font-bold text-gray-500 py-4">방장이 게임을 종료할 때까지 기다려주세요.</div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // 메인 렌더 함수 통합 리턴
      return (
        <div className="app-wrapper flex flex-col min-h-screen bg-[#f4f6f8] relative font-sans">
          <style>{`
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            * { font-family: 'Pretendard', sans-serif; }
          `}</style>
          
          {toastMessage && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2.5 rounded-full shadow-lg text-[11px] font-bold z-50 animate-in fade-in slide-in-from-top-4 w-11/12 max-w-sm text-center pointer-events-none">
              {toastMessage}
            </div>
          )}

          {/* 현재 스텝에 맞는 화면 렌더링 */}
          {content}

          {/* === 공유 모달들 (모든 화면 공통 사용) === */}
          
          {/* 스코어 캐디 변경 모달 */}
          {showCaddieModal && (
            <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-5 shadow-xl">
                <div className="flex justify-between items-center border-b border-gray-100 pb-3">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="Edit3" className="w-5 h-5 mr-2 text-[#128853]"/> 스코어 캐디 변경</h3>
                  <button onClick={() => setShowCaddieModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                <p className="text-[13px] text-gray-500 font-medium">현재 라운드의 스코어를 입력할 담당자를 선택해 주세요.</p>
                <div className="grid grid-cols-2 gap-3 mt-2">
                  {players.map((p, idx) => (
                    <button key={`change-caddie-${idx}`} disabled={globalExcluded[idx]} onClick={() => { setScoreCaddieIdx(idx); setShowCaddieModal(false); showToastMsg(`${p} 님으로 스코어 캐디가 변경되었습니다.`); }} className={`py-4 px-2 flex flex-col items-center justify-center gap-2 rounded-[16px] transition border active:scale-95 ${globalExcluded[idx] ? 'bg-gray-50 border-gray-100 text-gray-300 grayscale opacity-50' : scoreCaddieIdx === idx ? 'bg-[#e5f5ec] border-[#128853] text-[#128853] shadow-sm' : 'bg-white border-gray-200 text-gray-700 hover:bg-gray-50'}`}>
                      <div className="w-10 h-10 bg-gray-100 rounded-full overflow-hidden shrink-0"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${p}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div>
                      <span className="text-[13px] font-bold w-full truncate px-1">{p}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 룰 설정 확인 모달 */}
          {showRuleModal && (
            <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-4 shadow-xl">
                <div className="flex justify-between items-center border-b border-gray-100 pb-3">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="Info" className="w-5 h-5 mr-2 text-[#128853]"/> 배판 적용 기준</h3>
                  <button onClick={() => setShowRuleModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                <div className="text-[14px] space-y-3 text-gray-700 py-2">
                  <div className="bg-gray-50 p-3.5 rounded-[16px] flex items-center justify-between border border-gray-100">
                    <span className="font-bold text-gray-600">기준 시점</span>
                    <span className="font-bold text-[#128853]">
                      {doubleRules.timing === 'none' ? '미적용' : doubleRules.timing === 'current' ? '당홀 기준' : '전홀 기준'}
                    </span>
                  </div>
                  {doubleRules.timing !== 'none' && (
                    <ul className="space-y-2.5 pl-2 pt-2">
                      {doubleRules.birdie && <li className="flex items-center font-semibold"><Icon name="Check" className="w-4 h-4 text-[#128853] mr-2"/> 버디 이상</li>}
                      {doubleRules.threeTie && <li className="flex items-center font-semibold"><Icon name="Check" className="w-4 h-4 text-[#128853] mr-2"/> 3인 동타</li>}
                      {doubleRules.prevTie && <li className="flex items-center font-semibold"><Icon name="Check" className="w-4 h-4 text-[#128853] mr-2"/> 이전 홀 무승부 (모두 동타)</li>}
                      {doubleRules.triple && <li className="flex items-center font-semibold"><Icon name="Check" className="w-4 h-4 text-[#128853] mr-2"/> 파4/파5 트리플 보기 이상</li>}
                      {doubleRules.doublePar3 && <li className="flex items-center font-semibold"><Icon name="Check" className="w-4 h-4 text-[#128853] mr-2"/> 파3 더블 보기 이상</li>}
                    </ul>
                  )}
                </div>
                <div className="flex gap-2 mt-4 pt-2">
                  <button onClick={() => { setShowRuleModal(false); setStep('setup'); }} className={`flex-[1] bg-gray-100 hover:bg-gray-200 transition text-gray-700 font-bold py-3.5 rounded-[16px] text-[15px] active:scale-[0.98] ${!isAdmin ? 'hidden' : ''}`}>설정 변경</button>
                  <button onClick={() => setShowRuleModal(false)} className="flex-[2] bg-[#128853] hover:bg-[#0f7646] transition text-white font-bold py-3.5 rounded-[16px] text-[15px] shadow-sm active:scale-[0.98]">확인</button>
                </div>
              </div>
            </div>
          )}

          {/* 리셋 모달 */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black/60 z-[90] flex items-center justify-center p-4 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-5 shadow-xl text-center">
                <div className="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-2"><Icon name="RotateCcw" className="w-7 h-7" /></div>
                <h3 className="font-bold text-[19px] text-gray-800">새 게임 시작</h3>
                <p className="text-[14px] text-gray-500 font-medium leading-relaxed">모든 스코어 기록이 초기화되고<br/>설정 화면으로 돌아갑니다.<br/>계속하시겠습니까?</p>
                <div className="flex gap-2.5 mt-4 pt-2">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 transition text-gray-700 font-bold py-3.5 rounded-[16px] text-[15px] active:scale-[0.98]">취소</button>
                  <button onClick={() => { setHoles(Array(18).fill(null)); setCurrentHole(0); setStartTime(null); setStep('setup'); setShowResetConfirm(false); setShowFinalResultModal(false); setShowDoubleSettings(false); setShowBonusSettings(false); }} className="flex-1 bg-red-500 hover:bg-red-600 transition text-white font-bold py-3.5 rounded-[16px] text-[15px] active:scale-[0.98]">초기화 확인</button>
                </div>
              </div>
            </div>
          )}

          {/* 최종 정산 결과 모달 */}
          {showFinalResultModal && (
            <div className="fixed inset-0 bg-[#f4f6f8] z-[80] flex flex-col animate-in slide-in-from-bottom-4 duration-300 pointer-events-auto overflow-hidden">
              <div className="bg-[#128853] text-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-20 shrink-0">
                <button onClick={() => setShowFinalResultModal(false)} className="p-2 hover:bg-white/10 rounded-full transition active:scale-95"><Icon name="ArrowLeft" className="w-5 h-5"/></button>
                <h1 className="text-[17px] font-bold flex items-center">최종 정산 결과</h1>
                <div className="w-9"></div>
              </div>
              
              <div className="flex-1 overflow-y-auto p-4 pb-28 space-y-6">
                <div className="bg-white rounded-[24px] shadow-sm p-6 text-center border border-gray-100">
                  <div className="w-16 h-16 bg-[#e5f5ec] text-[#128853] rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="Check" className="w-8 h-8" /></div>
                  <h2 className="text-[20px] font-black text-gray-800 mb-1">모든 정산이 완료되었습니다!</h2>
                  <p className="text-[14px] text-gray-500 font-medium mt-2">아래의 개평 지급 내역을 확인해 주세요.</p>
                </div>

                {/* 🚨 승자의 개평 지급 상세 내역 */}
                <div className="mt-4">
                  <div className="text-center text-[15px] font-bold text-gray-800 mb-4 flex items-center justify-center">
                    누가 누구에게 개평을 주나요?
                  </div>
                  
                  {Object.keys(settlementData.gTransfers).length === 0 || !Object.values(settlementData.gTransfers).some(g => g.total > 0) ? (
                    <div className="bg-white rounded-[24px] shadow-sm p-8 text-center text-gray-400 font-semibold border border-gray-100">
                      지급할 개평이 없습니다.
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {Object.entries(settlementData.gTransfers).map(([fromId, data]) => {
                        if (data.total === 0) return null;
                        return (
                          <div key={fromId} className="bg-red-50/40 rounded-[20px] border border-red-100 p-4 shadow-sm">
                            <div className="flex justify-between items-center mb-3">
                              <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-white rounded-full overflow-hidden shrink-0 border border-red-100">
                                  <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${players[fromId]}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>
                                </div>
                                <div>
                                  <div className="text-[10px] text-red-400 font-bold mb-0.5">승자 (개평 주는 사람)</div>
                                  <div className="font-black text-[15px] text-gray-800">{players[fromId]}</div>
                                </div>
                              </div>
                              <div className="text-right">
                                <div className="text-[10px] text-red-400 font-bold mb-0.5">총 개평 지급액</div>
                                <div className="font-black text-[17px] text-red-500">{data.total.toLocaleString()}P</div>
                              </div>
                            </div>
                            <div className="bg-white rounded-[12px] p-3 space-y-2 border border-red-50">
                              {data.details.map((detail, idx) => (
                                <div key={idx} className="flex justify-between items-center text-[13px]">
                                  <span className="text-gray-600 font-semibold flex items-center">
                                    <Icon name="ArrowRight" className="w-3.5 h-3.5 mx-1.5 text-red-300" /> 
                                    {players[detail.to]}
                                  </span>
                                  <span className="font-bold text-red-500">{detail.amount.toLocaleString()}P</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>

              <div className="absolute bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 p-4 pb-8 z-30 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <div className="max-w-md mx-auto flex gap-3">
                  <button onClick={() => setShowFinalResultModal(false)} className="flex-1 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-4 rounded-[20px] transition duration-200 shadow-sm flex items-center justify-center text-[15px] active:scale-[0.98]">
                    정산 내역
                  </button>
                  <button onClick={() => setShowResetConfirm(true)} className="flex-1 bg-[#1e293b] hover:bg-[#0f172a] text-white font-bold py-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[15px] active:scale-[0.98]">
                    <Icon name="RotateCcw" className="w-5 h-5 mr-2" /> 새 게임 시작
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 골프장 검색 모달 */}
          {showCourseSearchModal && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex flex-col justify-end pointer-events-auto backdrop-blur-sm">
              <div className="bg-white rounded-t-[32px] p-6 animate-in slide-in-from-bottom-4 shadow-2xl flex flex-col max-h-[85vh]">
                <div className="flex justify-between items-center mb-5 shrink-0">
                  <h3 className="text-[19px] font-black text-gray-800 flex items-center">
                    <Icon name="Search" className="w-5 h-5 mr-2 text-[#128853]"/> 골프장 검색
                  </h3>
                  <button onClick={() => setShowCourseSearchModal(false)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500" /></button>
                </div>
                
                <div className="relative mb-4 shrink-0">
                  <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                  <input 
                    type="text" 
                    value={courseSearchQuery} 
                    onChange={(e) => setCourseSearchQuery(e.target.value)} 
                    placeholder="골프장 이름 검색" 
                    className="w-full bg-gray-50 border border-gray-200 rounded-[16px] pl-12 pr-4 py-3.5 font-bold text-[15px] outline-none focus:border-[#128853] focus:ring-1 focus:ring-[#128853] transition-all"
                  />
                </div>

                <div className="flex-1 overflow-y-auto -mx-2 px-2 space-y-2 pb-6">
                  {GOLF_COURSES.filter(c => c.id !== 'custom' && c.name.toLowerCase().includes(courseSearchQuery.toLowerCase())).map(course => (
                    <button 
                      key={course.id} 
                      onClick={() => { 
                        setSelectedCourseId(course.id); 
                        setFrontNineId(Object.keys(course.nineHoles)[0]);
                        setBackNineId(Object.keys(course.nineHoles)[1] || Object.keys(course.nineHoles)[0]);
                        setShowCourseSearchModal(false); 
                        setCourseSearchQuery(''); 
                      }} 
                      className="w-full bg-white border border-gray-100 hover:border-[#128853] hover:bg-[#e5f5ec] text-left p-4 rounded-[16px] transition flex items-center justify-between active:scale-[0.98]"
                    >
                      <span className="font-bold text-[15px] text-gray-800">{course.name}</span>
                      <Icon name="ArrowRight" className="w-4 h-4 text-gray-400" />
                    </button>
                  ))}
                  
                  {GOLF_COURSES.filter(c => c.id !== 'custom' && c.name.toLowerCase().includes(courseSearchQuery.toLowerCase())).length === 0 && (
                    <div className="text-center py-10 text-gray-400 font-bold text-[14px]">
                      검색 결과가 없습니다.<br/><span className="text-[12px] font-normal mt-1 block">직접 설정을 이용해주세요.</span>
                    </div>
                  )}
                  
                  <div className="pt-2">
                    <button 
                      onClick={() => { 
                        setSelectedCourseId('custom'); 
                        setShowCourseSearchModal(false); 
                        setCourseSearchQuery(''); 
                      }} 
                      className="w-full bg-gray-50 border border-gray-200 hover:bg-gray-100 text-left p-4 rounded-[16px] transition flex items-center justify-between mt-2 active:scale-[0.98]"
                    >
                      <span className="font-bold text-[15px] text-gray-700">직접 설정 (자유 입력)</span>
                      <Icon name="Edit3" className="w-4 h-4 text-gray-500" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 초대 코드로 입장 모달 */}
          {showJoinModal && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex flex-col justify-end pointer-events-auto backdrop-blur-sm">
              <div className="bg-white rounded-t-[32px] p-6 animate-in slide-in-from-bottom-4 shadow-2xl">
                <div className="flex justify-between items-center mb-6">
                  <h3 className="text-xl font-black text-gray-800">초대 코드로 입장</h3>
                  <button onClick={() => setShowJoinModal(false)} className="p-2 bg-gray-100 rounded-full active:scale-95 transition"><Icon name="X" className="w-5 h-5 text-gray-500" /></button>
                </div>
                <input 
                  type="text" 
                  value={joinCode} 
                  onChange={(e) => setJoinCode(e.target.value)} 
                  placeholder="초대 코드 6자리 입력" 
                  className="w-full bg-gray-50 border border-gray-200 rounded-[16px] px-4 py-4 text-center font-black text-xl mb-4 outline-none uppercase focus:border-[#128853] focus:ring-1 focus:ring-[#128853] transition-all"
                  autoFocus
                />
                <button onClick={() => {
                    if (!joinCode.trim()) return showToastMsg('코드를 입력해주세요.');
                    window.location.href = `?roomId=${joinCode.trim().toUpperCase()}`;
                  }} 
                  className="w-full bg-[#128853] text-white font-black py-4 rounded-[16px] text-lg shadow-md hover:bg-[#0f7646] transition active:scale-[0.98]">
                  입장하기
                </button>
              </div>
            </div>
          )}

          {/* QR 코드 공유 모달 (새롭게 개편) */}
          {showQrModal && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 shadow-xl text-center flex flex-col items-center">
                <div className="flex justify-between items-center w-full border-b border-gray-100 pb-3 mb-6">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="QrCode" className="w-5 h-5 mr-2 text-[#128853]"/> 방 초대하기</h3>
                  <button onClick={() => setShowQrModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                
                <p className="text-[13px] text-gray-600 font-medium text-center leading-relaxed mb-6">
                  라운드 동반자의 스마트폰 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.
                </p>

                <div className="bg-gray-50 p-4 rounded-[16px] mb-6 w-full flex justify-center border border-gray-100">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(window.location.origin + window.location.pathname + '?roomId=' + roomId)}`} alt="QR Code" className="w-40 h-40 rounded-lg mix-blend-multiply"/>
                </div>
                
                <div className="w-full mb-6">
                  <div className="text-[11px] font-bold text-gray-400 mb-1.5 text-left pl-1">초대 URL</div>
                  <div className="bg-gray-50 border border-gray-200 text-gray-800 text-[13px] font-bold p-3.5 rounded-[12px] truncate text-left w-full select-all">
                    {window.location.origin + window.location.pathname + '?roomId=' + roomId}
                  </div>
                </div>

                <div className="flex gap-2 w-full mb-6">
                  <button onClick={() => {
                    const url = window.location.origin + window.location.pathname + '?roomId=' + roomId;
                    const textArea = document.createElement("textarea");
                    textArea.value = url;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); showToastMsg('초대 링크가 복사되었습니다!'); } catch(e){}
                    document.body.removeChild(textArea);
                    setShowQrModal(false);
                  }} className="flex-1 bg-white border border-[#128853] text-[#128853] hover:bg-green-50 font-bold py-3.5 rounded-[16px] transition shadow-sm text-[14px] active:scale-[0.98]">
                    URL 복사
                  </button>
                  <button onClick={async () => {
                    const url = window.location.origin + window.location.pathname + '?roomId=' + roomId;
                    if (navigator.share) {
                      try {
                        await navigator.share({ title: '골프 타당 게임', text: '골프 타당 게임에 초대합니다!', url: url });
                        setShowQrModal(false);
                      } catch(e) {}
                    } else {
                      const textArea = document.createElement("textarea");
                      textArea.value = url;
                      document.body.appendChild(textArea);
                      textArea.select();
                      try { document.execCommand('copy'); showToastMsg('초대 링크가 복사되었습니다!'); } catch(e){}
                      document.body.removeChild(textArea);
                      setShowQrModal(false);
                    }
                  }} className="flex-1 bg-[#128853] hover:bg-[#0f7646] text-white font-bold py-3.5 rounded-[16px] transition shadow-sm text-[14px] active:scale-[0.98]">
                    공유하기
                  </button>
                </div>

                <p className="text-[11px] text-gray-400 font-medium text-center leading-relaxed">
                  지금 공유하시거나, 홀별 타수 기록 페이지<br/>
                  <span className="text-red-500 font-black">LIVE</span> 버튼을 클릭하시면 언제든 공유할 수 있습니다.
                </p>
              </div>
            </div>
          )}

          {/* 공통 Info 모달 */}
          {infoModal.show && (
            <div className="fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 shadow-xl text-center flex flex-col items-center">
                <div className="flex justify-between items-center w-full border-b border-gray-100 pb-3 mb-4">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="Info" className="w-5 h-5 mr-2 text-[#128853]"/> {infoModal.title}</h3>
                  <button onClick={() => setInfoModal({ show: false, title: '', desc: '' })} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                <p className="text-[14px] text-gray-600 font-medium leading-relaxed text-left whitespace-pre-wrap w-full mb-6">
                  {infoModal.desc}
                </p>
                <button onClick={() => setInfoModal({ show: false, title: '', desc: '' })} className="w-full bg-[#128853] text-white font-bold py-3.5 rounded-[16px] transition shadow-sm active:scale-[0.98]">
                  확인
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
