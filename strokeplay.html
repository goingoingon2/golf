  <script>
    window.__NATIVE_MAP__ = window.Map;
    window.__NATIVE_SET__ = window.Set;
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script>
    window.Map = window.__NATIVE_MAP__;
    window.Set = window.__NATIVE_SET__;
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif !important; margin: 0; padding: 0; }
    body { background-color: #f4f6f8; color: #111827; -webkit-tap-highlight-color: transparent; margin: 0; overscroll-behavior-y: none; -webkit-user-select: none; user-select: none; touch-action: pan-y; }
    input, textarea { -webkit-user-select: auto; user-select: auto; }
    input, button, select { outline: none; font-family: inherit; }
    button:disabled { cursor: default !important; opacity: 0.5; pointer-events: none; }
    .app-wrapper { max-width: 480px; margin: 0 auto; min-height: 100dvh; background: #f4f6f8; position: relative; overflow-x: hidden; }
    input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
    .pb-safe-sm { padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect, Fragment } = React;

    // =====================================================================
    // ★ 0. Firebase 설정 (본인의 Firebase 프로젝트 정보를 여기에 입력하세요) ★
    // Firebase 콘솔에서 '웹 앱 설정' 복사 후 아래 주석(//)을 풀고 값을 넣어주세요.
    // =====================================================================
    const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyALzYLoBWl-oHCyLzEr7YefqqySx8ESEjA",
  authDomain: "left-right-6da31.firebaseapp.com",
  projectId: "left-right-6da31",
  storageBucket: "left-right-6da31.firebasestorage.app",
  messagingSenderId: "128347797181",
  appId: "1:128347797181:web:3e1cdfe3e8d2efcde3a9d4"
    }; 
    let firebaseInitialized = false;
    let authInstance, dbInstance;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'golf-default-app';

    try {
      let configToUse = null;
      if (typeof __firebase_config !== 'undefined') configToUse = JSON.parse(__firebase_config);
      else if (Object.keys(MY_FIREBASE_CONFIG).length > 0) configToUse = MY_FIREBASE_CONFIG;

      if (configToUse && typeof firebase !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(configToUse);
        authInstance = firebase.auth();
        dbInstance = firebase.firestore();
        firebaseInitialized = true;
      }
    } catch (e) { console.error("Firebase Init Error:", e); }

    const GOLF_COURSES = [
      { id: 'custom', name: '직접 설정 (자유 입력)', nineHoles: { '전반': [4,4,4,4,4,4,4,4,4], '후반': [4,4,4,4,4,4,4,4,4] } },
      { id: 'standard_72', name: '표준 파72 (일반 코스)', nineHoles: { 'OUT': [4,4,3,5,4,4,3,5,4], 'IN':  [4,4,3,5,4,4,3,5,4] } },
      { id: 'club72_hanul', name: '클럽72 - 하늘코스', nineHoles: { 'OUT': [4,4,3,4,5,4,3,4,5], 'IN':  [4,4,3,5,4,4,3,5,4] } },
      { id: 'club72_ocean', name: '클럽72 - 오션코스', nineHoles: { 'OUT': [4,3,4,4,5,3,4,4,5], 'IN':  [4,4,3,4,5,4,3,5,4] } },
      { id: 'seowon_valley', name: '서원밸리CC', nineHoles: { '서원': [4,4,5,3,4,4,3,5,4], '밸리': [4,4,3,4,5,4,3,5,4] } }
    ];

    const Icons = {
      Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
      Plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
      Minus: '<line x1="5" y1="12" x2="19" y2="12"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',
      RotateCcw: '<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>',
      Trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
      ArrowRight: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
      ArrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
      Info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
      Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      Search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      QrCode: '<rect x="3" y="3" width="5" height="5" rx="1" ry="1"/><rect x="16" y="3" width="5" height="5" rx="1" ry="1"/><rect x="3" y="16" width="5" height="5" rx="1" ry="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/>',
      Map: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
      Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      Share2: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
      Calculator: '<rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="16" y1="10" x2="16.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="8" y1="18" x2="8.01" y2="18"/>',
      Wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
      Edit3: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
      User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      UserX: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="23" y2="14"/><line x1="23" y1="8" x2="17" y2="14"/>'
    };

    const Icon = ({ name, className = "", style, onClick }) => (
      <svg onClick={onClick} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: Icons[name] }} className={className} style={{...style, display: 'inline-block', width: '1em', height: '1em'}} />
    );

    const DEFAULT_PLAYERS = ['타이어 우즈', '로리 맥일로이', '스코티 셔플러', '필 미친손'];

    // 🚨 샌드박스 안전 처리가 포함된 유틸리티 함수들
    const getInitParams = () => {
      if (typeof window === 'undefined') return { rId: '', aKey: '' };
      const p = new URLSearchParams(window.location.search);
      return { rId: p.get('roomId') || '', aKey: p.get('adminKey') || '' };
    };

    const updateUrlSafe = (roomId, adminKey = null) => {
      try {
        if (window.location.protocol === 'blob:' || window.location.origin === 'null') return;
        const nurl = new URL(window.location.href);
        if (roomId) nurl.searchParams.set('roomId', roomId);
        if (adminKey) nurl.searchParams.set('adminKey', adminKey);
        window.history.replaceState(null, '', nurl.toString());
      } catch(e) {
        console.warn("샌드박스 환경에서는 URL 업데이트가 우회되었습니다.");
      }
    };

    const getShareUrl = (roomId) => {
      try {
        if (window.location.protocol === 'blob:' || window.location.origin === 'null') {
          return `https://golf-score.app/?roomId=${roomId}`; 
        }
        return window.location.origin + window.location.pathname + '?roomId=' + roomId;
      } catch (e) {
        return `https://golf-score.app/?roomId=${roomId}`; 
      }
    };

    // =====================================================================
    // ★ 2. 메인 앱 컴포넌트 ★
    // =====================================================================
    function App() {
      // 1. 방 정보 및 권한 (3중 방장 복구 로직)
      const { rId: initRoomId, aKey: initAdminKey } = useMemo(() => getInitParams(), []);
      const [roomId, setRoomId] = useState(initRoomId);
      const [adminKey, setAdminKey] = useState(initAdminKey);
      
      const [isAdmin, setIsAdmin] = useState(() => {
        if (!initRoomId) return true; // 방을 새로 파는 경우 무조건 방장 권한 부여
        if (initAdminKey) {
          if (initRoomId) localStorage.setItem(`golf_admin_${initRoomId}`, 'true');
          return true;
        }
        if (initRoomId && localStorage.getItem(`golf_admin_${initRoomId}`) === 'true') {
          return true;
        }
        return false;
      });

      const [step, setStep] = useState('setup'); 
      const [user, setUser] = useState(null);
      
      const [selectedCourseId, setSelectedCourseId] = useState('standard_72');
      const [frontNineId, setFrontNineId] = useState('OUT');
      const [backNineId, setBackNineId] = useState('IN');
      const [customCourseName, setCustomCourseName] = useState('직접 설정 골프장');
      const [customFrontName, setCustomFrontName] = useState('전반');
      const [customBackName, setCustomBackName] = useState('후반');
      const [courseSearchQuery, setCourseSearchQuery] = useState('');

      const [players, setPlayers] = useState([...DEFAULT_PLAYERS]);
      const [initialBalances, setInitialBalances] = useState([0, 0, 0, 0]); 
      const [baseAmount, setBaseAmount] = useState(1000); 
      const [isCustomAmount, setIsCustomAmount] = useState(false);
      const [gaepyungRate, setGaepyungRate] = useState(50);
      const [isCustomGaepyung, setIsCustomGaepyung] = useState(false); 
      const [isRoundThousand, setIsRoundThousand] = useState(true); 

      const [doubleRules, setDoubleRules] = useState({ timing: 'current', birdie: true, threeTie: true, prevTie: true, triple: true, doublePar3: true });
      
      const [birdieRule, setBirdieRule] = useState({ enabled: true, type: 'strokes', strokeValue: 1, fixedValue: 10000 });
      const [eagleRule, setEagleRule] = useState({ enabled: true, type: 'strokes', strokeValue: 3, fixedValue: 30000 });
      const [nearRule, setNearRule] = useState({ enabled: true, type: 'strokes', strokeValue: 1, fixedValue: 10000 }); 
      const [longestRule, setLongestRule] = useState({ enabled: false, type: 'strokes', strokeValue: 1, fixedValue: 10000 }); 

      const [holes, setHoles] = useState(Array(18).fill(null));
      const [currentHole, setCurrentHole] = useState(0); 
      const [currentPar, setCurrentPar] = useState(4);
      const [currentScores, setCurrentScores] = useState([4, 4, 4, 4]);
      
      const [currentNear, setCurrentNear] = useState(null);
      const [currentLongest, setCurrentLongest] = useState(null);
      const [isReverseNear, setIsReverseNear] = useState(false);
      const [isReverseLongest, setIsReverseLongest] = useState(false);

      const [multiplier, setMultiplier] = useState(1); 
      const [multiplierReason, setMultiplierReason] = useState(''); 
      const [hasManualMultiplier, setHasManualMultiplier] = useState(false); 
      const [currentExcluded, setCurrentExcluded] = useState([false, false, false, false]); 
      const [globalExcluded, setGlobalExcluded] = useState([false, false, false, false]); 
      const [isHoleExcluded, setIsHoleExcluded] = useState(false); 

      // UI States (모달 포함)
      const [showDoubleSettings, setShowDoubleSettings] = useState(false);
      const [showBonusSettings, setShowBonusSettings] = useState(false);
      const [showCourseSearchModal, setShowCourseSearchModal] = useState(false);
      const [showQrModal, setShowQrModal] = useState(false);
      const [showFinalResultModal, setShowFinalResultModal] = useState(false); // 결과 모달 복구 완료!
      const [showResetConfirm, setShowResetConfirm] = useState(false); // 리셋 모달 복구 완료!
      const [toastMessage, setToastMessage] = useState(''); 
      const [scorecardTab, setScorecardTab] = useState('front'); 
      const [infoModal, setInfoModal] = useState({ show: false, title: '', desc: '' });

      const [startTime, setStartTime] = useState(null);
      const [elapsedTime, setElapsedTime] = useState('00:00');

      const lastSyncedStr = useRef('');
      const lastSentUpdate = useRef(0);
      const hasReceivedData = useRef(false);
      const pressTimer = useRef(null);
      const parPressTimer = useRef(null);
      const isParLongPress = useRef(false);

      const showToastMsg = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 3000); };
      const openInfo = (title, desc) => setInfoModal({ show: true, title, desc });

      // Firebase Auth & 자동 방장 복구
      useEffect(() => {
        if (!firebaseInitialized || !authInstance) return;
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await authInstance.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await authInstance.signInAnonymously();
            }
          } catch (e) { console.error("Auth error:", e); }
        };
        initAuth();
        const unsubscribe = authInstance.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!initRoomId) {
          const lastRoom = localStorage.getItem('golf_last_room');
          if (lastRoom && localStorage.getItem(`golf_admin_${lastRoom}`) === 'true') {
            setRoomId(lastRoom);
            setIsAdmin(true);
            updateUrlSafe(lastRoom);
          }
        } else {
          localStorage.setItem('golf_last_room', initRoomId);
        }
      }, [initRoomId]);

      const getRoomRef = (rId) => {
        if (typeof window.__app_id !== 'undefined') {
          return dbInstance.collection('artifacts').doc(appId).collection('public').doc('data').collection('golf_rooms').doc(rId);
        }
        return dbInstance.collection('golf_rooms').doc(rId);
      };

      // 실시간 데이터 수신 및 동기화
      useEffect(() => {
        if (!user || !roomId || !dbInstance || !firebaseInitialized) return;
        const roomRef = getRoomRef(roomId);
        const unsubscribe = roomRef.onSnapshot((snap) => {
          if (snap.exists) {
            const data = snap.data();
            
            // 방장 권한 승격
            const localAdminKey = localStorage.getItem(`golf_adminKey_${roomId}`);
            if ((data.adminUid && data.adminUid === user.uid) || 
                (data.adminKey && adminKey === data.adminKey) || 
                (data.adminKey && localAdminKey === data.adminKey) ||
                localStorage.getItem(`golf_admin_${roomId}`) === 'true') {
              if (!isAdmin) {
                setIsAdmin(true);
                localStorage.setItem(`golf_admin_${roomId}`, 'true');
              }
            }
            if (data.adminKey && !adminKey && isAdmin) setAdminKey(data.adminKey);

            if (isAdmin && hasReceivedData.current) return;
            
            hasReceivedData.current = true;
            if (data.updatedAt && data.updatedAt <= lastSentUpdate.current) return;
            const { updatedAt, ...stateData } = data;
            lastSyncedStr.current = JSON.stringify(stateData);
            
            // 상태 덮어쓰기
            if (data.step !== undefined) setStep(data.step);
            if (data.holes !== undefined) setHoles(data.holes);
            if (data.currentHole !== undefined) setCurrentHole(data.currentHole);
            if (data.startTime !== undefined) setStartTime(data.startTime);
            if (data.players !== undefined) setPlayers(data.players);
            if (data.gaepyungRate !== undefined) setGaepyungRate(data.gaepyungRate);
            if (data.isRoundThousand !== undefined) setIsRoundThousand(data.isRoundThousand);
            if (data.birdieRule !== undefined) setBirdieRule(data.birdieRule);
            if (data.eagleRule !== undefined) setEagleRule(data.eagleRule);
            if (data.nearRule !== undefined) setNearRule(data.nearRule);
            if (data.longestRule !== undefined) setLongestRule(data.longestRule);
            if (data.currentPar !== undefined) setCurrentPar(data.currentPar);
            if (data.currentScores !== undefined) setCurrentScores(data.currentScores);
            if (data.currentNear !== undefined) setCurrentNear(data.currentNear);
            if (data.isReverseNear !== undefined) setIsReverseNear(data.isReverseNear);
            if (data.currentLongest !== undefined) setCurrentLongest(data.currentLongest);
            if (data.isReverseLongest !== undefined) setIsReverseLongest(data.isReverseLongest);
            if (data.multiplier !== undefined) setMultiplier(data.multiplier);
            if (data.multiplierReason !== undefined) setMultiplierReason(data.multiplierReason);
            if (data.hasManualMultiplier !== undefined) setHasManualMultiplier(data.hasManualMultiplier);
            if (data.currentExcluded !== undefined) setCurrentExcluded(data.currentExcluded);
            if (data.isHoleExcluded !== undefined) setIsHoleExcluded(data.isHoleExcluded);
          }
        }, (err) => console.error("Snapshot Error:", err));
        return () => unsubscribe();
      }, [user, roomId, isAdmin, adminKey]);

      // 방장 상태 서버 업데이트
      useEffect(() => {
        if (!user || !roomId || !dbInstance || !firebaseInitialized || !isAdmin || !hasReceivedData.current) return;

        const payload = { 
          adminUid: user.uid, 
          adminKey: adminKey,
          step, players, holes, currentHole, startTime, gaepyungRate, isRoundThousand,
          birdieRule, eagleRule, nearRule, longestRule,
          currentPar, currentScores, currentNear, isReverseNear, currentLongest, isReverseLongest, multiplier, multiplierReason, hasManualMultiplier, currentExcluded, isHoleExcluded
        };
        const currentStr = JSON.stringify(payload);
        if (currentStr === lastSyncedStr.current) return;

        const timer = setTimeout(() => {
          lastSyncedStr.current = currentStr;
          const finalPayload = { ...payload, updatedAt: Date.now() };
          lastSentUpdate.current = finalPayload.updatedAt;
          getRoomRef(roomId).set(finalPayload, { merge: true }).catch(e => console.error(e));
        }, 300); 
        return () => clearTimeout(timer);
      }, [step, players, holes, currentHole, startTime, gaepyungRate, isRoundThousand, birdieRule, eagleRule, nearRule, longestRule, currentPar, currentScores, currentNear, isReverseNear, currentLongest, isReverseLongest, multiplier, multiplierReason, hasManualMultiplier, currentExcluded, isHoleExcluded, user, roomId, isAdmin, adminKey]);

      // =====================================================================
      // ★ 비즈니스 로직 및 계산 ★
      // =====================================================================
      const checkAutoDouble = (targetScores, targetPar, rules, prevHoleForTie, excludedArr) => {
        if (!targetScores) return { isDbl: false, reason: '' };
        let isDbl = false;
        let reason = '';
        const excluded = excludedArr || [false, false, false, false];
        const activeScores = targetScores.filter((_, idx) => !excluded[idx]);
        
        if (activeScores.length === 0) return { isDbl: false, reason: '' };
        
        if (rules.birdie && activeScores.some(s => s <= targetPar - 1)) { isDbl = true; reason = '버디이상'; }
        else if (rules.triple && targetPar >= 4 && activeScores.some(s => s >= targetPar + 3)) { isDbl = true; reason = '트리플이상'; }
        else if (rules.doublePar3 && targetPar === 3 && activeScores.some(s => s >= targetPar + 2)) { isDbl = true; reason = '더블이상'; }
        else if (rules.threeTie) {
          const counts = {};
          activeScores.forEach(s => counts[s] = (counts[s] || 0) + 1);
          if (Object.values(counts).some(c => c === 3 && activeScores.length >= 4)) { isDbl = true; reason = '3인동타'; }
        }
        
        if (!isDbl && rules.prevTie && prevHoleForTie) {
          const prevExcluded = prevHoleForTie.excluded || [false, false, false, false];
          const prevActiveScores = prevHoleForTie.scores.filter((_, idx) => !prevExcluded[idx]);
          if (prevActiveScores.length > 1) {
            const allTied = prevActiveScores.every(s => s === prevActiveScores[0]);
            if (allTied) { isDbl = true; reason = '이전홀무승부'; }
          }
        }
        return { isDbl, reason };
      };

      useEffect(() => {
        if (!hasManualMultiplier && doubleRules.timing === 'current' && step === 'play' && !isHoleExcluded) {
          const prevHole = currentHole > 0 ? holes[currentHole - 1] : null;
          const result = checkAutoDouble(currentScores, currentPar, doubleRules, prevHole, currentExcluded);
          setMultiplier(result.isDbl ? 2 : 1);
          setMultiplierReason(result.reason);
        }
      }, [currentScores, currentPar, currentExcluded, doubleRules, hasManualMultiplier, currentHole, step, holes, isHoleExcluded]);

      const actualCourseName = selectedCourseId === 'custom' ? customCourseName : (GOLF_COURSES.find(c => c.id === selectedCourseId)?.name || '');
      const actualFrontName = selectedCourseId === 'custom' ? customFrontName : frontNineId;
      const actualBackName = selectedCourseId === 'custom' ? customBackName : backNineId;

      const coursePars = useMemo(() => {
        if (selectedCourseId === 'custom') return Array(18).fill(4); 
        const course = GOLF_COURSES.find(c => c.id === selectedCourseId) || GOLF_COURSES[0];
        const front = course.nineHoles[frontNineId] || Object.values(course.nineHoles)[0];
        const back = course.nineHoles[backNineId] || Object.values(course.nineHoles)[0];
        return [...front, ...back];
      }, [selectedCourseId, frontNineId, backNineId]);

      const getHoleBalance = (hole) => {
        if (!hole || hole.isHoleExcluded) return [0, 0, 0, 0]; 
        const excluded = hole.excluded || [false, false, false, false];
        const activeCount = excluded.filter(e => !e).length;
        if (activeCount <= 1) return [0, 0, 0, 0]; 

        const sumScores = hole.scores.reduce((sum, score, idx) => excluded[idx] ? sum : sum + score, 0);
        const mult = hole.multiplier || 1;
        let balances = [0, 0, 0, 0];
        
        hole.scores.forEach((score, idx) => {
          if (excluded[idx]) return;
          balances[idx] = (sumScores - (score * activeCount)) * baseAmount * mult;
        });

        const applySpecialBonus = (winnerIdx, isReverse, rule) => {
          if (winnerIdx !== null && winnerIdx !== undefined && !excluded[winnerIdx] && rule.enabled) {
            const bonus = rule.type === 'strokes' ? (rule.strokeValue || 0) * baseAmount * mult : (rule.fixedValue || 0);
            for (let j = 0; j < 4; j++) if (j !== winnerIdx && !excluded[j]) {
              if (isReverse) { balances[winnerIdx] -= bonus; balances[j] += bonus; }
              else { balances[winnerIdx] += bonus; balances[j] -= bonus; }
            }
          }
        };

        hole.scores.forEach((score, index) => {
          if (excluded[index]) return;
          const diff = score - hole.par;
          if (diff === -1) applySpecialBonus(index, false, birdieRule);
          else if (diff <= -2) applySpecialBonus(index, false, eagleRule);
        });

        if (hole.par === 3 && nearRule.enabled) applySpecialBonus(hole.near, hole.isReverseNear, nearRule);
        if (hole.par >= 5 && longestRule.enabled) applySpecialBonus(hole.longest, hole.isReverseLongest, longestRule);

        return balances;
      };

      const calculateTransfers = (balances) => {
        let debtors = balances.map((b, i) => ({ id: i, amount: -b })).filter(d => d.amount > 0);
        let creditors = balances.map((b, i) => ({ id: i, amount: b })).filter(c => c.amount > 0);
        let transfers = {};
        debtors.forEach(d => { transfers[d.id] = { total: d.amount, details: [] }; });
        let i = 0, j = 0;
        while (i < debtors.length && j < creditors.length) {
          let debtor = debtors[i], creditor = creditors[j], amount = Math.min(debtor.amount, creditor.amount);
          transfers[debtor.id].details.push({ to: creditor.id, amount: amount });
          debtor.amount -= amount; creditor.amount -= amount;
          if (debtor.amount === 0) i++;
          if (creditor.amount === 0) j++;
        }
        return transfers;
      };

      const totalParSumAll = useMemo(() => {
        let sum = 0;
        for (let i = 0; i < currentHole; i++) sum += (holes[i] ? holes[i].par : coursePars[i]);
        return sum;
      }, [holes, currentHole, coursePars]);

      const totalStrokesSum = useMemo(() => {
        let strokes = [0, 0, 0, 0];
        holes.forEach(hole => {
          if (!hole) return;
          hole.scores.forEach((s, i) => { if (!(hole.excluded && hole.excluded[i])) strokes[i] += s; });
        });
        return strokes;
      }, [holes]);

      const gameBalances = useMemo(() => {
        let b = [0, 0, 0, 0];
        holes.forEach((h) => { if (h) { const hb = getHoleBalance(h); hb.forEach((v, i) => b[i] += v); } });
        return b;
      }, [holes, baseAmount, birdieRule, eagleRule, nearRule, longestRule]);

      const totalBalances = useMemo(() => gameBalances.map((gb, i) => gb + (parseInt(initialBalances[i], 10) || 0)), [gameBalances, initialBalances]);

      const settlementData = useMemo(() => {
        let totalGiven = 0;
        const rate = isNaN(gaepyungRate) || gaepyungRate === '' ? 0 : Number(gaepyungRate);
        const details = players.map((p, i) => {
          const bal = totalBalances[i];
          let cut = 0;
          if (bal > 0) {
            const rawCut = bal * (rate / 100);
            cut = isRoundThousand ? Math.floor(rawCut / 1000) * 1000 : Math.floor(rawCut);
            totalGiven += cut;
          }
          return { name: p, original: bal, cut, receive: 0, final: 0 };
        });
        let losers = details.map((d, i) => ({ index: i, amount: d.original < 0 ? Math.abs(d.original) : 0 })).filter(l => l.amount > 0);
        if (losers.length > 0) {
          let totalReceived = 0;
          losers.forEach(l => {
            const rawR = l.amount * (rate / 100);
            const r = isRoundThousand ? Math.floor(rawR / 1000) * 1000 : Math.floor(rawR);
            details[l.index].receive = r;
            totalReceived += r;
          });
          const left = totalGiven - totalReceived;
          if (left !== 0) {
            const maxL = Math.max(...losers.map(l => l.amount));
            const bLosers = losers.filter(l => l.amount === maxL);
            bLosers.sort((a, b) => b.index - a.index);
            details[bLosers[0].index].receive += left;
          }
        }
        details.forEach(d => { d.final = d.original > 0 ? d.original - d.cut : d.original + d.receive; });
        let gDebt = details.map((d, i) => ({ id: i, amount: d.cut })).filter(d => d.amount > 0);
        let gCred = details.map((d, i) => ({ id: i, amount: d.receive })).filter(c => c.amount > 0);
        let gTransfers = {};
        gDebt.forEach(d => { gTransfers[d.id] = { total: d.amount, details: [] }; });
        let i = 0, j = 0;
        while (i < gDebt.length && j < gCred.length) {
          let d = gDebt[i], c = gCred[j], a = Math.min(d.amount, c.amount);
          gTransfers[d.id].details.push({ to: c.id, amount: a });
          d.amount -= a; c.amount -= a;
          if (d.amount === 0) i++;
          if (c.amount === 0) j++;
        }
        return { details, gTransfers };
      }, [players, totalBalances, gaepyungRate, isRoundThousand]);

      useEffect(() => {
        if (!startTime || step === 'setup') return;
        const tid = setInterval(() => {
          const diff = Date.now() - startTime;
          const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
          setElapsedTime(`${h > 0 ? h+':' : ''}${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`);
        }, 1000);
        return () => clearInterval(tid);
      }, [startTime, step]);

      // UI 이벤트 핸들러
      const handleStart = () => {
        if (!user) return showToastMsg("로그인 연결 중입니다...");
        hasReceivedData.current = true; setIsAdmin(true);
        let newId = roomId;
        if (!newId) {
          newId = Math.random().toString(36).substring(2, 8).toUpperCase();
          setRoomId(newId);

        if (!currentAdminKey) {

        localStorage.setItem(`golf_admin_${newId}`, 'true');
        localStorage.setItem(`golf_adminKey_${newId}`, currentAdminKey);
        localStorage.setItem('golf_last_room', newId);
        
        updateUrlSafe(newId, currentAdminKey);

        if (dbInstance && user) {
          getRoomRef(newId).set({ adminUid: user.uid, adminKey: currentAdminKey, updatedAt: Date.now() }, { merge: true }).catch(e => console.error(e));
        }
        if (!startTime) setStartTime(Date.now());
        setStep('play'); loadHoleData(0); setShowQrModal(true);
      };

      const updateScore = (index, delta) => {
        if (!isAdmin || currentExcluded[index]) return;
        const newS = Math.max(1, currentScores[index] + delta);
        setCurrentScores(p => { const n = [...p]; n[index] = newS; return n; });

        if (currentPar >= 5 && currentLongest === index) setIsReverseLongest(newS > currentPar);
      };

      const handleParSelect = (par) => {
        if (!isAdmin) return;
        if (isParLongPress.current) { isParLongPress.current = false; return; }
        setCurrentPar(pPar => {

          return par;
        });
      };

      const startParPress = () => {
        if (!isAdmin) return;
        parPressTimer.current = setTimeout(() => {
          isParLongPress.current = true;

            return nP;
          });

      const cancelParPress = () => { if (parPressTimer.current) clearTimeout(parPressTimer.current); };

      const handleMultiplierMinus = () => {
        if (!isAdmin) return;
        setHasManualMultiplier(true);
        if (isHoleExcluded) return; 
        if (multiplier > 1) setMultiplier(multiplier - 1);
        else if (multiplier === 1) setIsHoleExcluded(true);
      };

      const handleMultiplierPlus = () => {
        if (!isAdmin) return;
        setHasManualMultiplier(true);
        if (isHoleExcluded) { setIsHoleExcluded(false); setMultiplier(1); }
        else setMultiplier(multiplier + 1);
      };

      const loadHoleData = (idx) => {
        setCurrentHole(idx);
        const ex = holes[idx];
        if (ex) {
          setCurrentPar(ex.par); setCurrentScores([...ex.scores]);
          setMultiplier(ex.multiplier||1); setMultiplierReason(ex.multiplierReason||''); setCurrentExcluded(ex.excluded||[false,false,false,false]);
          setIsHoleExcluded(ex.isHoleExcluded||false); setCurrentNear(ex.near); setIsReverseNear(ex.isReverseNear);
          setCurrentLongest(ex.longest); setIsReverseLongest(ex.isReverseLongest);
          setHasManualMultiplier(ex.hasManualMultiplier||false);
        } else {
          const p = coursePars[idx]||4;
          setCurrentPar(p); setCurrentScores([p,p,p,p]);
          
          let initialMultiplier = 1;
          let initialReason = '';
          const prevHole = idx > 0 ? holes[idx - 1] : null;
          if (doubleRules.timing === 'prev' && prevHole) {
              const autoDbl = checkAutoDouble(prevHole.scores, prevHole.par, doubleRules, prevHole, prevHole.excluded);
              if (autoDbl.isDbl) {
                  initialMultiplier = 2;
                  initialReason = autoDbl.reason;
              }
          }
          
          setMultiplier(initialMultiplier); setMultiplierReason(initialReason);
          setCurrentExcluded([...globalExcluded]); setIsHoleExcluded(false);
          setCurrentNear(null); setIsReverseNear(false); setCurrentLongest(null); setIsReverseLongest(false);
          setHasManualMultiplier(false);
        }
      };

      const saveHole = () => {
        if (!isAdmin) return;
        const nH = [...holes];
        nH[currentHole] = {
          par: currentPar, scores: [...currentScores], multiplier, excluded: [...currentExcluded],
          isHoleExcluded, near: currentPar === 3 && nearRule.enabled ? currentNear : null, isReverseNear,
          longest: currentPar >= 5 && longestRule.enabled ? currentLongest : null, isReverseLongest
        };
        setHoles(nH); setStep('hole-result');
      };

      const handleNextHole = () => {
        if (!isAdmin) return;
        if (currentHole < 17) {
          loadHoleData(currentHole + 1);
          setStep('play');
        } else {
          setStep('scorecard');
        }
      };

      const updatePlayerName = (idx, name) => { if(!isAdmin) return; const n = [...players]; n[idx] = name; setPlayers(n); };
      const updateInitialBalance = (idx, val) => { if(!isAdmin) return; const v = val.replace(/,/g,''); const n = [...initialBalances]; n[idx] = v === '' ? 0 : parseInt(v, 10); setInitialBalances(n); };

      const startPress = (e, idx, isGlobal) => {
        if (!isAdmin) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
        pressTimer.current = setTimeout(() => {
          if (isGlobal) {
            setGlobalExcluded(prev => { const newEx = [...prev]; newEx[idx] = !newEx[idx]; return newEx; });
          } else {
            const nEx = [...currentExcluded]; nEx[idx] = !nEx[idx]; setCurrentExcluded(nEx);
          }
        }, 500); 
      };
      const cancelPress = () => { if (pressTimer.current) { clearTimeout(pressTimer.current); pressTimer.current = null; } };

      // 화면 분기 랜더링
      let content = null;
      if (step === 'setup') {
        const hSum = initialBalances.reduce((s, v, i) => globalExcluded[i] ? s : s + (parseInt(v, 10) || 0), 0);
        content = (
          <div className={`flex flex-col flex-1 relative ${!isAdmin && startTime ? 'pointer-events-none opacity-80' : ''}`}>
            <div className="bg-[#128853] text-white pt-12 pb-24 px-6 rounded-b-[40px] text-center shadow-md relative z-0 pointer-events-auto">
              <div className="flex justify-center items-center gap-2 mb-2"><span className="text-2xl">⛳</span><h1 className="text-2xl font-black tracking-tight">골프 타당 게임</h1></div>
              <p className="text-[#a7e2c9] text-sm font-medium">라운드 전 설정을 완료해 주세요</p>
            </div>
            
            <div className="max-w-md w-full mx-auto px-4 -mt-16 relative z-10 space-y-4 flex-1">
              <div className="bg-white rounded-[24px] shadow-sm p-5 border border-gray-100 pointer-events-auto">
                <label className="flex items-center text-[15px] font-bold text-gray-800 mb-4"><Icon name="Map" className="w-5 h-5 mr-2 text-gray-600" /> 골프장 및 코스 설정</label>
                <div className="space-y-3">
                  <div className="flex gap-2">
                    {selectedCourseId === 'custom' ? (
                      <input type="text" value={customCourseName} onChange={(e) => setCustomCourseName(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-semibold text-gray-800 outline-none focus:ring-2 focus:ring-[#128853]" />
                    ) : (<div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 flex items-center text-sm font-semibold text-gray-800">{actualCourseName}</div>)}
                    <button onClick={() => setShowCourseSearchModal(true)} className="bg-[#1e9f64] hover:bg-[#128853] text-white px-4 rounded-xl font-bold text-sm transition flex items-center shrink-0 shadow-sm active:scale-[0.98]"><Icon name="Search" className="w-4 h-4 mr-1.5" /> 검색</button>
                  </div>

                    </div>
                    <div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-1.5 flex items-center"><span className="text-xs text-gray-500 font-bold px-2 whitespace-nowrap">후반</span>

              <div className="bg-white rounded-[24px] shadow-sm p-5 border border-gray-100 pointer-events-auto">

              {showDoubleSettings && (
                <div className="bg-white p-5 rounded-[24px] shadow-sm border space-y-4 animate-in fade-in slide-in-from-top-2 pointer-events-auto">

                    {['none', 'current', 'prev'].map(t => (
                      <button key={t} onClick={() => setDoubleRules({...doubleRules, timing: t})} className={`flex-1 py-2 text-xs font-bold rounded-lg ${doubleRules.timing === t ? 'bg-white shadow-sm text-[#128853]' : 'text-gray-500'}`}>{t === 'none' ? '미적용' : t === 'current' ? '당홀' : '전홀'}</button>
                    ))}
                  </div>
                  <div className="space-y-2 pt-2 border-t">
                    {[{ id: 'birdie', label: '버디 이상' }, { id: 'threeTie', label: '3인 동타 (정확히 3명 동타시)' }, { id: 'prevTie', label: '이전 홀 무승부 (모두 동타)' }, { id: 'triple', label: '파4/파5 트리플 보기 이상' }, { id: 'doublePar3', label: '파3 더블 보기 이상' }].map(c => (
                      <label key={c.id} className="flex items-center cursor-pointer p-2 bg-gray-50 rounded-xl">
                        <input type="checkbox" checked={doubleRules[c.id]} onChange={(e) => { const n = { ...doubleRules, [c.id]: e.target.checked }; if (doubleRules.timing === 'none' && e.target.checked) n.timing = 'current'; setDoubleRules(n); }} className="w-4 h-4 ml-2 mr-3 text-[#128853]" />

                      </label>
                    ))}
                  </div>
                </div>
              )}

              {showBonusSettings && (
                <div className="bg-white p-5 rounded-[24px] shadow-sm border space-y-5 animate-in fade-in slide-in-from-top-2 pointer-events-auto">
                  {[{id:'birdie', label:'🐤 버디 축하금', rule:birdieRule, set:setBirdieRule, toggle: false}, 
                    {id:'eagle', label:'🦅 이글 축하금', rule:eagleRule, set:setEagleRule, toggle: false}, 
                    {id:'near', label:'🎯 니어 (파3)', rule:nearRule, set:setNearRule, toggle: true}, 
                    {id:'longest', label:'🏌️ 롱기 (파5+)', rule:longestRule, set:setLongestRule, toggle: true}].map(b => (
                    <div key={b.id} className="space-y-3 border-b border-gray-100 last:border-0 pb-5 last:pb-0">
                      <label className="flex items-center cursor-pointer">
                        {b.toggle && (
                          <input type="checkbox" checked={b.rule.enabled} onChange={(e)=>b.set({...b.rule, enabled:e.target.checked})} className="w-4 h-4 mr-2 text-[#128853] rounded focus:ring-[#128853]" />

                        <button onClick={()=>b.set({...b.rule, type:'fixed'})} className={`col-span-1 flex items-center justify-center text-[12px] whitespace-nowrap font-bold rounded-lg transition border active:scale-95 ${b.rule.type==='fixed'?'border-[#128853] bg-white text-[#128853] shadow-sm':'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}>지정 포인트</button>
                        <div className="col-span-1 relative flex items-center bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                          <input type="text" inputMode="numeric" value={b.rule.type === 'strokes' ? (b.rule.strokeValue === '' ? '' : b.rule.strokeValue) : (b.rule.fixedValue === '' ? '' : Number(b.rule.fixedValue).toLocaleString())} onChange={(e)=>{ const v = e.target.value.replace(/,/g,''); if(b.rule.type==='strokes') b.set({...b.rule, strokeValue: v === '' ? '' : parseInt(v, 10)}); else b.set({...b.rule, fixedValue: v === '' ? '' : parseInt(v, 10)}); }} className="w-full h-full text-right px-2 text-[13px] font-black bg-transparent outline-none pr-5 text-[#128853]" />
                          <span className="absolute right-2 text-[10px] text-gray-400 font-bold">{b.rule.type==='strokes'?'타':'P'}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div className="pb-safe-sm pointer-events-auto">
                <button onClick={startTime ? () => setStep('play') : handleStart} className="w-full bg-[#1e9f64] text-white font-bold py-4 rounded-2xl shadow active:scale-[0.98] transition hover:bg-[#128853]">
                  {startTime ? "게임 계속하기" : "새 게임 시작 (방장)"} <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
                </button>
              </div>
            </div>
          </div>
        );

        content = (
          <div className="flex flex-col flex-1 relative">
            <div className="bg-[#128853] text-white p-4 pt-10 shadow-md flex justify-between items-center rounded-b-[24px] sticky top-0 z-20">
              <button onClick={() => setStep('scorecard')} className="p-2 active:scale-95 transition hover:bg-white/10 rounded-full"><Icon name="Trophy" className="w-6 h-6" /></button>

                <div className="font-black text-[20px] tracking-tight flex items-center gap-2">
                  <span>{currentHole + 1}H</span>

                    <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none active:scale-95">
                      LIVE
                    </span>
                  )}
                </div>
              </div>
              <div className="flex items-center gap-2">
                {startTime && <div className="text-[11px] font-bold text-white bg-black/20 px-2 py-1 rounded-md flex items-center gap-1 whitespace-nowrap"><Icon name="Clock" className="w-3 h-3"/> {elapsedTime}</div>}

                  <button onClick={() => setStep('setup')} className="p-1 hover:bg-white/10 rounded-full transition text-xs font-semibold flex flex-col items-center active:scale-95"><Icon name="Settings" className="w-5 h-5" /></button>

              </div>
            </div>

                  <div className="flex bg-gray-100 rounded-[12px] p-1 gap-1">
                    {[3, 4].map((par) => (
                      <button key={par} onClick={() => handleParSelect(par)} className={`flex-1 h-9 rounded-[8px] font-black text-[15px] transition-all active:scale-[0.98] ${currentPar === par ? 'bg-[#128853] shadow-sm text-white' : 'text-gray-400 hover:text-gray-800'}`}>{par}</button>
                    ))}
                    <button onMouseDown={startParPress} onTouchStart={startParPress} onMouseUp={cancelParPress} onTouchEnd={cancelParPress} onMouseLeave={cancelParPress} onClick={() => { const newPar = currentPar >= 5 ? currentPar : 5; handleParSelect(newPar); }} className={`flex-1 h-9 rounded-[8px] font-black text-[15px] transition-all active:scale-[0.98] ${currentPar >= 5 ? 'bg-[#128853] shadow-sm text-white' : 'text-gray-400 hover:text-gray-800'}`}>
                      {currentPar >= 5 ? currentPar : 5}
                    </button>
                  </div>
                </div>

                <div className={`flex-1 bg-white rounded-[16px] shadow-sm p-3 border border-gray-100 flex flex-col justify-center gap-2 ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                  <div className="flex items-center justify-between">
                    <span className="font-black text-gray-800 text-[14px] ml-1">배수 적용</span>
                    <div className="flex items-center gap-1">
                      {multiplier > 1 && multiplierReason && !isHoleExcluded && (
                        <span className="bg-[#ea580c] text-white text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm">{multiplierReason}</span>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center justify-between bg-gray-50 p-1.5 rounded-[12px] border border-gray-100 h-11">
                    <button onClick={handleMultiplierMinus} className="w-8 h-8 flex justify-center items-center bg-white rounded-[8px] text-gray-500 shadow-sm transition active:scale-95"><Icon name="Minus" className="w-4 h-4" /></button>
                    <span className={`font-black text-center ${isHoleExcluded ? 'text-gray-400 text-[13px]' : multiplier > 1 ? 'text-red-500 text-[16px]' : 'text-gray-800 text-[16px]'}`}>
                      {isHoleExcluded ? '제외' : `x${multiplier}`}
                    </span>
                    <button onClick={handleMultiplierPlus} className="w-8 h-8 flex justify-center items-center bg-white rounded-[8px] text-gray-500 shadow-sm transition active:scale-95"><Icon name="Plus" className="w-4 h-4" /></button>
                  </div>
                </div>
              </div>

              {((currentPar === 3 && nearRule.enabled) || (currentPar >= 5 && longestRule.enabled)) && (
                <div className={`bg-white rounded-[16px] shadow-sm p-3 border border-gray-100 flex flex-col gap-2 ${!isAdmin ? 'pointer-events-none opacity-80' : ''} animate-in fade-in slide-in-from-top-2`}>
                  <div className="flex items-center justify-between px-1">
                    <div className="flex items-center gap-1.5">
                      {currentPar === 3 ? <span className="text-[14px]">🎯</span> : <span className="text-[14px]">🏌️</span>}
                      <label className="flex items-center font-black text-gray-800 text-[14px]">
                        {currentPar === 3 ? '니어리스트(미선택 가능)' : '롱기스트(미선택 가능)'}
                      </label>
                    </div>
                    <label className="flex items-center gap-1.5 cursor-pointer pointer-events-auto">
                      <input type="checkbox" className={`w-4 h-4 rounded border-gray-300 ${currentPar === 3 ? 'text-[#ef4444] focus:ring-red-500' : 'text-[#ef4444] focus:ring-red-500'}`} checked={currentPar === 3 ? isReverseNear : isReverseLongest} onChange={(e) => { if (currentPar === 3) setIsReverseNear(e.target.checked); if (currentPar >= 5) setIsReverseLongest(e.target.checked); }} disabled={!isAdmin} />
                      <span className={`text-[12px] font-bold ${(currentPar === 3 && isReverseNear) || (currentPar >= 5 && isReverseLongest) ? 'text-[#ef4444]' : 'text-gray-600'}`}>{currentPar === 3 ? '역니어' : '역롱기'}</span>
                    </label>
                  </div>
                  <div className="flex gap-1.5 overflow-x-auto pb-1 mt-1">
                    {players.map((p, idx) => !currentExcluded[idx] && (
                      <button key={`special-${idx}`} onClick={() => { 
                        if (currentPar === 3) {
                          if (currentNear === idx) setCurrentNear(null); 
                          else { setCurrentNear(idx); setIsReverseNear(currentScores[idx] > currentPar); }
                        }
                        if (currentPar >= 5) {
                          if (currentLongest === idx) setCurrentLongest(null); 
                          else { setCurrentLongest(idx); setIsReverseLongest(currentScores[idx] > currentPar); }
                        }
                      }} className={`flex-1 py-2 px-1 rounded-[10px] text-[12px] font-bold transition-all border active:scale-95 ${ 
                        (currentPar === 3 && currentNear === idx) 
                          ? (isReverseNear ? 'bg-[#ef4444] text-white border-[#ef4444] shadow-sm' : 'bg-blue-500 text-white border-blue-500 shadow-sm') 
                          : (currentPar >= 5 && currentLongest === idx) 
                            ? (isReverseLongest ? 'bg-[#ef4444] text-white border-[#ef4444] shadow-sm' : 'bg-orange-500 text-white border-orange-500 shadow-sm') 
                            : 'bg-gray-50 text-gray-600 border-gray-200 hover:bg-gray-100' 
                      }`}>
                        {p.length > 4 ? p.substring(0, 4) + '..' : p}
                      </button>
                    ))}
                  </div>
                </div>
              )}

                {players.map((player, idx) => (
                  <div key={idx} className={`p-3 flex items-center justify-between transition cursor-pointer select-none rounded-[16px] ${currentExcluded[idx] ? 'opacity-50 grayscale bg-gray-50' : 'bg-white'}`} onTouchStart={(e) => startPress(e, idx, false)} onTouchEnd={cancelPress} onTouchMove={cancelPress} onMouseDown={(e) => startPress(e, idx, false)} onMouseUp={cancelPress} onMouseLeave={cancelPress} onContextMenu={(e) => e.preventDefault()}>

                      <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-gray-100 rounded-full overflow-hidden shrink-0 border border-gray-200">
                          <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${player}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>
                        </div>
                        <span className={`font-bold text-[15px] truncate ${currentExcluded[idx] ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{player}</span>
                      </div>
                    </div>
                    
                    <div className={`flex items-center justify-end gap-3 bg-transparent ${currentExcluded[idx] ? 'opacity-60' : ''} ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                      {!currentExcluded[idx] && (
                        <div className={`w-5 text-right font-black text-[13px] ${currentScores[idx] - currentPar === 0 ? 'text-[#128853]' : currentScores[idx] - currentPar < 0 ? 'text-blue-600' : 'text-red-600'}`}>
                          {currentScores[idx] - currentPar === 0 ? 'E' : currentScores[idx] - currentPar > 0 ? `+${currentScores[idx] - currentPar}` : currentScores[idx] - currentPar}
                        </div>
                      )}
                      <div className="flex items-center space-x-3">
                        <button onClick={(e) => { e.stopPropagation(); updateScore(idx, -1); }} className="w-10 h-10 flex justify-center items-center bg-[#f1f5f9] rounded-[12px] text-gray-400 border border-gray-200 shadow-sm active:scale-95 transition"><Icon name="Minus" className="w-5 h-5 font-bold" /></button>
                        <div className="w-8 flex flex-col items-center justify-center shrink-0 pointer-events-none">
                          <span className={`text-center font-black text-[22px] tracking-tight leading-none ${currentExcluded[idx] ? 'text-gray-400' : currentScores[idx] - currentPar === -1 ? 'text-[#128853]' : currentScores[idx] - currentPar <= -2 ? 'text-purple-600' : 'text-gray-800'}`}>
                            {currentScores[idx]}
                          </span>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); updateScore(idx, 1); }} className="w-10 h-10 flex justify-center items-center bg-[#128853] rounded-[12px] text-white shadow-sm active:scale-95 transition"><Icon name="Plus" className="w-5 h-5 font-bold" /></button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 p-4 z-20 flex gap-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] pb-safe">
              {isAdmin ? (
               <div className="max-w-md mx-auto flex flex-col gap-2 w-full">
                 <div className="flex gap-2 w-full">
                   <button onClick={() => currentHole > 0 && loadHoleData(currentHole - 1)} disabled={currentHole === 0} className={`flex-[1] py-4 rounded-[16px] font-bold flex flex-col items-center justify-center bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 transition text-[13px] shadow-sm active:scale-[0.98] ${currentHole === 0 ? 'opacity-50' : ''}`}>
                     <div className="flex items-center gap-1"><Icon name="ArrowLeft" className="w-4 h-4"/> 이전 홀</div>
                   </button>
                  <button onClick={saveHole} className="flex-[2] bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 rounded-[16px] shadow-md flex items-center justify-center transition text-[14px] active:scale-[0.98]">
                    결과 및 정산 <Icon name="ArrowRight" className="w-4 h-4 ml-1" />
                  </button>
                 </div>
               </div>
              ) : (
                <div className="max-w-md mx-auto flex gap-2 w-full">
                  <button onClick={() => setStep('scorecard')} className="flex-1 py-4 rounded-[16px] font-bold bg-gray-100 text-gray-600 transition text-[14px] active:scale-[0.98]">
                    전체 스코어
                  </button>
                  <div className="flex-[2] text-center font-bold text-[#128853] py-4 bg-white rounded-[16px] flex items-center justify-center gap-2 border border-[#128853]">
                    <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                    방장이 입력 중입니다...
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      } else if (step === 'hole-result') {
        const currentHoleData = holes[currentHole] || {
          par: currentPar || 4, scores: currentScores || [4,4,4,4], multiplier: multiplier || 1, multiplierReason: multiplierReason || '', excluded: currentExcluded || [false,false,false,false], isHoleExcluded: isHoleExcluded || false, near: null, isReverseNear: false, longest: null, isReverseLongest: false
        };
        const holeBalances = getHoleBalance(currentHoleData);
        const transfers = calculateTransfers(holeBalances);

        content = (
          <div className="flex flex-col flex-1 relative pb-24">
            <div className="bg-gradient-to-b from-[#128853] to-[#1e9f64] text-white pt-12 pb-16 px-6 rounded-b-[40px] shadow-sm text-center relative z-0">
              <div className="absolute top-8 left-6 inline-flex items-center justify-center w-10 h-10 bg-white/20 rounded-full text-sm font-bold backdrop-blur-sm">

                <div className="absolute top-8 right-6 text-[11px] font-bold text-white bg-black/20 px-2.5 py-1.5 rounded-lg flex items-center gap-1 backdrop-blur-sm">

                </div>
              )}

              <div className="text-[15px] font-bold mt-1 text-yellow-300 flex items-center justify-center gap-2">

                {roomId && (
                  <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none ml-2 active:scale-95">

                {players.map((player, idx) => {
                  const score = currentHoleData.scores[idx];
                  const par = currentHoleData.par;
                  const diff = score - par;
                  const bal = holeBalances[idx];

                  return (
                    <div key={idx} className={`flex-1 px-1 ${currentHoleData.excluded?.[idx] ? 'opacity-40' : ''}`}>
                      <div className="w-8 h-8 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-2 overflow-hidden">
                         {currentHoleData.excluded?.[idx] ? <Icon name="UserX" className="w-5 h-5 text-gray-400 mt-1" /> : <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${player}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>}
                      </div>
                      <div className="text-[10px] text-gray-500 font-bold mb-2 truncate px-1">{player}</div>
                      
                      {currentHoleData.excluded?.[idx] ? (
                        <div className="font-bold text-gray-400 text-xs mt-3 bg-gray-50 py-1 rounded-md">제외됨</div>
                      ) : (
                        <>
                          <div className={`font-bold text-[13px] mb-1 flex flex-col items-center justify-center gap-0.5 ${diff === -1 ? 'text-[#128853]' : diff <= -2 ? 'text-purple-600' : 'text-gray-800'}`}>
                            <div className="flex items-center gap-1">
                              {score}타

                            {currentHoleData.par === 3 && currentHoleData.near === idx && (
                              <span className={`text-[9px] px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight ${currentHoleData.isReverseNear ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>
                                {currentHoleData.isReverseNear ? '역니어' : '니어'}
                              </span>
                            )}
                            {currentHoleData.par >= 5 && currentHoleData.longest === idx && (
                              <span className={`text-[9px] px-1.5 py-0.5 rounded mt-0.5 font-black leading-tight ${currentHoleData.isReverseLongest ? 'bg-red-100 text-red-700' : 'bg-orange-100 text-orange-700'}`}>
                                {currentHoleData.isReverseLongest ? '역롱기' : '롱기'}
                              </span>
                            )}
                          </div>
                          <div className={`text-[11px] font-black mt-1 ${bal > 0 ? 'text-[#1ea34a]' : bal < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                            {bal > 0 ? '+' : ''}{bal === 0 ? '-' : bal.toLocaleString()}
                          </div>
                        </>
                      )}
                    </div>
                  );
                })}
              </div>

              {currentHoleData.isHoleExcluded ? (
                <div className="bg-red-50 rounded-[20px] shadow-sm p-6 text-center text-red-500 font-bold border border-red-100 mb-6">
                  ⚠️ 이 홀은 전체 내기에서 제외되었습니다. (타수만 기록됨)
                </div>
              ) : (
                <div>
                  <div className="text-center text-[13px] font-bold text-gray-600 mb-4 flex items-center justify-center">
                    <div className="w-5 h-5 mr-1.5 bg-[#1ea34a] text-white rounded-full flex items-center justify-center font-bold text-[10px]">P</div> 포인트 이동 (주는 사람 기준)
                  </div>
                  
                  {Object.keys(transfers).length === 0 ? (
                    <div className="bg-white rounded-[24px] shadow-sm p-8 text-center text-gray-400 font-semibold border border-gray-100">
                      변동 포인트가 없습니다.
                    </div>
                  ) : (
                    <div className="space-y-4">
                      {Object.entries(transfers).map(([fromId, data]) => (

                            <div className="flex items-center gap-3">
                              <div className="w-10 h-10 bg-gray-100 rounded-full overflow-hidden shrink-0">
                                <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${players[fromId]}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>

                              <div>
                                <div className="text-[10px] text-gray-400 font-bold mb-0.5">주는 사람</div>
                                <div className="font-black text-base text-gray-800">{players[fromId]}</div>
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-[10px] text-gray-400 font-bold mb-0.5">총 이동 포인트</div>
                              <div className="font-black text-[19px] text-red-500">{data.total.toLocaleString()}P</div>
                            </div>
                          </div>
                          <div className="bg-gray-50 rounded-[16px] p-3 space-y-2 border border-gray-100">
                            {data.details.map((detail, idx) => (
                              <div key={idx} className="flex justify-between items-center text-[13px]">
                                <span className="text-gray-600 font-semibold flex items-center">
                                  <Icon name="ArrowRight" className="w-3.5 h-3.5 mx-2 text-gray-400" /> 
                                  {players[detail.to]}
                                </span>
                                <span className="font-bold text-blue-600">{detail.amount.toLocaleString()}P</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
            
            <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 p-4 z-20 flex gap-3 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] pb-safe">
              {isAdmin ? (
               <div className="max-w-md mx-auto flex flex-col gap-2 w-full">
                 <div className="flex gap-2 w-full">
                   <button onClick={() => setStep('play')} className="flex-[1] py-4 rounded-[16px] font-bold flex flex-col items-center justify-center bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 transition text-[13px] shadow-sm active:scale-[0.98]">
                     <div className="flex items-center gap-1"><Icon name="Edit3" className="w-4 h-4"/> 수정하기</div>
                   </button>
                   <button onClick={() => setStep('scorecard')} className="flex-[1] py-4 rounded-[16px] font-bold flex flex-col items-center justify-center bg-gray-100 text-gray-600 hover:bg-gray-200 transition text-[13px] active:scale-[0.98]">
                    스코어보드
                  </button>
                  <button onClick={handleNextHole} className="flex-[1.5] bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 rounded-[16px] shadow-md flex items-center justify-center transition text-[14px] active:scale-[0.98]">
                    {currentHole === 17 ? '최종 완료' : '다음 홀'} <Icon name="ArrowRight" className="w-4 h-4 ml-1" />
                  </button>
                 </div>
               </div>
              ) : (
                <div className="max-w-md mx-auto flex gap-2 w-full">
                  <button onClick={() => setStep('scorecard')} className="flex-1 py-4 rounded-[16px] font-bold bg-gray-100 text-gray-600 transition text-[14px] active:scale-[0.98]">

                  </button>
                  <div className="flex-[2] text-center font-bold text-[#128853] py-4 bg-white rounded-[16px] flex items-center justify-center gap-2 border border-[#128853]">
                    <span className="relative flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span></span>
                    방장이 입력 중입니다...
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      } else if (step === 'scorecard') {
        const generateScorecardText = () => {
          const date = new Date().toLocaleDateString('ko-KR');
          let text = `⛳ 골프 타당 게임 스코어카드\n📍 코스: ${actualCourseName} (${actualFrontName} / ${actualBackName})\n📅 일시: ${date}\n\n[현재 합산 결과]\n`;
          players.forEach((p, i) => {
            const bal = gameBalances[i];
            const total = totalBalances[i];
            const balText = bal > 0 ? `+${bal.toLocaleString()}` : bal === 0 ? '0' : bal.toLocaleString();
            text += `🏌️ ${p}: ${balText}P (핸디포함 ${total > 0 ? '+' : ''}${total.toLocaleString()}P)\n`;
          });
          text += `\n* 진행 상황: ${currentHole}H 완료`;
          return text;
        };

        const handleShareAction = () => {
          const text = generateScorecardText();
          const el = document.createElement("textarea"); el.value = text; document.body.appendChild(el); el.select();
          try { document.execCommand('copy'); showToastMsg('복사되었습니다!'); } catch (err) { showToastMsg('복사 실패'); }
          document.body.removeChild(el);
        };

        const handleSaveAction = () => {
          const text = generateScorecardText();
          const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a'); link.href = url; link.download = `골프스코어.txt`;
          document.body.appendChild(link); link.click(); document.body.removeChild(link); URL.revokeObjectURL(url);
          showToastMsg('저장되었습니다.');
        };

        content = (
          <div className="flex flex-col flex-1 relative pb-24">
            <div className="bg-[#1f2937] p-3 text-white flex items-center justify-between sticky top-0 z-20 shadow-md">
              <button onClick={() => setStep('play')} className="p-2 hover:bg-white/10 rounded-full transition active:scale-95"><Icon name="ArrowLeft" className="w-5 h-5"/></button>
              <div className="text-center flex flex-col items-center justify-center">
                <div className="font-black text-[17px] tracking-tight flex items-center gap-2">
                  <span>전체 스코어보드</span>
                  {roomId && (
                    <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none active:scale-95">
                      LIVE
                    </span>
                  )}
                </div>
              </div>
              <div className="flex gap-1.5 items-center">
                {startTime && <div className="text-[11px] font-bold text-white bg-black/30 px-2 py-1 rounded-md flex items-center gap-1 whitespace-nowrap"><Icon name="Clock" className="w-3 h-3"/> {elapsedTime}</div>}
                <button onClick={handleSaveAction} className="p-2 hover:bg-white/10 rounded-full transition text-gray-300 hover:text-white active:scale-95"><Icon name="Download" className="w-5 h-5"/></button>
                <button onClick={handleShareAction} className="p-2 hover:bg-white/10 rounded-full transition text-gray-300 hover:text-white active:scale-95"><Icon name="Share2" className="w-5 h-5"/></button>
              </div>
            </div>

            <div className="flex-1 overflow-x-auto relative w-full bg-[#f4f6f8] pb-10">
              <div className="flex bg-white py-3 border-b border-gray-200 sticky top-0 z-10 px-2 gap-1 shadow-sm">
                 <div className="w-16 shrink-0"></div>
                 {players.map((p, i) => {
                   const rel = totalStrokesSum[i] - totalParSumAll;
                   const formattedRel = rel > 0 ? `+${rel}` : rel === 0 ? 'E' : `${rel}`;
                   return (
                     <div key={i} className="flex-1 flex flex-col items-center justify-center bg-gray-50 rounded-[12px] py-2 px-1 border border-gray-100 mx-[1px]">
                        <div className="w-6 h-6 bg-gray-200 rounded-full mb-1 overflow-hidden">
                           <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${p}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>

                        <span className="text-[10px] font-bold text-gray-800 truncate w-full text-center px-1">{p}</span>
                        <div className="text-[12px] font-black text-[#16a34a] mt-1 whitespace-nowrap flex items-center justify-center">
                          <span>{formattedRel}</span>
                        </div>
                     </div>
                   );
                 })}
              </div>

                <button onClick={() => setScorecardTab('back')} className={`flex-1 py-3 rounded-[12px] text-[13px] font-bold transition-all border active:scale-[0.98] ${scorecardTab === 'back' ? 'bg-white border-[#128853] text-[#128853] shadow-sm' : 'bg-white border-gray-200 text-gray-400 hover:bg-gray-50'}`}>{actualBackName} 코스</button>
              </div>

              <div className="p-3 space-y-2">
                {holes.map((hole, hIdx) => {
                  const isFront = hIdx < 9;
                  if (scorecardTab === 'front' && !isFront) return null;
                  if (scorecardTab === 'back' && isFront) return null;
                  
                  return (
                    <React.Fragment key={hIdx}>
                      {!hole ? (
                        <div onClick={() => { if (isAdmin) { loadHoleData(hIdx); setStep('play'); } }} className="flex items-center py-2 px-2 bg-white rounded-[16px] border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-50 transition mb-1.5 active:scale-[0.98]">
                           <div className="w-10 flex flex-col items-center justify-center shrink-0">
                              <span className="font-bold text-gray-800 text-[13px]">{hIdx + 1}H</span>
                              <span className="text-[9px] text-gray-400 mt-0.5">P {coursePars[hIdx] || 4}</span>
                           </div>
                           <div className="w-6 shrink-0 text-center"></div>

                             <div key={i} className="flex-1 px-1">
                               <div className="bg-gray-100 rounded-lg py-1.5 text-gray-300 text-center text-[10px] font-bold">대기</div>
                             </div>
                           ))}
                        </div>
                      ) : (
                        (() => {
                          const balances = getHoleBalance(hole);
                          return (
                            <div onClick={() => { if (isAdmin) { loadHoleData(hIdx); setStep('play'); } }} className="flex items-center py-2 px-2 bg-white rounded-[16px] border border-gray-100 shadow-sm cursor-pointer hover:bg-gray-50 transition mb-1.5 active:scale-[0.98]">
                               <div className="w-10 flex flex-col items-center justify-center shrink-0">
                                  <span className="font-black text-gray-800 text-[14px]">{hIdx + 1}H</span>
                                  <span className="text-[9px] text-gray-500 mt-0.5 font-bold">P {hole.par}</span>
                               </div>
                               <div className="w-6 flex items-center justify-center shrink-0">
                                  {hole.isHoleExcluded ? '' : ( hole.multiplier > 1 ? <span className="text-red-500 bg-red-50 text-[9px] font-black px-1 py-0.5 rounded">x{hole.multiplier}</span> : <span className="text-gray-300 text-xs font-black">-</span> )}
                               </div>
                               {players.map((p, i) => {
                                 const isExcluded = (hole.excluded && hole.excluded[i]) || hole.isHoleExcluded;
                                 const score = hole.scores[i];
                                 const diff = score - hole.par;
                                 const bal = balances[i];
                                 return (
                                   <div key={i} className={`flex-1 px-1 flex flex-col items-center justify-center ${isExcluded ? 'opacity-40' : ''}`}>
                                     {isExcluded && !hole.isHoleExcluded ? (
                                       <div className="w-full bg-gray-50 rounded-lg py-1.5 text-center font-bold text-gray-400 text-[10px]">제외</div>
                                     ) : (
                                       <>
                                         <div className={`w-full rounded-lg py-1 flex items-center justify-center gap-0.5 font-black text-[15px] ${hole.isHoleExcluded ? 'text-gray-400' : diff <= -2 ? 'text-purple-600 bg-purple-50' : diff === -1 ? 'text-[#128853] bg-[#e5f5ec]' : 'text-gray-800'}`}>
                                           <span>{score}</span>
                                         </div>
                                         {hole.par === 3 && hole.near === i && (
                                          <span className={`text-[9px] font-black mt-0.5 leading-none ${hole.isReverseNear ? 'text-red-500' : 'text-blue-500'}`}>{hole.isReverseNear ? '역니어' : '니어'}</span>
                                         )}
                                         {hole.par >= 5 && hole.longest === i && (
                                          <span className={`text-[9px] font-black mt-0.5 leading-none ${hole.isReverseLongest ? 'text-red-500' : 'text-orange-500'}`}>{hole.isReverseLongest ? '역롱기' : '롱기'}</span>
                                         )}
                                         
                                         {!hole.isHoleExcluded && (
                                            <div className={`text-[9px] font-bold mt-1 whitespace-nowrap tracking-tighter ${bal > 0 ? 'text-[#1ea34a]' : bal < 0 ? 'text-red-500' : 'text-gray-400'}`}>
                                              {bal > 0 ? `+${bal.toLocaleString()}` : ''}{bal === 0 ? '-' : bal < 0 ? `${bal.toLocaleString()}` : ''}
                                            </div>
                                         )}
                                       </>
                                     )}
                                   </div>
                                 );
                               })}
                            </div>
                          );
                        })()
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
            
            <div className="bg-[#fcfcfc] border-t border-gray-200 shadow-[0_-15px_20px_-5px_rgba(0,0,0,0.05)] fixed bottom-0 left-0 right-0 z-30 pb-safe">
               <div className="max-w-md mx-auto p-4 pt-3">
                  <div className="flex justify-between items-center mb-2.5">
                    <div className="text-[12px] font-bold text-gray-800 flex items-center"><Icon name="Trophy" className="w-4 h-4 text-yellow-500 mr-1.5"/> 현재 합산 결과</div>
                    {isAdmin && <button onClick={()=>setStep('settlement')} className="bg-[#1f2937] text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm active:scale-95 transition">정산하기</button>}
                  </div>
                  <div className="flex gap-2">
                    {players.map((p, i) => (
                      <div key={i} className={`flex-1 bg-white rounded-[16px] p-2 text-center border border-gray-100 flex flex-col items-center justify-center ${gameBalances[i] > 0 ? 'bg-green-50/30' : ''}`}>
                        <div className="text-[10px] text-gray-500 font-bold truncate mb-1 w-full">{p}</div>
                        <div className={`text-[16px] tracking-tight font-black ${gameBalances[i] > 0 ? 'text-[#128853]' : gameBalances[i] < 0 ? 'text-red-500' : 'text-gray-800'}`}>
                          {gameBalances[i] === 0 ? '0' : gameBalances[i].toLocaleString()}
                        </div>
                        <div className="text-[8.5px] text-gray-400 font-semibold mt-0.5">
                          핸디포함 <span className={totalBalances[i] > 0 ? 'text-[#128853]' : totalBalances[i] < 0 ? 'text-red-400' : ''}>{totalBalances[i] > 0 ? '+' : ''}{totalBalances[i].toLocaleString()}</span>
                        </div>
                      </div>
                    ))}
                  </div>
               </div>
            </div>
          </div>
        );
      } 
      else if (step === 'settlement') {
        content = (
          <div className="flex flex-col flex-1 relative pb-10">
            <div className="bg-[#128853] text-white p-4 shadow-sm flex items-center justify-between sticky top-0 z-20">
              <button onClick={() => setStep('scorecard')} className="p-2 hover:bg-white/10 rounded-full transition active:scale-95"><Icon name="ArrowLeft" className="w-5 h-5"/></button>
              <div className="flex items-center gap-2">
                <h1 className="text-[17px] font-bold flex items-center"><Icon name="Calculator" className="w-5 h-5 mr-2"/> 최종 정산 내역</h1>
