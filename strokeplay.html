<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>골프 타당 게임(Stroke play)</title>

  <!-- 1. 폰트 로드 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />

  <!-- 2. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 3. React 및 Babel 로드 -->
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js" crossorigin></script>
  
  <script>
    // Babel 충돌 방지
    window.__NATIVE_MAP__ = window.Map;
    window.__NATIVE_SET__ = window.Set;
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script>
    window.Map = window.__NATIVE_MAP__;
    window.Set = window.__NATIVE_SET__;
  </script>

  <!-- 4. Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, sans-serif !important; margin: 0; padding: 0; }
    body { background-color: #f4f6f8; color: #111827; -webkit-tap-highlight-color: transparent; margin: 0; }
    input, button, select { outline: none; font-family: inherit; }
    button:disabled { cursor: default !important; opacity: 0.5; pointer-events: none; }
    .app-wrapper { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f4f6f8; position: relative; overflow-x: hidden; }
    
    /* 숫자 입력창의 업다운 스피너(화살표) 숨기기 */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type="number"] {
        -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect, Fragment } = React;

    // =====================================================================
    // ★ 0. Firebase 설정 ★
    // =====================================================================
    const MY_FIREBASE_CONFIG = {
  apiKey: "AIzaSyALzYLoBWl-oHCyLzEr7YefqqySx8ESEjA",
  authDomain: "left-right-6da31.firebaseapp.com",
  projectId: "left-right-6da31",
  storageBucket: "left-right-6da31.firebasestorage.app",
  messagingSenderId: "128347797181",
  appId: "1:128347797181:web:3e1cdfe3e8d2efcde3a9d4"
};

    let firebaseInitialized = false;
    let authInstance, dbInstance;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    try {
      let configToUse = null;
      if (typeof __firebase_config !== 'undefined') configToUse = JSON.parse(__firebase_config);
      else if (Object.keys(MY_FIREBASE_CONFIG).length > 0) configToUse = MY_FIREBASE_CONFIG;

      if (configToUse && typeof firebase !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(configToUse);
        authInstance = firebase.auth();
        dbInstance = firebase.firestore();
        firebaseInitialized = true;
      }
    } catch (e) { console.error("Firebase 에러:", e); }

    // =====================================================================
    // ★ 1. 데이터 및 SVG 아이콘 ★
    // =====================================================================
    const GOLF_COURSES = [
      { id: 'custom', name: '직접 설정 (자유 입력)', nineHoles: { '전반': [4,4,4,4,4,4,4,4,4], '후반': [4,4,4,4,4,4,4,4,4] } },
      { id: 'standard_72', name: '표준 파72 (일반 코스)', nineHoles: { 'OUT': [4,4,3,5,4,4,3,5,4], 'IN':  [4,4,3,5,4,4,3,5,4] } },
      { id: 'club72_hanul', name: '클럽72 - 하늘코스', nineHoles: { 'OUT': [4,4,3,4,5,4,3,4,5], 'IN':  [4,4,3,5,4,4,3,5,4] } },
      { id: 'club72_ocean', name: '클럽72 - 오션코스', nineHoles: { 'OUT': [4,3,4,4,5,3,4,4,5], 'IN':  [4,4,3,4,5,4,3,5,4] } },
      { id: 'seowon_valley', name: '서원밸리CC', nineHoles: { '서원': [4,4,5,3,4,4,3,5,4], '밸리': [4,4,3,4,5,4,3,5,4] } },
      { id: 'southcape', name: '사우스케이프', nineHoles: { '선라이즈': [4,4,3,5,4,5,3,4,4], '선셋': [4,3,4,4,5,3,4,5,4] } }
    ];

    const Icons = {
      Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
      Plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
      Minus: '<line x1="5" y1="12" x2="19" y2="12"/>',
      Check: '<polyline points="20 6 9 17 4 12"/>',
      RotateCcw: '<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>',
      Trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>',
      ArrowRight: '<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>',
      ArrowLeft: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
      Info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
      Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      X: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      Map: '<polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>',
      Search: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
      Calculator: '<rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="16" y1="10" x2="16.01" y2="10"/><line x1="12" y1="10" x2="12.01" y2="10"/><line x1="8" y1="10" x2="8.01" y2="10"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="12" y1="18" x2="12.01" y2="18"/><line x1="8" y1="18" x2="8.01" y2="18"/>',
      Wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
      Share2: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
      Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      Edit3: '<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
      User: '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
      UserX: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" y1="8" x2="23" y2="14"/><line x1="23" y1="8" x2="17" y2="14"/>',
      Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      QrCode: '<rect x="3" y="3" width="5" height="5" rx="1" ry="1"/><rect x="16" y="3" width="5" height="5" rx="1" ry="1"/><rect x="3" y="16" width="5" height="5" rx="1" ry="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/>',
      Flag: '<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>',
      Target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>'
    };

    const Icon = ({ name, className = "", style, onClick }) => (
      <svg onClick={onClick} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: Icons[name] }} className={className} style={{...style, display: 'inline-block', width: '1em', height: '1em'}} />
    );

    const DEFAULT_PLAYERS = ['타이어 우즈', '로리 맥일로이', '스코티 셔플러', '필 미친손'];

    // =====================================================================
    // ★ 2. 메인 앱 컴포넌트 ★
    // =====================================================================
    function App() {
      // 1. 상태 변수들
      const [isAdmin, setIsAdmin] = useState(true);
      const [step, setStep] = useState('setup'); 
      
      const [selectedCourseId, setSelectedCourseId] = useState('standard_72');
      const [frontNineId, setFrontNineId] = useState('OUT');
      const [backNineId, setBackNineId] = useState('IN');
      const [customCourseName, setCustomCourseName] = useState('직접 설정 골프장');
      const [customFrontName, setCustomFrontName] = useState('전반');
      const [customBackName, setCustomBackName] = useState('후반');
      const [showCourseSearchModal, setShowCourseSearchModal] = useState(false);
      const [courseSearchQuery, setCourseSearchQuery] = useState('');

      const [players, setPlayers] = useState([...DEFAULT_PLAYERS]);
      const [initialBalances, setInitialBalances] = useState([0, 0, 0, 0]); 
      const [baseAmount, setBaseAmount] = useState(1000); // 🚨 기본 1000P
      const [isCustomAmount, setIsCustomAmount] = useState(false);
      const [gaepyungRate, setGaepyungRate] = useState(50);
      const [isCustomGaepyung, setIsCustomGaepyung] = useState(false); // 🚨 직접입력 모드 상태 추가
      const [isRoundThousand, setIsRoundThousand] = useState(true); // 🚨 1000P 단위 절사 기본값 true로 변경

      const [scoreCaddieIdx, setScoreCaddieIdx] = useState(0);
      const [showDoubleSettings, setShowDoubleSettings] = useState(false);
      const [showBonusSettings, setShowBonusSettings] = useState(false);
      const [doubleRules, setDoubleRules] = useState({ timing: 'current', birdie: true, threeTie: true, prevTie: true, triple: true, doublePar3: true });
      const [birdieRule, setBirdieRule] = useState({ type: 'strokes', strokeValue: 1, fixedValue: 10000 });
      const [eagleRule, setEagleRule] = useState({ type: 'strokes', strokeValue: 3, fixedValue: 30000 });
      const [nearRule, setNearRule] = useState({ enabled: true, amount: 10000 }); // 🚨 니어 룰 추가
      const [longestRule, setLongestRule] = useState({ enabled: false, amount: 10000 }); // 🚨 롱기 룰 추가

      const [usePutts, setUsePutts] = useState(false);
      const [holes, setHoles] = useState(Array(18).fill(null));
      const [currentHole, setCurrentHole] = useState(0); 
      const [currentPar, setCurrentPar] = useState(4);
      const [currentScores, setCurrentScores] = useState([4, 4, 4, 4]);
      const [currentPutts, setCurrentPutts] = useState([0, 0, 0, 0]);
      
      const [currentNear, setCurrentNear] = useState(null);
      const [currentLongest, setCurrentLongest] = useState(null);
      const [isReverseNear, setIsReverseNear] = useState(false);
      const [isReverseLongest, setIsReverseLongest] = useState(false);

      const [multiplier, setMultiplier] = useState(1); 
      const [multiplierReason, setMultiplierReason] = useState(''); 
      const [hasManualMultiplier, setHasManualMultiplier] = useState(false); 
      const [currentExcluded, setCurrentExcluded] = useState([false, false, false, false]); 
      
      // 모달 전용 상태들
      const [showRuleModal, setShowRuleModal] = useState(false); 
      const [showCaddieModal, setShowCaddieModal] = useState(false); 
      const [globalExcluded, setGlobalExcluded] = useState([false, false, false, false]); 
      const [isHoleExcluded, setIsHoleExcluded] = useState(false); 
      const [toastMessage, setToastMessage] = useState(''); 
      const [showResetConfirm, setShowResetConfirm] = useState(false); 
      const [scorecardTab, setScorecardTab] = useState('front'); 
      const [showJoinModal, setShowJoinModal] = useState(false);
      const [showQrModal, setShowQrModal] = useState(false);
      const [showFinalResultModal, setShowFinalResultModal] = useState(false);
      const [joinCode, setJoinCode] = useState('');
      const [infoModal, setInfoModal] = useState({ show: false, title: '', desc: '' });

      const [startTime, setStartTime] = useState(null);
      const [elapsedTime, setElapsedTime] = useState('00:00');
      const [user, setUser] = useState(null);
      const [roomId, setRoomId] = useState('');

      const lastSyncedStr = useRef('');
      const lastSentUpdate = useRef(0);
      const hasReceivedData = useRef(false);
      
      const pressTimer = useRef(null);
      const parPressTimer = useRef(null);
      const isParLongPress = useRef(false);
      const livePressTimer = useRef(null);

      // =====================================================================
      // ★ 공통 함수들 ★
      // =====================================================================
      const openInfo = (title, desc) => {
        setInfoModal({ show: true, title, desc });
      };

      const showToastMsg = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 3000);
      };

      // =====================================================================
      // ★ Firebase 통신 ★
      // =====================================================================
      useEffect(() => {
        if (!firebaseInitialized || !authInstance) return;
        const initAuth = async () => {
          try {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await authInstance.signInWithCustomToken(window.__initial_auth_token);
            } else {
              await authInstance.signInAnonymously();
            }
          } catch (e) {
            console.error("Auth error:", e);
          }
        };
        initAuth();
        const unsubscribe = authInstance.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const rId = params.get('roomId');
        if (rId) {
          setRoomId(rId);
          if (localStorage.getItem('golf_admin_room') === rId) setIsAdmin(true);
          else setIsAdmin(false);
        }
      }, []);

      const getRoomRef = (rId) => {
        if (typeof window.__app_id !== 'undefined') {
          return dbInstance.collection('artifacts').doc(appId).collection('public').doc('data').collection('golf_rooms').doc(rId);
        }
        return dbInstance.collection('golf_rooms').doc(rId);
      };

      useEffect(() => {
        if (!user || !roomId || !dbInstance || !firebaseInitialized) return;
        const roomRef = getRoomRef(roomId);
        const unsubscribe = roomRef.onSnapshot((snap) => {
          if (snap.exists) {
            if (isAdmin && hasReceivedData.current) return;
            
            hasReceivedData.current = true;
            const data = snap.data();
            if (data.updatedAt && data.updatedAt <= lastSentUpdate.current) return;
            const { updatedAt, ...stateData } = data;
            lastSyncedStr.current = JSON.stringify(stateData);
            
            if (data.step !== undefined) setStep(data.step);
            if (data.holes !== undefined) setHoles(data.holes);
            if (data.currentHole !== undefined) setCurrentHole(data.currentHole);
            if (data.startTime !== undefined) setStartTime(data.startTime);
            if (data.players !== undefined) setPlayers(data.players);
            if (data.usePutts !== undefined) setUsePutts(data.usePutts);
            if (data.gaepyungRate !== undefined) {
              setGaepyungRate(data.gaepyungRate);
              if (![0, 10, 20, 30, 50, 70].includes(data.gaepyungRate)) setIsCustomGaepyung(true);
            }
            if (data.isRoundThousand !== undefined) setIsRoundThousand(data.isRoundThousand);
            
            if (data.birdieRule !== undefined) setBirdieRule(data.birdieRule);
            if (data.eagleRule !== undefined) setEagleRule(data.eagleRule);
            if (data.nearRule !== undefined) setNearRule(data.nearRule);
            if (data.longestRule !== undefined) setLongestRule(data.longestRule);

            if (data.currentPar !== undefined) setCurrentPar(data.currentPar);
            if (data.currentScores !== undefined) setCurrentScores(data.currentScores);
            if (data.currentPutts !== undefined) setCurrentPutts(data.currentPutts);
            if (data.currentNear !== undefined) setCurrentNear(data.currentNear);
            if (data.isReverseNear !== undefined) setIsReverseNear(data.isReverseNear);
            if (data.currentLongest !== undefined) setCurrentLongest(data.currentLongest);
            if (data.isReverseLongest !== undefined) setIsReverseLongest(data.isReverseLongest);
            if (data.multiplier !== undefined) setMultiplier(data.multiplier);
            if (data.multiplierReason !== undefined) setMultiplierReason(data.multiplierReason);
            if (data.hasManualMultiplier !== undefined) setHasManualMultiplier(data.hasManualMultiplier);
            if (data.currentExcluded !== undefined) setCurrentExcluded(data.currentExcluded);
            if (data.isHoleExcluded !== undefined) setIsHoleExcluded(data.isHoleExcluded);
          }
        }, (err) => console.error("Snapshot error:", err));
        return () => unsubscribe();
      }, [user, roomId, isAdmin]);

      useEffect(() => {
        if (!user || !roomId || !dbInstance || !firebaseInitialized || !isAdmin) return;

        const payload = { 
          step, players, holes, currentHole, startTime, usePutts, gaepyungRate, isRoundThousand,
          birdieRule, eagleRule, nearRule, longestRule,
          currentPar, currentScores, currentPutts, currentNear, isReverseNear, currentLongest, isReverseLongest, multiplier, multiplierReason, hasManualMultiplier, currentExcluded, isHoleExcluded
        };
        const currentStr = JSON.stringify(payload);
        if (currentStr === lastSyncedStr.current) return;

        const timer = setTimeout(() => {
          lastSyncedStr.current = currentStr;
          const finalPayload = { ...payload, updatedAt: Date.now() };
          lastSentUpdate.current = finalPayload.updatedAt;
          getRoomRef(roomId).set(finalPayload, { merge: true }).catch(e => console.error(e));
        }, 300); 
        return () => clearTimeout(timer);
      }, [step, players, holes, currentHole, startTime, usePutts, gaepyungRate, isRoundThousand, birdieRule, eagleRule, nearRule, longestRule, currentPar, currentScores, currentPutts, currentNear, isReverseNear, currentLongest, isReverseLongest, multiplier, multiplierReason, hasManualMultiplier, currentExcluded, isHoleExcluded, user, roomId, isAdmin]);

      // =====================================================================
      // ★ 파생 데이터 및 계산 로직 ★
      // =====================================================================
      useEffect(() => {
        if (step === 'scorecard') setScorecardTab(currentHole < 9 ? 'front' : 'back');
      }, [step, currentHole]);

      useEffect(() => {
        if (!startTime || step === 'setup') return;
        const timerId = setInterval(() => {
          const diff = Date.now() - startTime;
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          setElapsedTime(`${h > 0 ? h+':' : ''}${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`);
        }, 1000);
        return () => clearInterval(timerId);
      }, [startTime, step]);

      const actualCourseName = selectedCourseId === 'custom' ? customCourseName : (GOLF_COURSES.find(c => c.id === selectedCourseId)?.name || '');
      const actualFrontName = selectedCourseId === 'custom' ? customFrontName : frontNineId;
      const actualBackName = selectedCourseId === 'custom' ? customBackName : backNineId;

      const coursePars = useMemo(() => {
        if (selectedCourseId === 'custom') return Array(18).fill(4); 
        const course = GOLF_COURSES.find(c => c.id === selectedCourseId) || GOLF_COURSES[0];
        const front = course.nineHoles[frontNineId] || Object.values(course.nineHoles)[0];
        const back = course.nineHoles[backNineId] || Object.values(course.nineHoles)[0];
        return [...front, ...back];
      }, [selectedCourseId, frontNineId, backNineId]);

      const totalParSumAll = useMemo(() => {
        let sum = 0;
        for (let i = 0; i < currentHole; i++) sum += (holes[i] ? holes[i].par : coursePars[i]);
        return sum;
      }, [holes, currentHole, coursePars]);

      const totalStrokesSum = useMemo(() => {
        let strokes = [0, 0, 0, 0];
        holes.forEach(hole => {
          if (!hole) return;
          hole.scores.forEach((s, i) => { if (!(hole.excluded && hole.excluded[i])) strokes[i] += s; });
        });
        return strokes;
      }, [holes]);

      const totalPuttsSum = useMemo(() => {
        let putts = [0, 0, 0, 0];
        holes.forEach(hole => {
          if (!hole || !hole.putts) return;
          hole.putts.forEach((p, i) => { if (!(hole.excluded && hole.excluded[i])) putts[i] += p; });
        });
        return putts;
      }, [holes]);

      const checkAutoDouble = (targetScores, targetPar, rules, prevHoleForTie, excludedArr) => {
        if (!targetScores) return { isDbl: false, reason: '' };
        let isDbl = false;
        let reason = '';
        const excluded = excludedArr || [false, false, false, false];
        const activeScores = targetScores.filter((_, idx) => !excluded[idx]);
        
        if (activeScores.length === 0) return { isDbl: false, reason: '' };
        
        if (rules.birdie && activeScores.some(s => s <= targetPar - 1)) { isDbl = true; reason = '버디이상'; }
        else if (rules.triple && targetPar >= 4 && activeScores.some(s => s >= targetPar + 3)) { isDbl = true; reason = '트리플이상'; }
        else if (rules.doublePar3 && targetPar === 3 && activeScores.some(s => s >= targetPar + 2)) { isDbl = true; reason = '더블이상'; }
        else if (rules.threeTie) {
          const counts = {};
          activeScores.forEach(s => counts[s] = (counts[s] || 0) + 1);
          if (Object.values(counts).some(c => c === 3 && activeScores.length >= 4)) { isDbl = true; reason = '3인동타'; }
        }
        
        if (!isDbl && rules.prevTie && prevHoleForTie) {
          const prevExcluded = prevHoleForTie.excluded || [false, false, false, false];
          const prevActiveScores = prevHoleForTie.scores.filter((_, idx) => !prevExcluded[idx]);
          if (prevActiveScores.length > 1) {
            const allTied = prevActiveScores.every(s => s === prevActiveScores[0]);
            if (allTied) { isDbl = true; reason = '이전홀무승부'; }
          }
        }
        return { isDbl, reason };
      };

      useEffect(() => {
        if (!hasManualMultiplier && doubleRules.timing === 'current' && step === 'play' && !isHoleExcluded) {
          const prevHole = currentHole > 0 ? holes[currentHole - 1] : null;
          const result = checkAutoDouble(currentScores, currentPar, doubleRules, prevHole, currentExcluded);
          setMultiplier(result.isDbl ? 2 : 1);
          setMultiplierReason(result.reason);
        }
      }, [currentScores, currentPar, currentExcluded, doubleRules, hasManualMultiplier, currentHole, step, holes, isHoleExcluded]);

      const getHoleBalance = (hole) => {
        if (!hole || hole.isHoleExcluded) return [0, 0, 0, 0]; 
        const excluded = hole.excluded || [false, false, false, false];
        const activeCount = excluded.filter(e => !e).length;
        if (activeCount <= 1) return [0, 0, 0, 0]; 

        const sumScores = hole.scores.reduce((sum, score, idx) => excluded[idx] ? sum : sum + score, 0);
        const mult = hole.multiplier || 1;
        let balances = [0, 0, 0, 0];
        
        hole.scores.forEach((score, idx) => {
          if (excluded[idx]) return;
          const netStrokes = sumScores - (score * activeCount);
          balances[idx] = netStrokes * baseAmount * mult;
        });

        hole.scores.forEach((score, index) => {
          if (excluded[index]) return;
          const diff = score - hole.par;
          if (diff === -1) { 
            const bonus = birdieRule.type === 'strokes' ? (birdieRule.strokeValue || 0) * baseAmount * mult : (birdieRule.fixedValue || 0);
            for(let j=0; j<4; j++) if(j !== index && !excluded[j]) { balances[index] += bonus; balances[j] -= bonus; }
          } else if (diff <= -2) { 
            const bonus = eagleRule.type === 'strokes' ? (eagleRule.strokeValue || 0) * baseAmount * mult : (eagleRule.fixedValue || 0);
            for(let j=0; j<4; j++) if(j !== index && !excluded[j]) { balances[index] += bonus; balances[j] -= bonus; }
          }
        });

        const applySpecialBonus = (winnerIdx, isReverse, amount) => {
          if (winnerIdx !== null && winnerIdx !== undefined && !excluded[winnerIdx] && amount) {
            const bonus = amount; 
            for (let j = 0; j < 4; j++) {
              if (j !== winnerIdx && !excluded[j]) {
                if (isReverse) {
                  balances[winnerIdx] -= bonus;
                  balances[j] += bonus;
                } else {
                  balances[winnerIdx] += bonus;
                  balances[j] -= bonus;
                }
              }
            }
          }
        };

        if (hole.par === 3 && nearRule.enabled) applySpecialBonus(hole.near, hole.isReverseNear, nearRule.amount);
        if (hole.par >= 5 && longestRule.enabled) applySpecialBonus(hole.longest, hole.isReverseLongest, longestRule.amount);

        return balances;
      };

      const calculateTransfers = (balances) => {
        let debtors = balances.map((b, i) => ({ id: i, amount: -b })).filter(d => d.amount > 0);
        let creditors = balances.map((b, i) => ({ id: i, amount: b })).filter(c => c.amount > 0);
        let transfers = {};
        debtors.forEach(d => { transfers[d.id] = { total: d.amount, details: [] }; });
        let i = 0, j = 0;
        while (i < debtors.length && j < creditors.length) {
          let debtor = debtors[i];
          let creditor = creditors[j];
          let amount = Math.min(debtor.amount, creditor.amount);
          transfers[debtor.id].details.push({ to: creditor.id, amount: amount });
          debtor.amount -= amount; creditor.amount -= amount;
          if (debtor.amount === 0) i++;
          if (creditor.amount === 0) j++;
        }
        return transfers;
      };

      const gameBalances = useMemo(() => {
        let balances = [0, 0, 0, 0];
        holes.forEach((hole) => {
          if (!hole) return;
          const hb = getHoleBalance(hole);
          hb.forEach((b, i) => balances[i] += b);
        });
        return balances;
      }, [holes, baseAmount, birdieRule, eagleRule, nearRule, longestRule]);

      const totalBalances = useMemo(() => {
        return gameBalances.map((gb, i) => gb + (parseInt(initialBalances[i], 10) || 0));
      }, [gameBalances, initialBalances]);

      const settlementData = useMemo(() => {
        let totalGiven = 0;
        const safeGaepyungRate = isNaN(gaepyungRate) || gaepyungRate === '' ? 0 : Number(gaepyungRate);
        const details = players.map((p, i) => {
          const bal = totalBalances[i];
          let cut = 0;
          if (bal > 0) {
            const rawCut = bal * (safeGaepyungRate / 100);
            cut = isRoundThousand ? Math.floor(rawCut / 1000) * 1000 : Math.floor(rawCut);
            totalGiven += cut;
          }
          return { name: p, original: bal, cut, receive: 0, final: 0 };
        });

        let losers = details.map((d, i) => ({ index: i, amount: d.original < 0 ? Math.abs(d.original) : 0 })).filter(l => l.amount > 0);

        if (losers.length > 0) {
          let totalReceived = 0;
          losers.forEach(loser => {
            const rawReceive = loser.amount * (safeGaepyungRate / 100);
            const receive = isRoundThousand ? Math.floor(rawReceive / 1000) * 1000 : Math.floor(rawReceive);
            details[loser.index].receive = receive;
            totalReceived += receive;
          });
          
          const leftover = totalGiven - totalReceived;
          if (leftover !== 0) {
            const maxLoss = Math.max(...losers.map(l => l.amount));
            const biggestLosers = losers.filter(l => l.amount === maxLoss);
            
            // 플레이어 순서가 제일 끝인 사람이 앞으로 오도록 내림차순 정렬
            biggestLosers.sort((a, b) => b.index - a.index);
            const chosenLoser = biggestLosers[0];
            
            details[chosenLoser.index].receive += leftover;
          }
        }
        
        details.forEach(d => { d.final = d.original > 0 ? d.original - d.cut : d.original + d.receive; });
        
        // 🚨 승자(벌은 사람)가 누구에게 개평을 나누어주는지 상세 매칭 로직 (gTransfers)
        let gDebt = details.map((d, i) => ({ id: i, amount: d.cut })).filter(d => d.amount > 0); // 개평 주는 사람
        let gCred = details.map((d, i) => ({ id: i, amount: d.receive })).filter(c => c.amount > 0); // 개평 받는 사람
        let gTransfers = {};
        gDebt.forEach(d => { gTransfers[d.id] = { total: d.amount, details: [] }; });
        let i = 0, j = 0;
        while (i < gDebt.length && j < gCred.length) {
          let debtor = gDebt[i];
          let creditor = gCred[j];
          let amount = Math.min(debtor.amount, creditor.amount);
          gTransfers[debtor.id].details.push({ to: creditor.id, amount: amount });
          debtor.amount -= amount; creditor.amount -= amount;
          if (debtor.amount === 0) i++;
          if (creditor.amount === 0) j++;
        }

        return { details, gTransfers };
      }, [players, totalBalances, gaepyungRate, isRoundThousand]);

      const generateScorecardText = () => {
        const date = new Date().toLocaleDateString('ko-KR');
        let text = `⛳ 골프 타당 게임(Stroke play) 스코어카드\n📍 코스: ${actualCourseName} (${actualFrontName} / ${actualBackName})\n📅 일시: ${date}\n\n[현재 합산 결과]\n`;
        players.forEach((p, i) => {
          const bal = gameBalances[i];
          const total = totalBalances[i];
          const balText = bal > 0 ? `+${bal.toLocaleString()}` : bal === 0 ? '0' : bal.toLocaleString();
          text += `🏌️ ${p}: ${balText}P (핸디포함 ${total > 0 ? '+' : ''}${total.toLocaleString()}P)\n`;
        });
        text += `\n* 진행 상황: ${currentHole}H 완료`;
        return text;
      };

      // =====================================================================
      // ★ 뷰 & 클릭 이벤트 헨들러 (UI 조작) ★
      // =====================================================================
      const handleLivePressStart = () => {
        if (livePressTimer.current) clearTimeout(livePressTimer.current);
        livePressTimer.current = setTimeout(() => {
          if (roomId) {
            const textArea = document.createElement("textarea");
            textArea.value = roomId;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              showToastMsg('초대 코드가 복사되었습니다. 친구에게 공유하세요!');
            } catch (err) {
              showToastMsg('초대 코드 복사에 실패했습니다.');
            }
            document.body.removeChild(textArea);
          }
        }, 500); 
      };
      const handleLivePressEnd = () => { if (livePressTimer.current) clearTimeout(livePressTimer.current); };

      const updateScore = (index, delta) => {
        if (!isAdmin || currentExcluded[index]) return; 
        const newScore = Math.max(1, currentScores[index] + delta);
        
        setCurrentScores(prev => {
          const newScores = [...prev];
          newScores[index] = Math.max(1, newScores[index] + delta);
          return newScores;
        });

        // 스마트 역니어/역롱기 자동 인식
        if (currentPar === 3 && currentNear === index) {
          setIsReverseNear(newScore > currentPar);
        }
        if (currentPar >= 5 && currentLongest === index) {
          setIsReverseLongest(newScore > currentPar);
        }
      };

      const updatePutts = (index, delta) => {
        if (!isAdmin || currentExcluded[index]) return; 
        setCurrentPutts(prev => {
          const newPutts = [...prev];
          newPutts[index] = Math.max(0, newPutts[index] + delta);
          return newPutts;
        });
      };

      const handleParSelect = (par) => {
        if (!isAdmin) return;
        if (isParLongPress.current) { isParLongPress.current = false; return; }
        setCurrentPar(prevPar => {
          if (par !== prevPar) {
            // PAR 변경 시, 이전 PAR와의 차이만큼 모든 선수의 타수도 비례하여 조정
            setCurrentScores(prevScores => prevScores.map(s => Math.max(1, s + (par - prevPar))));
          }
          return par;
        });
      };

      const startParPress = () => {
        if (!isAdmin) return;
        if (parPressTimer.current) clearTimeout(parPressTimer.current);
        parPressTimer.current = setTimeout(() => {
          isParLongPress.current = true;
          setCurrentPar(prevPar => {
            const newPar = prevPar >= 5 ? prevPar + 1 : 6;
            // 길게 눌러서 5 이상으로 PAR가 바뀔 때도 동일하게 타수 조정 적용
            setCurrentScores(prevScores => prevScores.map(s => Math.max(1, s + (newPar - prevPar))));
            return newPar;
          });
        }, 500);
      };
      const cancelParPress = () => { if (parPressTimer.current) clearTimeout(parPressTimer.current); };

      const handleMultiplierMinus = () => {
        if (!isAdmin) return;
        setHasManualMultiplier(true);
        if (isHoleExcluded) return; 
        if (multiplier > 1) {
          setMultiplier(multiplier - 1);
          setMultiplierReason('수동적용');
        } else if (multiplier === 1) {
          setIsHoleExcluded(true);
        }
      };

      const handleMultiplierPlus = () => {
        if (!isAdmin) return;
        setHasManualMultiplier(true);
        if (isHoleExcluded) { 
          setIsHoleExcluded(false); 
          setMultiplier(1); 
        } else {
          setMultiplier(multiplier + 1);
          setMultiplierReason('수동적용');
        }
      };

      const toggleExcluded = (index) => {
        setCurrentExcluded(prev => {
          const newExcluded = [...prev];
          newExcluded[index] = !newExcluded[index];
          return newExcluded;
        });
      };

      const startPress = (e, idx, isGlobal) => {
        if (!isAdmin) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
        pressTimer.current = setTimeout(() => {
          if (isGlobal) {
            setGlobalExcluded(prev => {
              const newEx = [...prev];
              newEx[idx] = !newEx[idx];
              showToastMsg(newEx[idx] ? `${players[idx]} 님이 전체 게임에서 제외되었습니다.` : `${players[idx]} 님이 게임에 참여합니다.`);
              return newEx;
            });
          } else {
            toggleExcluded(idx);
            const isExcluding = !currentExcluded[idx];
            showToastMsg(isExcluding ? `${players[idx]} 님이 이 홀 내기에서 제외되었습니다.` : `${players[idx]} 님이 내기에 참여합니다.`);
          }
        }, 500); 
      };

      const cancelPress = () => {
        if (pressTimer.current) {
          clearTimeout(pressTimer.current);
          pressTimer.current = null;
        }
      };

      const loadHoleData = (holeIndex) => {
        setCurrentHole(holeIndex);
        const existingData = holes[holeIndex];

        let initialPar = coursePars[holeIndex] || 4; 
        let initialScores = [initialPar, initialPar, initialPar, initialPar]; 
        let initialPutts = [0, 0, 0, 0];
        let initialMultiplier = 1;
        let initialMultiplierReason = '';
        let initialHasManual = false;
        let initialExcluded = [false, false, false, false];
        let initialIsHoleExcluded = false;
        let initialNear = null;
        let initialIsReverseNear = false;
        let initialLongest = null;
        let initialIsReverseLongest = false;

        if (existingData) {
          initialPar = existingData.par;
          initialScores = [...existingData.scores];
          initialPutts = existingData.putts ? [...existingData.putts] : [0,0,0,0];
          initialMultiplier = existingData.multiplier || 1;
          initialMultiplierReason = existingData.multiplierReason || '';
          initialHasManual = existingData.hasManualMultiplier || false;
          initialExcluded = existingData.excluded || [false, false, false, false];
          initialIsHoleExcluded = existingData.isHoleExcluded || false;
          initialNear = existingData.near !== undefined ? existingData.near : null;
          initialIsReverseNear = existingData.isReverseNear !== undefined ? existingData.isReverseNear : false;
          initialLongest = existingData.longest !== undefined ? existingData.longest : null;
          initialIsReverseLongest = existingData.isReverseLongest !== undefined ? existingData.isReverseLongest : false;
        } else {
          const prevHole = holeIndex > 0 ? holes[holeIndex - 1] : null;
          initialExcluded = [...globalExcluded]; 
          let autoDoubleResult = { isDbl: false, reason: '' };
          if (doubleRules.timing === 'current') {
            autoDoubleResult = checkAutoDouble(initialScores, initialPar, doubleRules, prevHole, initialExcluded);
          } else if (doubleRules.timing === 'prev' && prevHole) {
            autoDoubleResult = checkAutoDouble(prevHole.scores, prevHole.par, doubleRules, prevHole, prevHole.excluded);
          }
          initialMultiplier = autoDoubleResult.isDbl ? 2 : 1;
          initialMultiplierReason = autoDoubleResult.reason;
        }

        setCurrentPar(initialPar);
        setCurrentScores(initialScores);
        setCurrentPutts(initialPutts);
        setCurrentNear(initialNear);
        setIsReverseNear(initialIsReverseNear);
        setCurrentLongest(initialLongest);
        setIsReverseLongest(initialIsReverseLongest);
        setMultiplier(initialMultiplier);
        setMultiplierReason(initialMultiplierReason);
        setHasManualMultiplier(initialHasManual);
        setCurrentExcluded(initialExcluded);
        setIsHoleExcluded(initialIsHoleExcluded);
      };

      const handleStart = () => {
        hasReceivedData.current = true; 
        setIsAdmin(true); 
        let newId = roomId;
        if (!newId) {
          newId = Math.random().toString(36).substring(2, 8).toUpperCase();
          setRoomId(newId);
          localStorage.setItem('golf_admin_room', newId);
          try {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('roomId', newId);
            window.history.replaceState(null, '', newUrl.toString());
          } catch(e) {}
        }
        if (!startTime) setStartTime(Date.now());
        setStep('play');
        loadHoleData(0);
        setShowQrModal(true); // 🚨 게임 시작과 동시에 초대 모달 오픈
      };

      const saveHole = () => {
        if (!isAdmin) return;
        const newHoles = [...holes];
        newHoles[currentHole] = {
          par: currentPar, scores: [...currentScores], putts: [...currentPutts],
          multiplier, 
          multiplierReason: (multiplier > 1 && !hasManualMultiplier) ? multiplierReason : (hasManualMultiplier && multiplier > 1 ? '수동적용' : ''),
          excluded: [...currentExcluded], isHoleExcluded, hasManualMultiplier,
          near: currentPar === 3 && nearRule.enabled ? currentNear : null,
          isReverseNear: currentPar === 3 ? isReverseNear : false,
          longest: currentPar >= 5 && longestRule.enabled ? currentLongest : null,
          isReverseLongest: currentPar >= 5 ? isReverseLongest : false
        };
        setHoles(newHoles);
        setStep('hole-result');
      };

      const handleNextHole = () => {
        if (!isAdmin) return;
        if (currentHole < 17) {
          loadHoleData(currentHole + 1);
          setStep('play');
        } else {
          setStep('scorecard');
        }
      };

      const updatePlayerName = (index, name) => {
        if (!isAdmin) return;
        const newPlayers = [...players];
        newPlayers[index] = name;
        setPlayers(newPlayers);
      };

      const updateInitialBalance = (index, val) => {
        if (!isAdmin) return;
        const rawValue = val.replace(/,/g, '');
        const newBalances = [...initialBalances];
        if (rawValue === '-' || rawValue === '') {
          newBalances[index] = rawValue;
        } else {
          const num = parseInt(rawValue, 10);
          newBalances[index] = isNaN(num) ? 0 : num;
        }
        setInitialBalances(newBalances);
      };

      const handleShareAction = () => {
        const shareText = generateScorecardText();
        const textArea = document.createElement("textarea");
        textArea.value = shareText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showToastMsg('스코어 결과가 복사되었습니다. 카카오톡 등에 붙여넣기 하세요!');
        } catch (err) {
          showToastMsg('복사에 실패했습니다.');
        }
        document.body.removeChild(textArea);
      };

      const handleSaveAction = () => {
        const text = generateScorecardText();
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
        link.download = `골프스코어_${dateStr}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToastMsg('스코어카드가 기기에 저장되었습니다.');
      };

      // =====================================================================
      // ★ 화면별 렌더링 컨텐츠 조합 ★
      // =====================================================================
      let content = null;

      if (step === 'setup') {
        const handicapSum = initialBalances.reduce((sum, val, idx) => globalExcluded[idx] ? sum : sum + (parseInt(val, 10) || 0), 0);
        content = (
          <div className={`flex flex-col flex-1 relative ${!isAdmin ? 'pointer-events-none' : ''}`}>
            <div className="bg-[#128853] text-white pt-12 pb-24 px-6 rounded-b-[40px] text-center shadow-md relative z-0 pointer-events-auto">
              <div className="flex justify-center items-center gap-2 mb-2"><span className="text-2xl">⛳</span><h1 className="text-2xl font-black tracking-tight">골프 타당 게임(Stroke play)</h1></div>
              <p className="text-[#a7e2c9] text-sm font-medium">라운드 전 설정을 완료해 주세요</p>
            </div>
            
            <div className="max-w-md w-full mx-auto px-4 -mt-16 relative z-10 space-y-4 flex-1">
              <div className="bg-white rounded-[24px] shadow-sm p-5 border border-gray-100 pointer-events-auto">
                <label className="flex items-center text-[15px] font-bold text-gray-800 mb-4"><Icon name="Map" className="w-5 h-5 mr-2 text-gray-600" /> 골프장 및 코스 설정</label>
                <div className={`space-y-3 ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                  <div className="flex gap-2">
                    {selectedCourseId === 'custom' ? (
                      <input type="text" value={customCourseName} onChange={(e) => setCustomCourseName(e.target.value)} className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm font-semibold text-gray-800 outline-none focus:ring-2 focus:ring-[#128853] transition" placeholder="골프장 이름 입력" />
                    ) : (<div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 flex items-center text-sm font-semibold text-gray-800">{actualCourseName}</div>)}

                      {selectedCourseId === 'custom' ? ( <input type="text" value={customFrontName} onChange={(e) => setCustomFrontName(e.target.value)} className="w-full bg-transparent px-2 py-1.5 outline-none text-sm font-bold text-gray-800" placeholder="이름" /> ) : ( <select value={frontNineId} onChange={(e) => setFrontNineId(e.target.value)} className="w-full bg-transparent px-1 py-1.5 outline-none text-sm font-bold text-gray-800">{Object.keys(GOLF_COURSES.find(c => c.id === selectedCourseId)?.nineHoles || {}).map(k => <option key={k} value={k}>{k}</option>)}</select> )}
                    </div>
                    <div className="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-1.5 flex items-center"><span className="text-xs text-gray-500 font-bold px-2 whitespace-nowrap">후반</span>
                      {selectedCourseId === 'custom' ? ( <input type="text" value={customBackName} onChange={(e) => setCustomBackName(e.target.value)} className="w-full bg-transparent px-2 py-1.5 outline-none text-sm font-bold text-gray-800" placeholder="이름" /> ) : ( <select value={backNineId} onChange={(e) => setBackNineId(e.target.value)} className="w-full bg-transparent px-1 py-1.5 outline-none text-sm font-bold text-gray-800">{Object.keys(GOLF_COURSES.find(c => c.id === selectedCourseId)?.nineHoles || {}).map(k => <option key={k} value={k}>{k}</option>)}</select> )}
                    </div>
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-[24px] shadow-sm p-5 border border-gray-100 pointer-events-auto">
                <div className="flex justify-between items-center mb-4">
                  <label className="flex items-center text-[15px] font-bold text-gray-800"><Icon name="Users" className="w-5 h-5 mr-2 text-gray-600" /> 플레이어 및 핸디캡 (P)</label>

                    <span className="text-[12px] font-bold text-gray-500">퍼팅 기록</span>
                    <button onClick={() => setUsePutts(!usePutts)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors shrink-0 ${usePutts ? 'bg-[#128853]' : 'bg-gray-200'}`}><span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform shadow-sm ${usePutts ? 'translate-x-5' : 'translate-x-0.5'}`} /></button>
                  </div>
                </div>
                <div className={`space-y-3 ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                  {players.map((player, idx) => (
                    <div key={idx} className={`flex items-center gap-3 p-2.5 border rounded-[16px] transition select-none ${globalExcluded[idx] ? 'bg-gray-50 border-gray-200 opacity-50 grayscale' : 'bg-white border-gray-200 hover:border-gray-300'}`} onTouchStart={(e) => startPress(e, idx, true)} onTouchEnd={cancelPress} onTouchMove={cancelPress} onMouseDown={(e) => startPress(e, idx, true)} onMouseUp={cancelPress} onMouseLeave={cancelPress} onContextMenu={(e) => { if (e.target.tagName !== 'INPUT') e.preventDefault(); }}>
                      <div className="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-gray-500 overflow-hidden shrink-0"><Icon name="User" className="w-6 h-6 mt-1" /></div>
                      <div className="flex flex-1 items-center gap-2 min-w-0">
                        {/* 🚨 이름 입력창 UI 및 UX 완벽 개선 (플레이스홀더화, 검은색 텍스트) */}
                        <input 
                          type="text" 
                          value={player === DEFAULT_PLAYERS[idx] ? '' : player} 
                          onChange={(e) => updatePlayerName(idx, e.target.value)} 
                          onBlur={(e) => { if (e.target.value.trim() === '') updatePlayerName(idx, DEFAULT_PLAYERS[idx]); }}
                          className="w-full bg-transparent py-2 outline-none transition text-[15px] font-bold truncate cursor-pointer focus:cursor-text text-black placeholder-gray-400" 
                          placeholder={DEFAULT_PLAYERS[idx]} 
                          onTouchStart={(e) => e.stopPropagation()} 
                          onMouseDown={(e) => e.stopPropagation()} 
                        />
                        {scoreCaddieIdx === idx && (<button className={`shrink-0 text-[#128853] bg-[#e5f5ec] rounded-full p-1.5 shadow-sm active:scale-95 ${!isAdmin ? 'pointer-events-none opacity-50' : 'pointer-events-auto'}`} onClick={(e) => { e.stopPropagation(); setShowCaddieModal(true); }}><Icon name="Edit3" className="w-3.5 h-3.5" /></button>)}
                      </div>
                      <div className="relative w-28 shrink-0 bg-gray-50 rounded-[12px] overflow-hidden border border-gray-200 focus-within:border-[#128853] focus-within:ring-1 focus-within:ring-[#128853] transition-all cursor-pointer">
                        <input 
                          type="text" 
                          inputMode="numeric" 
                          value={initialBalances[idx] === 0 || initialBalances[idx] === '' ? '' : (initialBalances[idx] === '-' ? '-' : Number(initialBalances[idx]).toLocaleString())} 
                          onChange={(e) => updateInitialBalance(idx, e.target.value)} 
                          className="w-full bg-transparent px-3 py-2.5 outline-none transition text-right pr-7 text-sm font-bold text-gray-700 cursor-pointer focus:cursor-text" 
                          placeholder="0" 
                          onTouchStart={(e) => e.stopPropagation()} 
                          onMouseDown={(e) => e.stopPropagation()} 
                        />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-xs pointer-events-none">P</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="flex items-center justify-between mt-4 pt-4 border-t border-gray-100 px-1">
                  <span className="text-[14px] font-bold text-gray-800">핸디캡 합계</span>
                  <span className={`text-[16px] font-black ${handicapSum === 0 ? 'text-[#128853]' : 'text-red-500'}`}>{handicapSum > 0 ? '+' : ''}{handicapSum.toLocaleString()}P</span>
                </div>
              </div>

              <div className={`bg-white rounded-[24px] shadow-sm p-5 border border-gray-100 pointer-events-auto ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                <label className="flex items-center text-[15px] font-bold text-gray-800 mb-4"><div className="w-5 h-5 mr-2 bg-[#e5f5ec] text-[#128853] rounded-full flex items-center justify-center font-black text-[10px]">P</div> 1타당 포인트 (P)</label>
                <div className="grid grid-cols-3 gap-2.5 mb-2">
                  {[1000, 2000, 3000, 5000, 10000].map(amt => (<button key={amt} onClick={() => { setBaseAmount(amt); setIsCustomAmount(false); }} className={`py-3.5 rounded-xl text-sm font-bold transition-all active:scale-[0.98] ${!isCustomAmount && baseAmount === amt ? 'bg-[#128853] text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{amt.toLocaleString()}</button>))}
                  {isCustomAmount ? (
                    <div className="relative">
                      <input type="text" inputMode="numeric" value={baseAmount ? Number(baseAmount).toLocaleString() : ''} onChange={(e) => { const rawValue = e.target.value.replace(/,/g, ''); if (rawValue === '') setBaseAmount(''); else { const num = parseInt(rawValue, 10); if (!isNaN(num)) setBaseAmount(num); } }} onBlur={() => { if (!baseAmount) setIsCustomAmount(false); }} className="py-3.5 rounded-xl text-sm font-bold bg-[#128853] text-white shadow-md outline-none text-center focus:ring-2 focus:ring-green-300 w-full placeholder-white/70 pr-6" placeholder="입력" autoFocus />
                      <span className="absolute right-3 top-1/2 -translate-y-1/2 text-white/80 font-bold text-xs pointer-events-none">P</span>
                    </div>
                  ) : (<button onClick={() => { setIsCustomAmount(true); setBaseAmount(''); }} className="py-3.5 rounded-xl text-sm font-bold transition-all bg-gray-100 text-gray-600 hover:bg-gray-200 active:scale-[0.98]">직접입력</button>)}
                </div>
              </div>

              <div className={`space-y-3 pointer-events-auto ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => { setShowDoubleSettings(!showDoubleSettings); setShowBonusSettings(false); }} className={`py-3.5 rounded-[16px] text-[14px] font-bold flex items-center justify-center transition-all border active:scale-[0.98] ${showDoubleSettings ? 'bg-[#1f2937] text-white border-[#1f2937]' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}`}><Icon name="Settings" className="w-[18px] h-[18px] mr-1.5"/> 배판 조건</button>
                  <button onClick={() => { setShowBonusSettings(!showBonusSettings); setShowDoubleSettings(false); }} className={`py-3.5 rounded-[16px] text-[14px] font-bold flex items-center justify-center transition-all border active:scale-[0.98] ${showBonusSettings ? 'bg-[#1f2937] text-white border-[#1f2937]' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}`}><Icon name="Trophy" className="w-[18px] h-[18px] mr-1.5"/> 보너스 설정</button>
                </div>

                {showDoubleSettings && (
                  <div className="bg-white rounded-[24px] shadow-sm border border-gray-100 p-5 animate-in fade-in slide-in-from-top-2">
                    <div className="space-y-5">
                      <div>
                        <label className="text-[13px] font-bold text-gray-800 mb-2.5 block">배판 적용 기준 시점</label>
                        <div className="flex bg-gray-100 p-1 rounded-[12px] gap-1">
                          <button onClick={() => setDoubleRules({timing: 'none', birdie: false, threeTie: false, prevTie: false, triple: false, doublePar3: false})} className={`flex-1 py-2 text-[12px] font-bold rounded-[8px] transition ${doubleRules.timing === 'none' ? 'bg-white shadow-sm text-[#128853]' : 'text-gray-500 hover:text-gray-700'}`}>미적용</button>
                          <button onClick={() => setDoubleRules({timing: 'current', birdie: true, threeTie: true, prevTie: true, triple: true, doublePar3: true})} className={`flex-1 py-2 text-[12px] font-bold rounded-[8px] transition ${doubleRules.timing === 'current' ? 'bg-white shadow-sm text-[#128853]' : 'text-gray-500 hover:text-gray-700'}`}>당홀</button>
                          <button onClick={() => setDoubleRules({timing: 'prev', birdie: true, threeTie: true, prevTie: true, triple: true, doublePar3: true})} className={`flex-1 py-2 text-[12px] font-bold rounded-[8px] transition ${doubleRules.timing === 'prev' ? 'bg-white shadow-sm text-[#128853]' : 'text-gray-500 hover:text-gray-700'}`}>전홀</button>
                        </div>
                      </div>
                      <div>
                        <label className="text-[13px] font-bold text-gray-800 mb-2.5 block">자동 배판 조건</label>
                        <div className="space-y-2">
                          {[{ id: 'birdie', label: '버디 이상' }, { id: 'threeTie', label: '3인 동타 (정확히 3명 동타시)' }, { id: 'prevTie', label: '이전 홀 무승부 (모두 동타)' }, { id: 'triple', label: '파4/파5 트리플 보기 이상' }, { id: 'doublePar3', label: '파3 더블 보기 이상' }].map(condition => (
                            <label key={condition.id} className="flex items-center p-3.5 bg-gray-50 border border-gray-100 rounded-[12px] cursor-pointer transition hover:bg-gray-100">
                              <input type="checkbox" checked={doubleRules[condition.id]} onChange={(e) => { const newRules = { ...doubleRules, [condition.id]: e.target.checked }; if (doubleRules.timing === 'none' && e.target.checked) { newRules.timing = 'current'; } setDoubleRules(newRules); }} className="w-5 h-5 text-[#128853] rounded border-gray-300 focus:ring-[#128853]" />
                              <span className="ml-3 text-[14px] font-bold text-gray-700">{condition.label}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {showBonusSettings && (
                  <div className="bg-white rounded-[24px] shadow-sm border border-gray-100 p-5 animate-in fade-in slide-in-from-top-2">
                    <div className="space-y-5">
                      <div>
                        <label className="text-[13px] font-bold text-gray-800 mb-2.5 block">버디 (Birdie) 축하금</label>
                        <div className="grid grid-cols-3 gap-2 w-full h-[44px]">
                          <button onClick={() => setBirdieRule({...birdieRule, type: 'strokes'})} className={`col-span-1 flex items-center justify-center text-[12px] whitespace-nowrap font-bold rounded-lg transition border ${birdieRule.type === 'strokes' ? 'bg-white border-[#128853] text-[#128853] shadow-sm' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}>타수 추가</button>
                          <button onClick={() => setBirdieRule({...birdieRule, type: 'fixed'})} className={`col-span-1 flex items-center justify-center text-[12px] whitespace-nowrap font-bold rounded-lg transition border ${birdieRule.type === 'fixed' ? 'bg-white border-[#128853] text-[#128853] shadow-sm' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}>지정 포인트</button>
                          <div className="col-span-1 relative flex items-center bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                            <input type="text" inputMode="numeric" value={birdieRule.type === 'strokes' ? birdieRule.strokeValue : (birdieRule.fixedValue ? birdieRule.fixedValue.toLocaleString() : '')} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if (val === '') { if (birdieRule.type === 'strokes') setBirdieRule({...birdieRule, strokeValue: ''}); else setBirdieRule({...birdieRule, fixedValue: ''}); } else { const num = parseInt(val, 10); if (!isNaN(num)) { if (birdieRule.type === 'strokes') setBirdieRule({...birdieRule, strokeValue: num}); else setBirdieRule({...birdieRule, fixedValue: num}); } } }} className="w-full h-full text-right bg-transparent outline-none font-bold text-[#128853] text-[13px] pr-6 pl-1 cursor-pointer focus:cursor-text" />
                            <span className="text-[11px] font-bold text-gray-400 absolute right-2 pointer-events-none">{birdieRule.type === 'strokes' ? '타' : 'P'}</span>
                          </div>
                        </div>
                      </div>
                      <div className="border-t border-gray-100 pt-5">
                        <label className="text-[13px] font-bold text-gray-800 mb-2.5 block">이글 (Eagle) 축하금</label>
                        <div className="grid grid-cols-3 gap-2 w-full h-[44px]">
                          <button onClick={() => setEagleRule({...eagleRule, type: 'strokes'})} className={`col-span-1 flex items-center justify-center text-[12px] whitespace-nowrap font-bold rounded-lg transition border ${eagleRule.type === 'strokes' ? 'bg-white border-[#128853] text-[#128853] shadow-sm' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}>타수 추가</button>
                          <button onClick={() => setEagleRule({...eagleRule, type: 'fixed'})} className={`col-span-1 flex items-center justify-center text-[12px] whitespace-nowrap font-bold rounded-lg transition border ${eagleRule.type === 'fixed' ? 'bg-white border-[#128853] text-[#128853] shadow-sm' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}>지정 포인트</button>
                          <div className="col-span-1 relative flex items-center bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden">
                            <input type="text" inputMode="numeric" value={eagleRule.type === 'strokes' ? eagleRule.strokeValue : (eagleRule.fixedValue ? eagleRule.fixedValue.toLocaleString() : '')} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if (val === '') { if (eagleRule.type === 'strokes') setEagleRule({...eagleRule, strokeValue: ''}); else setEagleRule({...eagleRule, fixedValue: ''}); } else { const num = parseInt(val, 10); if (!isNaN(num)) { if (eagleRule.type === 'strokes') setEagleRule({...eagleRule, strokeValue: num}); else setEagleRule({...eagleRule, fixedValue: num}); } } }} className="w-full h-full text-right bg-transparent outline-none font-bold text-[#128853] text-[13px] pr-6 pl-1 cursor-pointer focus:cursor-text" />
                            <span className="text-[11px] font-bold text-gray-400 absolute right-2 pointer-events-none">{eagleRule.type === 'strokes' ? '타' : 'P'}</span>
                          </div>
                        </div>
                      </div>

                      {/* 🚨 니어 및 롱기 추가 영역 */}
                      <div className="border-t border-gray-100 pt-5">
                        <div className="flex gap-4">
                          <div className="flex-1 space-y-2">
                            <label className="flex items-center cursor-pointer">
                              <input type="checkbox" checked={nearRule.enabled} onChange={(e) => setNearRule({...nearRule, enabled: e.target.checked})} className="w-4 h-4 text-blue-500 rounded border-gray-300 focus:ring-blue-500" />
                              <span className="ml-2 text-[13px] font-bold text-gray-800">🎯 니어 (파3)</span>
                            </label>
                            <div className={`relative flex items-center border rounded-lg shadow-sm overflow-hidden h-[44px] transition-all ${nearRule.enabled ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-200'}`}>
                               {nearRule.enabled ? (
                                  <>
                                    <input type="text" inputMode="numeric" value={nearRule.amount ? nearRule.amount.toLocaleString() : ''} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if(val === '') setNearRule({...nearRule, amount: ''}); else { const num = parseInt(val, 10); if(!isNaN(num)) setNearRule({...nearRule, amount: num}); } }} className="w-full h-full text-right bg-transparent outline-none font-black text-blue-600 text-[14px] pr-6 pl-2 cursor-pointer focus:cursor-text" />
                                    <span className="text-[11px] font-bold text-blue-400 absolute right-2 pointer-events-none">P</span>
                                  </>
                               ) : (
                                  <div className="w-full h-full flex items-center justify-center text-[12px] font-bold text-gray-400">사용안함</div>
                               )}
                            </div>
                          </div>

                          <div className="flex-1 space-y-2">
                            <label className="flex items-center cursor-pointer">
                              <input type="checkbox" checked={longestRule.enabled} onChange={(e) => setLongestRule({...longestRule, enabled: e.target.checked})} className="w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500" />
                              <span className="ml-2 text-[13px] font-bold text-gray-800">🏌️ 롱기 (파5 이상)</span>
                            </label>
                            <div className={`relative flex items-center border rounded-lg shadow-sm overflow-hidden h-[44px] transition-all ${longestRule.enabled ? 'bg-orange-50 border-orange-200' : 'bg-gray-50 border-gray-200'}`}>
                               {longestRule.enabled ? (
                                  <>
                                    <input type="text" inputMode="numeric" value={longestRule.amount ? longestRule.amount.toLocaleString() : ''} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if(val === '') setLongestRule({...longestRule, amount: ''}); else { const num = parseInt(val, 10); if(!isNaN(num)) setLongestRule({...longestRule, amount: num}); } }} className="w-full h-full text-right bg-transparent outline-none font-black text-orange-600 text-[14px] pr-6 pl-2 cursor-pointer focus:cursor-text" />
                                    <span className="text-[11px] font-bold text-orange-400 absolute right-2 pointer-events-none">P</span>
                                  </>
                               ) : (
                                  <div className="w-full h-full flex items-center justify-center text-[12px] font-bold text-gray-400">사용안함</div>
                               )}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div className="space-y-3 mt-4 pt-2 border-t border-gray-100 pointer-events-auto pb-4">
                {startTime ? (
                  <button onClick={() => setStep('play')} className="w-full bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 px-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[17px] active:scale-[0.98]">
                    게임 계속하기 <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
                  </button>
                ) : (
                  <button onClick={handleStart} className="w-full bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 px-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[17px] active:scale-[0.98]">
                    새 게임 시작 (방장) <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      } 
      else if (step === 'play') {
        content = (
          <div className="flex flex-col flex-1 relative">
            <div className="bg-[#128853] text-white p-4 pt-10 sticky top-0 z-20 shadow-md flex justify-between items-center rounded-b-[24px]">
              <button onClick={() => setStep('scorecard')} className="p-2 hover:bg-white/10 rounded-full transition flex flex-col items-center active:scale-95"><Icon name="Trophy" className="w-6 h-6" /></button>
              <div className="text-center flex flex-col items-center justify-center">
                <div className="font-black text-[20px] tracking-tight flex items-center gap-2">
                  <span>{currentHole + 1}H</span>
                  {roomId && (
                    <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none active:scale-95">
                      LIVE
                    </span>
                  )}
                </div>
              </div>
              <div className="flex items-center gap-2">
                {startTime && <div className="text-[11px] font-bold text-white bg-black/20 px-2 py-1 rounded-md flex items-center gap-1 whitespace-nowrap"><Icon name="Clock" className="w-3 h-3"/> {elapsedTime}</div>}
                {isAdmin && (
                  <button onClick={() => setStep('setup')} className="p-1 hover:bg-white/10 rounded-full transition text-xs font-semibold flex flex-col items-center active:scale-95"><Icon name="Settings" className="w-5 h-5" /></button>
                )}
              </div>
            </div>

            <div className="max-w-md mx-auto w-full p-4 space-y-4 pt-6 flex-1 pb-24">
              <div className="flex gap-3">
                <div className={`flex-1 bg-white rounded-[16px] shadow-sm p-3 border border-gray-100 flex flex-col justify-center gap-2 ${!isAdmin ? 'pointer-events-none opacity-80' : ''}`}>
                  <span className="font-black text-gray-800 text-[14px] ml-1">PAR</span>
                  <div className="flex bg-gray-100 rounded-[12px] p-1 gap-1">
                    {[3, 4].map((par) => (
                      <button key={par} onClick={() => handleParSelect(par)} className={`flex-1 h-9 rounded-[8px] font-black text-[15px] transition-all active:scale-[0.98] ${currentPar === par ? 'bg-[#128853] shadow-sm text-white' : 'text-gray-400 hover:text-gray-800'}`}>{par}</button>
