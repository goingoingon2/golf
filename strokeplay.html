                  <span onClick={() => setShowQrModal(true)} className="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-md animate-pulse cursor-pointer select-none ml-2 active:scale-95">
                    LIVE
                  </span>
                )}
              </div>
              <div className="flex items-center">
                {startTime && <div className="text-[11px] font-bold text-white bg-black/20 px-2 py-1 rounded-md flex items-center gap-1 whitespace-nowrap"><Icon name="Clock" className="w-3 h-3"/> {elapsedTime}</div>}
              </div> 
            </div>

            <div className={`max-w-md mx-auto w-full p-4 space-y-4 pt-6 ${!isAdmin ? 'pointer-events-none' : ''}`}>
              <div className="bg-white rounded-[24px] p-5 shadow-sm border border-gray-100">
                <h2 className="text-[15px] font-bold text-gray-800 mb-4 flex items-center">
                  <Icon name="Wallet" className="w-5 h-5 mr-2 text-[#128853]"/> 개평 비율 설정
                </h2>
                
                <div className={`mb-4 ${!isAdmin ? 'opacity-80' : ''}`}>
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => { setGaepyungRate(0); setIsCustomGaepyung(false); }} className={`col-span-2 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 0 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>개평 없음 (0%)</button>
                    <button onClick={() => { setGaepyungRate(10); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 10 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>10%</button>
                    <button onClick={() => { setGaepyungRate(20); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 20 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>20%</button>
                    <button onClick={() => { setGaepyungRate(30); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 30 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>30%</button>
                    <button onClick={() => { setGaepyungRate(50); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 50 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>50%</button>
                    <button onClick={() => { setGaepyungRate(70); setIsCustomGaepyung(false); }} className={`col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] ${gaepyungRate === 70 && !isCustomGaepyung ? 'bg-[#128853] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>70%</button>
                    {!isCustomGaepyung ? (
                      <button onClick={() => { setIsCustomGaepyung(true); setGaepyungRate(''); }} className="col-span-1 py-3 rounded-xl text-[13px] font-bold transition active:scale-[0.98] bg-gray-100 text-gray-600 hover:bg-gray-200">직접입력</button>
                    ) : (
                      <div className="col-span-1 relative bg-[#128853] rounded-xl shadow-sm transition-all flex items-center overflow-hidden cursor-pointer focus-within:ring-2 focus-within:ring-green-300">
                        <input 
                          type="number" 
                          inputMode="numeric" 
                          value={gaepyungRate} 
                          onChange={(e) => setGaepyungRate(e.target.value === '' ? '' : Number(e.target.value))} 
                          className="w-full h-full py-3 bg-transparent text-white text-right font-bold text-[14px] outline-none pr-6 pl-1 placeholder-white/60 cursor-pointer focus:cursor-text" 
                          placeholder="0"
                          autoFocus
                        />
                        <span className="absolute right-2 text-white/90 text-[12px] font-bold pointer-events-none">%</span>
                      </div>
                    )}
                  </div>
                </div>

                <div className={`flex items-center justify-between py-2 border-t border-gray-100 mt-2 pt-4 ${!isAdmin ? 'opacity-80' : ''}`}>
                  <div className="flex flex-col"><span className="text-[13px] font-bold text-gray-800">1,000P 단위 절사</span><span className="text-[10px] text-gray-500 mt-0.5">1,000P 미만 금액 버림</span></div>
                  <button onClick={() => setIsRoundThousand(!isRoundThousand)} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors shrink-0 ${isRoundThousand ? 'bg-[#128853]' : 'bg-gray-200'}`}><span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform shadow-sm ${isRoundThousand ? 'translate-x-5' : 'translate-x-0.5'}`} /></button>
                </div>
              </div>

              <div>
                <div className="flex items-center gap-2 mb-3 ml-1 mt-6">
                  <h3 className="font-bold text-[15px] text-gray-700">플레이어별 최종 정산</h3>
                  <span className="text-[11px] text-[#128853] font-bold">* 핸디가 있을 경우, 핸디포함 계산됩니다</span>
                </div>
                
                <div className="space-y-4">
                  {settlementData.details.map((d, i) => (
                    <div key={i} className="bg-white rounded-[20px] p-0 shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                      <div className="flex justify-between items-center p-4 border-b border-gray-50">
                        <div className="flex items-center gap-2">
                          <div className="w-8 h-8 bg-gray-100 rounded-full overflow-hidden shrink-0"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${d.name}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div>
                          <span className="font-bold text-gray-800 text-[15px]">{d.name}</span>
                        </div>
                        <span className={`font-black text-[15px] ${d.original > 0 ? 'text-[#128853]' : d.original < 0 ? 'text-red-500' : 'text-gray-500'}`}>기존: {d.original > 0 ? '+' : ''}{d.original.toLocaleString()}P</span>
                      </div>
                      <div className="p-4 space-y-2">
                        <div className="flex justify-between items-center text-[12px]">
                          <span className="text-gray-500 font-medium">개평 ({d.original > 0 ? '지급할 포인트' : d.original < 0 ? '받을 포인트' : '해당 없음'})</span>
                          <span className={`font-black ${d.original > 0 ? 'text-red-500' : d.original < 0 ? 'text-blue-500' : 'text-gray-400'}`}>{d.original > 0 ? '-' + d.cut.toLocaleString() : d.original < 0 ? '+' + d.receive.toLocaleString() : '0'}P</span>
                        </div>
                      </div>
                      <div className="flex justify-between items-center bg-gray-50 p-4 border-t border-gray-100">
                        <span className="text-[13px] font-bold text-gray-800">최종 수령(지불) 포인트</span>
                        <span className={`text-[20px] tracking-tight font-black ${d.final > 0 ? 'text-[#128853]' : d.final < 0 ? 'text-red-500' : 'text-gray-600'}`}>{d.final > 0 ? '+' : ''}{d.final === 0 ? '0' : d.final.toLocaleString()}P</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="pt-6 pb-8 pointer-events-auto pb-safe">
                {isAdmin ? (
                  <button onClick={() => setShowFinalResultModal(true)} className="w-full bg-[#128853] hover:bg-[#0f7646] text-white font-bold py-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[15px] active:scale-[0.98]">
                    <Icon name="Calculator" className="w-5 h-5 mr-2" /> 정산완료 및 개평 계산하기
                  </button>
                ) : (
                  <div className="w-full text-center font-bold text-gray-500 py-4">방장이 게임을 종료할 때까지 기다려주세요.</div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // =====================================================================
      // 6. 메인 컴포넌트 리턴 (모달)
      // =====================================================================
      return (
        <div className="app-wrapper flex flex-col min-h-[100dvh] bg-[#f4f6f8] relative font-sans">
          <style>{`
            @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
            * { font-family: 'Pretendard', sans-serif; }
          `}</style>
          
          {toastMessage && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2.5 rounded-full shadow-lg text-[11px] font-bold z-50 animate-in fade-in slide-in-from-top-4 w-11/12 max-w-sm text-center pointer-events-none">
              {toastMessage}
            </div>
          )}

          {content}
          
          {showQrModal && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-5 shadow-xl text-center flex flex-col items-center">
                <div className="flex justify-between items-center w-full border-b border-gray-100 pb-3 mb-2">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="QrCode" className="w-5 h-5 mr-2 text-[#128853]"/> 방 초대하기</h3>
                  <button onClick={() => setShowQrModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                
                <p className="text-[13px] text-gray-600 font-medium text-center leading-relaxed">
                  라운드 동반자의 스마트폰 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.
                </p>

                <div className="bg-gray-50 p-4 rounded-[16px] w-full flex justify-center border border-gray-100">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(getShareUrl(roomId))}`} alt="QR Code" className="w-40 h-40 rounded-lg mix-blend-multiply"/>
                </div>
                
                <div className="w-full">
                  <div className="text-[11px] font-bold text-gray-400 mb-1 text-left pl-1">초대 URL</div>
                  <div className="bg-gray-50 border border-gray-200 text-gray-800 text-[13px] font-bold p-3.5 rounded-[12px] truncate text-left w-full select-all">
                    {getShareUrl(roomId)}
                  </div>
                </div>

                <div className="flex gap-2 w-full mt-2">
                  <button onClick={() => {
                    const url = getShareUrl(roomId);
                    const textArea = document.createElement("textarea");
                    textArea.value = url;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); showToastMsg('초대 링크가 복사되었습니다!'); } catch(e){}
                    document.body.removeChild(textArea);
                    setShowQrModal(false);
                  }} className="flex-1 bg-white border border-[#128853] text-[#128853] hover:bg-green-50 font-bold py-3.5 rounded-[16px] transition shadow-sm text-[14px] active:scale-[0.98]">
                    URL 복사
                  </button>
                  <button onClick={async () => {
                    const url = getShareUrl(roomId);
                    if (navigator.share) {
                      try {
                        await navigator.share({ title: '골프 타당 게임', text: '골프 타당 게임에 초대합니다!', url: url });
                        setShowQrModal(false);
                      } catch(e) {}
                    } else {
                      const textArea = document.createElement("textarea");
                      textArea.value = url;
                      document.body.appendChild(textArea);
                      textArea.select();
                      try { document.execCommand('copy'); showToastMsg('초대 링크가 복사되었습니다!'); } catch(e){}
                      document.body.removeChild(textArea);
                      setShowQrModal(false);
                    }
                  }} className="flex-1 bg-[#128853] hover:bg-[#0f7646] text-white font-bold py-3.5 rounded-[16px] transition shadow-sm text-[14px] active:scale-[0.98]">
                    공유하기
                  </button>
                </div>
              </div>
            </div>
          )}

          {showCourseSearchModal && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex flex-col justify-end pointer-events-auto backdrop-blur-sm">
              <div className="bg-white rounded-t-[32px] p-6 animate-in slide-in-from-bottom-4 shadow-2xl flex flex-col max-h-[85vh] pb-safe">
                <div className="flex justify-between items-center mb-5 shrink-0">
                  <h3 className="text-[19px] font-black text-gray-800 flex items-center">
                    <Icon name="Search" className="w-5 h-5 mr-2 text-[#128853]"/> 골프장 검색
                  </h3>
                  <button onClick={() => setShowCourseSearchModal(false)} className="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500" /></button>
                </div>
                
                <div className="relative mb-4 shrink-0">
                  <Icon name="Search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                  <input 
                    type="text" 
                    value={courseSearchQuery} 
                    onChange={(e) => setCourseSearchQuery(e.target.value)} 
                    placeholder="골프장 이름 검색" 
                    className="w-full bg-gray-50 border border-gray-200 rounded-[16px] pl-12 pr-4 py-3.5 font-bold text-[15px] outline-none focus:border-[#128853] focus:ring-1 focus:ring-[#128853] transition-all"
                  />
                </div>

                <div className="flex-1 overflow-y-auto -mx-2 px-2 space-y-2 pb-6">
                  {GOLF_COURSES.filter(c => c.id !== 'custom' && c.name.toLowerCase().includes(courseSearchQuery.toLowerCase())).map(course => (
                    <button 
                      key={course.id} 
                      onClick={() => { 
                        setSelectedCourseId(course.id); 
                        setFrontNineId(Object.keys(course.nineHoles)[0]);
                        setBackNineId(Object.keys(course.nineHoles)[1] || Object.keys(course.nineHoles)[0]);
                        setShowCourseSearchModal(false); 
                        setCourseSearchQuery(''); 
                      }} 
                      className="w-full bg-white border border-gray-100 hover:border-[#128853] hover:bg-[#e5f5ec] text-left p-4 rounded-[16px] transition flex items-center justify-between active:scale-[0.98]"
                    >
                      <span className="font-bold text-[15px] text-gray-800">{course.name}</span>
                      <Icon name="ArrowRight" className="w-4 h-4 text-gray-400" />
                    </button>
                  ))}
                  
                  {GOLF_COURSES.filter(c => c.id !== 'custom' && c.name.toLowerCase().includes(courseSearchQuery.toLowerCase())).length === 0 && (
                    <div className="text-center py-10 text-gray-400 font-bold text-[14px]">
                      검색 결과가 없습니다.<br/><span className="text-[12px] font-normal mt-1 block">직접 설정을 이용해주세요.</span>
                    </div>
                  )}
                  
                  <div className="pt-2">
                    <button 
                      onClick={() => { 
                        setSelectedCourseId('custom'); 
                        setShowCourseSearchModal(false); 
                        setCourseSearchQuery(''); 
                      }} 
                      className="w-full bg-gray-50 border border-gray-200 hover:bg-gray-100 text-left p-4 rounded-[16px] transition flex items-center justify-between mt-2 active:scale-[0.98]"
                    >
                      <span className="font-bold text-[15px] text-gray-700">직접 설정 (자유 입력)</span>
                      <Icon name="Edit3" className="w-4 h-4 text-gray-500" />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {infoModal.show && (
            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-xs p-6 shadow-xl text-center flex flex-col items-center">
                <div className="flex justify-between items-center w-full border-b border-gray-100 pb-3 mb-4">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Icon name="Info" className="w-5 h-5 mr-2 text-[#128853]"/> {infoModal.title}</h3>
                  <button onClick={() => setInfoModal({ show: false, title: '', desc: '' })} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                <p className="text-[14px] text-gray-600 font-medium leading-relaxed text-left whitespace-pre-wrap w-full mb-6">
                  {infoModal.desc}
                </p>
                <button onClick={() => setInfoModal({ show: false, title: '', desc: '' })} className="w-full bg-[#128853] text-white font-bold py-3.5 rounded-[16px] transition shadow-sm active:scale-[0.98]">
                  확인
                </button>
              </div>
            </div>
          )}

          {/* 최종 결과 및 개평 정산 모달 */}
          {showFinalResultModal && (
            <div className="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 shadow-xl flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center border-b border-gray-100 pb-4 mb-4 shrink-0">
                  <h3 className="font-bold text-[19px] text-gray-800 flex items-center"><Icon name="Trophy" className="w-6 h-6 mr-2 text-yellow-500"/> 최종 정산 결과</h3>
                  <button onClick={() => setShowFinalResultModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition active:scale-95"><Icon name="X" className="w-5 h-5 text-gray-500"/></button>
                </div>
                <div className="overflow-y-auto flex-1 space-y-3 pr-1">
                  {[...settlementData.details].sort((a, b) => b.final - a.final).map((d, i) => (
                    <div key={i} className="bg-gray-50 rounded-[16px] p-3.5 flex items-center justify-between border border-gray-100">
                      <div className="flex items-center gap-3">
                        <div className="w-9 h-9 bg-white rounded-full overflow-hidden shrink-0 shadow-sm border border-gray-100">
                          <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${d.name}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/>
                        </div>
                        <span className="font-bold text-[15px] text-gray-800">{d.name}</span>
                      </div>
                      <div className={`font-black text-[17px] tracking-tight ${d.final > 0 ? 'text-[#128853]' : d.final < 0 ? 'text-red-500' : 'text-gray-600'}`}>
                        {d.final > 0 ? '+' : ''}{d.final === 0 ? '0' : d.final.toLocaleString()}P
                      </div>
                    </div>
                  ))}
                </div>
                <div className="pt-5 mt-2 border-t border-gray-100 shrink-0">
                  <button onClick={() => { setShowFinalResultModal(false); setShowResetConfirm(true); }} className="w-full bg-[#128853] hover:bg-[#0f7646] text-white font-bold py-4 rounded-[16px] transition shadow-sm active:scale-[0.98] text-[16px] flex items-center justify-center">
                    <Icon name="RotateCcw" className="w-5 h-5 mr-2" /> 새 게임 시작
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 리셋(새 게임) 확인 모달 */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black/60 z-[300] flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm pointer-events-auto">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 shadow-xl text-center space-y-5">
                <div className="w-14 h-14 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-2 text-red-500">
                  <Icon name="RotateCcw" className="w-7 h-7" />
                </div>
                <div>
                  <h3 className="font-bold text-[18px] text-gray-800 mb-2">새 게임 시작</h3>
                  <p className="text-[14px] text-gray-500 font-medium">현재 진행 중인 모든 데이터가 초기화됩니다.<br/>정말 새 게임을 시작하시겠습니까?</p>
                </div>
                <div className="flex gap-2 w-full mt-4">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 rounded-[16px] transition text-[14px] active:scale-[0.98]">취소</button>
                  <button onClick={() => {
                    setHoles(Array(18).fill(null));
                    setCurrentHole(0);
                    setCurrentScores([4,4,4,4]);
                    setStartTime(null);
                    setStep('setup');
                    setShowResetConfirm(false);
                    setShowFinalResultModal(false);
                    if (isAdmin && roomId) {
                      getRoomRef(roomId).set({
                        step: 'setup', holes: Array(18).fill(null), currentHole: 0, startTime: null, currentScores: [4,4,4,4], updatedAt: Date.now()
                      }, { merge: true }).catch(e => console.error(e));
                    }
                    showToastMsg('새 게임이 준비되었습니다.');
                  }} className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-3.5 rounded-[16px] transition shadow-sm text-[14px] active:scale-[0.98]">초기화</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
