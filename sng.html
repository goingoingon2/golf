    const getRandomHandicap = () => String(Math.floor(Math.random() * 31) + 80);
    const safeDisplayDiff = diff => { if (diff == null || isNaN(diff)) return '-'; if (diff === 0) return 'E'; return diff > 0 ? `+${Math.round(diff)}` : String(Math.round(diff)); };
    const safeDisplayNet = netDiff => { if (netDiff == null || isNaN(netDiff)) return '-'; const val = parseFloat(netDiff).toFixed(1); if (val === "0.0" || val === "-0.0") return 'E'; return netDiff > 0 ? `+${val}` : String(val); };

    function RankBadge({ rank }) {
      if (rank === 0) return <span className="text-[22px]">🥇</span>;
      if (rank === 1) return <span className="text-[22px]">🥈</span>;
      if (rank === 2) return <span className="text-[22px]">🥉</span>;
      return <span className="font-black text-lg text-slate-400 w-8 text-center">{rank + 1}</span>;
    }

    function GroupBadges({ tIdx, pIdx, customGroups }) {
      if (!customGroups || customGroups.length === 0) return null;
      const myGroups = customGroups.map((g, idx) => ({ ...g, style: GROUP_STYLES[idx % GROUP_STYLES.length] })).filter(g => (g.members || []).includes(`${tIdx}-${pIdx}`));
      if (myGroups.length === 0) return null;
      return <div className="flex flex-wrap gap-1 items-center shrink-0 ml-1">{myGroups.map(g => <span key={g.id} className={`shrink-0 text-[9px] font-bold px-1.5 py-0.5 rounded border shadow-sm max-w-[50px] truncate ${g.style.badge}`}>{String(g.name)}</span>)}</div>;
    }

    function ShareModal({ isOpen, onClose, roomId }) {
      if (!isOpen) return null;
      const inviteUrl = roomId ? `${window.location.origin}${window.location.pathname}?roomId=${roomId}` : window.location.href;
      const handleCopy = () => {
        try { const el = document.createElement('textarea'); el.value = inviteUrl; el.setAttribute('readonly', ''); el.style.position = 'absolute'; el.style.left = '-9999px'; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert('URL이 복사되었습니다.'); } 
        catch(e) { alert('복사 실패. 아래 URL을 직접 복사해주세요.'); }
        onClose();
      };
      return (
        <div className="fixed inset-0 z-[130] flex items-center justify-center px-4 text-center font-sans">
          <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-[2px]" onClick={onClose} />
          <div className="bg-white w-full max-w-sm rounded-[32px] p-6 relative z-10 shadow-2xl animate-fade-in-up text-left">
            <div className="flex items-center justify-between mb-6"><div className="flex items-center gap-2 text-slate-800 font-bold text-lg"><Icons.Share2 className="w-5 h-5 text-[#0D8A5E]" /> 방 초대하기</div><button onClick={onClose} className="p-2 text-slate-400"><Icons.X className="w-5 h-5" /></button></div>
            <div className="bg-[#F8F9FA] rounded-3xl p-6 flex items-center justify-center mb-6 border"><Icons.Share2 className="w-20 h-20 text-slate-300" strokeWidth={1.5} /></div>
            <div className="mb-6"><label className="block text-slate-500 text-xs font-bold mb-2 pl-1">초대 URL</label><div className="bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-600 text-sm truncate font-medium select-all">{inviteUrl}</div></div>
            <div className="flex gap-3"><button onClick={handleCopy} className="flex-1 bg-white border border-[#0D8A5E] text-[#0D8A5E] font-bold py-3.5 rounded-xl">URL 복사</button><button onClick={() => { if(navigator.share) navigator.share({ title: '골프 스코어보드', url: inviteUrl }); onClose(); }} className="flex-1 bg-[#0D8A5E] text-white font-bold py-3.5 rounded-xl shadow-md">공유하기</button></div>
          </div>
        </div>
      );

    function DetailModal({ isOpen, onClose, config }) {
      const [overallTab, setOverallTab] = useState('realtime');
      if (!isOpen || !config) return null;
      const currentLists = config.isOverall ? [...(config.lists?.[overallTab] || [])].sort((a, b) => a.diff - b.diff) : (config.list || []);

        <div className="fixed inset-0 z-[250] flex items-end sm:items-center justify-center sm:px-4 sm:max-w-md sm:mx-auto font-sans">

          <div className="bg-white w-full sm:rounded-[32px] rounded-t-[32px] max-h-[85vh] p-6 relative z-10 shadow-2xl flex flex-col animate-fade-in-up">

              <>

                <div className="bg-slate-50 rounded-xl flex items-center text-xs font-bold text-slate-500 py-2 px-4 mb-2 shrink-0"><div className="w-10 text-center">순위</div><div className="flex-1 px-2">플레이어</div><div className="flex items-center justify-end gap-3 shrink-0"><span className="w-16 text-right">기록</span><span className="w-10 text-right">진행</span></div></div>
                <div className="overflow-y-auto flex-1 pr-1 space-y-2 pb-4 no-scrollbar">

    function ScoreboardView({ teamNames, teamData, currentUserRole, myPlayerInfo, hostSelectedTeam, isMultiCourse, teamCourses, courseInfo, allPars, allScores, handicapType, eventName, customGroups, onGoToSettings, onBack, onGoToInput, onOpenAwards }) {

            <div className="px-4 mb-3 flex bg-white rounded-xl p-1 shadow-sm mx-4"><button onClick={() => setActiveTab('front')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'front' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-400'}`}>전반 ({String(vTeamCourse.front)})</button><button onClick={() => setActiveTab('back')} className={`flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${activeTab === 'back' ? 'bg-slate-800 text-white shadow-sm' : 'text-slate-400'}`}>후반 ({String(vTeamCourse.back)})</button></div>
            <div className="px-4 pb-4">

    function AwardsPageViewMain({ stats, syncStats, predictionStats, totalPar, teamNames, teamData, eventName, isAwardOpen, isAwardsManuallyOpened, setIsAwardsManuallyOpened, currentUserRole, customGroups, enableGroupComp, enableTeamComp, teamBalanceMode, groupBalanceMode, selectedAwards, stablefordTitle, allPars, onBack, setDetailModal, setIsAwardInfoOpen, specialRankings }) {
      const getCompStats = (type) => {
        const list = type === 'group' ? (customGroups || []) : (teamData || []).map((_, i) => ({ id: i, name: teamNames[i], members: (teamData[i] || []).map((__, pi) => `${i}-${pi}`) }));

          const avgGross = members.length > 0 ? members.reduce((sum, m) => sum + (m.score || 0), 0) / members.length : 0; const compDiff = diffs.length > 0 ? diffs.reduce((a,b)=>a+b, 0) / diffs.length : 0;

                      <div className="pt-4 border-t space-y-4">
                        {(tempCustomGroups || []).map((g, idx) => {

            <div className="bg-white rounded-2xl p-5 shadow-sm transition-all border border-slate-100">
              <div className="flex items-center justify-between cursor-pointer" onClick={() => setIsAwardSettingsOpen(!isAwardSettingsOpen)}><div className="flex items-center gap-2"><Icons.Award className="w-5 h-5 text-slate-500" /><h2 className="text-slate-800 font-bold text-base">시상 및 랭킹 설정</h2></div><Icons.ChevronDown className={`w-5 h-5 text-slate-400 transition-transform ${isAwardSettingsOpen ? 'rotate-180' : ''}`} /></div>
              {isAwardSettingsOpen && (
                <div className="pt-2 animate-fade-in-up mt-2 text-left"><div className="flex flex-wrap gap-2 pt-4 border-t border-slate-100">{(ALL_AWARDS_KEYS || []).map(award => {
                      const isSelected = (selectedAwards || []).includes(award); const hasSet = award === '니어리스트' || award === '롱기스트' || award === '변형스테이블포드';
                      return (<div key={award} className="relative inline-flex items-center"><button onClick={() => { if (isSelected) setSelectedAwards((selectedAwards||[]).filter(x=>x!==award)); else { setSelectedAwards([...(selectedAwards||[]),award]); if(award==='변형스테이블포드') setShowStablefordModal(true); if(award==='니어리스트'||award==='롱기스트') setShowSpecialHoleModal(true); } }} className={`px-3 py-1.5 rounded-xl text-sm font-bold border transition-all ${isSelected?'bg-[#E6F4EF] border-[#0D8A5E] text-[#0D8A5E]':'bg-white text-slate-500'} ${hasSet && isSelected ? 'pr-8' : ''}`}>{String(award)}</button>{hasSet && isSelected && (<button onClick={() => { if(award==='변형스테이블포드') setShowStablefordModal(true); else setShowSpecialHoleModal(true); }} className="absolute right-1 p-1 text-[#0D8A5E] hover:bg-[#D1FAE5] rounded-full transition-colors"><Icons.Settings className="w-3.5 h-3.5"/></button>)}</div>);
                    })}</div></div>

            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 no-scrollbar text-left">
              {players.map((team, tIdx) => (
                <div key={tIdx} className="mb-6 last:mb-0">
                  <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2 flex-1 min-w-0 pr-2"><input type="text" value={teamNames[tIdx] || ''} onChange={e=>{const nt=[...(teamNames||[])]; nt[tIdx]=e.target.value; setTeamNames(nt);}} className="bg-[#E6F4EF] text-[#0D8A5E] px-2.5 py-1 rounded-full text-xs font-bold w-16 text-center outline-none" /><h3 className="text-slate-800 font-bold text-sm truncate shrink-0">플레이어 명단</h3></div><div className="flex gap-2 items-center shrink-0">{tIdx >= 2 && <button onClick={() => handleRemoveTeam(tIdx)} className="p-1.5 text-slate-300 hover:text-red-500 transition-colors"><Icons.Trash2 className="w-5 h-5" strokeWidth={1.5} /></button>}{tIdx === 0 && (<div className="flex bg-slate-100 p-1 rounded-lg shrink-0"><button onClick={()=>setCurrentHandicapType('strokes')} className={`px-2.5 py-1 rounded-md text-[11px] font-bold transition-colors ${currentHandicapType==='strokes'?'bg-white shadow-sm text-slate-800':'text-slate-500'}`}>타수</button><button onClick={()=>setCurrentHandicapType('over')} className={`px-2.5 py-1 rounded-md text-[11px] font-bold transition-colors ${currentHandicapType==='over'?'bg-white shadow-sm text-slate-800':'text-slate-500'}`}>오버파</button></div>)}</div></div>
                  {isMultiCourse && (<div className="flex gap-2 mt-3 mb-2 bg-slate-50 p-2 rounded-xl animate-fade-in-up"><span className="text-[11px] font-bold text-slate-500 shrink-0 self-center w-10 text-center">코스</span><select value={teamCourses[tIdx]?.front || courseInfo.front} onChange={e => { const ntc = [...teamCourses]; ntc[tIdx] = {...ntc[tIdx], front: e.target.value}; setTeamCourses(ntc); }} className="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-[11px] font-bold bg-white outline-none">{courseOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select><select value={teamCourses[tIdx]?.back || courseInfo.back} onChange={e => { const ntc = [...teamCourses]; ntc[tIdx] = {...ntc[tIdx], back: e.target.value}; setTeamCourses(ntc); }} className="flex-1 border border-slate-200 rounded-lg px-2 py-1.5 text-[11px] font-bold bg-white outline-none">{courseOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select></div>)}
                  <div className="grid grid-cols-2 gap-2">
                    {(team || []).map((p,pI)=>(
                      <div key={pI} className="relative flex bg-[#F8F9FA] rounded-xl border overflow-hidden shadow-sm"><div className="flex-1 flex items-center pl-3 py-1.5 min-w-0 pr-1 gap-1"><input type="text" value={p.name} onChange={(e)=>handlePlayerChange(tIdx,pI,'name',e.target.value)} className="w-full flex-1 text-sm font-medium focus:outline-none bg-transparent min-w-0" /></div><div className="w-16 border-l flex items-center pr-2 bg-slate-200/30 shrink-0"><input type="text" value={p.handicap} onChange={(e)=>handlePlayerChange(tIdx,pI,'handicap',e.target.value.replace(/[^0-9+\-]/g,''))} className="w-full bg-transparent py-1 text-xs text-center font-bold focus:outline-none" />{currentHandicapType==='strokes'&&<span className="text-[11px] text-slate-500 font-bold">타</span>}</div></div>

              {players.length < 20 && (<button onClick={handleAddTeam} className="w-full mt-2 bg-slate-50 border border-dashed border-slate-300 py-3 rounded-xl text-slate-500 font-bold text-sm flex items-center justify-center gap-2 hover:bg-slate-100 transition-colors active:scale-[0.98]"><Icons.Plus className="w-4 h-4" /> 다음 조 추가하기</button>)}

            {isRoundStarted && (<div className="flex gap-2 mb-1"><button onClick={() => setConfirmModal('reset')} className="flex-1 bg-white border border-red-200 text-red-500 font-bold py-3.5 rounded-xl shadow-sm active:scale-95 transition-all text-sm">새 게임 시작</button><button onClick={() => setConfirmModal('end')} className="flex-1 bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-sm active:scale-95 transition-all text-sm">게임 종료하기</button></div>)}
            <button onClick={()=>{ setCustomGroups(tempCustomGroups); setGroupBalanceMode(tempGroupBalanceMode); setSpecialHoles(tempSpecialHoles); setStablefordTitle(tempStablefordTitle); setStablefordConfig(tempStablefordConfig); onComplete(players, currentHandicapType); }} className="w-full bg-[#0D8A5E] text-white font-bold text-lg py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transition-all active:scale-[0.98]">{isRoundStarted ? '게임 계속하기' : '대기실 입장'} <Icons.ChevronRight className="w-5 h-5" /></button>
          </div>

          {confirmModal && (
            <div className="fixed inset-0 z-[120] flex items-center justify-center px-4 font-sans text-center">
              <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onClick={() => setConfirmModal(null)} />
              <div className="bg-white w-full max-w-sm rounded-[32px] p-6 relative z-10 shadow-2xl animate-fade-in-up">
                <h3 className="text-slate-800 font-black text-lg mb-2">{confirmModal === 'reset' ? '새 게임 시작' : '게임 종료'}</h3>
                <p className="text-slate-600 text-sm mb-6 leading-relaxed">{confirmModal === 'reset' ? '모든 스코어가 초기화됩니다. 정말 새 게임을 시작하시겠습니까?' : '진행 중인 게임 조기 종료하고 결과 화면으로 이동하시겠습니까?'}</p>
                <div className="flex gap-3"><button onClick={() => setConfirmModal(null)} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3.5 rounded-xl transition-colors">취소</button><button onClick={() => { if (confirmModal === 'reset') onResetGame(); else onEndGame(); setConfirmModal(null); }} className={`flex-1 text-white font-bold py-3.5 rounded-xl shadow-md transition-colors active:scale-95 ${confirmModal === 'reset' ? 'bg-red-500' : 'bg-slate-800'}`}>확인</button></div>
              </div>
            </div>
          )}
          
          {showStablefordModal && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center px-4 font-sans text-left">
              <div className="absolute inset-0 bg-slate-900/40" onClick={()=>setShowStablefordModal(false)}/>
              <div className="bg-white w-full max-w-sm rounded-[32px] p-6 relative z-10 shadow-2xl flex flex-col max-h-[90vh] no-scrollbar">
                <div className="flex items-center justify-between mb-4"><h3 className="text-slate-800 font-bold text-lg flex items-center gap-2"><Icons.Settings className="w-5 h-5 text-[#0D8A5E]"/> 점수제 설정</h3><button onClick={()=>setShowStablefordModal(false)} className="p-1.5 text-slate-400"><Icons.X className="w-5 h-5"/></button></div>
                <div className="overflow-y-auto flex-1 space-y-4 mb-6 no-scrollbar">
                  <div><label className="block text-xs font-bold text-slate-500 mb-2 pl-1">시상 명칭</label><input type="text" value={tempStablefordTitle} onChange={e=>setTempStablefordTitle(e.target.value)} className="w-full bg-[#F8F9FA] border rounded-xl px-4 py-3 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#0D8A5E]" /></div>
                  <div className="space-y-3"><label className="block text-xs font-bold text-slate-500 pl-1">획득 기준</label>
                    {(tempStablefordConfig || []).map((item,idx)=>(<div key={item.id} className="flex items-center gap-2 w-full"><input type="text" value={item.label} onChange={e=>{const nc=[...tempStablefordConfig];nc[idx].label=e.target.value;setTempStablefordConfig(nc);}} className="flex-1 border rounded-xl px-3 py-2 text-sm font-bold outline-none"/><div className="flex items-center gap-1 bg-slate-50 rounded-xl p-1 border shrink-0"><button onClick={()=>{const nc=[...tempStablefordConfig];nc[idx].score-=1;setTempStablefordConfig(nc);}} className="w-7 h-7 rounded-lg bg-white flex items-center justify-center transition-colors"><Icons.Minus className="w-3 h-3"/></button><span className="font-black text-sm w-6 text-center text-[#0D8A5E]">{item.score>0?`+${item.score}`:item.score}</span><button onClick={()=>{const nc=[...tempStablefordConfig];nc[idx].score+=1;setTempStablefordConfig(nc);}} className="w-7 h-7 rounded-lg bg-white flex items-center justify-center transition-colors"><Icons.Plus className="w-3 h-3"/></button></div></div>))}
                  </div>
                </div>
                <button onClick={()=>{setStablefordTitle(tempStablefordTitle);setStablefordConfig(tempStablefordConfig);setShowStablefordModal(false);}} className="w-full bg-[#0D8A5E] text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-[0.98]">설정 완료</button>
              </div>
            </div>
          )}
          
          {showSpecialHoleModal && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center px-4 font-sans text-left">
              <div className="absolute inset-0 bg-slate-900/40" onClick={()=>setShowSpecialHoleModal(false)} />
              <div className="bg-white w-full max-w-sm rounded-[32px] p-6 relative z-10 shadow-2xl animate-fade-in-up">
                <h3 className="text-slate-800 font-bold text-lg mb-6 flex items-center gap-2"><Icons.Target className="w-5 h-5 text-[#0D8A5E]" /> 지정 홀 설정</h3>
                <div className="space-y-4 mb-8">
                  {overlappingCourses.length === 0 && (<div className="bg-red-50 text-red-500 p-3 rounded-xl text-xs font-bold border border-red-100">조별 코스가 달라서 모든 조가 겹치는 코스가 없습니다. 특수 홀을 지정할 수 없습니다.</div>)}
                  <div><span className="font-bold text-slate-700 block mb-2 text-sm">니어리스트 홀 (파3 중첩 코스)</span><select value={tempSpecialHoles.nearest ? JSON.stringify(tempSpecialHoles.nearest) : ""} onChange={e => setTempSpecialHoles({...tempSpecialHoles, nearest: e.target.value ? JSON.parse(e.target.value) : null})} className="w-full bg-[#F8F9FA] border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#0D8A5E] outline-none"><option value="">설정 안함</option>{overlappingCourses.map(c => Array.from({length: 9}).map((_, i) => { if (currentCourseData.courses[c] && currentCourseData.courses[c][i] === 3) return <option key={`${c}-${i+1}`} value={JSON.stringify({course: c, hole: i+1})}>{c} {i+1}H (파3)</option>; return null; }))}</select></div>
                  <div><span className="font-bold text-slate-700 block mb-2 text-sm">롱기스트 홀 (파5 중첩 코스)</span><select value={tempSpecialHoles.longest ? JSON.stringify(tempSpecialHoles.longest) : ""} onChange={e => setTempSpecialHoles({...tempSpecialHoles, longest: e.target.value ? JSON.parse(e.target.value) : null})} className="w-full bg-[#F8F9FA] border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-[#0D8A5E] outline-none"><option value="">설정 안함</option>{overlappingCourses.map(c => Array.from({length: 9}).map((_, i) => { if (currentCourseData.courses[c] && currentCourseData.courses[c][i] === 5) return <option key={`${c}-${i+1}`} value={JSON.stringify({course: c, hole: i+1})}>{c} {i+1}H (파5)</option>; return null; }))}</select></div>
                  <div className="pt-2 border-t border-slate-100"><label className="flex items-center gap-2 cursor-pointer mb-1"><input type="checkbox" checked={tempSpecialHoles.requirePar !== false} onChange={e => setTempSpecialHoles({...tempSpecialHoles, requirePar: e.target.checked})} className="w-4 h-4 text-[#0D8A5E] rounded focus:ring-[#0D8A5E] outline-none" /><span className="font-bold text-slate-700 text-sm">파(Par) 이하 기록 시에만 유효</span></label></div>
                </div>
                <button onClick={()=>{setShowSpecialHoleModal(false);}} className="w-full bg-[#0D8A5E] text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-all">설정 완료</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [currentView, setCurrentView] = usePersistentState('golf_currentView', 'settings');
      const [handicapType, setHandicapType] = usePersistentState('golf_handicapType', 'strokes');
      const [eventName, setEventName] = usePersistentState('golf_eventName', '단체 골프 라운드');
      const [courseInfo, setCourseInfo] = usePersistentState('golf_courseInfo', { name: '표준 파72 (일반 코스)', front: 'OUT 코스', back: 'IN 코스' });
      const [isMultiCourse, setIsMultiCourse] = usePersistentState('golf_isMultiCourse', false);
      const [teamCourses, setTeamCourses] = usePersistentState('golf_teamCourses', Array(20).fill({front: 'OUT 코스', back: 'IN 코스'}));
      const [isRoundStarted, setIsRoundStarted] = usePersistentState('golf_isRoundStarted', false);
      const [teamNames, setTeamNames] = usePersistentState('golf_teamNames_v2', ['1조', '2조', '3조', '4조']);
      const [teamData, setTeamData] = usePersistentState('golf_teamData_v2', getInitialTeams());
      const [enableTeamComp, setEnableTeamComp] = usePersistentState('golf_enableTeamComp', true);
      const [enableGroupComp, setEnableGroupComp] = usePersistentState('golf_enableGroupComp_v2', true);
      const [teamBalanceMode, setTeamBalanceMode] = usePersistentState('golf_teamBalanceMode', 'average');
      const [customGroups, setCustomGroups] = usePersistentState('golf_customGroups_v2', getInitialGroups());
      const [groupBalanceMode, setGroupBalanceMode] = usePersistentState('golf_groupBalanceMode', 'average');
      const [selectedAwards, setSelectedAwards] = usePersistentState('golf_selectedAwards', ALL_AWARDS_KEYS);
      const [stablefordTitle, setStablefordTitle] = usePersistentState('golf_stablefordTitle', '변형스테이블포드');
      const [stablefordConfig, setStablefordConfig] = usePersistentState('golf_stablefordConfig', [{ id: 'albatross', label: '알바트로스', score: 8 }, { id: 'eagle', label: '이글', score: 5 }, { id: 'birdie', label: '버디', score: 2 }, { id: 'par', label: '파', score: 0 }, { id: 'bogey', label: '보기', score: -1 }, { id: 'doubleBogey', label: '더블보기 이상', score: -3 }]);
      const [specialHoles, setSpecialHoles] = usePersistentState('golf_specialHoles', { nearest: null, longest: null, requirePar: true });
      const [specialRecords, setSpecialRecords] = usePersistentState('golf_specialRecords', Array(18).fill(null).map(() => ({})));
      const [currentHole, setCurrentHole] = usePersistentState('golf_currentHole', 1);
      const [allPars, setAllPars] = usePersistentState('golf_allPars', []);
      const [allScores, setAllScores] = usePersistentState('golf_allScores', []);
      const [hostSelectedTeam, setHostSelectedTeam] = usePersistentState('golf_hostSelectedTeam', 0);
      const [isAwardsManuallyOpened, setIsAwardsManuallyOpened] = usePersistentState('golf_isAwardsManuallyOpened', false);
      const [currentUserRole, setCurrentUserRole] = usePersistentState('golf_currentUserRole', 'host');
      const [myPlayerInfo, setMyPlayerInfo] = usePersistentState('golf_myPlayerInfo', null);
      const [joinedStatus, setJoinedStatus] = usePersistentState('golf_joinedStatus', []);
      const [lastEditors, setLastEditors] = usePersistentState('golf_lastEditors', {});
      const [scoreInputPermission, setScoreInputPermission] = usePersistentState('golf_scoreInputPermission', 'all');
      const [scoreInputAuthorizedPlayers, setScoreInputAuthorizedPlayers] = usePersistentState('golf_scoreInputAuthorizedPlayers', []);

      const [previousView, setPreviousView] = useState('scoreInput');
      const [detailModal, setDetailModal] = useState(null);
      const [isAwardInfoOpen, setIsAwardInfoOpen] = useState(false);
      const [roomId, setRoomId] = usePersistentState('golf_roomId', null);
      const manuallyClearedRef = useRef({});
      const [isDbConnected, setIsDbConnected] = useState(false);

      useEffect(() => { 
        try { if (window.localStorage.getItem('golf_host_verified') === 'true') setCurrentUserRole('host'); } catch(e) {} 
        try { const urlParams = new URLSearchParams(window.location.search); const rId = urlParams.get('roomId'); if (rId) setRoomId(rId); } catch(e) {}
      }, [setCurrentUserRole, setRoomId]);

      useEffect(() => { if (!auth) return; signInAnonymously(auth).then(() => setIsDbConnected(true)).catch(console.error); }, []);

      useEffect(() => {
        if (!db || !roomId || !isDbConnected) return;
        const roomRef = doc(db, 'golf_rooms', roomId);
        const unsubscribe = onSnapshot(roomRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.allScores) setAllScores(data.allScores); if (data.allPars) setAllPars(data.allPars); if (data.joinedStatus) setJoinedStatus(data.joinedStatus); if (data.specialRecords) setSpecialRecords(data.specialRecords);
            if (data.lastEditors) setLastEditors(data.lastEditors); if (data.isRoundStarted !== undefined) setIsRoundStarted(data.isRoundStarted); if (data.teamData) setTeamData(data.teamData); if (data.eventName) setEventName(data.eventName); if (data.scoreInputAuthorizedPlayers) setScoreInputAuthorizedPlayers(data.scoreInputAuthorizedPlayers);
          }
        }, (err) => console.error("Firebase Sync Error:", err));
        return () => unsubscribe();
      }, [roomId, isDbConnected]);

      const syncToDB = async (updates) => { if (!db || !roomId || !isDbConnected) return; try { const roomRef = doc(db, 'golf_rooms', roomId); await setDoc(roomRef, updates, { merge: true }); } catch (e) {} };

      const handleCompleteSettings = (data, type) => {
        setTeamData(data); setHandicapType(type); setCurrentUserRole('host'); try { window.localStorage.setItem('golf_host_verified', 'true'); } catch(e) {}
        let currentRoomId = roomId; if (!currentRoomId) { currentRoomId = Math.random().toString(36).substring(2, 8).toUpperCase(); setRoomId(currentRoomId); }
        try { const url = new URL(window.location.href); if (url.searchParams.get('roomId') !== currentRoomId) { url.searchParams.set('roomId', currentRoomId); window.history.pushState({}, '', url.toString()); } } catch(e) {}
        if (!isRoundStarted) { const initialJoin = data.map(t => (t || []).map(() => false)); setJoinedStatus(initialJoin); setCurrentView('waitingRoom'); syncToDB({ teamData: data, eventName: eventName, joinedStatus: initialJoin, isRoundStarted: false }); } 
        else { setCurrentView('scoreInput'); }
      };

      const handleStartRound = () => {
        let newPars = allPars; let newScores = allScores;
        if (allPars.length === 0) {
          const d = GOLF_COURSES_DATA.find(c => c.name === courseInfo.name) || GOLF_COURSES_DATA[0];
          newPars = teamData.map((_, tIdx) => { const tc = isMultiCourse ? teamCourses[tIdx] : courseInfo; return [...d.courses[tc.front], ...d.courses[tc.back]]; });
          setAllPars(newPars); newScores = Array(18).fill(null).map(() => (teamData || []).map(t => (t || []).map(() => null))); setAllScores(newScores);
        }
        setIsRoundStarted(true); setCurrentView('scoreInput'); syncToDB({ allPars: newPars, allScores: newScores, isRoundStarted: true });
      };

      const handleResetGame = () => {
        setIsRoundStarted(false); setJoinedStatus([]); setMyPlayerInfo(null); setCurrentHole(1); setAllScores([]); setAllPars([]); setIsAwardsManuallyOpened(false); setSpecialRecords(Array(18).fill(null).map(() => ({}))); setLastEditors({}); manuallyClearedRef.current = {}; setCurrentView('settings');
        syncToDB({ allScores: [], allPars: [], isRoundStarted: false, joinedStatus: [], specialRecords: Array(18).fill(null).map(() => ({})) });
      };

      const handleEndGame = () => { setIsAwardsManuallyOpened(true); setPreviousView('settings'); setCurrentView('awards'); };

      const getAwardStats = (basis = 'realtime') => {
        let syncHoles = [];
        if (basis === 'min_hole_sync') {
          for (let i = 0; i < 18; i++) {
            let allPlayed = true;
            for (let t = 0; t < teamData.length; t++) { for (let p = 0; p < teamData[t].length; p++) { if (allScores[i]?.[t]?.[p] == null) { allPlayed = false; break; } } if (!allPlayed) break; }
            if (allPlayed) syncHoles.push(i);
          }
        }
        return (teamData || []).flatMap((team, tIdx) => (team || []).map((player, pIdx) => {
          let score = 0, actualDiff = 0, birds = 0, sfScore = 0, holes = 0, vari = 0, prevD = null;
          let daPa = 0, daBogey = 0, realPars = 0, realBogeys = 0, realDoublePars = 0;
          let details = { birdies: [], daPa: [], daBogey: [], realPars: [], realBogeys: [], realDoublePars: [], variance: [] };
          allScores.slice(0, 18).forEach((hs, hIdx) => {
            if (basis === 'min_hole_sync' && !syncHoles.includes(hIdx)) return;
            const s = hs[tIdx]?.[pIdx];
            if (s != null) {
              holes++; const p = allPars[tIdx]?.[hIdx] || 4; const d = s - p; const hName = `${hIdx+1}H`;
              score += s; actualDiff += d;
              if (d <= -1) { birds++; details.birdies.push(`${hName}(${s})`); }
              if (d === 0) { realPars++; details.realPars.push(hName); daPa += 1; details.daPa.push(`${hName}(1)`); }
              else if (d >= p) { realDoublePars++; details.realDoublePars.push(hName); daPa += 2; details.daPa.push(`${hName}(2)`); }
              else { if (d === 1) { realBogeys++; details.realBogeys.push(hName); } daBogey += d; details.daBogey.push(`${hName}(+${d})`); }
              if (prevD !== null && hIdx >= 1) { const diffVal = Math.abs(d - prevD); details.variance.push(`${hName}(${diffVal})`); vari += diffVal; }
              prevD = d;
              const conf = (id) => stablefordConfig.find(c => c.id === id)?.score || 0;
              if (d <= -3) sfScore += conf('albatross'); else if (d === -2) sfScore += conf('eagle'); else if (d === -1) sfScore += conf('birdie'); else if (d === 0) sfScore += conf('par'); else if (d === 1) sfScore += conf('bogey'); else if (d >= 2) sfScore += conf('doubleBogey');
            }
          });
          const handi = parseInt(String(player.handicap || "0").replace(/[^0-9+\-]/g, '')) || 0; const handicapOverPar = handicapType === 'strokes' ? handi - 72 : handi;
          const handiTrend = handicapOverPar / 18; const expectedDiffNow = handiTrend * holes; const diffVsExpected = actualDiff - expectedDiffNow;
          let perfText = '';
          if (holes > 0) {
            if (diffVsExpected < 0) perfText = `예상 ${safeDisplayDiff(expectedDiffNow)} → 실제 ${safeDisplayDiff(actualDiff)} (${Math.abs(Math.round(diffVsExpected))}타 이득)`;
            else if (diffVsExpected > 0) perfText = `예상 ${safeDisplayDiff(expectedDiffNow)} → 실제 ${safeDisplayDiff(actualDiff)} (${Math.round(diffVsExpected)}타 손해)`;
            else perfText = `예상 ${safeDisplayDiff(expectedDiffNow)} → 실제 ${safeDisplayDiff(actualDiff)} (기대치 부합)`;
            details.perfText = [perfText];
          }
          return { ...player, tIdx, pIdx, score, actualDiff, diff: actualDiff, birdies: birds, daPaScore: daPa, daBogeyScore: daBogey, realPars, realBogeys, realDoublePars, details, netDiff: holes > 0 ? (actualDiff - (handicapOverPar * (holes/18))) : 0, ilchiScore: holes > 0 ? diffVsExpected : 9999, nakchaScore: holes > 0 ? diffVsExpected : -9999, stablefordScore: sfScore, mockNewPeoriaNet: holes > 0 ? (score - (actualDiff * 0.8)) : 0, playedHoles: holes, variance: vari };
        }));
      };

      const getPredictionStats = () => {
        const physicalHoleDiffs = {}; const physicalHoleCounts = {};
        allScores.forEach((hs, hI) => { hs.forEach((team, tI) => { team.forEach((score, pI) => { if (score != null) { const tc = isMultiCourse ? teamCourses[tI] : courseInfo; const cName = hI < 9 ? tc.front : tc.back; const cHole = hI < 9 ? hI + 1 : hI - 8; const key = `${cName}-${cHole}`; const par = allPars[tI]?.[hI] || 4; if (!physicalHoleDiffs[key]) { physicalHoleDiffs[key] = 0; physicalHoleCounts[key] = 0; } physicalHoleDiffs[key] += (score - par); physicalHoleCounts[key]++; } }); }); });
        Object.keys(physicalHoleDiffs).forEach(k => { physicalHoleDiffs[k] /= physicalHoleCounts[k]; });
        return (teamData || []).flatMap((team, tIdx) => (team || []).map((player, pIdx) => {
          let actualDiff = 0, playedHoles = 0, score = 0;
          allScores.forEach((hs, hI) => { if (hs[tIdx]?.[pIdx] != null) { score += hs[tIdx][pIdx]; actualDiff += (hs[tIdx][pIdx] - (allPars[tIdx]?.[hI] || 4)); playedHoles++; } });
          const handi = parseInt(String(player.handicap || "0").replace(/[^0-9+\-]/g, '')) || 0; const handicapOverPar = handicapType === 'strokes' ? handi - 72 : handi; const handiTrend = handicapOverPar / 18; const currentTrend = playedHoles > 0 ? actualDiff / playedHoles : handiTrend;
          let predictedDiff = actualDiff;
          for (let i = 0; i < 18; i++) { if (allScores[i]?.[tIdx]?.[pIdx] == null) { const tc = isMultiCourse ? teamCourses[tIdx] : courseInfo; const cName = i < 9 ? tc.front : tc.back; const cHole = i < 9 ? i + 1 : i - 8; const key = `${cName}-${cHole}`; const holeDiff = physicalHoleDiffs[key] || 0; predictedDiff += (currentTrend * 0.5) + (holeDiff * 0.3) + (handiTrend * 0.2); } }
          return { ...player, tIdx, pIdx, diff: predictedDiff, score, playedHoles, actualDiff, predictedScore: Math.round(72 + predictedDiff) };
        }));
      };

      const stats = getAwardStats('realtime'); const syncStats = getAwardStats('min_hole_sync'); const predictionStats = getPredictionStats(); const totalPar = allPars.length > 0 && allPars[0] ? allPars[0].reduce((a,b)=>a+b, 0) : 72; const isAwardOpenFlag = currentUserRole === 'host' || isAwardsManuallyOpened;

      const renderCurrentView = () => {
        switch(currentView) {
          case 'settings': return <SettingsView teamNames={teamNames} setTeamNames={setTeamNames} initialData={teamData} setTeamData={setTeamData} initialHandicapType={handicapType} setHandicapType={setHandicapType} eventName={eventName} setEventName={setEventName} courseInfo={courseInfo} setCourseInfo={setCourseInfo} selectedAwards={selectedAwards} setSelectedAwards={setSelectedAwards} stablefordTitle={stablefordTitle} setStablefordTitle={setStablefordTitle} stablefordConfig={stablefordConfig} setStablefordConfig={setStablefordConfig} specialHoles={specialHoles} setSpecialHoles={setSpecialHoles} isMultiCourse={isMultiCourse} setIsMultiCourse={setIsMultiCourse} teamCourses={teamCourses} setTeamCourses={setTeamCourses} onComplete={handleCompleteSettings} isRoundStarted={isRoundStarted} enableTeamComp={enableTeamComp} setEnableTeamComp={setEnableTeamComp} enableGroupComp={enableGroupComp} setEnableGroupComp={setEnableGroupComp} teamBalanceMode={teamBalanceMode} setTeamBalanceMode={setTeamBalanceMode} customGroups={customGroups} setCustomGroups={setCustomGroups} groupBalanceMode={groupBalanceMode} setGroupBalanceMode={setGroupBalanceMode} scoreInputPermission={scoreInputPermission} setScoreInputPermission={setScoreInputPermission} onEndGame={handleEndGame} onResetGame={handleResetGame} />;
          case 'waitingRoom': return <WaitingRoomView teamData={teamData} currentUserRole={currentUserRole} myPlayerInfo={myPlayerInfo} setMyPlayerInfo={setMyPlayerInfo} joinedStatus={joinedStatus} setJoinedStatus={setJoinedStatus} isRoundStarted={isRoundStarted} onBack={() => setCurrentView('settings')} eventName={eventName} onStartRound={handleStartRound} customGroups={customGroups} roomId={roomId} syncToDB={syncToDB} userUid={auth?.currentUser?.uid} scoreInputPermission={scoreInputPermission} scoreInputAuthorizedPlayers={scoreInputAuthorizedPlayers} setScoreInputAuthorizedPlayers={setScoreInputAuthorizedPlayers} />;
          case 'scoreInput': return <ScoreInputView teamNames={teamNames} teamData={teamData} isMultiCourse={isMultiCourse} teamCourses={teamCourses} courseInfo={courseInfo} currentUserRole={currentUserRole} myPlayerInfo={myPlayerInfo} hostSelectedTeam={hostSelectedTeam} setHostSelectedTeam={setHostSelectedTeam} allPars={allPars} setAllPars={setAllPars} allScores={allScores} setAllScores={setAllScores} specialHoles={specialHoles} specialRecords={specialRecords} setSpecialRecords={setSpecialRecords} eventName={eventName} scoreInputPermission={scoreInputPermission} scoreInputAuthorizedPlayers={scoreInputAuthorizedPlayers} lastEditors={lastEditors} setLastEditors={setLastEditors} customGroups={customGroups} onGoToSettings={() => setCurrentView('settings')} onOpenScoreboard={() => setCurrentView('scoreboard')} onOpenAwards={() => { setPreviousView('scoreInput'); setCurrentView('awards'); }} currentHole={currentHole} setCurrentHole={setCurrentHole} manuallyClearedRef={manuallyClearedRef} syncToDB={syncToDB} />;
          case 'scoreboard': return <ScoreboardView teamNames={teamNames} teamData={teamData} isMultiCourse={isMultiCourse} teamCourses={teamCourses} courseInfo={courseInfo} currentUserRole={currentUserRole} myPlayerInfo={myPlayerInfo} hostSelectedTeam={hostSelectedTeam} allPars={allPars} allScores={allScores} handicapType={handicapType} eventName={eventName} customGroups={customGroups} onGoToSettings={() => setCurrentView('settings')} onBack={() => setCurrentView('scoreInput')} onGoToInput={(h, t) => { setCurrentHole(h); setHostSelectedTeam(t); setCurrentView('scoreInput'); }} onOpenAwards={() => { setPreviousView('scoreboard'); setCurrentView('awards'); }} />;
          case 'awards': return <AwardsPageViewMain stats={stats} syncStats={syncStats} predictionStats={predictionStats} totalPar={totalPar} teamNames={teamNames} teamData={teamData} eventName={eventName} isAwardOpen={isAwardOpenFlag} isAwardsManuallyOpened={isAwardsManuallyOpened} setIsAwardsManuallyOpened={setIsAwardsManuallyOpened} currentUserRole={currentUserRole} customGroups={customGroups} enableGroupComp={enableGroupComp} enableTeamComp={enableTeamComp} teamBalanceMode={teamBalanceMode} groupBalanceMode={groupBalanceMode} selectedAwards={selectedAwards} stablefordTitle={stablefordTitle} allPars={allPars} onBack={() => setCurrentView(previousView)} setDetailModal={setDetailModal} setIsAwardInfoOpen={setIsAwardInfoOpen} specialRankings={{ nearest: specialRecords.flatMap((hr, hI) => hr ? Object.entries(hr).filter(([_,r]) => r.nearest?.pIdx != null).map(([tI, r]) => ({ name: teamData[tI][r.nearest.pIdx].name, tIdx: parseInt(tI), pIdx: r.nearest.pIdx, distance: r.nearest.distance, hIdx: hI, isInvalid: specialHoles.requirePar && allScores[hI]?.[tI]?.[r.nearest.pIdx] - (allPars[tI]?.[hI]||4) > 0 && !r.nearest.isPar })) : []).sort((a,b) => a.isInvalid === b.isInvalid ? a.distance - b.distance : (a.isInvalid ? 1 : -1)), longest: specialRecords.flatMap((hr, hI) => hr ? Object.entries(hr).filter(([_,r]) => r.longest?.pIdx != null).map(([tI, r]) => ({ name: teamData[tI][r.longest.pIdx].name, tIdx: parseInt(tI), pIdx: r.longest.pIdx, distance: r.longest.distance, hIdx: hI, isInvalid: specialHoles.requirePar && allScores[hI]?.[tI]?.[r.longest.pIdx] - (allPars[tI]?.[hI]||4) > 0 && !r.longest.isPar })) : []).sort((a,b) => a.isInvalid === b.isInvalid ? b.distance - a.distance : (a.isInvalid ? 1 : -1)) }} />;
          default: return null;
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 text-[#1E293B] sm:max-w-md sm:mx-auto sm:border-x sm:shadow-2xl relative overflow-x-hidden font-pretendard" style={{ fontFamily: '"Pretendard Variable", Pretendard, -apple-system, sans-serif' }}>
          {renderCurrentView()}
          <DetailModal isOpen={!!detailModal} onClose={() => setDetailModal(null)} config={detailModal} />
          {isAwardInfoOpen && (
            <div className="fixed inset-0 z-[300] flex items-center justify-center px-4 font-sans font-pretendard">
              <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onClick={() => setIsAwardInfoOpen(false)} />
              <div className="bg-white w-full max-w-sm rounded-[32px] p-6 relative z-10 shadow-2xl animate-fade-in-up text-left text-[#1E293B]">
                <div className="flex items-center justify-between mb-4"><h3 className="text-slate-800 font-black text-lg flex items-center gap-2"><Icons.Info className="w-5 h-5 text-[#0D8A5E]"/> 시상 기준 안내</h3><button onClick={() => setIsAwardInfoOpen(false)} className="p-1.5 text-slate-400 hover:bg-slate-50 rounded-full"><Icons.X className="w-5 h-5" /></button></div>
                <div className="space-y-3 text-sm text-slate-600 max-h-[60vh] overflow-y-auto pr-1 pb-4 leading-relaxed no-scrollbar text-left">
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>전체 순위 (실시간):</b> 현재까지 플레이한 홀을 기준으로 한 실제 스코어 순위입니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>전체 순위 (예상 기준):</b> 개인의 핸디캡과 당일 타수 페이스를 바탕으로 한 18홀 예상 실제 타수입니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>조별/그룹 순위:</b> 팀 평균 실제 타수를 비교합니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>신페리오:</b> 임의 지정된 12개 홀 성적을 바탕으로 당일 핸디캡을 산출하는 네트 스코어 순위입니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>다파/다찐파:</b> 파(Par) 1점, 양파(Double Par) 2점으로 합산 (다찐파는 양파 제외 순수 파만 카운트)</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>다보기/다찐보기:</b> 보기 1점, 더블 2점, 트리플 3점 등 오버파 수만큼 합산 (다찐보기는 순수 보기만 카운트)</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>다찐양파:</b> 양파(Double Par) 횟수만 카운트합니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>일취월장/낙차큰커브:</b> 핸디캡 대비 스코어를 가장 많이 줄이거나(-) 잃은(+) 플레이어입니다.</div>
                  <div className="bg-slate-50 p-3 rounded-xl border border-slate-100"><b>널뛰기/시몬스:</b> 2번 홀부터 이전 홀과의 타수 차이를 누적 합산합니다.</div>
                </div>
                <button onClick={() => setIsAwardInfoOpen(false)} className="w-full bg-[#0D8A5E] text-white font-bold py-3.5 rounded-xl shadow-md mt-2 active:scale-95 transition-all">확인</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
