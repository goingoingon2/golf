    function MemoList({ memos, categories, activeCategory, setActiveCategory, isSelectionMode, setIsSelectionMode, selectedMemoIds, setSelectedMemoIds, onOpenDetail, onManageCategories, baseFontSize }) {
      const timerRef = useRef(null);
      const isLongPressTriggered = useRef(false);

      const handleTouchStart = (memo) => {
        if (isSelectionMode) return;
        isLongPressTriggered.current = false;
        timerRef.current = setTimeout(() => {
          isLongPressTriggered.current = true;
          if ('vibrate' in navigator) navigator.vibrate(50);
          setIsSelectionMode(true);
          setSelectedMemoIds([memo.id]);
        }, 500);
      };

      const handleTouchEnd = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      const handleClick = (memo) => {
        if (isLongPressTriggered.current) {
          isLongPressTriggered.current = false;
          return;
        }
        if (isSelectionMode) {
          setSelectedMemoIds(prev => prev.includes(memo.id) ? prev.filter(id=>id!==memo.id) : [...prev, memo.id]);
        } else {
          onOpenDetail(memo);
        }
      };

      return (
        <div className="p-3 flex flex-col gap-4">
          <p className="text-[11px] text-gray-500 font-extrabold px-2 -mb-2 mt-1 flex items-center gap-1 opacity-80"><Icon name="Sparkles" size={12} className="mr-1"/> 카테고리나 메모를 길게 누르면 기능이 켜져요!</p>
          <div className="flex flex-wrap gap-2 px-1">
            {categories.map(cat => (
              <button 
                key={cat.name} 
                onTouchStart={() => {
                  isLongPressTriggered.current = false;
                  timerRef.current = setTimeout(() => {
                    isLongPressTriggered.current = true;
                    if ('vibrate' in navigator) navigator.vibrate(50);
                    onManageCategories();
                  }, 500);
                }}
                onTouchEnd={handleTouchEnd}
                onMouseDown={() => {
                  isLongPressTriggered.current = false;
                  timerRef.current = setTimeout(() => {
                    isLongPressTriggered.current = true;
                    if ('vibrate' in navigator) navigator.vibrate(50);
                    onManageCategories();
                  }, 500);
                }}
                onMouseUp={handleTouchEnd}
                onMouseLeave={handleTouchEnd}
                onClick={() => {
                  if (isLongPressTriggered.current) {
                    isLongPressTriggered.current = false;
                    return;
                  }
                  setActiveCategory(cat.name);
                }}
                onContextMenu={e => e.preventDefault()}
                style={{ WebkitTouchCallout: 'none', userSelect: 'none' }}
                className={`px-4 py-1.5 rounded-full text-[13px] font-bold border ${activeCategory === cat.name ? "bg-gray-800 text-white" : "bg-white/80 text-gray-700 border-[#d1c9b8]"}`}
              >
                {cat.name}
              </button>
            ))}
          </div>
          <div className="flex flex-col gap-4">
            {memos.length === 0 ? (
              <div className="text-center text-gray-500 mt-10 py-12 bg-white/90 rounded-[24px] border border-dashed border-[#d1c9b8]"><div className="bg-[#E2D9C8] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="PenTool" size={24} className="text-[#1a4314]" /></div><p className="font-bold text-[#1a4314]">기록된 메모가 없습니다.</p></div>
            ) : (
              memos.map(memo => (
                <div 
                  key={memo.id} 
                  onTouchStart={() => handleTouchStart(memo)}
                  onTouchEnd={handleTouchEnd}
                  onMouseDown={() => handleTouchStart(memo)}
                  onMouseUp={handleTouchEnd}
                  onMouseLeave={handleTouchEnd}
                  onClick={() => handleClick(memo)}
                  style={{ WebkitTouchCallout: 'none', userSelect: 'none' }}
                  className={`bg-[#fdfcf9] rounded-[24px] p-5 shadow-sm border ${isSelectionMode && selectedMemoIds.includes(memo.id) ? 'border-[#1a4314] ring-2 ring-[#1a4314]' : 'border-[#d1c9b8]'} cursor-pointer`}
                >
                  <div className="flex justify-between items-center mb-1">
                    <div className="flex gap-2 items-center">
                       {isSelectionMode && <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 ${selectedMemoIds.includes(memo.id)?'bg-[#1a4314] border-[#1a4314]':'border-gray-300'}`}>{selectedMemoIds.includes(memo.id) && <Icon name="Check" size={12} className="text-white font-black"/>}</div>}
                       <span className="text-[12px] font-bold text-[#1a4314] bg-[#e8f5e9] px-3 py-1 rounded-full border border-[#a5d6a7]">{memo.category}</span>
                       {memo.isPinned && <Icon name="Pin" size={14} className="text-amber-600" />}
                    </div>
                    <span className="text-[12px] font-bold text-gray-400">{memo.date}</span>
                  </div>
                  <div className="flex gap-4 items-start mt-2">
                    <div className="flex-1 min-w-0">
                      <p className="text-gray-800 font-medium leading-[1.6] line-clamp-3" style={{ fontSize: `${baseFontSize}px` }} dangerouslySetInnerHTML={{ __html: memo.content.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ') }}></p>
                    </div>
                    {(memo.imageUrl || (memo.urls && memo.urls.length > 0)) && (
                      <div className="flex flex-col gap-2 shrink-0">
                        {memo.imageUrl && <img src={memo.imageUrl} className="w-[80px] h-[80px] object-cover rounded-2xl border" />}
                        {memo.urls && memo.urls.map((url, idx) => {
                          const ytId = getYoutubeId(url);
                          const igId = getInstagramId(url);
                          if (igId) {
                            return (
                              <div key={idx} className="relative w-[80px] h-[60px] rounded-[12px] overflow-hidden border border-gray-200 shadow-sm flex flex-col items-center justify-center bg-white">
                                <Icon name="Instagram" size={18} className="text-pink-600 mb-0.5" />
                                <span className="text-[9px] font-extrabold text-gray-700">Instagram</span>
                              </div>
                            );
                          }
                          if (!ytId) return null;
                          return (
                            <div key={idx} className="relative w-[80px] h-[60px] rounded-[12px] overflow-hidden border border-gray-200 shadow-sm bg-black">
                              <img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt="yt-thumb" className="w-full h-full object-cover opacity-80" />
                              <div className="absolute inset-0 flex items-center justify-center">
                                <Icon name="PlayCircle" size={18} className="text-white drop-shadow-md" />
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    function GlobalSearch({ memos, shotMemos, blockedUsers, onOpenDetail, onCancel, baseFontSize }) {

      const feedMemos = memos.filter(m => m.isPublic && !blockedUsers.includes(m.author) && query && m.content.toLowerCase().includes(query.toLowerCase()));
      const filteredShotMemos = shotMemos.filter(m => query && m.content.toLowerCase().includes(query.toLowerCase()));

      const renderMemo = (memo) => (
        <div key={`s-${memo.id}`} onClick={() => onOpenDetail(memo)} className="bg-white rounded-[20px] p-4 shadow-sm border border-[#d1c9b8] cursor-pointer mb-3 hover:border-[#1a4314] transition-colors">
          <div className="flex justify-between items-center mb-2">
            <span className="text-[11px] font-bold text-[#1a4314] bg-[#e8f5e9] px-2 py-0.5 rounded-md">{memo.category}</span>
            <span className="text-[11px] text-gray-400 font-bold">{memo.date}</span>

          <div className="flex gap-3 items-start">
            <div className="flex-1 min-w-0">
              <p className="text-gray-800 font-medium leading-[1.6] line-clamp-2" style={{ fontSize: `${baseFontSize}px` }} dangerouslySetInnerHTML={{ __html: memo.content.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ') }}></p>
            </div>
            {memo.imageUrl && <img src={memo.imageUrl} className="w-[60px] h-[60px] object-cover rounded-xl border shrink-0" />}

      const renderShotMemo = (memo) => (

             <span className="text-[11px] font-bold text-gray-500">Shot메모</span>
             <span className="text-[11px] text-gray-400 font-bold">{memo.date}</span>
           </div>
           <p className="text-gray-800 font-medium" style={{ fontSize: `${baseFontSize}px` }}>{memo.content}</p>

      return (
        <div className="p-4 flex flex-col h-full bg-[#fdfcf9]">

            <div className="relative flex-1">
              <Icon name="Search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-[#1a4314]" />
              <input autoFocus type="text" placeholder="메모, 커뮤니티, 숏메모 통합 검색" className="w-full pl-11 pr-10 py-3 bg-white border border-[#d1c9b8] rounded-full text-[16px] font-bold outline-none focus:ring-2 focus:ring-[#1a4314]/20 focus:border-[#1a4314] transition-all shadow-sm" value={query} onChange={(e) => setQuery(e.target.value)} />
              {query && <button onClick={() => setQuery('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><Icon name="X" size={16}/></button>}
            </div>
          </div>
          
          <div className="flex-1 overflow-y-auto pb-24 scrollbar-hide px-1">
            {!query ? (
              <div className="text-center text-gray-400 mt-24 flex flex-col items-center">
                <Icon name="Search" size={48} className="mb-4 opacity-20" />
                <p className="font-bold text-gray-400">찾고 싶은 내용을 검색해보세요.</p>
              </div>
            ) : (
              <div className="flex flex-col gap-6">
                {myMemos.length === 0 && feedMemos.length === 0 && filteredShotMemos.length === 0 ? (
                  <div className="text-center text-gray-500 mt-10 font-bold">검색 결과가 없습니다.</div>

                    {feedMemos.length > 0 && (
                      <div>
                        <h3 className="font-black text-[14px] mb-3 text-blue-600 flex items-center gap-1.5"><Icon name="Users" size={16}/> 커뮤니티 ({feedMemos.length})</h3>
                        {feedMemos.map(renderMemo)}

    function ShotMemoMain({ shotMemos, onSaveShotMemo, onDeleteShotMemos, isSelectionMode, setIsSelectionMode, selectedIds, setSelectedIds, baseFontSize }) {
      const [text, setText] = useState('');
      const [editingId, setEditingId] = useState(null);
      const [editingText, setEditingText] = useState('');
      const [confirmDelId, setConfirmDelId] = useState(null);
      
      const timerRef = useRef(null);
      const isLongPressTriggered = useRef(false);

      const handleTouchStart = (memo) => {
        if (editingId || isSelectionMode) return;
        isLongPressTriggered.current = false;
        timerRef.current = setTimeout(() => {
          isLongPressTriggered.current = true;
          if ('vibrate' in navigator) navigator.vibrate(50);
          setEditingId(memo.id);
          setEditingText(memo.content);
        }, 500);
      };

      const handleTouchEnd = () => {
        if (timerRef.current) clearTimeout(timerRef.current);
      };

      const handleClick = (memo) => {
        if (isLongPressTriggered.current || editingId === memo.id) {
          isLongPressTriggered.current = false;
          return;
        }
        if (isSelectionMode) {
          setSelectedIds(prev => prev.includes(memo.id) ? prev.filter(s=>s!==memo.id) : [...prev, memo.id]);
        }
      };

      const saveEdit = (id, e) => {
        e.stopPropagation();
        if (!editingText.trim()) return;
        const memoToUpdate = shotMemos.find(m => m.id === id);
        if (memoToUpdate) onSaveShotMemo({ ...memoToUpdate, content: editingText });
        setEditingId(null);
      };

      return (
        <div className="p-4 flex flex-col gap-4 h-full relative">
          <div className="bg-white/90 border border-[#d1c9b8] rounded-3xl p-4 shadow-sm">

              }} className="px-5 py-2 bg-[#1a4314] text-white rounded-xl font-bold text-[14px]">기록</button>

              <button onClick={() => setIsSelectionMode(true)} className="text-[11px] font-extrabold px-3 py-1.5 rounded-lg transition-colors bg-white border border-[#d1c9b8] text-gray-700 shadow-sm hover:bg-gray-50">

              <div className="text-center text-gray-500 mt-6 py-12 bg-white/90 rounded-[24px] border border-dashed border-[#d1c9b8]"><p className="font-bold text-[#1a4314]">기록된 숏메모가 없습니다.</p></div>

              shotMemos.map(memo => (
                <div

                  {...(editingId !== memo.id ? { 
                    onTouchStart: () => handleTouchStart(memo),
                    onTouchEnd: handleTouchEnd,
                    onTouchCancel: handleTouchEnd,
                    onMouseDown: () => handleTouchStart(memo),
                    onMouseUp: handleTouchEnd,
                    onMouseLeave: handleTouchEnd,
                    onClick: () => handleClick(memo)
                  } : {})}
                  style={{ WebkitTouchCallout: editingId === memo.id ? 'default' : 'none', userSelect: editingId === memo.id ? 'auto' : 'none' }}
                  className={`bg-[#fdfcf9] rounded-2xl p-4 shadow-sm border ${isSelectionMode && selectedIds.includes(memo.id) ? 'border-[#1a4314] ring-2 ring-[#1a4314]' : 'border-[#d1c9b8]'} ${editingId !== memo.id ? 'cursor-pointer' : ''} flex justify-between items-start`}
                >
                  {editingId === memo.id ? (
                    <div className="w-full flex flex-col gap-2">
                      <textarea
                        value={editingText}
                        onChange={e => setEditingText(e.target.value)}
                        onFocus={(e) => e.target.setSelectionRange(e.target.value.length, e.target.value.length)}
                        className="w-full bg-white border border-[#1a4314] rounded-xl p-2 outline-none resize-none font-medium min-h-[60px]"
                        style={{ fontSize: `${baseFontSize}px` }}
                        autoFocus
                      />
                      <div className="flex justify-between items-center mt-1">
                        {/* 삭제 버튼 인라인 확인창 기능 적용 (이벤트 씹힘 완벽 해결) */}
                        <button 
                            onClick={(e) => {
                                e.stopPropagation(); 
                                if (confirmDelId === memo.id) {
                                    onDeleteShotMemos([memo.id]); 
                                    setEditingId(null);
                                    setConfirmDelId(null);
                                } else {
                                    setConfirmDelId(memo.id);
                                    setTimeout(() => setConfirmDelId(null), 3000);
                                }

                            className="text-red-500 text-[13px] font-bold p-2 flex items-center gap-1.5 hover:bg-red-50 rounded-lg"
                        >
                            <Icon name="Trash2" size={14}/>

                        <div className="flex gap-2">
                          <button onClick={(e)=>{e.stopPropagation(); setEditingId(null);}} className="px-3 py-2 bg-[#E2D9C8] text-[#1a4314] rounded-lg text-[13px] font-bold hover:bg-[#d5ccba]">취소</button>
                          <button onClick={(e) => saveEdit(memo.id, e)} className="px-3 py-2 bg-[#1a4314] text-white rounded-lg text-[13px] font-bold hover:bg-[#2d6a4f]">저장</button>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="flex gap-3 items-start flex-1">
                      {isSelectionMode && <div className={`mt-0.5 w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 ${selectedIds.includes(memo.id)?'bg-[#1a4314] border-[#1a4314]':'border-gray-300'}`}>{selectedIds.includes(memo.id) && <Icon name="Check" size={12} className="text-white font-black"/>}</div>}
                      <div className="flex flex-col gap-1 flex-1">

                        <span className="text-[11px] font-bold text-gray-400">{memo.date}</span>
                      </div>
                    </div>
                  )}

        </div>
      );

    function ScoreMain({ scores, onAddScore, onOpenScoreDetail }) {
      const [period, setPeriod] = useState('전체');
      const filtered = scores.filter(s => period === '전체' || s.date.startsWith(period.replace('년', '')));
      const avg = filtered.length ? Math.round(filtered.reduce((a,b)=>a+b.score,0)/filtered.length) : 0;
      return (
        <div className="p-5 flex flex-col gap-5">
          <div className="flex justify-between items-end"><h3 className="font-black text-[18px]">요약 리포트</h3><select value={period} onChange={e=>setPeriod(e.target.value)} className="bg-white border rounded-xl px-3 py-1.5 font-bold text-[13px]"><option>전체</option><option>2025년</option><option>2024년</option></select></div>
          <div className="bg-[#1a4314] text-white p-7 rounded-[28px] shadow-lg flex justify-between items-center relative overflow-hidden"><Icon name="Trophy" size={110} className="absolute -right-4 -top-4 opacity-10" /><div className="z-10"><p className="text-[#a5d6a7] text-[13px] font-bold">평균 타수</p><p className="text-[44px] font-black">{avg || '-'}</p></div><div className="text-right z-10"><p className="text-[#a5d6a7] text-[13px] font-bold">총 라운드</p><p className="text-[32px] font-black">{filtered.length}</p></div></div>
          <div className="flex flex-col gap-3">
            {filtered.map(s => (
              <div key={s.id} onClick={()=>onOpenScoreDetail(s)} className="bg-white p-5 rounded-[24px] border border-[#d1c9b8] flex justify-between items-center hover:shadow-md cursor-pointer">
                <div className="flex flex-col">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[12px] text-gray-400 font-bold">{s.date}</span>
                    {s.game && <span className="text-[10px] font-extrabold bg-orange-50 text-orange-600 px-2 py-0.5 rounded-md border border-orange-200">{s.game.name}</span>}
                  </div>
                  <h4 className="font-black text-[17px]">{s.course}</h4>
                </div>
                <div className="text-right"><span className="text-[30px] font-black">{s.score}</span></div>
              </div>
            ))}
            <button onClick={onAddScore} className="py-4 bg-gray-900 text-white font-black rounded-2xl flex items-center justify-center gap-2 mt-2"><Icon name="Plus" size={22}/> 새 라운드 기록</button>
          </div>
        </div>
      );
    }

        return (
          <div className="mb-4 bg-white rounded-[20px] shadow-sm border border-[#d1c9b8] overflow-hidden">
            <div className="bg-gray-50 px-4 py-3 border-b flex justify-between items-center font-black text-[14px]"><span>{title} (Hole {start+1}~{start+9})</span></div>
            <div className="overflow-x-auto pb-1"><table className="w-full text-center text-[12px] min-w-[360px]">
              <thead><tr className="bg-white text-gray-400 border-b">{holes.map(h=><th key={h} className="py-2">{h+1}</th>)}<th className="py-2 font-black bg-gray-50">합계</th></tr></thead>
              <tbody><tr className="bg-[#f0fdf4]/50">{holes.map(h=><td key={h} className="py-2.5 font-black text-[15px]">{data.strokes[h]}</td>)}<td className="font-black text-[#10b981] bg-[#e8f5e9]">{holes.reduce((s,h)=>s+data.strokes[h],0)}</td></tr></tbody>
            </table></div>

          <div className="bg-gray-900 text-white p-7 rounded-[28px] shadow-lg flex flex-col items-center relative"><Icon name="Trophy" size={130} className="absolute opacity-10 -right-4" /><span className="bg-white/20 px-3 py-1 rounded-full text-[11px] mb-4">{scoreData.type}</span><h2 className="text-[24px] font-black mb-1">{scoreData.course}</h2><p className="text-gray-400 font-bold mb-7">{scoreData.date}</p><div className="flex gap-8 items-baseline"><div className="text-center"><p className="text-[13px] text-gray-400">타수</p><p className="text-[48px] font-black">{scoreData.score}</p></div><div className="w-px h-12 bg-gray-700"></div><div><p className="text-[36px] font-black text-red-400">{scoreData.par}</p></div></div></div>
          {scoreData.imageUrl && <div className="mb-4"><h3 className="font-black text-[16px] mb-3 flex items-center gap-2"><Icon name="Camera" size={20} className="text-[#10b981]" /> 스코어카드 원본</h3><img src={scoreData.imageUrl} className="w-full rounded-2xl border object-cover h-[200px]" /></div>}
          {scoreData.game && (
            <div className="bg-orange-50 border border-orange-200 p-5 rounded-[24px] mb-4">
              <div className="flex justify-between items-center mb-3">
                <h4 className="font-black text-orange-800 flex items-center gap-2"><Icon name="Gamepad2" size={20}/> {scoreData.game.name} 결과</h4>
                <button onClick={() => setShowGameDetails(!showGameDetails)} className="text-[11px] font-bold bg-white text-orange-600 px-3 py-1.5 rounded-full border border-orange-200 shadow-sm hover:bg-orange-100 transition-colors">
                  {showGameDetails ? '간략히 보기' : '자세히 보기'}
                </button>
              </div>
              <div className="grid grid-cols-2 gap-2">
                {scoreData.game.results.map((r,i)=><div key={`r-${i}`} className="bg-white p-2.5 rounded-xl flex justify-between font-bold text-[13px]"><span>{r.name}</span><span className={r.point.includes('+')?'text-blue-600':'text-red-600'}>{r.point}</span></div>)}
              </div>
              {showGameDetails && scoreData.game.details && (
                <div className="mt-4 pt-4 border-t border-orange-200/50 flex flex-col gap-2 animate-in slide-in-from-top-2">
                  <span className="text-[12px] font-extrabold text-orange-800 mb-1">홀별 상세 획득 내역</span>
                  {scoreData.game.details.map((d, i) => (
                    <div key={`d-${i}`} className="bg-white/60 p-2.5 rounded-xl flex justify-between items-center text-[12px]">
                      <span className="font-bold text-gray-600">{d.hole} <span className="font-medium text-gray-400">({d.desc})</span></span>
                      <span className="font-extrabold text-gray-900">{d.winner} <span className="text-blue-600">{d.amount} P</span></span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          <h3 className="font-black text-[16px] mb-1 flex items-center gap-2"><Icon name="BarChart3" size={20} className="text-[#10b981]" /> 나의 스코어카드</h3>
          {renderHoles(myData, 0, 'OUT Course')} {renderHoles(myData, 9, 'IN Course')}
          {scoreData.players.length > 1 && (
            <div className="mt-2"><button onClick={()=>setShowComp(!showComp)} className="w-full py-4 bg-white border border-[#d1c9b8] rounded-[20px] font-extrabold flex justify-between px-6">동반자 스코어 보기 ({scoreData.players.length-1}명) {showComp ? <Icon name="ChevronUp"/> : <Icon name="ChevronDown"/>}</button>
            {showComp && <div className="mt-4 flex flex-col gap-6">{scoreData.players.slice(1).map((p,i)=><div key={`c-${i}`} className="bg-gray-50/50 p-4 rounded-2xl border"><h4 className="font-black mb-2">{p.name}</h4>{renderHoles(p, 0, 'OUT')} {renderHoles(p, 9, 'IN')}</div>)}</div>}</div>
          )}
          <button onClick={()=>onSendToMemo(scoreData)} className="w-full py-4 bg-[#1a4314] text-white font-extrabold rounded-[20px] shadow-lg flex items-center justify-center gap-2 mt-4"><Icon name="Share" size={18}/> 메모장으로 보내기</button>
        </div>
      );

        </div>

      const [commentText, setCommentText] = useState("");

      const [confirmDel, setConfirmDel] = useState(false);
      const commentTimerRef = useRef(null);

      const handleCommentStart = (author) => {
        if (author === '나') return;
        commentTimerRef.current = setTimeout(() => {
          if ('vibrate' in navigator) navigator.vibrate(50);
          onOpenBlockModal(author);
        }, 500);
      };

      const submitComment = () => {
        if(commentText.trim()) {
          if (replyingTo) {
            onAddReply(memo.id, replyingTo.id, commentText.trim());

            onAddComment(memo.id, commentText.trim());
          }
          setCommentText("");
          setReplyingTo(null);

        <div className="bg-[#fdfcf9] min-h-full flex flex-col">
          <div className="flex-1 pb-[calc(6rem+env(safe-area-inset-bottom))]">

              <div className="flex items-center justify-between mb-6">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full bg-[#e8f5e9] border border-[#a5d6a7] flex items-center justify-center font-bold text-[#1a4314] text-[18px]">
                    {(memo.author || '나').substring(0, 1)}
                  </div>
                  <div className="flex flex-col">
                    <div className="flex items-center gap-2">
                      <span className="font-black text-[16px] text-gray-900">{memo.author || '나'}</span>
                      {memo.author !== '나' && (
                        <button 
                          onClick={() => onToggleFollow(memo.author)} 
                          className={`text-[10px] px-2 py-0.5 rounded-full font-bold border transition-colors ${followingUsers.includes(memo.author) ? 'bg-[#1a4314] text-white border-[#1a4314]' : 'bg-white text-gray-500 border-gray-300 hover:bg-gray-50'}`}
                        >
                          {followingUsers.includes(memo.author) ? '구독중' : '+ 구독'}
                        </button>
                      )}
                    </div>
                    <span className="text-[12px] font-medium text-gray-500">{memo.date}</span>
                  </div>
                </div>
                
                <div className="flex flex-col items-end gap-2.5">
                  <span className="bg-[#1a4314] text-white px-3 py-1.5 rounded-full text-[12px] font-bold shadow-sm">{memo.category}</span>

    function MemoEditor({ memo, categories, onSave, onCancel, baseFontSize }) {
      const defaultCat = categories.find(c => c.name !== "전체") || { name: '기타', defaultPublic: false };
      const [category, setCategory] = useState(memo?.category || defaultCat.name);
      const [content, setContent] = useState(memo?.content || '');
      const [imageUrl, setImageUrl] = useState(memo?.imageUrl || null);
      const [isPublic, setIsPublic] = useState(memo ? memo.isPublic : defaultCat.defaultPublic);
      const fileInputRef = useRef(null);
      const editorRef = useRef(null); 

      const [keepOriginal, setKeepOriginal] = useState(false);
      const [originalPosition, setOriginalPosition] = useState('bottom'); 

      const [checklist, setChecklist] = useState(memo?.checklist || []);
      const [newCheckItem, setNewCheckItem] = useState('');
      const [showChecklistInput, setShowChecklistInput] = useState(false);
      const [urls, setUrls] = useState(memo?.urls || []);
      const [newUrl, setNewUrl] = useState('');
      
      const [summarizingUrl, setSummarizingUrl] = useState(null); 
      const [isGeneratingTags, setIsGeneratingTags] = useState(false);
      const [isOrganizingContent, setIsOrganizingContent] = useState(false); 

      useEffect(() => {
        if (editorRef.current && content !== editorRef.current.innerHTML) {
          editorRef.current.innerHTML = content;
        }
      }, []);

      const formatDoc = (e, cmd, value = null) => {
        e.preventDefault(); 
        document.execCommand(cmd, false, value);
        if (editorRef.current) {
          editorRef.current.focus();
          setContent(editorRef.current.innerHTML);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => setImageUrl(reader.result);
          reader.readAsDataURL(file);
        }
      };

      const handleSave = () => {
        if (!content.trim()) return alert("내용을 입력해주세요.");
        onSave({ id: memo?.id, category, content, checklist, urls, imageUrl, isPublic, date: memo?.date || "방금 전" });
      };

      const addItem = (type) => {
        if (type === 'check' && newCheckItem.trim()) { setChecklist([...checklist, { id: Date.now(), text: newCheckItem, completed: false }]); setNewCheckItem(''); } 
        else if (type === 'url' && newUrl.trim()) { setUrls([...urls, newUrl]); setNewUrl(''); }
      };

      const toggleCheckItem = (id) => { setChecklist(checklist.map(item => item.id === id ? { ...item, completed: !item.completed } : item)); };

      const handleOrganizeContent = async () => {
        const currentHtml = editorRef.current ? editorRef.current.innerHTML : content;
        const rawText = currentHtml.replace(/<[^>]*>?/gm, '').trim();
        if (!rawText) return alert("정리할 내용을 먼저 작성해주세요!");
        setIsOrganizingContent(true);

        const apiKey = ""; 
        const promptText = `다음 작성된 텍스트를 읽기 쉽고 깔끔한 SNS 게시물 스타일로 예쁘게 다듬어줘.
        - 적절하고 센스 있는 이모지를 섞어줄 것
        - 결과를 <b>, <br/>, <ul>, <li> 등의 HTML 태그가 적용된 형태로 바로 출력할 것 (마크다운 제외).
        원본 내용: ${rawText}`;

        const payload = { contents: [{ parts: [{ text: promptText }] }] };

        const fetchWithBackoff = async (retries = 3, delay = 1000) => {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP error!`);
            return JSON.parse(await response.text());
          } catch (error) {
            if (retries > 0) {
              await new Promise(resolve => setTimeout(resolve, delay));
              return fetchWithBackoff(retries - 1, delay * 2);
            } else throw error;
          }
        };

        try {
          const result = await fetchWithBackoff();
          let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const cleanHtml = text.replace(/```html/gi, '').replace(/```/g, '').trim();
            let finalHtml = cleanHtml;
            if (keepOriginal) {
              const separatorTop = '<br/><br/><div style="color:#9ca3af; font-size:13px; font-weight:900; margin-bottom:8px;">--- AI 정리 ---</div>';
              const separatorBottom = '<br/><br/><div style="color:#9ca3af; font-size:13px; font-weight:900; margin-bottom:8px;">--- 원본 내용 ---</div>';
              finalHtml = originalPosition === 'top' ? currentHtml + separatorTop + cleanHtml : cleanHtml + separatorBottom + currentHtml;
            }
            setContent(finalHtml);
            if (editorRef.current) editorRef.current.innerHTML = finalHtml;
          }
        } catch (error) {
          alert("글 정리 중 오류가 발생했습니다.");
        } finally {
          setIsOrganizingContent(false);
        }
      };

      const handleGenerateTags = async () => {
        const currentHtml = editorRef.current ? editorRef.current.innerHTML : content;
        const rawText = currentHtml.replace(/<[^>]*>?/gm, '').trim();
        if (!rawText) return alert("메모 내용을 먼저 작성해주세요!");
        setIsGeneratingTags(true);

        const apiKey = ""; 
        const promptText = `다음 골프 메모를 읽고 인스타그램 해시태그 3~5개를 한 줄로 띄어쓰기해서 출력해.\n내용: ${rawText}`; 
        const payload = { contents: [{ parts: [{ text: promptText }] }] };

        const fetchWithBackoff = async (retries = 3, delay = 1000) => {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP error!`);
            return JSON.parse(await response.text());
          } catch (error) {
            if (retries > 0) {
              await new Promise(resolve => setTimeout(resolve, delay));
              return fetchWithBackoff(retries - 1, delay * 2);
            } else throw error;
          }
        };

        try {
          const result = await fetchWithBackoff();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) {
            const newHtml = currentHtml + (currentHtml ? '<br/><br/>' : '') + `<span style="color:#1a4314; font-weight:900;">${text.trim()}</span>`;
            setContent(newHtml);
            if (editorRef.current) editorRef.current.innerHTML = newHtml;
          }
        } catch (error) {
          alert("태그 생성 중 오류가 발생했습니다.");
        } finally {
          setIsGeneratingTags(false);
        }
      };

      const handleSummarizeUrl = async (url) => {
        if (summarizingUrl) return;
        setSummarizingUrl(url);
        const apiKey = ""; 
        const promptText = `다음 링크의 영상을 보고 골프 핵심 레슨 내용을 3~4줄로 명확하게 요약해줘: ${url}`;
        const payload = { contents: [{ parts: [{ text: promptText }] }] };

        const fetchWithBackoff = async (retries = 5, delay = 1000) => {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`HTTP error!`);
            return JSON.parse(await response.text());
          } catch (error) {
            if (retries > 0) {
              await new Promise(resolve => setTimeout(resolve, delay));
              return fetchWithBackoff(retries - 5, delay * 2);
            } else throw error;
          }
        };

        try {
          const result = await fetchWithBackoff();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          const currentHtml = editorRef.current ? editorRef.current.innerHTML : content;
          if (text) {
            const formattedSummary = '<b>🤖 [AI 영상 요약]</b><br/>' + text.trim().replace(/\n/g, '<br/>');
            const newHtml = currentHtml + (currentHtml ? '<br/><br/>' : '') + formattedSummary;
            setContent(newHtml);
            if (editorRef.current) editorRef.current.innerHTML = newHtml;
          }
        } catch (error) {
          alert("AI 요약 중 오류가 발생했습니다.");
        } finally {
          setSummarizingUrl(null);
        }
      };

      return (
        <div className="p-6 bg-[#fdfcf9] min-h-full flex flex-col gap-6">
          <div className="flex items-center justify-between">
            <div className="flex-1 mr-2">
              <div className="flex flex-wrap gap-1.5 pb-1">
                {categories.filter(c => c.name !== "전체").map(cat => (
                  <button key={cat.name} onClick={() => setCategory(cat.name)} className={`px-3.5 py-1.5 rounded-full text-[13px] font-extrabold border transition-colors ${category === cat.name ? 'bg-[#1a4314] border-[#1a4314] text-white shadow-md' : 'bg-white border-[#d1c9b8] text-gray-700 hover:bg-gray-50'}`}>
                    {cat.name}

            </div>
            <button onClick={() => setIsPublic(!isPublic)} className={`shrink-0 px-4 py-2 rounded-xl border transition-colors flex items-center justify-center text-[13px] font-extrabold tracking-tight ${isPublic ? 'bg-[#e8f5e9] border-[#a5d6a7] text-[#2e7d32] shadow-sm' : 'bg-white border-[#d1c9b8] text-gray-600 hover:bg-gray-100'}`}>
              {isPublic ? "전체 공개" : "나만 보기"}
            </button>

      const [currentMemo, setCurrentMemo] = useState(null);
      const [currentScore, setCurrentScore] = useState(null);
      
      const [isSelectionMode, setIsSelectionMode] = useState(false);
      const [selectedMemoIds, setSelectedMemoIds] = useState([]);
      const [confirmDelMerge, setConfirmDelMerge] = useState(false); // 통합 하단바 삭제 확인
      
      const [blockModalTarget, setBlockModalTarget] = useState(null);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [showMergeModal, setShowMergeModal] = useState(false);
      const [isMerging, setIsMerging] = useState(false);

      const [baseFontSize, setBaseFontSize] = useState(15);
      const [followingUsers, setFollowingUsers] = useState(['골프여신']);

      // === Firebase Auth Effect ===
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (e) { console.error("Firebase Auth Error", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setFbUser);
        return () => unsubscribe();
      }, []);

      // === Firebase Data Sync Effects ===
      // 1. Memos (Public)
      useEffect(() => {
        if (!fbUser || !db) return;
        const q = collection(db, 'artifacts', appId, 'public', 'data', 'memos');
        const unsub = onSnapshot(q, (snap) => {
          if (snap.empty) {
            setMemos(INITIAL_MEMOS);
            INITIAL_MEMOS.forEach(async (m) => await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', m.id.toString()), m));
          } else {
            const data = snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a, b) => Number(b.id) - Number(a.id));
            setMemos(data);
          }
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      // 2. Shot Memos (Private)
      useEffect(() => {
        if (!fbUser || !db) return;
        const q = collection(db, 'artifacts', appId, 'users', fbUser.uid, 'shotMemos');
        const unsub = onSnapshot(q, (snap) => {
          if (snap.empty) {
            setShotMemos(INITIAL_SHOT_MEMOS);
            INITIAL_SHOT_MEMOS.forEach(async (m) => await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'shotMemos', m.id.toString()), m));
          } else {
            const data = snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a, b) => Number(b.id) - Number(a.id));
            setShotMemos(data);
          }
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      // 3. Scores (Private)
      useEffect(() => {
        if (!fbUser || !db) return;
        const q = collection(db, 'artifacts', appId, 'users', fbUser.uid, 'scores');
        const unsub = onSnapshot(q, (snap) => {
          if (snap.empty) {
            setScores(INITIAL_SCORES);
            INITIAL_SCORES.forEach(async (s) => await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'scores', s.id.toString()), s));
          } else {
            const data = snap.docs.map(d => ({ ...d.data(), id: d.id })).sort((a, b) => Number(b.id) - Number(a.id));
            setScores(data);
          }
        }, (err) => console.error(err));
        return () => unsub();
      }, [fbUser]);

      // === Data Mutators (Write to Firebase) ===
      const scrollToTop = () => {
        setTimeout(() => {
          const el = document.getElementById('main-scroll-area');
          if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
        }, 50);
      };

      const handleSaveMemo = async (memo) => {
        if (!db || !fbUser) return;
        const memoId = memo.id ? memo.id.toString() : Date.now().toString();
        const memoRef = doc(db, 'artifacts', appId, 'public', 'data', 'memos', memoId);
        const payload = memo.id ? { ...memo } : { ...memo, id: memoId, author: "나", likes: 0, likedByMe: false, comments: [], views: 0, shares: 0, date: "방금 전", isPinned: false };
        await setDoc(memoRef, payload);
        setCurrentTab('memo');
        setView('list');
        scrollToTop();
      };

      const handleDeleteMemo = async (id) => {
        if (!db || !fbUser) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', id.toString()));
        setView('list');
      };

      const handleSaveShotMemo = async (memo) => {
        if (!db || !fbUser) return;
        await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'shotMemos', memo.id.toString()), memo);
        scrollToTop();
      };

      const handleDeleteShotMemos = async (ids) => {
        if (!db || !fbUser) return;
        for (const id of ids) {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'shotMemos', id.toString()));
        }
      };

      const handleSaveScore = async (score) => {
        if (!db || !fbUser) return;
        const scoreId = score.id ? score.id.toString() : Date.now().toString();
        await setDoc(doc(db, 'artifacts', appId, 'users', fbUser.uid, 'scores', scoreId), { ...score, id: scoreId });
        setView('list');
        scrollToTop();
      };


      const filteredMyMemos = memos.filter(m => m.author === "나" && (activeCategory === "전체" || m.category === activeCategory));
      
      const feedMemos = memos
        .filter(m => m.isPublic && !blockedUsers.includes(m.author))
        .sort((a, b) => {
          const aFollow = followingUsers.includes(a.author);
          const bFollow = followingUsers.includes(b.author);
          if (aFollow && !bFollow) return -1;
          if (!aFollow && bFollow) return 1;
          return Number(b.id) - Number(a.id);
        });

      const handleMergeMemos = async (type) => {
        const targetMemos = memos.filter(m => selectedMemoIds.includes(m.id)).sort((a, b) => Number(a.id) - Number(b.id));
        if (targetMemos.length < 2) return;

        setIsMerging(true);
        let mergedContent = "";

        if (type === 'time') {
          mergedContent = targetMemos.map(m => `<div style="color:#10b981; font-size:12px; font-weight:bold; margin-bottom:4px;">[${m.date} - ${m.category}]</div>${m.content}`).join('<br/><br/><hr style="border-top: 1px dashed #e5e7eb; margin: 12px 0;"/><br/>');
        } else {
          const apiKey = "";
          const rawTexts = targetMemos.map(m => `[${m.category}] ${m.content.replace(/<[^>]*>?/gm, '')}`).join('\n\n---\n\n');
          const prompt = `다음은 사용자가 작성한 여러 개의 골프 메모입니다. 이 내용들을 분석하여 유사한 주제끼리 묶어서 가독성 좋고 자연스러운 하나의 완성 글로 합쳐주세요. 강조할 부분은 <b> 태그를, 줄바꿈은 <br/>을 사용하세요.\n\n[원본 메모들]\n${rawTexts}`;

          const payload = { contents: [{ parts: [{ text: prompt }] }] };

          const fetchWithBackoff = async (retries = 3, delay = 1000) => {
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              return JSON.parse(await response.text());
            } catch (error) {
              if (retries > 0) {
                await new Promise(resolve => setTimeout(resolve, delay));
                return fetchWithBackoff(retries - 1, delay * 2);
              } else throw error;
            }
          };

          try {
            const result = await fetchWithBackoff();
            let text = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (text) mergedContent = text.replace(/```html/gi, '').replace(/```/g, '').trim();
          } catch (error) {
            alert("AI 정리 중 오류가 발생했습니다. 시간순으로 임시 병합됩니다.");
            mergedContent = targetMemos.map(m => `<b>[${m.date}]</b><br/>${m.content}`).join('<br/><br/>');
          }
        }

        const allUrls = [...new Set(targetMemos.flatMap(m => m.urls || []))];
        let checklistIdCounter = Date.now();
        const allChecklists = targetMemos.flatMap(m => m.checklist || []).map(item => ({ id: checklistIdCounter++, text: item.text, completed: item.completed }));
        const firstImage = targetMemos.find(m => m.imageUrl)?.imageUrl || null;

        const newDraft = { id: null, author: "나", category: "기타", content: mergedContent, urls: allUrls, checklist: allChecklists, imageUrl: firstImage, isPublic: false };

        setIsMerging(false); setShowMergeModal(false); setIsSelectionMode(false); setSelectedMemoIds([]);
        setCurrentMemo(newDraft); setView('edit');
      };

      const handleShotMemoMerge = (ids) => { 
        const merged = shotMemos.filter(m => ids.includes(m.id)).map(m => m.content).join('<br/>'); 
        setCurrentMemo({ id: null, author: "나", category: "기타", content: merged, urls: [], checklist: [], imageUrl: null, isPublic: false }); 
        setView('edit'); 
      };
      
      const handleBlockPost = (author) => { if (!blockedUsers.includes(author)) setBlockedUsers([...blockedUsers, author]); setBlockModalTarget(null); alert(`${author} 차단됨`); };
      const handleBlockHide = (author) => { if (!hiddenFromUsers.includes(author)) setHiddenFromUsers([...hiddenFromUsers, author]); setBlockModalTarget(null); alert(`${author}에게 숨김됨`); };
      const handleToggleFollow = (author) => {
        if (author === '나') return;
        setFollowingUsers(prev => prev.includes(author) ? prev.filter(u => u !== author) : [...prev, author]);
      };
      
      const handleToggleLike = async (id) => { 
        const memo = memos.find(m => m.id === id);
        if(!memo || !db || !fbUser) return;
        const updated = { ...memo, likedByMe: !memo.likedByMe, likes: memo.likedByMe ? memo.likes - 1 : memo.likes + 1 };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', id.toString()), updated);
      };
      
      const handleAddComment = async (id, text) => { 
        const memo = memos.find(m => m.id === id);
        if(!memo || !db || !fbUser) return;
        const updated = { ...memo, comments: [...(memo.comments || []), { id: Date.now(), author: "나", text }] };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', id.toString()), updated);
      };

      const handleAddReply = async (memoId, commentId, text) => {
        const memo = memos.find(m => m.id === memoId);
        if(!memo || !db || !fbUser) return;
        const updated = { ...memo, comments: memo.comments.map(c => c.id === commentId ? { ...c, replies: [...(c.replies || []), { id: Date.now(), author: "나", text }] } : c) };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', memoId.toString()), updated);
      };
      
      const handleTogglePin = async (id) => { 
        const memo = memos.find(m => m.id === id);
        if(!memo || !db || !fbUser) return;
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', id.toString()), { ...memo, isPinned: !memo.isPinned });
      };
      
      const handleTogglePublic = async (id) => { 
        const memo = memos.find(m => m.id === id);
        if(!memo || !db || !fbUser) return;
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', id.toString()), { ...memo, isPublic: !memo.isPublic });
      };
      
      const handleToggleChecklist = async (memoId, itemId) => {
        const memo = memos.find(m => m.id === memoId);
        if(!memo || !db || !fbUser) return;
        const updated = { ...memo, checklist: memo.checklist.map(c => c.id === itemId ? { ...c, completed: !c.completed } : c) };
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'memos', memoId.toString()), updated);
      };

      const handleTabChange = (tab) => {
        setIsSelectionMode(false); setSelectedMemoIds([]);
        setCurrentTab(tab); setView('list');
        setCurrentMemo(null); setCurrentScore(null);
        scrollToTop();
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setView('list');
        setCurrentTab(defaultTab);
      };

      return (
        <div className="fixed inset-0 bg-[#c8c3b7] flex justify-center sm:items-center sm:py-6 text-gray-900 w-full h-full">
          <GlobalStyle />
          
          {/* 전체 레이아웃 (flex flex-col 로 변경하여 하단바 겹침 완벽 방지) */}
          <div className="w-full h-full max-w-[440px] shadow-2xl flex flex-col bg-white overflow-hidden kraft-bg sm:max-h-[850px] sm:rounded-[40px] sm:border-[10px] sm:border-gray-800 relative">
            
            {!isAuthenticated ? (
              <AuthScreen onLogin={() => setIsAuthenticated(true)} />
            ) : (
              <>
                <header className="pt-[max(env(safe-area-inset-top),2rem)] pb-4 px-5 z-10 flex-shrink-0 flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <h1 className="text-[26px] font-[900] stamped-text pb-0.5">진심골프메모</h1>
                    <div className="flex flex-col border-l-[2px] border-[#1a4314]/80 pl-2.5"><span className="text-[10px] font-[900] stamped-text">GOLF MEMO</span><span className="text-[10px] font-[900] stamped-text">& PRACTICE</span></div>
                  </div>
                  {view === 'list' && (
                    <div className="relative ml-auto">
                      <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 bg-white/60 rounded-full border border-[#d1c9b8] hover:bg-white transition-colors shadow-sm">
                        <Icon name="Menu" size={20} className="text-[#1a4314]" />
                      </button>
                      {isMenuOpen && (
                        <>
                          <div className="fixed inset-0 z-40" onClick={() => setIsMenuOpen(false)}></div>
                          <div className="absolute right-0 top-full mt-2 w-36 bg-white rounded-2xl shadow-xl border border-[#d1c9b8] overflow-hidden z-50 animate-in fade-in zoom-in-95 duration-200">
                            <button onClick={() => { setView('search'); setIsMenuOpen(false); }} className="w-full flex items-center gap-2.5 px-4 py-3.5 hover:bg-gray-50 font-extrabold text-[14px] text-gray-800 border-b border-gray-100 transition-colors">
                              <Icon name="Search" size={18} className="text-[#1a4314]"/> 통합 검색
                            </button>
                            <button onClick={() => { setView('mypage'); setIsMenuOpen(false); }} className="w-full flex items-center gap-2.5 px-4 py-3.5 hover:bg-gray-50 font-extrabold text-[14px] text-gray-800 transition-colors">
                              <Icon name="User" size={18} className="text-[#1a4314]"/> 마이페이지
                            </button>
                          </div>
                        </>
                      )}
                    </div>
                  )}
                  {view !== 'list' && view !== 'mypage' && view !== 'search' && <button onClick={() => { if(view==='score_detail')setCurrentScore(null); setView('list');}} className="flex items-center text-[#1a4314] font-extrabold ml-auto"><Icon name="ChevronLeft" size={28} /> 뒤로</button>}
                </header>

                <main id="main-scroll-area" className="flex-1 overflow-y-auto scrollbar-hide px-2 pb-6 relative">
                  {view === 'list' && currentTab === 'memo' && <MemoList memos={filteredMyMemos} categories={categories} activeCategory={activeCategory} setActiveCategory={setActiveCategory} isSelectionMode={isSelectionMode} setIsSelectionMode={setIsSelectionMode} selectedMemoIds={selectedMemoIds} setSelectedMemoIds={setSelectedMemoIds} onOpenDetail={m=>{setCurrentMemo(m); setView('detail');}} onManageCategories={()=>setView('categories')} baseFontSize={baseFontSize} />}
                  {view === 'search' && <GlobalSearch memos={memos} shotMemos={shotMemos} blockedUsers={blockedUsers} onOpenDetail={m=>{setCurrentMemo(m); setView('detail');}} onCancel={()=>setView('list')} baseFontSize={baseFontSize} />}
                  {view === 'list' && currentTab === 'shot_memo' && <ShotMemoMain shotMemos={shotMemos} onSaveShotMemo={handleSaveShotMemo} onDeleteShotMemos={handleDeleteShotMemos} onMerge={handleShotMemoMerge} baseFontSize={baseFontSize} isSelectionMode={isSelectionMode} setIsSelectionMode={setIsSelectionMode} selectedIds={selectedMemoIds} setSelectedIds={setSelectedMemoIds} />}
                  {view === 'list' && currentTab === 'feed' && <FeedList memos={feedMemos} onOpenDetail={m=>{setCurrentMemo(m); setView('detail');}} onToggleLike={handleToggleLike} onOpenBlockModal={setBlockModalTarget} baseFontSize={baseFontSize} followingUsers={followingUsers} />}
                  {view === 'list' && currentTab === 'score' && <ScoreMain scores={scores} onAddScore={()=>setView('score_edit')} onOpenScoreDetail={s=>{setCurrentScore(s); setView('score_detail');}} />}
                  {view === 'score_edit' && <ScoreEditor onSave={handleSaveScore} onCancel={()=>setView('list')} />}
                  {view === 'score_detail' && <ScoreDetail scoreData={currentScore} onSendToMemo={s=>{setCurrentMemo({id:null, author:"나", category:"필드/라운드", content:`<b>[스코어 기록] ${s.course}</b><br/>최종 타수: ${s.score}타 (${s.par})`, urls:[], checklist:[], imageUrl:s.imageUrl, isPublic:false}); setView('edit');}} />}
                  {view === 'mypage' && <MyPage onCancel={()=>setView('list')} blockedUsers={blockedUsers} setBlockedUsers={setBlockedUsers} hiddenFromUsers={hiddenFromUsers} setHiddenFromUsers={setHiddenFromUsers} defaultTab={defaultTab} setDefaultTab={setDefaultTab} baseFontSize={baseFontSize} setBaseFontSize={setBaseFontSize} followingUsers={followingUsers} onToggleFollow={handleToggleFollow} onLogout={handleLogout} />}
                  {view === 'detail' && <MemoDetail memo={memos.find(m => m.id === currentMemo?.id) || currentMemo} onDelete={handleDeleteMemo} onEdit={() => setView('edit')} onToggleLike={handleToggleLike} onAddComment={handleAddComment} onAddReply={handleAddReply} onTogglePublic={handleTogglePublic} onTogglePin={handleTogglePin} onToggleChecklist={handleToggleChecklist} onOpenBlockModal={setBlockModalTarget} baseFontSize={baseFontSize} followingUsers={followingUsers} onToggleFollow={handleToggleFollow} />}
                  {view === 'edit' && <MemoEditor memo={currentMemo} categories={categories} onSave={handleSaveMemo} onCancel={()=>setView(currentMemo?.id ? 'detail' : 'list')} baseFontSize={baseFontSize} />}
                  {view === 'categories' && <CategoryManager categories={categories} setCategories={setCategories} />}
                  {view === 'list' && currentTab === 'game' && <GameMain onSelectGame={id=>setView(`game_${id}`)} />}
                  {view === 'game_draw' && <TeamDrawGame />}
                  {view === 'game_fun' && <FunGolfGame />}
                  {view === 'game_tee' && <TeeSpinGame />}
                </main>

                {/* 플로팅 글쓰기 버튼: 스크롤 영역 밖으로 빼내어 absolute로 고정 (스크롤 시 위로 올라가는 현상 완벽 해결) */}
                {!isSelectionMode && view === 'list' && currentTab === 'memo' && (
                  <button 
                    onClick={() => { setCurrentMemo(null); setView('edit'); }} 
                    className="absolute right-5 w-[56px] h-[56px] bg-[#1a4314] rounded-full flex items-center justify-center text-white shadow-xl z-[40] active:scale-95 transition-transform"
                    style={{ bottom: 'calc(80px + env(safe-area-inset-bottom))' }}
                  >
                    <Icon name="Plus" size={32} />
                  </button>
                )}

                {/* 목록 합치기 하단바: 스크롤 영역의 가장 밑바닥(내비게이션 위)에 딱 붙게 변경 (붕 뜨는 현상 해결) */}
                {isSelectionMode && view === 'list' && (currentTab === 'memo' || currentTab === 'shot_memo') && (
                  <div className="shrink-0 w-full bg-white/95 backdrop-blur-md border-t border-[#d1c9b8] p-4 flex justify-between items-center z-[50] shadow-[0_-10px_20px_rgba(0,0,0,0.1)]">
                    <span className="font-extrabold text-[#1a4314] text-[15px] pl-2">{selectedMemoIds.length}개 선택됨</span>
                    <div className="flex gap-2">
                      <button onClick={()=> {setIsSelectionMode(false); setSelectedMemoIds([]);}} className="px-4 py-2.5 bg-[#E2D9C8] text-[#1a4314] rounded-xl font-bold text-[13px] hover:bg-[#d5ccba] transition-colors border border-[#d1c9b8]">취소</button>
                      {selectedMemoIds.length > 0 && (
                        <button 
                            onClick={() => {
                                if (confirmDelMerge) {
                                    if (currentTab === 'memo') selectedMemoIds.forEach(id => handleDeleteMemo(id));
                                    else handleDeleteShotMemos(selectedMemoIds);
                                    setIsSelectionMode(false);
                                    setSelectedMemoIds([]);
                                    setConfirmDelMerge(false);
                                } else {
                                    setConfirmDelMerge(true);
                                    setTimeout(() => setConfirmDelMerge(false), 3000);
                                }
                            }} 
                            className="px-4 py-2.5 bg-red-50 text-red-600 rounded-xl font-bold text-[13px] shadow-sm hover:bg-red-100"
                        >
                            {confirmDelMerge ? "정말 삭제?" : "삭제"}
                        </button>
                      )}
                      <button onClick={() => {
                          if (currentTab === 'memo') setShowMergeModal(true);
                          else handleShotMemoMerge(selectedMemoIds);
                      }} disabled={selectedMemoIds.length < 2} className="px-4 py-2.5 bg-[#1a4314] text-white rounded-xl font-bold text-[13px] disabled:opacity-50 disabled:bg-gray-400 shadow-md hover:bg-[#2d6a4f] transition-colors">합치기</button>
                    </div>
                  </div>
                )}

                {view === 'list' && (
                  <nav className="shrink-0 bg-[#E8E2D2]/95 border-t border-[#d1c9b8]/60 flex justify-between z-10 text-[9px] font-bold text-[#6b7280] pb-[env(safe-area-inset-bottom)] sm:rounded-b-[30px]">
                    <div onClick={() => handleTabChange('memo')} className={`p-2 flex-1 flex flex-col items-center cursor-pointer ${currentTab==='memo'?'text-[#1a4314]':''}`}><Icon name="PenTool" size={20}/><span>메모</span></div>
                    <div onClick={() => handleTabChange('shot_memo')} className={`p-2 flex-1 flex flex-col items-center cursor-pointer ${currentTab==='shot_memo'?'text-[#1a4314]':''}`}><Icon name="MessageSquare" size={20}/><span>Shot메모</span></div>
                    <div onClick={() => handleTabChange('feed')} className={`p-2 flex-1 flex flex-col items-center cursor-pointer ${currentTab==='feed'?'text-[#1a4314]':''}`}><Icon name="Users" size={20}/><span>커뮤니티</span></div>
                    <div onClick={() => handleTabChange('score')} className={`p-2 flex-1 flex flex-col items-center cursor-pointer ${currentTab==='score'?'text-[#1a4314]':''}`}><Icon name="LayoutList" size={20}/><span>스코어</span></div>
                    <div onClick={() => handleTabChange('game')} className={`p-2 flex-1 flex flex-col items-center cursor-pointer ${currentTab==='game'?'text-[#1a4314]':''}`}><Icon name="Dices" size={20}/><span>게임</span></div>
                    <div onClick={() => window.open('https://goingoingon2.github.io/golf/golf_metronome.html', '_blank')} className="p-2 flex-1 flex flex-col items-center cursor-pointer"><Icon name="Timer" size={20}/><span>메트로놈</span></div>
                  </nav>
                )}

                {showMergeModal && (
                  <div className="absolute inset-0 bg-black/60 z-[60] flex items-center justify-center p-5 animate-in fade-in duration-200">
                    <div className="bg-[#fcfbf9] rounded-3xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-2xl animate-in zoom-in-95 duration-200 relative overflow-hidden border border-[#d1c9b8]">
                      {isMerging && (
                        <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-10 flex flex-col items-center justify-center">
                          <Icon name="Loader2" size={40} className="text-[#1a4314] animate-spin mb-3" />
                          <p className="font-bold text-[#1a4314] text-sm">AI가 메모를 합치고 있습니다...</p>
                        </div>
                      )}
                      <h3 className="text-lg font-extrabold text-gray-900 mb-1">어떤 방식으로 합칠까요?</h3>
                      <button onClick={() => handleMergeMemos('time')} className="flex flex-col items-start p-4 border border-gray-200 rounded-xl hover:border-[#1a4314] hover:bg-[#e8f5e9] transition-all text-left bg-white">
                        <span className="font-bold text-gray-800 flex items-center gap-1.5"><Icon name="Calendar" size={16} className="text-[#1a4314]"/> 시간순서로 합치기</span>
                        <span className="text-[12px] text-gray-500 mt-1.5 leading-snug">선택한 메모들을 작성된 순서대로 단순하게 이어 붙입니다.</span>
                      </button>
                      <button onClick={() => handleMergeMemos('ai')} className="flex flex-col items-start p-4 border border-gray-200 rounded-xl hover:border-purple-500 hover:bg-purple-50 transition-all text-left bg-white">
                        <span className="font-bold text-gray-800 flex items-center gap-1.5"><Icon name="Sparkles" size={16} className="text-purple-500"/> AI 유사 내용 묶기</span>
                        <span className="text-[12px] text-gray-500 mt-1.5 leading-snug">AI가 분석하여 비슷한 주제끼리 매끄럽게 재작성합니다.</span>
                      </button>
                      <button onClick={() => setShowMergeModal(false)} className="mt-2 py-3 bg-[#E2D9C8] text-[#1a4314] font-bold rounded-xl hover:bg-[#d5ccba] transition-colors">취소</button>
                    </div>
                  </div>
                )}

                {blockModalTarget && (
                  <div className="absolute inset-0 bg-black/60 z-[70] flex items-end justify-center animate-in fade-in" onClick={() => setBlockModalTarget(null)}>
                    <div className="bg-[#fdfcf9] w-full max-w-[440px] rounded-t-[32px] p-6 pb-[calc(3rem+env(safe-area-inset-bottom))] flex flex-col gap-2 shadow-2xl animate-in slide-in-from-bottom-full border border-[#d1c9b8]" onClick={e => e.stopPropagation()}>
                      <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div><h3 className="text-[18px] font-black mb-4 px-2">{blockModalTarget}님 차단 설정</h3>
                      <button onClick={() => handleBlockPost(blockModalTarget)} className="w-full text-left px-5 py-4 bg-white border rounded-2xl font-bold text-red-600 hover:bg-red-50">이 유저의 게시물 숨기기</button>
                      <button onClick={() => handleBlockHide(blockModalTarget)} className="w-full text-left px-5 py-4 bg-white border rounded-2xl font-bold text-orange-600 hover:bg-orange-50 mt-2">내 메모를 보지 못하게 차단</button>
                      <button onClick={() => setBlockModalTarget(null)} className="w-full py-4 mt-4 bg-[#E2D9C8] font-extrabold rounded-2xl hover:bg-[#d5ccba]">취소</button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }
    
    // React 앱 렌더링 즉시 실행
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
