<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>좌탄우탄 스코어보드 (LIVE)</title>
    <!-- React 및 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        .btn-kakao { background-color: #FEE500; color: #191919; }
    </style>

    <!-- Firebase SDK 동적 로드 (모듈 방식) -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, onSnapshot, collection } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // React 코드에서 사용할 수 있도록 전역 객체에 할당
        window.FirebaseSDK = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, doc, setDoc, onSnapshot, collection
        };
        window.dispatchEvent(new Event('firebaseLoaded'));
    </script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // 환경 변수 설정 (Canvas 환경 지원)
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'golf-score-app';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        let db, auth;

        // 아이콘 컴포넌트
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22h10c0-1.76-.85-3.25-2.03-3.79-.5-.23-.97-.66-.97-1.21v-2.34M12 2a5 5 0 0 0-5 5c0 3.5 3 5.5 5 5.5s5-2 5-5.5a5 5 0 0 0-5-5z"/>,
                users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/>,
                share: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-13.3 1 1 0 0 1 .1 2 6.5 6.5 0 1 0 5.4 10.3c.5.8.9 1.7.9 2.7l.1-.1a1 1 0 0 1 .1-1.1c.5-.8.9-1.7.9-2.7a1 1 0 0 1 1.1-1.6Z"/>,
                kakao: <path d="M12 3C7.03 3 3 6.06 3 9.83c0 2.43 1.66 4.56 4.14 5.76-.17.63-.61 2.29-.7 2.63-.12.43.14.43.3.33.12-.08 1.95-1.32 2.73-1.85.83.1 1.68.16 2.53.16 4.97 0 9-3.06 9-6.83C21 6.06 16.97 3 12 3Z" fill="currentColor" stroke="none"/>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
                wallet: <path d="M21 12V7H5a2 2 0 0 1 0-4h14v4M3 5v14a2 2 0 0 0 2 2h16v-5M18 12a2 2 0 0 0 0 4h4v-4Z"/>,
                settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2Z"/><circle cx="12" cy="12" r="3"/></>,
                check: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/>,
                minus: <line x1="5" y1="12" x2="19" y2="12"/>,
                chevronDown: <polyline points="6 9 12 15 18 9"/>,
                chevronUp: <polyline points="18 15 12 9 6 15"/>,
                chevronLeft: <polyline points="15 18 9 12 15 6"/>,
                chevronRight: <polyline points="9 18 15 12 9 6"/>,
                close: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                list: <><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            // Firebase 연동 상태
            const [user, setUser] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            // 로컬 UI 상태
            const [showToast, setShowToast] = useState(false);
            const [toastMessage, setToastMessage] = useState('');
            const [isSettingOpen, setIsSettingOpen] = useState(false);
            const [isResetConfirmOpen, setIsResetConfirmOpen] = useState(false);
            const [isScoreboardOpen, setIsScoreboardOpen] = useState(false);
            const [editingIdx, setEditingIdx] = useState(-1);
            const editInputRef = useRef(null);

            // 클라우드 동기화 타겟 상태들
            const [players, setPlayers] = useState(['유영호', '문현중', '김대웅', '김무성']);
            const [isStarted, setIsStarted] = useState(false);
            const [feeMode, setFeeMode] = useState('none');
            const [feeSettings, setFeeSettings] = useState({ morning: [0, 15000, 25000, 40000], afternoon: [0, 17000, 37000, 54000] });
            const [holes, setHoles] = useState(Array.from({ length: 18 }, (_, i) => ({ number: i + 1, winners: [], points: 1, isDraw: false })));
            const [currentHoleIdx, setCurrentHoleIdx] = useState(0);

            // 1. Firebase 초기화 및 인증
            useEffect(() => {
                if (!firebaseConfig) return; // 로컬 환경 폴백
                let isMounted = true;
                
                const initFirebase = async () => {
                    if (!window.FirebaseSDK) await new Promise(r => window.addEventListener('firebaseLoaded', r));
                    if (!isMounted) return;
                    
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                    
                    if (!auth) {
                        const app = initializeApp(firebaseConfig);
                        auth = getAuth(app);
                        db = getFirestore(app);
                    }

                    try {
                        if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
                        else await signInAnonymously(auth);
                    } catch (e) { console.error("Auth Error", e); }

                    onAuthStateChanged(auth, (u) => {
                        if (isMounted) {
                            setUser(u);
                            setIsDbReady(!!u);
                        }
                    });
                };
                initFirebase();
                return () => { isMounted = false; };
            }, []);

            // 2. 실시간 데이터 리스너 (Firestore -> Local)
            useEffect(() => {
                if (!isDbReady || !user) return;
                const { doc, onSnapshot } = window.FirebaseSDK;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameState', 'current');
                
                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.players) setPlayers(data.players);
                        if (data.isStarted !== undefined) setIsStarted(data.isStarted);
                        if (data.feeMode) setFeeMode(data.feeMode);
                        if (data.feeSettings) setFeeSettings(data.feeSettings);
                        if (data.holes) setHoles(data.holes);
                        if (data.currentHoleIdx !== undefined) setCurrentHoleIdx(data.currentHoleIdx);
                    }
                }, (error) => console.error("Sync Error:", error));
                
                return () => unsubscribe();
            }, [isDbReady, user]);

            // 3. 상태 업데이트 및 동기화 함수 (Local -> Firestore)
            const updateGameState = async (updates) => {
                // UI 즉각 반영 (Optimistic Update)
                if (updates.players !== undefined) setPlayers(updates.players);
                if (updates.isStarted !== undefined) setIsStarted(updates.isStarted);
                if (updates.feeMode !== undefined) setFeeMode(updates.feeMode);
                if (updates.feeSettings !== undefined) setFeeSettings(updates.feeSettings);
                if (updates.holes !== undefined) setHoles(updates.holes);
                if (updates.currentHoleIdx !== undefined) setCurrentHoleIdx(updates.currentHoleIdx);

                if (!isDbReady || !user) return;
                setIsSyncing(true);
                try {
                    const { doc, setDoc } = window.FirebaseSDK;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameState', 'current');
                    await setDoc(docRef, updates, { merge: true });
                } catch (e) { console.error("Save Error", e); }
                finally { setTimeout(() => setIsSyncing(false), 500); }
            };

            // 토스트 및 포커스 유틸
            useEffect(() => {
                if (showToast) {
                    const timer = setTimeout(() => setShowToast(false), 2000);
                    return () => clearTimeout(timer);
                }
            }, [showToast]);

            useEffect(() => {
                if (editingIdx !== -1 && editInputRef.current) {
                    editInputRef.current.focus();
                    editInputRef.current.select();
                }
            }, [editingIdx]);

            // 계산 로직
            const totals = useMemo(() => {
                const scores = [0, 0, 0, 0];
                holes.forEach(hole => {
                    if (hole.winners.length === 2 && !hole.isDraw) {
                        for (let i = 0; i < 4; i++) {
                            if (hole.winners.includes(i)) scores[i] += hole.points;
                            else scores[i] -= hole.points;
                        }
                    }
                });
                return scores;
            }, [holes]);

            const rankingInfo = useMemo(() => {
                if (feeMode === 'none') return null;
                const playerData = players.map((name, index) => ({ index, name, score: totals[index] })).sort((a, b) => b.score - a.score);
                const fees = new Array(4).fill(0);
                const config = feeSettings[feeMode];
                const groups = [];
                playerData.forEach(p => {
                    if (groups.length > 0 && groups[groups.length - 1][0].score === p.score) groups[groups.length - 1].push(p);
                    else groups.push([p]);
                });
                let currentRank = 0;
                groups.forEach(group => {
                    const count = group.length;
                    let sumFee = 0;
                    for (let i = 0; i < count; i++) sumFee += config[currentRank + i] || 0;
                    const avgFee = Math.round(sumFee / count);
                    group.forEach(p => fees[p.index] = avgFee);
                    currentRank += count;
                });
                return fees;
            }, [totals, feeMode, players, feeSettings]);

            // 액션 핸들러들
            const executeReset = () => {
                const resetHoles = Array.from({ length: 18 }, (_, i) => ({ number: i + 1, winners: [], points: 1, isDraw: false }));
                updateGameState({ holes: resetHoles, isStarted: false, feeMode: 'none', currentHoleIdx: 0 });
                setIsResetConfirmOpen(false);
                setToastMessage('모든 화면이 초기화되었습니다.');
                setShowToast(true);
            };

            const handlePlayerToggle = (holeIndex, playerIndex) => {
                const newHoles = [...holes];
                // 앞선 홀들 미입력시 자동 비김 처리
                for (let i = 0; i < holeIndex; i++) {
                    if (newHoles[i].winners.length === 0 && !newHoles[i].isDraw) newHoles[i] = { ...newHoles[i], isDraw: true };
                }
                const hole = { ...newHoles[holeIndex] };
                hole.isDraw = false;
                
                const isWinner = hole.winners.includes(playerIndex);
                const isHoleDone = hole.winners.length === 2;

                if (isWinner) {
                    // 이긴 팀을 누른 경우 점수 증가 (최대 10)
                    if (hole.points < 10) hole.points += 1;
                    else {
                        hole.winners = hole.winners.filter(id => id !== playerIndex);
                        if (hole.winners.length === 0) hole.points = 1;
                    }
                } else if (!isHoleDone) {
                    // 승자가 다 선택되지 않았을 때 새로운 이긴 팀 추가
                    hole.winners = [...hole.winners, playerIndex];
                } else {
                    // 이미 승자 2명이 선택된 상태에서 패배 팀(-)을 누른 경우 (점수 차감 및 리셋 로직)
                    if (hole.points > 1) {
                        hole.points -= 1; // 점수가 1보다 크면 1점씩 차감
                    } else {
                        // 점수가 1점일 때 패배 팀을 누르면 해당 홀 팀 구성을 완전히 초기화
                        hole.winners = [];
                        hole.points = 1;
                    }
                }
                newHoles[holeIndex] = hole;
                updateGameState({ holes: newHoles });
            };

            const handleShare = async () => {
                // 공유 시 해당 파일의 현재 URL을 함께 전달
                const currentUrl = window.location.href;
                let lastHole = 0;
                holes.forEach(h => { if(h.isDraw || h.winners.length === 2) lastHole = h.number; });
                
                const summary = players.map((p, i) => {
                    const score = totals[i];
                    return `${p}: ${score > 0 ? '+' : ''}${score}점${rankingInfo ? ` (${rankingInfo[i].toLocaleString()}원)` : ''}`;
                }).join('\n');

                const feeLabel = feeMode === 'none' ? '' : ` [${feeMode === 'morning' ? '오전' : '오후'} 내기]`;
                const text = `⛳️ [좌탄우탄 LIVE 스코어] ${lastHole}홀 진행${feeLabel}\n\n${summary}\n\n👇 아래 링크로 들어오시면 실시간 점수판을 같이 볼 수 있습니다.\n${currentUrl}`;

                if (navigator.share) {
                    try { await navigator.share({ title: '좌탄우탄 스코어', text: text }); } 
                    catch (err) { copyToClipboard(text); }
                } else { copyToClipboard(text); }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setToastMessage('복사되었습니다! 카톡에 붙여넣으세요.');
                    setShowToast(true);
                } catch (e) {
                    setToastMessage('공유 기능을 지원하지 않는 브라우저입니다.');
                    setShowToast(true);
                }
                document.body.removeChild(textArea);
            };

            // 입력 필드 관련 유틸
            const handlePlayerChangeLocal = (idx, val) => { const n = [...players]; n[idx] = val; setPlayers(n); };
            const handleFeeChangeLocal = (mode, rankIdx, value) => {
                const numValue = parseInt(value) || 0;
                setFeeSettings(prev => ({ ...prev, [mode]: prev[mode].map((v, i) => i === rankIdx ? numValue : v) }));
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                            <div className="bg-emerald-600 p-8 text-white text-center relative">
                                {isDbReady && (
                                    <div className="absolute top-4 right-4 flex items-center gap-1.5 bg-black/20 px-2 py-1 rounded-full text-[10px] font-bold tracking-wider">
                                        <span className={`w-2 h-2 rounded-full ${isSyncing ? 'bg-amber-400 animate-pulse' : 'bg-green-400'}`}></span> LIVE
                                    </div>
                                )}
                                <Icon name="trophy" size={48} className="mx-auto mb-3" />
                                <h1 className="text-3xl font-black italic tracking-tighter uppercase">Left & Right</h1>
                                <p className="text-emerald-100 text-sm mt-1 font-medium">실시간 동기화 스코어보드</p>
                            </div>
                            <div className="p-6 space-y-6 overflow-y-auto max-h-[75vh]">
                                <div className="space-y-3">
                                    <label className="text-sm font-bold text-slate-700 flex items-center">
                                        <Icon name="users" size={16} className="mr-1" /> 플레이어 명단
                                    </label>
                                    <div className="grid grid-cols-2 gap-3">
                                        {players.map((p, i) => (
                                            <input key={i} type="text" value={p} onFocus={e => e.target.select()} 
                                                onChange={e => handlePlayerChangeLocal(i, e.target.value)}
                                                onBlur={() => updateGameState({ players })}
                                                className="w-full px-4 py-3 rounded-2xl border border-slate-200 bg-slate-50 text-center font-bold outline-none focus:ring-2 focus:ring-emerald-500" />
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-3 border-t border-slate-100 pt-4">
                                    <label className="text-sm font-bold text-slate-700 flex items-center">
                                        <Icon name="wallet" size={16} className="mr-1" /> 게임비 내기 옵션
                                    </label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['none', 'morning', 'afternoon'].map(m => (
                                            <button key={m} onClick={() => updateGameState({ feeMode: m })} className={`py-3 rounded-xl font-bold border transition-all ${feeMode === m ? 'bg-emerald-600 text-white border-emerald-600 shadow-lg' : 'bg-white text-slate-400 border-slate-200 hover:bg-slate-50'}`}>
                                                {m === 'none' ? '안함' : m === 'morning' ? '오전' : '오후'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden">
                                    <button onClick={() => setIsSettingOpen(!isSettingOpen)} className="w-full px-4 py-3 flex items-center justify-between text-sm font-bold text-slate-600 hover:bg-slate-100 transition-colors">
                                        <span className="flex items-center"><Icon name="settings" size={16} className="mr-1.5" /> 금액 상세 설정</span>
                                        <Icon name={isSettingOpen ? "chevronUp" : "chevronDown"} size={16} />
                                    </button>
                                    {isSettingOpen && (
                                        <div className="p-4 pt-0 space-y-4 animate-in">
                                            <div className="space-y-3">
                                                <p className="text-[11px] font-bold text-emerald-600 border-l-2 border-emerald-600 pl-2 uppercase">Morning Fees</p>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {feeSettings.morning.map((val, i) => (
                                                        <div key={i} className="flex items-center bg-white rounded-lg border border-slate-200 px-2">
                                                            <span className="text-[10px] text-slate-400 font-bold mr-2">{i+1}위</span>
                                                            <input type="number" value={val} 
                                                                onChange={e => handleFeeChangeLocal('morning', i, e.target.value)} 
                                                                onBlur={() => updateGameState({ feeSettings })}
                                                                className="w-full py-2 text-xs font-bold outline-none bg-transparent" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <p className="text-[11px] font-bold text-amber-600 border-l-2 border-amber-600 pl-2 uppercase">Afternoon Fees</p>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {feeSettings.afternoon.map((val, i) => (
                                                        <div key={i} className="flex items-center bg-white rounded-lg border border-slate-200 px-2">
                                                            <span className="text-[10px] text-slate-400 font-bold mr-2">{i+1}위</span>
                                                            <input type="number" value={val} 
                                                                onChange={e => handleFeeChangeLocal('afternoon', i, e.target.value)} 
                                                                onBlur={() => updateGameState({ feeSettings })}
                                                                className="w-full py-2 text-xs font-bold outline-none bg-transparent" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => updateGameState({ isStarted: true })} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform text-lg uppercase tracking-widest mt-2">Game Start</button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentHoleData = holes[currentHoleIdx];
            const isCurrentHoleDone = currentHoleData.winners.length === 2 || currentHoleData.isDraw;

            return (
                <div className="min-h-screen bg-slate-100 flex flex-col font-sans text-slate-900 relative">
                    {showToast && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl animate-in text-sm font-bold flex items-center gap-2 whitespace-nowrap z-[110]"><Icon name="check" size={16} className="text-emerald-400"/>{toastMessage}</div>}
                    
                    {/* 초기화 모달 */}
                    {isResetConfirmOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in">
                            <div className="bg-white w-full max-w-xs rounded-3xl shadow-2xl p-6 text-center">
                                <Icon name="alert" size={48} className="text-rose-500 mx-auto mb-4"/>
                                <h3 className="text-xl font-bold mb-2">초기화하시겠습니까?</h3>
                                <p className="text-xs text-slate-500">참여 중인 모든 사람의 화면이 초기화됩니다.</p>
                                <div className="flex gap-2 mt-6">
                                    <button onClick={() => setIsResetConfirmOpen(false)} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold">취소</button>
                                    <button onClick={executeReset} className="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-bold">확인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 전체 스코어보드 모달 */}
                    {isScoreboardOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-100 flex flex-col animate-slide-up">
                            <div className="bg-emerald-600 text-white px-4 py-4 flex justify-between items-center shadow-md shrink-0">
                                <h2 className="font-black text-lg">전체 스코어보드</h2>
                                <button onClick={() => setIsScoreboardOpen(false)} className="p-2 bg-white/20 rounded-full active:scale-90"><Icon name="close" /></button>
                            </div>
                            
                            {/* 모달 내 전체 TOTAL 스코어 요약 섹션 */}
                            <div className="grid grid-cols-5 bg-white text-slate-900 border-b border-slate-300 shrink-0 shadow-sm z-10">
                                <div className="flex items-center justify-center font-black text-slate-300 text-[10px]">TOTAL</div>
                                {players.map((p, i) => (
                                    <div key={i} className="py-3 border-l border-slate-100 flex flex-col items-center relative">
                                        <span className="text-[11px] font-bold text-slate-400 truncate w-full text-center px-1">{p}</span>
                                        <span className={`text-xl font-black ${totals[i]>0?'text-blue-600':totals[i]<0?'text-red-500':''}`}>{totals[i]>0?`+${totals[i]}`:totals[i]}</span>
                                        {rankingInfo && <span className="text-[9px] font-bold text-slate-500 bg-slate-100 px-1 rounded mt-1">{rankingInfo[i].toLocaleString()}원</span>}
                                    </div>
                                ))}
                            </div>

                            {/* 홀 리스트 영역 */}
                            <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                {holes.map((h, i) => {
                                    const done = h.winners.length === 2;
                                    return (
                                        <div key={h.number} 
                                             onClick={() => { updateGameState({ currentHoleIdx: i }); setIsScoreboardOpen(false); }}
                                             className={`flex h-16 rounded-2xl shadow-sm border transition-all cursor-pointer hover:border-emerald-500 ${h.isDraw ? 'bg-slate-200 border-slate-300' : done ? 'bg-white border-slate-200' : currentHoleIdx === i ? 'bg-emerald-50 border-emerald-500 ring-2 ring-emerald-500 ring-opacity-50' : 'bg-white border-dashed border-slate-300'}`}>
                                            <div className={`w-14 border-r flex flex-col items-center justify-center font-black italic ${currentHoleIdx === i ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-50/50'}`}>
                                                <span className="text-[10px] opacity-70">H</span>{h.number}
                                            </div>
                                            <div className="flex-1 grid grid-cols-4 p-2 gap-1.5 items-center">
                                                {h.isDraw ? <div className="col-span-4 text-center text-sm font-black text-slate-400">DRAW</div> : 
                                                    [0,1,2,3].map(pi => {
                                                        const win = h.winners.includes(pi);
                                                        const lose = done && !win;
                                                        if (!done && !win && currentHoleIdx !== i) return <div key={pi} className="text-center text-[10px] text-slate-300">-</div>;
                                                        return (
                                                            <div key={pi} className={`flex items-center justify-center h-full rounded-lg text-sm font-black ${win ? (h.points>1?'bg-amber-500 text-white':'bg-blue-500 text-white') : lose ? 'bg-slate-800 text-slate-300' : 'bg-slate-100 text-slate-400'}`}>
                                                                {win?`+${h.points}`:lose?`-${h.points}`:'-'}
                                                            </div>
                                                        )
                                                    })
                                                }
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    )}

                    {/* 상단 헤더 (항상 고정, 총점 표시) */}
                    <div className="bg-emerald-600 text-white shadow-lg z-10 shrink-0">
                        <div className="flex justify-between items-center px-4 py-3">
                            <div className="flex items-center">
                                <h1 className="font-black italic text-xl tracking-tight mr-2">LEFT & RIGHT</h1>
                                {isDbReady && (
                                    <div className="flex items-center gap-1 bg-black/20 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wider">
                                        <span className={`w-1.5 h-1.5 rounded-full ${isSyncing ? 'bg-amber-400 animate-pulse' : 'bg-green-400'}`}></span>
                                        LIVE
                                    </div>
                                )}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={handleShare} className="p-2 btn-kakao rounded-full shadow-md active:scale-90 transition-transform"><Icon name="kakao" /></button>
                                <button onClick={() => setIsResetConfirmOpen(true)} className="p-2 bg-white/20 rounded-full active:scale-90 transition-transform"><Icon name="rotate" /></button>
                            </div>
                        </div>
                        <div className="grid grid-cols-5 bg-white text-slate-900 border-b border-slate-300">
                            <div className="flex items-center justify-center font-black text-slate-300 text-[10px]">TOTAL</div>
                            {players.map((p, i) => (
                                <div key={i} className="py-3 border-l border-slate-100 flex flex-col items-center relative">
                                    {editingIdx === i ? (
                                        <input ref={editInputRef} defaultValue={p} 
                                            onBlur={e => {
                                                const n = [...players]; n[i] = e.target.value || p; 
                                                updateGameState({ players: n }); 
                                                setEditingIdx(-1);
                                            }} 
                                            onKeyDown={e => e.key === 'Enter' && e.target.blur()} className="w-full text-[11px] text-center bg-emerald-50 outline-none font-black" />
                                    ) : (
                                        <span onClick={() => setEditingIdx(i)} className="text-[11px] font-bold text-slate-400 truncate w-full text-center px-1 cursor-pointer">{p}</span>
                                    )}
                                    <span className={`text-xl font-black ${totals[i]>0?'text-blue-600':totals[i]<0?'text-red-500':''}`}>{totals[i]>0?`+${totals[i]}`:totals[i]}</span>
                                    {rankingInfo && <span className="text-[9px] font-bold text-slate-500 bg-slate-100 px-1 rounded mt-1">{rankingInfo[i].toLocaleString()}원</span>}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 단일 홀 입력 메인 뷰 */}
                    <div className="flex-1 overflow-y-auto p-4 flex flex-col justify-center">
                        <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6">
                            
                            {/* 홀 네비게이션 */}
                            <div className="flex justify-between items-center mb-8">
                                <button onClick={() => updateGameState({ currentHoleIdx: currentHoleIdx - 1 })} disabled={currentHoleIdx === 0} className={`p-3 rounded-full ${currentHoleIdx === 0 ? 'opacity-20' : 'bg-slate-100 hover:bg-slate-200 active:scale-90'}`}>
                                    <Icon name="chevronLeft" size={24} />
                                </button>
                                <div className="text-center">
                                    <p className="text-sm font-bold text-emerald-600 mb-[-4px]">CURRENT HOLE</p>
                                    <h2 className="text-5xl font-black italic text-slate-800">{currentHoleData.number}</h2>
                                </div>
                                <button onClick={() => updateGameState({ currentHoleIdx: currentHoleIdx + 1 })} disabled={currentHoleIdx === 17} className={`p-3 rounded-full ${currentHoleIdx === 17 ? 'opacity-20' : 'bg-slate-100 hover:bg-slate-200 active:scale-90'}`}>
                                    <Icon name="chevronRight" size={24} />
                                </button>
                            </div>

                            {/* 플레이어 선택 버튼들 */}
                            {currentHoleData.isDraw ? (
                                <div className="py-12 flex flex-col items-center justify-center bg-slate-100 rounded-3xl border-2 border-dashed border-slate-300">
                                    <Icon name="minus" size={48} className="text-slate-400 mb-2" />
                                    <p className="text-2xl font-black text-slate-500 tracking-widest uppercase">Draw Game</p>
                                    <p className="text-sm text-slate-400 mt-2 font-bold">비김 처리된 홀입니다.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 gap-4">
                                    {players.map((p, pi) => {
                                        const win = currentHoleData.winners.includes(pi);
                                        const lose = isCurrentHoleDone && !win;
                                        
                                        let btnClass = "relative h-32 rounded-3xl transition-all active:scale-95 flex flex-col items-center justify-center border-b-8 shadow-sm ";
                                        if (win) {
                                            btnClass += currentHoleData.points > 1 ? "bg-amber-500 border-amber-700 text-white" : "bg-blue-500 border-blue-700 text-white";
                                        } else if (lose) {
                                            btnClass += "bg-slate-800 border-slate-950 text-slate-300 opacity-90";
                                        } else {
                                            btnClass += "bg-slate-50 border-slate-200 text-slate-400 border-2";
                                        }

                                        return (
                                            <button key={pi} onClick={() => handlePlayerToggle(currentHoleIdx, pi)} className={btnClass}>
                                                <span className="text-sm font-bold opacity-80 mb-1">{p}</span>
                                                <span className="text-4xl font-black">{win ? `+${currentHoleData.points}` : lose ? `-${currentHoleData.points}` : 'WIN'}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            {/* 하단 유틸 버튼 (비김 / 다음 홀) */}
                            <div className="mt-6 flex gap-3">
                                <button onClick={() => {
                                    const n = [...holes]; 
                                    n[currentHoleIdx].isDraw = !n[currentHoleIdx].isDraw; 
                                    n[currentHoleIdx].winners=[]; 
                                    n[currentHoleIdx].points=1; 
                                    updateGameState({ holes: n });
                                }} className={`flex-1 py-4 rounded-2xl font-black text-sm border-2 transition-all ${currentHoleData.isDraw ? 'bg-slate-200 border-slate-300 text-slate-600' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}>
                                    {currentHoleData.isDraw ? '비김 취소' : '비김 (DRAW) 처리'}
                                </button>
                                
                                {isCurrentHoleDone && currentHoleIdx < 17 && (
                                    <button onClick={() => updateGameState({ currentHoleIdx: currentHoleIdx + 1 })} className="flex-1 py-4 rounded-2xl font-black text-sm bg-emerald-600 text-white shadow-lg animate-in flex items-center justify-center">
                                        다음 홀 입력 <Icon name="chevronRight" size={16} className="ml-1"/>
                                    </button>
                                )}
                            </div>

                        </div>
                    </div>

                    {/* 전체 스코어보드 열기 버튼 (하단 고정) */}
                    <div className="p-4 bg-white border-t border-slate-200 pb-8 shrink-0">
                        <button onClick={() => setIsScoreboardOpen(true)} className="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 flex items-center justify-center gap-2">
                            <Icon name="list" size={20} />
                            전체 스코어보드 보기
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
