            <button onClick={() => setStep('scorecard')} className="p-2 hover:bg-white/10 rounded-full transition flex flex-col items-center"><Trophy className="w-6 h-6" /></button>
            <div className="text-center font-black text-[20px] tracking-tight flex items-center gap-2">
              <Flag className="w-5 h-5" />{currentHole + 1} HOLE
              {roomId && <div className="absolute top-12 right-[50%] translate-x-[50%] mt-4 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-sm animate-pulse">LIVE</div>}
            </div>
            <button onClick={() => setStep('setup')} className="p-2 hover:bg-white/10 rounded-full transition text-xs font-semibold flex flex-col items-center"><Settings className="w-6 h-6" /></button>
          </div>

          <div className="max-w-md mx-auto p-4 space-y-4 pt-6">
            <button onClick={() => setShowCaddieModal(true)} className="w-full bg-[#e5f5ec] text-[#128853] rounded-[16px] p-3.5 flex items-center justify-between shadow-sm transition hover:bg-[#d0eedd] active:scale-[0.98]">
              <div className="flex items-center"><Edit3 className="w-4 h-4 mr-2" /><span className="text-[13px] font-bold">스코어 캐디 (입력 담당)</span></div>
              <div className="flex items-center gap-2"><div className="w-7 h-7 bg-white rounded-full overflow-hidden shrink-0 border border-white"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${players[scoreCaddieIdx]}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div><span className="text-[14px] font-black mr-1 text-gray-800">{players[scoreCaddieIdx]}</span><ChevronDown className="w-4 h-4 text-gray-500 opacity-70" /></div>
            </button>

            <div className="flex items-center gap-3">
              <div className="flex-1 bg-white rounded-[16px] shadow-sm p-3 border border-gray-100 flex items-center justify-between">
                <span className="font-black text-gray-800 text-[14px] ml-1">PAR</span>
                <div className="flex bg-gray-100 rounded-[12px] p-1 gap-1">
                  {[3, 4, 5].map((par) => (
                    <button key={par} onClick={() => { setCurrentPar(par); if (!hasManualMultiplier && doubleRules.timing === 'current') { const prevHole = currentHole > 0 ? holes[currentHole - 1] : null; const isAutoDouble = checkAutoDouble(currentScores, par, doubleRules, prevHole, currentExcluded); setMultiplier(isAutoDouble ? 2 : 1); } }} className={`w-8 h-8 rounded-[8px] font-black text-[15px] transition-all ${currentPar === par ? 'bg-[#128853] shadow-sm text-white' : 'text-gray-400 hover:text-gray-800'}`}>{par}</button>
                  ))}
                </div>
              </div>
              <div className="bg-white rounded-[16px] shadow-sm p-3 border border-gray-100 flex items-center gap-2">
                <span className="text-[12px] font-bold text-gray-600 flex items-center">내기 제외 <Info className="w-3.5 h-3.5 text-gray-300 ml-1"/></span>
                <button onClick={() => { setIsHoleExcluded(!isHoleExcluded); }} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors shrink-0 ${isHoleExcluded ? 'bg-red-500' : 'bg-gray-200'}`}><span className={`inline-block h-5 w-5 transform rounded-full bg-white transition-transform shadow-sm ${isHoleExcluded ? 'translate-x-5' : 'translate-x-0.5'}`} /></button>
              </div>
            </div>

            {!isHoleExcluded && (
              <div className="bg-white rounded-[16px] shadow-sm p-4 border border-gray-100 flex justify-between items-center relative">
                <div className="flex flex-col"><div className="flex items-center"><span className="text-[14px] font-black text-gray-800">배수 적용</span><button onClick={() => setShowRuleModal(true)} className="ml-1.5 text-gray-300 hover:text-[#128853] transition"><Info className="w-4 h-4" /></button></div></div>
                <div className="flex items-center space-x-3 bg-gray-50 p-1.5 rounded-[12px] border border-gray-100">
                  <button onClick={() => { setMultiplier(Math.max(1, multiplier - 1)); setHasManualMultiplier(true); }} className="w-8 h-8 flex justify-center items-center bg-white rounded-[8px] text-gray-500 shadow-sm transition active:scale-95"><Minus className="w-4 h-4" /></button>
                  <span className={`font-black text-[15px] w-6 text-center ${multiplier > 1 ? 'text-red-500' : 'text-gray-700'}`}>x{multiplier}</span>
                  <button onClick={() => { setMultiplier(multiplier + 1); setHasManualMultiplier(true); }} className="w-8 h-8 flex justify-center items-center bg-white rounded-[8px] text-gray-500 shadow-sm transition active:scale-95"><Plus className="w-4 h-4" /></button>
                </div>
              </div>
            )}

            <div className="bg-white rounded-[24px] shadow-sm border border-gray-100 p-2 space-y-1">
              {players.map((player, idx) => (
                <div key={idx} className={`p-3 flex items-center justify-between transition cursor-pointer select-none rounded-[16px] ${currentExcluded[idx] ? 'opacity-50 grayscale bg-gray-50' : 'bg-white'}`} onTouchStart={(e) => startPress(e, idx, false)} onTouchEnd={cancelPress} onTouchMove={cancelPress} onMouseDown={(e) => startPress(e, idx, false)} onMouseUp={cancelPress} onMouseLeave={cancelPress} onContextMenu={(e) => e.preventDefault()}>
                  <div className="flex flex-col flex-1 pointer-events-none">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 bg-gray-100 rounded-full overflow-hidden shrink-0"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${player}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div>
                      <span className={`font-bold text-[15px] truncate ${currentExcluded[idx] ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{player}</span>
                    </div>
                  </div>
                  <div className={`flex items-center space-x-5 bg-white ${currentExcluded[idx] ? 'pointer-events-none opacity-60' : ''}`}>
                    <button onClick={(e) => { e.stopPropagation(); updateScore(idx, -1); }} className="w-10 h-10 flex justify-center items-center bg-white rounded-[12px] text-red-500 border border-gray-100 shadow-sm active:bg-red-50 transition"><Minus className="w-5 h-5 font-bold" /></button>
                    <div className="w-8 flex flex-col items-center justify-center shrink-0 pointer-events-none">
                      <span className={`text-center font-black text-[22px] tracking-tight leading-none ${currentExcluded[idx] ? 'text-gray-400' : currentScores[idx] - currentPar === -1 ? 'text-[#128853]' : currentScores[idx] - currentPar <= -2 ? 'text-purple-600' : 'text-gray-800'}`}>{currentScores[idx]}</span>
                      {!currentExcluded[idx] && currentScores[idx] - currentPar === -1 && <span className="text-[10px] font-black text-[#128853] mt-1 tracking-tighter">Birdie</span>}
                      {!currentExcluded[idx] && currentScores[idx] - currentPar <= -2 && <span className="text-[10px] font-black text-purple-600 mt-1 tracking-tighter">Eagle</span>}
                    </div>
                    <button onClick={(e) => { e.stopPropagation(); updateScore(idx, 1); }} className="w-10 h-10 flex justify-center items-center bg-white rounded-[12px] text-blue-500 border border-gray-100 shadow-sm active:bg-blue-50 transition"><Plus className="w-5 h-5 font-bold" /></button>
                  </div>
                </div>
              ))}
            </div>

            <div className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-200 p-4 pb-8 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
              <div className="max-w-md mx-auto flex gap-3 w-full">
                <button onClick={() => currentHole > 0 && loadHoleData(currentHole - 1)} disabled={currentHole === 0} className={`flex-[1] py-4 rounded-[16px] font-bold flex items-center justify-center transition text-[15px] ${currentHole === 0 ? 'bg-gray-100 text-gray-300' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}><ArrowLeft className="w-5 h-5 mr-1" /> 이전 홀</button>
                <button onClick={saveHole} className="flex-[2] bg-[#1e9f64] hover:bg-[#128853] text-white font-bold py-4 rounded-[16px] shadow-md flex items-center justify-center transition text-[15px]">결과 및 정산 <ArrowRight className="w-5 h-5 ml-2" /></button>
              </div>
            </div>
          </div>

          {showCaddieModal && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-5 shadow-xl">
                <div className="flex justify-between items-center border-b border-gray-100 pb-3">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Edit3 className="w-5 h-5 mr-2 text-[#128853]"/> 스코어 캐디 변경</h3>
                  <button onClick={() => setShowCaddieModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                </div>
                <div className="grid grid-cols-2 gap-3 mt-2">
                  {players.map((p, idx) => (
                    <button key={`change-caddie-${idx}`} disabled={globalExcluded[idx]} onClick={() => { setScoreCaddieIdx(idx); setShowCaddieModal(false); setToastMessage(`${p} 님으로 스코어 캐디가 변경되었습니다.`); setTimeout(() => setToastMessage(''), 3000); }} className={`py-4 px-2 flex flex-col items-center justify-center gap-2 rounded-[16px] transition border ${globalExcluded[idx] ? 'bg-gray-50 border-gray-100 text-gray-300 grayscale opacity-50' : scoreCaddieIdx === idx ? 'bg-[#e5f5ec] border-[#128853] text-[#128853] shadow-sm' : 'bg-white border-gray-200 text-gray-700 hover:bg-gray-50'}`}>
                      <div className="w-10 h-10 bg-gray-100 rounded-full overflow-hidden shrink-0"><img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${p}&backgroundColor=f1f5f9`} alt="avatar" className="w-full h-full object-cover"/></div>
                      <span className="text-[13px] font-bold w-full truncate px-1">{p}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {showRuleModal && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 animate-in fade-in duration-200 backdrop-blur-sm">
              <div className="bg-white rounded-[24px] w-full max-w-sm p-6 space-y-4 shadow-xl">
                <div className="flex justify-between items-center border-b border-gray-100 pb-3">
                  <h3 className="font-bold text-[17px] text-gray-800 flex items-center"><Info className="w-5 h-5 mr-2 text-[#128853]"/> 배판 적용 기준</h3>
                  <button onClick={() => setShowRuleModal(false)} className="p-1 hover:bg-gray-100 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                </div>
                <div className="text-[14px] space-y-3 text-gray-700 py-2">
                  <div className="bg-gray-50 p-3.5 rounded-[16px] flex items-center justify-between border border-gray-100"><span className="font-bold text-gray-600">기준 시점</span><span className="font-bold text-[#128853]">{doubleRules.timing === 'current' ? '당홀 기준' : '전홀 기준'}</span></div>
                  <ul className="space-y-2.5 pl-2 pt-2">
                    {doubleRules.birdie && <li className="flex items-center font-semibold"><Check className="w-4 h-4 text-[#128853] mr-2"/> 버디 이상</li>}
                    {doubleRules.threeTie && <li className="flex items-center font-semibold"><Check className="w-4 h-4 text-[#128853] mr-2"/> 3인 동타</li>}
                    {doubleRules.prevTie && <li className="flex items-center font-semibold"><Check className="w-4 h-4 text-[#128853] mr-2"/> 이전 홀 무승부 (모두 동타)</li>}
                    {doubleRules.triple && <li className="flex items-center font-semibold"><Check className="w-4 h-4 text-[#128853] mr-2"/> 파4/파5 트리플 보기 이상</li>}
                    {doubleRules.doublePar3 && <li className="flex items-center font-semibold"><Check className="w-4 h-4 text-[#128853] mr-2"/> 파3 더블 보기 이상</li>}
                  </ul>
                  {!doubleRules.birdie && !doubleRules.threeTie && !doubleRules.prevTie && !doubleRules.triple && !doubleRules.doublePar3 && (
                    <div className="text-gray-400 text-center py-2 font-medium">설정된 자동 배판 조건이 없습니다.</div>
                  )}
                </div>
                <div className="flex gap-2 mt-4 pt-2">
                  <button onClick={() => { setShowRuleModal(false); setStep('setup'); }} className="flex-[1] bg-gray-100 hover:bg-gray-200 transition text-gray-700 font-bold py-3.5 rounded-[16px] text-[15px]">설정 변경</button>
                  <button onClick={() => setShowRuleModal(false)} className="flex-[2] bg-[#128853] hover:bg-[#0f7646] transition text-white font-bold py-3.5 rounded-[16px] text-[15px] shadow-sm">확인</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
