<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프 게임&</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0fdf4; /* Tailwind green-50 */
            background-image: linear-gradient(to bottom right, #f0fdf4, #dcfce7); /* green-50 to green-100 */
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Custom hover animation for cards */
        .game-card:hover .icon-container {
            transform: scale(1.1) rotate(5deg);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <!-- Header -->
    <header class="mb-12 text-center mt-10">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-green-600 rounded-full shadow-lg mb-4 text-white">
            <i class="fa-solid fa-golf-ball-tee text-4xl"></i>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-green-900 tracking-tight">골프 게임&</h1>
        <p class="mt-4 text-green-700 text-lg">원하는 게임을 선택하여 플레이하세요!</p>
    </header>

    <!-- Game Links Grid -->
    <main class="w-full max-w-5xl">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
            
            <!-- 스트로크 -->
            <a href="https://goingoingon2.github.io/golf/strokeplay.html" target="_blank" rel="noopener noreferrer" 
               class="game-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm hover:shadow-xl border border-green-100 transition-all duration-300 hover:-translate-y-2">
                <div class="icon-container w-20 h-20 mb-6 flex items-center justify-center bg-green-50 rounded-2xl group-hover:bg-green-500 transition-all duration-300">
                    <i class="fa-solid fa-flag text-3xl text-green-600 group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">스트로크</h2>
                <p class="text-sm text-gray-500 text-center">기본 스트로크 플레이</p>
            </a>

            <!-- 뽑기 -->
            <a href="https://goingoingon2.github.io/golf/draw.html" target="_blank" rel="noopener noreferrer" 
               class="game-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm hover:shadow-xl border border-green-100 transition-all duration-300 hover:-translate-y-2">
                <div class="icon-container w-20 h-20 mb-6 flex items-center justify-center bg-blue-50 rounded-2xl group-hover:bg-blue-500 transition-all duration-300">
                    <i class="fa-solid fa-dice text-3xl text-blue-600 group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">뽑기</h2>
                <p class="text-sm text-gray-500 text-center">운이 필요한 뽑기 게임</p>
            </a>

            <!-- 좌탄우탄 -->
            <a href="https://goingoingon2.github.io/golf/left_right.html" target="_blank" rel="noopener noreferrer" 
               class="game-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm hover:shadow-xl border border-green-100 transition-all duration-300 hover:-translate-y-2">
                <div class="icon-container w-20 h-20 mb-6 flex items-center justify-center bg-orange-50 rounded-2xl group-hover:bg-orange-500 transition-all duration-300">
                    <i class="fa-solid fa-arrows-left-right-to-line text-3xl text-orange-600 group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">좌탄우탄</h2>
                <p class="text-sm text-gray-500 text-center">방향성 컨트롤 게임</p>
            </a>

            <!-- 4종 경기 -->
            <a href="https://goingoingon2.github.io/golf/golf_quadrathlon.html" target="_blank" rel="noopener noreferrer" 
               class="game-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm hover:shadow-xl border border-green-100 transition-all duration-300 hover:-translate-y-2">
                <div class="icon-container w-20 h-20 mb-6 flex items-center justify-center bg-purple-50 rounded-2xl group-hover:bg-purple-500 transition-all duration-300">
                    <i class="fa-solid fa-trophy text-3xl text-purple-600 group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">4종 경기</h2>
                <p class="text-sm text-gray-500 text-center">종합 미션 클리어</p>
            </a>

            <!-- 스윙 메트로놈 -->
            <a href="https://goingoingon2.github.io/golf/golf_metronome.html" target="_blank" rel="noopener noreferrer" 
               class="game-card group flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-sm hover:shadow-xl border border-green-100 transition-all duration-300 hover:-translate-y-2">
                <div class="icon-container w-20 h-20 mb-6 flex items-center justify-center bg-rose-50 rounded-2xl group-hover:bg-rose-500 transition-all duration-300">
                    <i class="fa-solid fa-stopwatch text-3xl text-rose-600 group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">스윙 메트로놈</h2>
                <p class="text-sm text-gray-500 text-center">정확한 템포 연습</p>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-16 text-center text-green-700/60 text-sm pb-8">
        &copy; 2024 골프 게임&. All rights reserved.
    </footer>

</body>
</html>
