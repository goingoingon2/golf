    // --- Utils ---

      const s = Number(strokes) || 0;

    const getJokerLabel = (val) => {
      switch(String(val)) {

    const getCardStyle = (role, jokerTeam = null) => {
      if (role === 'RED') return 'bg-[#ef4444] text-white shadow-lg border border-red-400';
      if (role === 'BLUE') return 'bg-[#3b82f6] text-white shadow-lg border border-blue-400';

    const RANDOM_JOKER_POOL = ['이글', '버디', '파', '보기', '더블', '트리플'];

    const SAMPLE_COURSES = [
      {

          'EAST': [4, 4, 5, 3, 4, 4, 5, 3, 4], 'WEST': [5, 4, 3, 4, 4, 5, 3, 4, 4],
          'SOUTH': [4, 3, 5, 4, 4, 4, 3, 5, 4], 'NORTH': [4, 5, 3, 4, 4, 3, 5, 4, 4]
        }
      },
      { 
    name: '스카이72 골프클럽',

    pars: {

  },
  { 
    name: '스카이밸리 CC', 
    courses: ['스카이', '밸리', '레이크', '마운틴'],
    pars: {
      '스카이': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '밸리': [4, 5, 3, 4, 4, 4, 3, 5, 4],
      '레이크': [4, 4, 5, 3, 4, 4, 3, 5, 4],
      '마운틴': [5, 4, 3, 4, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '베어즈베스트 청라', 
    courses: ['오스트랄아시아', '유럽', '미국'],
    pars: {
      '오스트랄아시아': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '유럽': [4, 5, 3, 4, 4, 4, 3, 5, 4],
      '미국': [4, 4, 5, 3, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '백제 컨트리클럽', 
    courses: ['사비', '웅진', '한성'],
    pars: {

  {

    courses: ['OUT', 'IN'],
    pars: {
      'OUT': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      'IN': [4, 5, 3, 4, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '사우스케이프 오너스클럽', 
    courses: ['선라이즈', '선셋'],
    pars: {
      '선라이즈': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '선셋': [4, 5, 3, 4, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '레이크사이드 CC', 
    courses: ['동(EAST)', '남(SOUTH)', '서(WEST)'],
    pars: {
      '동(EAST)': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '남(SOUTH)': [4, 5, 3, 4, 4, 4, 3, 5, 4],
      '서(WEST)': [5, 4, 3, 4, 4, 5, 3, 4, 4]
    }
  },
  { 
    name: '웰링턴 CC', 
    courses: ['와이번', '그리핀', '피닉스'],
    pars: {
      '와이번': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '그리핀': [4, 5, 3, 4, 4, 4, 3, 5, 4],
      '피닉스': [4, 4, 5, 3, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '블루원 상주 CC', 
    courses: ['EAST', 'WEST'],
    pars: {
      'EAST': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      'WEST': [4, 5, 3, 4, 4, 4, 3, 5, 4]
    }
  },
  { 
    name: '서원밸리 CC', 
    courses: ['서원', '밸리', '에코', '포레스트'],
    pars: {
      '서원': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      '밸리': [4, 5, 3, 4, 4, 4, 3, 5, 4],
      '에코': [4, 4, 5, 3, 4, 4, 3, 5, 4],
      '포레스트': [5, 4, 3, 4, 4, 5, 3, 4, 4]
    }
  },
  { 
    name: '해슬리 나인브릿지', 
    courses: ['해슬리', 'PGA'],
    pars: {
      '해슬리': [4, 4, 3, 5, 4, 4, 3, 5, 4],
      'PGA': [4, 5, 3, 4, 4, 4, 3, 5, 4]
    }
  }
    ];

    const getHolePar = (courseName, frontCourse, backCourse, holeNum) => {
      const course = SAMPLE_COURSES.find(c => c.name === courseName);
      const defaultPars = [4, 4, 3, 5, 4, 4, 3, 5, 4];
      if (!course || !course.pars) return defaultPars[(holeNum - 1) % 9]; 
      if (holeNum <= 9) return (course.pars[frontCourse] || defaultPars)[holeNum - 1] || 4;
      return (course.pars[backCourse] || defaultPars)[holeNum - 10] || 4;
    };

    const defaultOecdViolations = { ob: false, hazard: false, bunker: false, threePutt: false, tree: false, road: false };
    const DEFAULT_NAMES = ['타이거 우즈', '로리 맥일로이', '스코티 셰플러', '필 미켈슨'];

    const DEFAULT_SETTINGS = {
      basePoint: 10000, potBirdieReward: 10000, potEagleReward: 30000,
      useNear: true, potNearReward: 10000, useLong: false, potLongReward: 10000, 
      birdieReward: 10000, eagleReward: 30000, rewardSource: 'POT',  
      oecdIncludeIndividual: true, exemptSameTeam: false, initialPot: 0, jokerValue: '1',
      oecdLimit: 60000, oecdPenalty: 10000, oecdMaxPenalty: 30000, oecdIncludeRewards: true,
      oecdReleaseEnabled: true, oecdReleaseThreshold: 0, oecdRule: 'POT', 
      oecdConditions: { ob: true, hazard: true, bunker: true, threePutt: true, triple: true, tree: false, road: false },
      doubleConditions: { birdie: true, tie: true, triple: false, threeTieCurrent: false, threeTiePrev: false },
      zeroOutLastHole: false,
      guestPermissions: { finishShuffle: true, autoPick: true, nextHole: true },
      drawMethod: 'FUN' // 'FUN' | 'SIMPLE'
    };

    function App() {
      const [roomId, setRoomId] = useState(() => {
        const params = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '');
        return params.get('room') || '';
      });

      // 브라우저 URL을 안전하게 업데이트
      const safeUpdateUrl = (rId) => {
        try {
          if (window.location.protocol === 'blob:' || window.location.href.includes('scf.usercontent') || window.location.origin === 'null') return;
          const newUrl = new URL(window.location.href);
          if (newUrl.searchParams.get('room') !== rId) {
             newUrl.searchParams.set('room', rId);
             window.history.replaceState(null, '', newUrl.href);
          }
        } catch(e) {}
      };

      useEffect(() => {
        if (roomId) safeUpdateUrl(roomId);
      }, [roomId]);

      const shareUrl = useMemo(() => {
        let base = window.location.origin + window.location.pathname;
        if (window.location.protocol === 'blob:' || base.includes('scf.usercontent') || base === 'null' || base.includes('about:srcdoc')) {
          base = 'https://goingoingon2.github.io/golf/draw.html';
        }
        return `${base}?room=${roomId}`;
      }, [roomId]);

      const [user, setUser] = useState(null);

      const [gameState, setGameState] = useState('SETUP'); 
      const [currentHole, setCurrentHole] = useState(1);
      const [commonPot, setCommonPot] = useState(0); 
      const [caddyId, setCaddyId] = useState(1); 
      const [history, setHistory] = useState([]);
      const [drawResult, setDrawResult] = useState(null); 
      
      const [players, setPlayers] = useState([
        { id: 1, name: '', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 2, name: '', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 3, name: '', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 4, name: '', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
      ]);

      const [settings, setSettings] = useState(DEFAULT_SETTINGS);

      const [holeData, setHoleData] = useState({
        par: 4, multiplier: 1, isExcluded: false, manualOverride: false, 
        nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: 4, 2: 4, 3: 4, 4: 4 },
        oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } }
      });

      const [matchState, setMatchState] = useState({ assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 });
      const [courseInfo, setCourseInfo] = useState({ name: '표준 파72 (일반 코스)', front: 'OUT', back: 'IN' });

      // --- 방장 및 참석자 식별 States ---
      const [hostUid, setHostUid] = useState(null);
      const [guestSlots, setGuestSlots] = useState({});
      const [joinedPlayers, setJoinedPlayers] = useState([]);

      const isHostView = Boolean(user && hostUid === user.uid);
      const localPlayerId = isHostView ? caddyId : (user ? guestSlots[user.uid] : null);

      // --- UI States ---
      const [isCaddyModalOpen, setIsCaddyModalOpen] = useState(false);
      const [isCourseModalOpen, setIsCourseModalOpen] = useState(false);
      const [courseSearchTerm, setCourseSearchTerm] = useState(''); 
      const [isInviteModalOpen, setIsInviteModalOpen] = useState(false); 
      const [isPermissionModalOpen, setIsPermissionModalOpen] = useState(false); 
      const [copySuccess, setCopySuccess] = useState(false); 
      const [activeMoneyTab, setActiveMoneyTab] = useState(null); 
      const [activeSettingsTab, setActiveSettingsTab] = useState(null); 
      const [isJokerModalOpen, setIsJokerModalOpen] = useState(false);
      const [elapsedSeconds, setElapsedSeconds] = useState(0);
      const [showScoreboard, setShowScoreboard] = useState(false);
      const [courseTab, setCourseTab] = useState('FRONT');
      const [showPotWarning, setShowPotWarning] = useState(false);
      const [warnedHole, setWarnedHole] = useState(0);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

      // --- 뽑기 전용 States ---
      const [isShuffling, setIsShuffling] = useState(false);
      const [shufflePositions, setShufflePositions] = useState(Array(5).fill({ x: 0, y: 0, r: 0 }));
      const lastShuffleRef = useRef(0);
      const [localJokerSpin, setLocalJokerSpin] = useState('...');
      const [pickLog, setPickLog] = useState('카드를 선택하세요!');

      const totalInitPoint = players.reduce((sum, player) => sum + (player.initPoint || 0), 0);

      const [maxParOption, setMaxParOption] = useState(5);
      const pressTimer = useRef(null);
      const isLongPress = useRef(false);

      useEffect(() => {
        if (holeData.par >= 5) setMaxParOption(holeData.par);
        else setMaxParOption(5);
      }, [holeData.par]);

      const getAutoDoubleReason = () => {
        const scoresArray = Object.values(holeData.scores);
        const hasBirdie = scoresArray.some(score => score === holeData.par - 1);
        const hasEagle = scoresArray.some(score => score <= holeData.par - 2);
        const hasTripleOrWorse = scoresArray.some(score => holeData.par === 3 ? score - holeData.par >= 2 : score - holeData.par >= 3);

        const scoreCounts = {};
        scoresArray.forEach(s => scoreCounts[s] = (scoreCounts[s] || 0) + 1);
        const hasThreeTieCurrent = Object.values(scoreCounts).includes(3);

        const prevHoleLog = history.length > 0 ? history[history.length - 1] : null;
        const wasPrevHoleTied = prevHoleLog && prevHoleLog.isTie === true;

        let hasThreeTiePrev = false;
        if (prevHoleLog && prevHoleLog.scores) {
          const prevScoreCounts = {};
          Object.values(prevHoleLog.scores).forEach(s => prevScoreCounts[s] = (prevScoreCounts[s] || 0) + 1);
          hasThreeTiePrev = Object.values(prevScoreCounts).includes(3);
        }

        if (settings.doubleConditions?.birdie && (hasBirdie || hasEagle)) return '버디/이글';
        if (settings.doubleConditions?.tie && wasPrevHoleTied) return '전홀 무승부';
        if (settings.doubleConditions?.threeTiePrev && hasThreeTiePrev) return '전홀 3명동타';
        if (settings.doubleConditions?.threeTieCurrent && hasThreeTieCurrent) return '당홀 3명동타';
        if (settings.doubleConditions?.triple && hasTripleOrWorse) return holeData.par === 3 ? '파3더블' : '트리플';
        return null;
      };

      const autoDoubleReason = getAutoDoubleReason();
      const displayMultiplier = holeData.isExcluded ? 0 : holeData.manualOverride ? holeData.multiplier : Math.max(holeData.multiplier, autoDoubleReason ? 2 : 1);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !roomId) return;
        
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', roomId);
        const unsub = onSnapshot(roomRef, (snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.data();
            if (data.gameState) setGameState(data.gameState);
            if (data.players) setPlayers(data.players);
            if (data.settings) {
               const updatedSettings = { ...DEFAULT_SETTINGS, ...data.settings };
               // 기본 설정 객체 병합 보완
               if (!updatedSettings.guestPermissions) updatedSettings.guestPermissions = { finishShuffle: true, autoPick: true, nextHole: true };
               if (!updatedSettings.drawMethod) updatedSettings.drawMethod = 'FUN';
               setSettings(updatedSettings);
            }
            if (data.holeData) setHoleData(data.holeData);
            if (data.matchState) setMatchState(data.matchState);
            if (data.currentHole) setCurrentHole(data.currentHole);
            if (data.commonPot !== undefined) setCommonPot(data.commonPot);
            if (data.caddyId) setCaddyId(data.caddyId);
            if (data.history) setHistory(data.history);
            if (data.drawResult) setDrawResult(data.drawResult);
            if (data.courseInfo) setCourseInfo(data.courseInfo);
            if (data.hostUid !== undefined) setHostUid(data.hostUid);
            if (data.guestSlots !== undefined) setGuestSlots(data.guestSlots);
            if (data.joinedPlayers !== undefined) setJoinedPlayers(data.joinedPlayers);
          }
        }, (err) => console.error("Firestore Listen Error:", err));
        return () => unsub();
      }, [user, roomId]);

      useEffect(() => {
        let interval = null;
        if (gameState !== 'SETUP' && gameState !== 'WAITING' && gameState !== 'SETTLEMENT') {
          interval = setInterval(() => setElapsedSeconds(prev => prev + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [gameState]);

      useEffect(() => {
        if (gameState === 'PLAYING') {
          // 경고 조건: 배판일 경우 5배, 평소 3배
          const requiredPot = displayMultiplier > 1 ? settings.basePoint * 5 : settings.basePoint * 3; 
          if (commonPot <= requiredPot && warnedHole !== currentHole) {
            setShowPotWarning(true);
            setWarnedHole(currentHole);
          }
        }
      }, [gameState, commonPot, displayMultiplier, settings.basePoint, currentHole, warnedHole]);

      // 뽑기 애니메이션 Sync 로직
      useEffect(() => {
        if (matchState?.shuffleTrigger && matchState.shuffleTrigger > lastShuffleRef.current) {
          lastShuffleRef.current = matchState.shuffleTrigger;
          const direction = matchState.shuffleDirection;
          setIsShuffling(direction);
          let count = 0;
          const interval = setInterval(() => {
            setShufflePositions(Array.from({length:5}).map(() => ({ x: (Math.random()-0.5)*60+(direction==='left'?-80:80), y:(Math.random()-0.5)*60, r:(Math.random()-0.5)*180+(direction==='left'?-90:90) })));
            if (++count > 8) { clearInterval(interval); setShufflePositions(Array(5).fill({x:0,y:0,r:0})); setIsShuffling(false); }
          }, 100);
        }
      }, [matchState?.shuffleTrigger]);

      useEffect(() => {
        if (matchState?.selectedCards) {
          const count = Object.keys(matchState.selectedCards).length;
          if (count === 0) setPickLog('가장 먼저 카드를 선점하세요!');
          else if (count === 4) setPickLog('✅ 모든 선택이 완료되었습니다!');
          else setPickLog(`💬 ${count}/4 명 선택 완료 (남은 카드를 고르세요)`);
        }
      }, [matchState?.selectedCards]);

      useEffect(() => {
        let interval;
        if (gameState === 'RANDOM_JOKER' && matchState?.isSpinningJoker) {
          let spinCount = 0;
          interval = setInterval(() => {
            setLocalJokerSpin(RANDOM_JOKER_POOL[spinCount % RANDOM_JOKER_POOL.length]);
            spinCount++;
          }, 100);
        }
        return () => clearInterval(interval);
      }, [gameState, matchState?.isSpinningJoker]);

      const syncState = async (updates) => {
        if (!user) return;
        
        if (!roomId) {
           if (updates.gameState !== undefined) setGameState(updates.gameState);
           if (updates.players !== undefined) setPlayers(updates.players);
           if (updates.settings !== undefined) setSettings(updates.settings);
           if (updates.holeData !== undefined) setHoleData(updates.holeData);
           if (updates.matchState !== undefined) setMatchState(updates.matchState);
           if (updates.currentHole !== undefined) setCurrentHole(updates.currentHole);
           if (updates.commonPot !== undefined) setCommonPot(updates.commonPot);
           if (updates.caddyId !== undefined) setCaddyId(updates.caddyId);
           if (updates.history !== undefined) setHistory(updates.history);
           if (updates.drawResult !== undefined) setDrawResult(updates.drawResult);
           if (updates.courseInfo !== undefined) setCourseInfo(updates.courseInfo);
           if (updates.hostUid !== undefined) setHostUid(updates.hostUid);
           if (updates.guestSlots !== undefined) setGuestSlots(updates.guestSlots);
           if (updates.joinedPlayers !== undefined) setJoinedPlayers(updates.joinedPlayers);
           return;
        }

        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', roomId);
          await setDoc(roomRef, {
            gameState, players, settings, holeData, matchState, currentHole, commonPot, caddyId, history, drawResult, courseInfo,
            hostUid, guestSlots, joinedPlayers,
            ...updates
          }, { merge: true });
        } catch (err) {
          console.error("Sync Error:", err);
        }
      };

      const createRoom = async () => {
        let currentRoomId = roomId;
        
        if (!currentRoomId) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          currentRoomId = Array.from({length: 6}, () => chars.charAt(Math.floor(Math.random() * chars.length))).join('');
          setRoomId(currentRoomId);
          safeUpdateUrl(currentRoomId);
        }

        const initPlayers = players.map((p, i) => ({ ...p, name: p.name.trim() || DEFAULT_NAMES[i], currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 }));
        const initialPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, 1);
        
        const updates = {
          gameState: 'WAITING',
          players: initPlayers,
          commonPot: totalInitPoint + settings.initialPot, 
          history: [],
          matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 },
          holeData: { ...holeData, par: initialPar, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: {1:initialPar, 2:initialPar, 3:initialPar, 4:initialPar} },
          currentHole: 1,
          hostUid: user.uid,
          guestSlots: { [user.uid]: caddyId },
          joinedPlayers: [caddyId]
        };

        try {
           await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', currentRoomId), {
             gameState: updates.gameState,
             players: updates.players,
             settings, 
             holeData: updates.holeData,
             matchState: updates.matchState,
             currentHole: updates.currentHole,
             commonPot: updates.commonPot,
             caddyId, 
             history: updates.history,
             drawResult, 
             courseInfo,
             hostUid: updates.hostUid,
             guestSlots: updates.guestSlots,
             joinedPlayers: updates.joinedPlayers
           }, { merge: true });
           
           setGameState(updates.gameState);
           setPlayers(updates.players);
           setCommonPot(updates.commonPot);
           setHistory(updates.history);
           setMatchState(updates.matchState);
           setHoleData(updates.holeData);
           setCurrentHole(updates.currentHole);
           setHostUid(updates.hostUid);
           setGuestSlots(updates.guestSlots);
           setJoinedPlayers(updates.joinedPlayers);
        } catch (err) {
           console.error("Room Create Error:", err);
        }
        
        setIsInviteModalOpen(true);
      };

      const toggleJoin = (targetPlayerId) => {
        if (!user) return;
        const slots = { ...guestSlots };
        let newJoined = [...joinedPlayers];
        const currentUid = user.uid || 'local';

        if (isHostView) {
          if (targetPlayerId === caddyId) return; 
          if (newJoined.includes(targetPlayerId)) {
            newJoined = newJoined.filter(id => id !== targetPlayerId);
            Object.keys(slots).forEach(uid => {
              if (slots[uid] === targetPlayerId) slots[uid] = null; 
            });
          } else {
            newJoined.push(targetPlayerId);
          }
          syncState({ joinedPlayers: newJoined, guestSlots: slots });
        } else {
          if (slots[currentUid] === targetPlayerId) {
            newJoined = newJoined.filter(id => id !== targetPlayerId);
            slots[currentUid] = null; 
          } else {
            if (newJoined.includes(targetPlayerId)) return; 
            
            const oldId = slots[currentUid];
            if (oldId) newJoined = newJoined.filter(id => id !== oldId);

            newJoined.push(targetPlayerId);
            slots[currentUid] = targetPlayerId;
          }
          syncState({ joinedPlayers: newJoined, guestSlots: slots });
        }
      };

      const startRound = () => {
        const initialPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, currentHole);
        syncState({ gameState: 'PLAYING', holeData: { ...holeData, par: initialPar, scores: { 1: initialPar, 2: initialPar, 3: initialPar, 4: initialPar } } });
      };

      const handleParChange = (newPar) => {
        const newScores = { 1: newPar, 2: newPar, 3: newPar, 4: newPar };
        syncState({ holeData: { ...holeData, par: newPar, scores: newScores } });
      };

      const startPress = (p) => {
        isLongPress.current = false;
        if (p >= 5) {
          pressTimer.current = setTimeout(() => {
            isLongPress.current = true;
            const nextPar = p >= 7 ? 5 : p + 1;
            setMaxParOption(nextPar);
            handleParChange(nextPar);
          }, 500); 
        }
      };

      const endPress = () => { if (pressTimer.current) clearTimeout(pressTimer.current); };
      const handleParClick = (p) => { if (!isLongPress.current) handleParChange(p); };

      const handleMultiplierChange = (direction) => {
        let currentMult = displayMultiplier;
        let isExcluded = holeData.isExcluded;
        if (direction === 'DOWN') {
          if (isExcluded) return;
          if (currentMult <= 1) isExcluded = true;
          else currentMult -= 1;
        } else if (direction === 'UP') {
          if (isExcluded) { isExcluded = false; currentMult = 1; }
          else currentMult += 1;
        }
        syncState({ holeData: { ...holeData, multiplier: currentMult, isExcluded, manualOverride: true } });
      };

      const handleScoreChange = (id, change) => {
        const newScore = Math.max(1, (holeData.scores[id] || 4) + change);
        const newScores = { ...holeData.scores, [id]: newScore };
        let updates = { scores: newScores };

        if (holeData.nearWinner === id) updates.nearIsReverse = newScore > holeData.par;
        if (holeData.longWinner === id) updates.longIsReverse = newScore > holeData.par;

        syncState({ holeData: { ...holeData, ...updates } });
      };

      const toggleNearWinner = (pId) => {
         if (holeData.nearWinner === pId) {
             syncState({ holeData: { ...holeData, nearWinner: null, nearIsReverse: false } });
         } else {
             const isRev = holeData.scores[pId] > holeData.par;
             syncState({ holeData: { ...holeData, nearWinner: pId, nearIsReverse: isRev } });
         }
      };

      const toggleLongWinner = (pId) => {
         if (holeData.longWinner === pId) {
             syncState({ holeData: { ...holeData, longWinner: null, longIsReverse: false } });
         } else {
             const isRev = holeData.scores[pId] > holeData.par;
             syncState({ holeData: { ...holeData, longWinner: pId, longIsReverse: isRev } });
         }
      };

      const toggleNearReverse = () => {
         if (holeData.nearWinner) {
             syncState({ holeData: { ...holeData, nearIsReverse: !holeData.nearIsReverse } });
         }
      };

      const toggleLongReverse = () => {
         if (holeData.longWinner) {
             syncState({ holeData: { ...holeData, longIsReverse: !holeData.longIsReverse } });
         }
      };

      const toggleOecdViolation = (id, condition) => {
        const v = holeData.oecdViolations[id];
        const newViolations = { ...holeData.oecdViolations, [id]: { ...v, [condition]: !v[condition] } };
        syncState({ holeData: { ...holeData, oecdViolations: newViolations } });
      };

      // --- 통합: 뽑기 매칭 시작 ---
      const startTeamMatching = () => {
        const isJokerUsed = settings.jokerValue !== 'NONE';
        let roles = ['RED', 'RED', 'BLUE', 'BLUE'];
        
        if (isJokerUsed) {
          const removeIdx = Math.floor(Math.random() * 4);
          roles.splice(removeIdx, 1);
          roles.push('JOKER');
        }
        
        roles.sort(() => Math.random() - 0.5);

        let actualJokerValue = 0;
        let finalJokerStroke = '';
        if (isJokerUsed) {
          if (settings.jokerValue !== 'RANDOM') {
            actualJokerValue = parseInt(settings.jokerValue);
            finalJokerStroke = getJokerLabel(settings.jokerValue);
          }
        }

        if (settings.drawMethod === 'SIMPLE') {
          // 단순하게(자동 매칭) 모드일 때는 패 섞기/뽑기 단계를 생략하고 바로 결과/조커확인 창으로 넘어갑니다.
          const assignedTeams = {};
          const newSelectedCards = {};
          players.forEach((p, idx) => {
            assignedTeams[p.id] = roles[idx];
            newSelectedCards[idx] = {
              playerId: p.id,
              playerName: p.name || '알수없음',
              role: roles[idx]
            };
          });

          syncState({ 
            gameState: 'TEAM_MATCHING_RESULT', 
            matchState: { 
              assignedTeams, 
              isJokerRevealed: settings.jokerValue !== 'RANDOM', 
              actualJokerValue,
              actualRoles: roles,
              selectedCards: newSelectedCards,
              finalJokerStroke,
              isSpinningJoker: false,
              shuffleTrigger: 0,
              shuffleDirection: 'left'
            } 
          });
        } else {
          // 재미있게(직접 뽑기) 모드일 때는 패 섞기 화면으로 넘어갑니다.
          syncState({ 
            gameState: 'SHUFFLE', 
            matchState: { 
              assignedTeams: {}, 
              isJokerRevealed: settings.jokerValue !== 'RANDOM', 
              actualJokerValue,
              actualRoles: roles,
              selectedCards: {},
              finalJokerStroke,
              isSpinningJoker: false,
              shuffleTrigger: 0,
              shuffleDirection: 'left'
            } 
          });
        }
      };

      const shuffleDeck = (dir) => syncState({ matchState: { ...matchState, shuffleTrigger: Date.now(), shuffleDirection: dir } });
      const finishShuffle = () => syncState({ gameState: 'DRAW' });

      const selectCard = (cardIndex) => {
        if (matchState.selectedCards[cardIndex] !== undefined || Object.keys(matchState.selectedCards).length >= 4) return;
        
        const pickedIds = Object.values(matchState.selectedCards).map(c => c.playerId);
        let pickerId = localPlayerId || caddyId; 
        
        if (pickedIds.includes(pickerId)) {
          const unpicked = players.map(p=>p.id).filter(id => !pickedIds.includes(id));
          if (unpicked.length > 0) pickerId = unpicked[0];
          else return;
        }
        const picker = players.find(p => p.id === pickerId);
        const pickOrder = Object.keys(matchState.selectedCards).length;
        
        const newSelected = {
          ...matchState.selectedCards,
          [cardIndex]: {
            playerId: pickerId,
            playerName: picker?.name || '알수없음',
            role: matchState.actualRoles[pickOrder]
          }
        };
        syncState({ matchState: { ...matchState, selectedCards: newSelected } });
      };

      const autoPickRemaining = () => {
        const pickedIds = Object.values(matchState.selectedCards).map(c => c.playerId);
        const unpickedIds = players.map(p=>p.id).filter(id => !pickedIds.includes(id));
        
        const pickedCards = Object.keys(matchState.selectedCards).map(Number);
        const unpickedCards = [0, 1, 2, 3, 4].filter(idx => !pickedCards.includes(idx));
        
        const newSelected = { ...matchState.selectedCards };
        let currentPickOrder = Object.keys(matchState.selectedCards).length;
        const shuffledUnpickedCards = [...unpickedCards].sort(() => Math.random() - 0.5);

        unpickedIds.forEach(pId => {
          const cardIndex = shuffledUnpickedCards.pop();
          const picker = players.find(p => p.id === pId);
          newSelected[cardIndex] = {
            playerId: pId,
            playerName: picker?.name || '알수없음',
            role: matchState.actualRoles[currentPickOrder]
          };
          currentPickOrder++;
        });
        syncState({ matchState: { ...matchState, selectedCards: newSelected } });
      };

      const revealTeams = () => {
        const assignedTeams = {};
        Object.values(matchState.selectedCards).forEach(card => {
          assignedTeams[card.playerId] = card.role;
        });
        syncState({ 
          gameState: 'TEAM_MATCHING_RESULT',
          matchState: { ...matchState, assignedTeams }
        });
      };

      const executeRandomJoker = () => {
        syncState({ gameState: 'RANDOM_JOKER', matchState: { ...matchState, isSpinningJoker: true } });
        
        setTimeout(() => {
          const opts = [
            { label: '이글', val: -2 }, { label: '버디', val: -1 }, { label: '파', val: 0 }, 
            { label: '보기', val: 1 }, { label: '더블', val: 2 }, { label: '트리플', val: 3 }
          ];
          const finalObj = opts[Math.floor(Math.random() * opts.length)];
          syncState({ 
            gameState: 'TEAM_MATCHING_RESULT',
            matchState: { 
              ...matchState, 
              isSpinningJoker: false, 
              finalJokerStroke: finalObj.label,
              actualJokerValue: finalObj.val,
              isJokerRevealed: true
            } 
          });
        }, 2000);
      };

      const finalizeHoleDirect = (currentMatchState) => {
        const rawTeams = currentMatchState.assignedTeams || {};
        let redCount = 0, blueCount = 0;
        players.forEach(p => { if (rawTeams[p.id] === 'RED') redCount++; if (rawTeams[p.id] === 'BLUE') blueCount++; });

        const actualTeams = { ...rawTeams };
        let jokerPlayerId = Object.keys(rawTeams).find(id => rawTeams[id] === 'JOKER');
        if (jokerPlayerId) {
          jokerPlayerId = parseInt(jokerPlayerId);
          if (redCount < blueCount) { actualTeams[jokerPlayerId] = 'RED'; redCount++; } 
          else if (blueCount < redCount) { actualTeams[jokerPlayerId] = 'BLUE'; blueCount++; } 
          else { actualTeams[jokerPlayerId] = 'RED'; redCount++; }
        }

        const finalScoresForTeam = { ...holeData.scores };
        if (jokerPlayerId) finalScoresForTeam[jokerPlayerId] = holeData.par + currentMatchState.actualJokerValue;

        let newPlayers = [...players];
        let potChangeThisHole = 0;
        const finalMultiplier = displayMultiplier; 
        let redTotalStrokes = 0, blueTotalStrokes = 0;

        players.forEach(p => {
          let effectiveScore = finalScoresForTeam[p.id];
          if (actualTeams[p.id] === 'RED') redTotalStrokes += effectiveScore;
          if (actualTeams[p.id] === 'BLUE') blueTotalStrokes += effectiveScore;
        });

        const redAvg = redTotalStrokes / redCount;
        const blueAvg = blueTotalStrokes / blueCount;
        const winningTeam = redAvg < blueAvg ? 'RED' : (blueAvg < redAvg ? 'BLUE' : 'TIE');
        const isTie = winningTeam === 'TIE';

        const holeLog = { 
          hole: currentHole, par: holeData.par, multiplier: finalMultiplier, scores: { ...holeData.scores }, 
          oecdViolations: JSON.parse(JSON.stringify(holeData.oecdViolations)), nearWinner: holeData.nearWinner, longWinner: holeData.longWinner,
          nearIsReverse: holeData.nearIsReverse || false, longIsReverse: holeData.longIsReverse || false,
          isTie: isTie, winningTeam: winningTeam,
          teamStats: { RED: { total: redTotalStrokes, avg: redAvg }, BLUE: { total: blueTotalStrokes, avg: blueAvg } },
          transfers: [], specials: [], playersBefore: JSON.parse(JSON.stringify(players)), commonPotBefore: commonPot 
        };

        let totalOecdPenaltyThisHole = 0;
        const oecdPenalties = {};
        players.forEach(p => {
          if (p.isOecd) {
            let penaltyCount = 0;
            const v = holeData.oecdViolations[p.id];
            if (settings.oecdConditions?.ob && v.ob) penaltyCount++;
            if (settings.oecdConditions?.hazard && v.hazard) penaltyCount++;
            if (settings.oecdConditions?.bunker && v.bunker) penaltyCount++;
            if (settings.oecdConditions?.threePutt && v.threePutt) penaltyCount++;
            if (settings.oecdConditions?.tree && v.tree) penaltyCount++;
            if (settings.oecdConditions?.road && v.road) penaltyCount++;
            if (settings.oecdConditions?.triple && (holeData.par === 3 ? (holeData.scores[p.id] - holeData.par >= 2) : (holeData.scores[p.id] - holeData.par >= 3))) penaltyCount++;

            if (penaltyCount > 0) {
              let penalty = penaltyCount * settings.oecdPenalty;
              if (settings.oecdMaxPenalty > 0 && penalty > settings.oecdMaxPenalty) penalty = settings.oecdMaxPenalty;
              oecdPenalties[p.id] = penalty;
              totalOecdPenaltyThisHole += penalty;
            }
          }
        });

        let availablePot = commonPot;
        if (settings.oecdRule === 'POT' || isTie) availablePot += totalOecdPenaltyThisHole;

        let totalIntendedPotPayout = 0;
        if (!isTie && finalMultiplier > 0) {
           const winnerCount = winningTeam === 'RED' ? redCount : blueCount;
           totalIntendedPotPayout += settings.basePoint * finalMultiplier * winnerCount;
        }
        
        players.forEach(p => {
           const score = holeData.scores[p.id];
           if (score === holeData.par - 1 && settings.rewardSource === 'POT') totalIntendedPotPayout += settings.potBirdieReward;
           if (score <= holeData.par - 2 && settings.rewardSource === 'POT') totalIntendedPotPayout += settings.potEagleReward;
        });
        
        if (settings.useNear && holeData.par === 3 && holeData.nearWinner && !holeData.nearIsReverse) {
           totalIntendedPotPayout += settings.potNearReward;
        }
        if (settings.useLong && holeData.par >= 5 && holeData.longWinner && !holeData.longIsReverse) {
           totalIntendedPotPayout += settings.potLongReward;
        }

        const potPayoutRatio = totalIntendedPotPayout > availablePot ? availablePot / totalIntendedPotPayout : 1;

        if (!isTie && finalMultiplier > 0) {
          const rawTransfer = settings.basePoint * finalMultiplier;
          const actualTransfer = Math.floor(rawTransfer * potPayoutRatio);
          newPlayers = newPlayers.map(p => {
            if (actualTeams[p.id] === winningTeam) {
              potChangeThisHole -= actualTransfer; 
              holeLog.transfers.push({ to: p.name, amount: actualTransfer, reason: '게임 승리' });
              return { ...p, currentPoint: p.currentPoint + actualTransfer };
            }
            return p; 
          });
        }

        players.forEach(p => {
          const score = holeData.scores[p.id]; 
          let special = null;
          if (score === holeData.par - 1) special = 'BIRDIE';
          else if (score <= holeData.par - 2) special = 'EAGLE'; 

          if (special) {
            if (settings.rewardSource === 'POT') {
              const rawReward = special === 'BIRDIE' ? settings.potBirdieReward : settings.potEagleReward;
              const actualReward = Math.floor(rawReward * potPayoutRatio);
              newPlayers = newPlayers.map(np => {
                if (np.id === p.id) {
                  holeLog.specials.push({ name: p.name, type: `${special}_RECEIVE`, amount: actualReward });
                  return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
                }
                return np;
              });
              potChangeThisHole -= actualReward; 
            } else {
              const reward = special === 'BIRDIE' ? settings.birdieReward : settings.eagleReward;
              const winnerTeam = actualTeams[p.id];
              const payers = newPlayers.filter(np => np.id !== p.id && (!settings.exemptSameTeam || actualTeams[np.id] !== winnerTeam));
              const payerIds = payers.map(payer => payer.id);
              const totalReward = reward * payerIds.length;

              newPlayers = newPlayers.map(np => {
                if (np.id === p.id) {
                  if (totalReward > 0) holeLog.specials.push({ name: p.name, type: `${special}_RECEIVE`, amount: totalReward });
                  const addedToAccumulated = settings.oecdIncludeIndividual ? 0 : totalReward; 
                  return { ...np, currentPoint: np.currentPoint + totalReward, accumulatedRewards: (np.accumulatedRewards || 0) + addedToAccumulated };
                } else if (payerIds.includes(np.id)) {
                  holeLog.specials.push({ name: np.name, type: `${special}_PAY`, amount: reward });
                  return { ...np, currentPoint: np.currentPoint - reward };
                }
                return np;
              });
            }
          }
        });

        if (settings.useNear && holeData.par === 3 && holeData.nearWinner) {
          const isReverse = holeData.nearIsReverse;
          const actualReward = Math.floor(settings.potNearReward * potPayoutRatio);
          
          newPlayers = newPlayers.map(np => {
            if (np.id === holeData.nearWinner) {
              if (isReverse) {
                holeLog.specials.push({ name: np.name, type: 'REVERSE_NEAR', amount: settings.potNearReward });
                return { ...np, currentPoint: np.currentPoint - settings.potNearReward };
              } else {
                holeLog.specials.push({ name: np.name, type: 'NEAR', amount: actualReward });
                return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
              }
            }
            return np;
          });
          if (isReverse) potChangeThisHole += settings.potNearReward;
          else potChangeThisHole -= actualReward;
        }

        if (settings.useLong && holeData.par >= 5 && holeData.longWinner) {
          const isReverse = holeData.longIsReverse;
          const actualReward = Math.floor(settings.potLongReward * potPayoutRatio);
          
          newPlayers = newPlayers.map(np => {
            if (np.id === holeData.longWinner) {
              if (isReverse) {
                holeLog.specials.push({ name: np.name, type: 'REVERSE_LONG', amount: settings.potLongReward });
                return { ...np, currentPoint: np.currentPoint - settings.potLongReward };
              } else {
                holeLog.specials.push({ name: np.name, type: 'LONG', amount: actualReward });
                return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
              }
            }
            return np;
          });
          if (isReverse) potChangeThisHole += settings.potLongReward;
          else potChangeThisHole -= actualReward;
        }

        if (totalOecdPenaltyThisHole > 0) {
          newPlayers = newPlayers.map(np => {
             if (oecdPenalties[np.id]) {
                holeLog.specials.push({ name: np.name, type: 'OECD_PAY', amount: oecdPenalties[np.id] });
                return { ...np, currentPoint: np.currentPoint - oecdPenalties[np.id] };
             }
             return np;
          });
          if (settings.oecdRule === 'POT') potChangeThisHole += totalOecdPenaltyThisHole;
          else {
            if (!isTie) {
              const splitAmount = Math.floor(totalOecdPenaltyThisHole / (winningTeam === 'RED' ? redCount : blueCount));
              newPlayers = newPlayers.map(np => {
                if (actualTeams[np.id] === winningTeam) return { ...np, currentPoint: np.currentPoint + splitAmount };
                return np;
              });
            } else potChangeThisHole += totalOecdPenaltyThisHole; 
          }
        }

        if (currentHole === 18 && settings.zeroOutLastHole && !isTie) {
          const provisionalPot = commonPot + potChangeThisHole;
          if (provisionalPot > 0) {
            const winnerCount = winningTeam === 'RED' ? redCount : blueCount;
            const sweepAmount = Math.floor(provisionalPot / winnerCount);
            newPlayers = newPlayers.map(p => {
              if (actualTeams[p.id] === winningTeam) return { ...p, currentPoint: p.currentPoint + sweepAmount, accumulatedRewards: (p.accumulatedRewards || 0) + sweepAmount };
              return p;
            });
            potChangeThisHole -= (sweepAmount * winnerCount);
            holeLog.transfers.push({ to: '승리팀', amount: sweepAmount, reason: '막홀 몰아주기' });
          }
        }

        const initialPoints = {};
        players.forEach(p => initialPoints[p.id] = p.currentPoint);
        const profits = {};
        newPlayers.forEach(p => { profits[p.id] = p.currentPoint - initialPoints[p.id]; });
        holeLog.profits = profits;

        newPlayers = newPlayers.map(p => {
          const totalProfit = p.currentPoint; 
          const oecdProfit = settings.oecdIncludeRewards ? totalProfit : totalProfit - (p.accumulatedRewards || 0);
          const strokesThisHole = holeData.scores[p.id] - holeData.par; 
          const newStrokes = p.currentStrokes + strokesThisHole;
          let isOecd = p.isOecd;
          if (!isOecd && oecdProfit >= settings.oecdLimit) isOecd = true; 
          else if (isOecd && settings.oecdReleaseEnabled && oecdProfit <= settings.oecdReleaseThreshold) isOecd = false; 
          return { ...p, currentStrokes: newStrokes, isOecd };
        });

        syncState({
          players: newPlayers, commonPot: commonPot + potChangeThisHole, history: [...history, holeLog],
          drawResult: { raw: currentMatchState.assignedTeams, actual: actualTeams, winningTeam: winningTeam, isTie: isTie, teamStats: holeLog.teamStats },
          matchState: currentMatchState, gameState: 'SCOREBOARD'
        });
      };

      const finalizeHole = () => finalizeHoleDirect(matchState);

      const nextHole = () => {
        if (history.length >= 18) {
          syncState({ gameState: 'SETTLEMENT' });
        } else {
          const nextH = currentHole === 18 ? 1 : currentHole + 1;
          const nextPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, nextH);
          syncState({
            currentHole: nextH,
            holeData: { par: nextPar, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: nextPar, 2: nextPar, 3: nextPar, 4: nextPar }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
            drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
          });
        }
      };

      const restartGame = () => {
        const resetPlayers = players.map((p, i) => ({ ...p, name: p.name === DEFAULT_NAMES[i] ? '' : p.name, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 }));
        syncState({
          gameState: 'SETUP', currentHole: 1, players: resetPlayers, commonPot: 0, history: [], drawResult: null,
          matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 },
          holeData: { par: 4, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: 4, 2: 4, 3: 4, 4: 4 }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
          joinedPlayers: [], guestSlots: {}, hostUid: null
        });
        setActiveMoneyTab(null);
        setActiveSettingsTab(null);
      };

      const handleEditHole = (targetHole) => {
        const logIndex = history.findIndex(h => h.hole === targetHole);
        if (logIndex === -1) { handleGoToUnplayedHole(targetHole); return; }
        const targetLog = history[logIndex];
        syncState({
           players: targetLog.playersBefore, commonPot: targetLog.commonPotBefore, history: history.slice(0, logIndex), currentHole: targetHole,
           holeData: {
              par: targetLog.par, multiplier: targetLog.multiplier || 1, isExcluded: targetLog.multiplier === 0, manualOverride: true,
              nearWinner: targetLog.nearWinner || null, longWinner: targetLog.longWinner || null, 
              nearIsReverse: targetLog.nearIsReverse || false, longIsReverse: targetLog.longIsReverse || false,
              scores: targetLog.scores, 
              oecdViolations: targetLog.oecdViolations ? JSON.parse(JSON.stringify(targetLog.oecdViolations)) : { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } 
           },
           drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
        });
        setShowScoreboard(false);
      };

      const handleEditHoleRequest = (holeNum) => {
        if (holeNum < currentHole) { 
            setConfirmModal({
                isOpen: true, message: `${holeNum}홀을 수정하면 이후 홀의 기록이 모두 초기화됩니다.\n정말 수정하시겠습니까?`,
                onConfirm: () => { setConfirmModal({ isOpen: false }); handleEditHole(holeNum); }
            });
        } else { handleEditHole(holeNum); }
      };

      const handleGoToUnplayedHole = (targetHole) => {
        if (targetHole === currentHole) { syncState({ gameState: 'PLAYING' }); setShowScoreboard(false); } 
        else {
          const nextPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, targetHole);
          syncState({
            currentHole: targetHole,
            holeData: { par: nextPar, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: nextPar, 2: nextPar, 3: nextPar, 4: nextPar }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
            drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
          });
          setShowScoreboard(false);
        }
      };

      const getPlayerTotals = (playerName) => {
        let received = 0, paid = 0, oecdPaid = 0;
        history.forEach(h => {
          h.specials?.forEach(s => {
            if (s.name === playerName) {
              if (s.type.includes('_RECEIVE') || s.type === 'NEAR' || s.type === 'LONG') received += s.amount;
              else if (s.type === 'BIRDIE_PAY' || s.type === 'EAGLE_PAY' || s.type === 'REVERSE_NEAR' || s.type === 'REVERSE_LONG') paid += s.amount;
              else if (s.type === 'OECD_PAY') oecdPaid += s.amount;
            }
          });
        });
        return { received, paid, oecdPaid };
      };

      const formatTime = (totalSeconds) => {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      };

      // === 렌더링 영역 ===

                                 className="w-4 h-4 rounded text-red-500 focus:ring-red-500 disabled:opacity-50 border-gray-300 cursor-pointer" />

                       </label>
                    </div>
                    <div className="flex gap-2">
                       {players.map(p => (
                           <button key={p.id}
                                   onClick={() => toggleLongWinner(p.id)}
                                   className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold border transition-colors truncate px-1 active:scale-95
                                      ${holeData.longWinner === p.id
                                          ? (holeData.longIsReverse ? 'bg-red-500 text-white border-red-600 shadow-md' : 'bg-orange-500 text-white border-orange-600 shadow-md')

                       ))}
                    </div>
                 </div>

              {players.map((p, idx) => {
                 const scoreDiff = holeData.scores[p.id] - holeData.par;
                 return (

                          <div className="font-bold text-gray-800 flex items-center gap-1.5">
                            {p.name}

                          </div>
                          <div className="flex flex-wrap gap-1 mt-1.5">
                            {p.isOecd && <span className="bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold border border-red-200 flex items-center">OECD</span>}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`text-sm font-black w-6 text-center ${scoreDiff > 0 ? 'text-red-500' : scoreDiff < 0 ? 'text-blue-600' : 'text-emerald-600'}`}>{scoreDiff === 0 ? 'E' : scoreDiff > 0 ? `+${scoreDiff}` : `${scoreDiff}`}</span>
                        <button onClick={() => handleScoreChange(p.id, -1)} className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 font-bold hover:bg-gray-200 hover:text-gray-600 active:scale-95 transition-all border border-gray-200">-</button>
                        <span className="text-xl font-black w-5 text-center text-gray-800">{holeData.scores[p.id]}</span>
                        <button onClick={() => handleScoreChange(p.id, 1)} className="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold hover:bg-emerald-700 active:scale-95 shadow-sm transition-all">+</button>
                      </div>
                    </div>
                    {p.isOecd && (
                      <div className="flex gap-1.5 mt-3 bg-red-50/50 p-2 rounded-lg border border-red-100 items-center">
                        <span className="text-[10px] font-black text-red-600 px-1 shrink-0">OECD<br/>내역</span>
                        <div className="flex-1 flex flex-wrap gap-1">
                          {settings.oecdConditions?.ob && <button onClick={() => toggleOecdViolation(p.id, 'ob')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].ob ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>OB</button>}
                          {settings.oecdConditions?.hazard && <button onClick={() => toggleOecdViolation(p.id, 'hazard')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].hazard ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>페널티</button>}
                          {settings.oecdConditions?.bunker && <button onClick={() => toggleOecdViolation(p.id, 'bunker')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].bunker ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>벙커</button>}
                          {settings.oecdConditions?.threePutt && <button onClick={() => toggleOecdViolation(p.id, 'threePutt')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].threePutt ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>3펏</button>}
                          {settings.oecdConditions?.tree && <button onClick={() => toggleOecdViolation(p.id, 'tree')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].tree ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>나무</button>}
                          {settings.oecdConditions?.road && <button onClick={() => toggleOecdViolation(p.id, 'road')} className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].road ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>도로</button>}
                          {settings.oecdConditions?.triple && <div className={`flex-1 min-w-[36px] py-1.5 text-[10px] font-bold rounded-md flex items-center justify-center transition-colors ${(holeData.par === 3 ? holeData.scores[p.id] - holeData.par >= 2 : holeData.scores[p.id] - holeData.par >= 3) ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-300 border border-red-100'}`}>트리플</div>}
                        </div>
                      </div>
                    )}
                  </div>

              })}

              <button onClick={startTeamMatching} className="flex-[2] bg-gray-800 text-white font-bold rounded-xl shadow-lg hover:bg-gray-900 active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-lg">
                <Users className="w-5 h-5" /> {settings.drawMethod === 'SIMPLE' ? '팀 매칭 (자동 배정)' : '팀 매칭 (패 뽑기)'}

            {isJokerModalOpen && (

                        <button onClick={() => setSettings({...settings, drawMethod: 'SIMPLE'})} className={`flex-1 py-2.5 text-xs font-bold rounded-md transition-colors ${settings.drawMethod === 'SIMPLE' ? 'bg-white shadow text-purple-600' : 'text-gray-500'}`}>단순하게 (자동 매칭)</button>

                </div>

                 <button onClick={finishShuffle} className="w-full bg-green-600 py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-green-500 active:scale-95 transition-all">패 섞기 완료</button>
              ) : (
                 <div className="w-full bg-slate-800 text-slate-500 py-4 rounded-2xl font-bold text-center border border-slate-700">방장이 섞기를 마칠 때까지 대기중...</div>
              )}
            </div>
          </div>
        )}

        {/* --- DRAW --- */}
        {gameState === 'DRAW' && (
          <div className="w-full min-h-screen bg-slate-900 text-white flex flex-col p-6 animate-in fade-in">
            <h2 className="text-center text-xl font-bold mb-8">팀 뽑기</h2>
            <div className="flex flex-wrap justify-center gap-4 w-full max-w-[340px] mx-auto relative z-10">
              {(() => {
                const myPick = Object.keys(matchState.selectedCards || {}).find(k => matchState.selectedCards[k].playerId === localPlayerId);
                
                if (myPick) {
                  const data = matchState.selectedCards[myPick];
                  return (
                    <div className={`w-[65%] aspect-[2/3] rounded-3xl shadow-2xl flex flex-col overflow-hidden animate-in zoom-in-90 ${getCardStyle(data.role)}`}>
                      <div className="flex-1 flex items-center justify-center w-full">
                        {data.role === 'JOKER' ? (
                           <div className="w-20 h-20 bg-white rounded-2xl flex items-center justify-center shadow-md">
                             <span className="text-5xl">🃏</span>
                           </div>
                        ) : (
                           <span className="text-[7rem] leading-none font-black drop-shadow-sm text-white">
                             {data.role === 'RED' ? 'R' : (data.role === 'BLUE' ? 'B' : '꽝')}
                           </span>

                      </div>
                      <div className="w-full bg-black/20 py-3 text-center font-bold text-[16px] text-white">내 카드</div>
                    </div>

                  const p = matchState.selectedCards?.[i];
                  return (
                    <div key={i} onClick={() => selectCard(i)} className={`w-[30%] aspect-[2/3] rounded-xl flex flex-col items-center justify-center transition-all shadow-xl relative overflow-hidden ${p ? 'bg-slate-800 border border-slate-700 cursor-not-allowed' : 'bg-slate-700 border-2 border-green-500 cursor-pointer hover:scale-105 active:scale-95'}`} style={!p ? { backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px)' } : {}}>
                      {p ? (
                        <div className="text-center w-full h-full flex flex-col justify-center relative">
                          <CheckCircle2 className="w-8 h-8 mx-auto opacity-30 text-white mb-2" />
                          <div className="text-[12px] w-full bg-black/30 py-1.5 truncate px-1 text-white/70 font-medium absolute bottom-0 left-0">{p.playerName}</div>
                        </div>
                      ) : <span className="text-slate-500 font-bold text-4xl">?</span>}
                    </div>
                  );
                });
              })()}

            <div className="mt-8 w-full max-w-sm mx-auto pb-6">
              <div className="border border-slate-700 bg-slate-800/80 p-5 rounded-2xl text-center backdrop-blur-sm">
                <p className={`font-bold text-sm mb-3 ${!Object.keys(matchState.selectedCards || {}).find(k=>matchState.selectedCards[k].playerId===localPlayerId) ? 'text-green-400 animate-pulse' : 'text-slate-400'}`}>{pickLog}</p>
                <div className="w-full bg-slate-700 h-2.5 rounded-full overflow-hidden"><div className="bg-green-500 h-full transition-all duration-500" style={{ width: `${(Object.keys(matchState.selectedCards || {}).length / 4) * 100}%` }}></div></div>
              </div>
              
              {(isHostView || settings.guestPermissions?.autoPick) && Object.keys(matchState.selectedCards || {}).length < 4 && (
                <button onClick={autoPickRemaining} className="w-full bg-yellow-500 text-yellow-900 py-4 rounded-2xl font-bold text-lg mt-4 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-yellow-400">
                  <Users className="w-5 h-5" /> 남은 동반자 대신 뽑기
                </button>
              )}

              {(isHostView || settings.guestPermissions?.autoPick) && Object.keys(matchState.selectedCards || {}).length >= 4 && (
                <button onClick={revealTeams} className="w-full bg-green-600 text-white py-5 rounded-2xl font-bold text-xl mt-4 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-green-500">
                  <CheckCircle2 className="w-6 h-6" /> 결과 확인 (전체 공개)
                </button>
              )}

              {!(isHostView || settings.guestPermissions?.autoPick) && Object.keys(matchState.selectedCards || {}).length >= 4 && (
                <div className="w-full bg-slate-800 text-slate-400 font-bold py-5 rounded-xl text-center text-lg mt-4 tracking-tight border border-slate-700">결과 확인을 기다립니다...</div>
              )}
            </div>
          </div>
        )}

        {/* --- RANDOM JOKER SPIN --- */}
        {gameState === 'RANDOM_JOKER' && (
          <div className="min-h-screen w-full bg-purple-900 text-white flex flex-col items-center justify-center p-6 animate-in fade-in">
            <h2 className="text-xl font-bold mb-10">조커 타수 추첨 중...</h2>
            <div className="w-full max-w-sm bg-purple-800/50 rounded-3xl p-12 border-4 border-purple-500 shadow-2xl text-center">
              <span className="text-7xl font-black text-yellow-400 drop-shadow-lg">{matchState.isSpinningJoker ? localJokerSpin : matchState.finalJokerStroke}</span>
            </div>
          </div>
        )}

        {/* --- TEAM MATCHING RESULT --- */}
        {gameState === 'TEAM_MATCHING_RESULT' && (() => {
          const results = Object.values(matchState.selectedCards || {});
          const isJokerPending = settings.jokerValue === 'RANDOM' && !matchState.isJokerRevealed;
          const rCount = Object.values(matchState.assignedTeams || {}).filter(r => r === 'RED').length;
          const jokerTeam = rCount === 1 ? 'RED' : 'BLUE';
          
          return (
            <div className="w-full min-h-screen bg-slate-900 text-white flex flex-col p-4 animate-in fade-in">
              <h2 className="text-center text-3xl font-black mb-8 text-yellow-400 mt-6">팀 매칭 결과</h2>
              <div className="grid grid-cols-2 gap-4 mb-6 w-full max-w-[340px] mx-auto">
                {results.map((res, idx) => {
                  const clickable = res.role === 'JOKER' && isJokerPending;
                  return (
                    <div key={idx} onClick={() => clickable && executeRandomJoker()} className={`relative aspect-[2/3] rounded-3xl flex flex-col shadow-xl transition-all overflow-hidden ${getCardStyle(res.role, jokerTeam)} ${clickable ? 'cursor-pointer animate-pulse ring-4 ring-yellow-400 scale-105 active:scale-95' : ''}`}>
                      {clickable && <span className="absolute -top-1 -right-1 bg-yellow-400 text-black text-[12px] font-black px-3 py-1.5 rounded-bl-lg rounded-tr-lg z-10 shadow-lg">Click!</span>}
                      {res.role === 'JOKER' && isJokerPending && !clickable && <span className="absolute top-2 right-2 bg-slate-800/80 text-white text-[10px] font-bold px-2 py-1.5 rounded-md shadow-sm z-10">대기중</span>}
                      
                      <div className="flex-1 flex flex-col items-center justify-center w-full">
                        {res.role === 'JOKER' ? (
                          <div className="text-center flex flex-col items-center justify-center">
                            <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm mb-2.5">
                              <span className="text-4xl">🃏</span>
                            </div>
                            <span className="text-[13px] font-black bg-black/30 px-3.5 py-1.5 rounded-full text-white">{matchState.finalJokerStroke || '확인중'}</span>
                          </div>
                        ) : (
                          <span className="text-[6.5rem] leading-none font-black text-white">{res.role === 'RED' ? 'R' : (res.role === 'BLUE' ? 'B' : '꽝')}</span>
                        )}
                      </div>
                      <div className="w-full bg-black/20 py-3 text-center font-bold text-[14px] truncate px-2 text-white">{res.playerName}</div>
                    </div>
                  );
                })}
              </div>
              <div className="w-full max-w-sm mx-auto bg-slate-800 rounded-2xl p-5 text-center mb-8 shadow-inner border border-slate-700">
                {isJokerPending ? (
                  <p className="text-yellow-400 font-bold animate-pulse">🃏 조커 카드를 클릭해 확인하세요!</p>
                ) : (
                  <p className="text-yellow-400 font-black text-xl">🎉 팀 뽑기 완료! 🎉</p>
                )}
              </div>
              <div className="w-full max-w-sm mx-auto pb-8 mt-auto">
                {(isHostView || settings.guestPermissions?.nextHole) ? (
                  <button onClick={finalizeHole} disabled={isJokerPending} className={`w-full py-5 rounded-2xl font-black text-lg flex items-center justify-center gap-2 transition-all active:scale-95 ${isJokerPending ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-xl'}`}>
                    홀 정산하기 <ChevronRight className="w-6 h-6"/>
                  </button>
                ) : (
                  <div className="w-full bg-slate-800 text-slate-400 font-bold py-5 rounded-xl text-center text-lg tracking-tight border border-slate-700">홀 정산을 기다립니다...</div>
                )}
              </div>
            </div>
          );
        })()}

        {/* --- SCOREBOARD --- */}
        {gameState === 'SCOREBOARD' && (
          <div className="w-full flex flex-col items-center pb-24 animate-in fade-in">
            <div className="w-full max-w-md bg-emerald-600 px-6 pt-8 pb-16 text-white rounded-b-3xl shadow-md relative z-10">
              <div className="flex justify-between items-start mb-4">
                <button onClick={() => setShowScoreboard(true)} className="p-2 -ml-2 text-emerald-100 hover:text-white transition-colors rounded-full active:scale-95"><List className="w-6 h-6" /></button>
                <div className="flex-1 flex flex-col items-center pt-1">
                  <h1 className="text-2xl font-bold text-center mb-2">{currentHole}H 매칭 결과</h1>
                  <div className="bg-emerald-800/40 border border-emerald-500/30 px-3 py-1 rounded-full flex items-center gap-1.5 shadow-sm">
                    <Coins className="w-3.5 h-3.5 text-yellow-400" /><span className="text-emerald-100 text-[10px] font-bold">현재 공용 포트</span><span className="text-yellow-300 font-black text-xs">{formatNum(commonPot)} P</span>
                  </div>
                </div>
                <div className="w-10"></div>

                <label className="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" checked={settings.guestPermissions?.autoPick ?? true} onChange={(e) => setSettings({...settings, guestPermissions: {...settings.guestPermissions, autoPick: e.target.checked}})} className="w-5 h-5 rounded text-green-600 focus:ring-green-500 border-gray-300" />
                  <span className="text-sm text-gray-700 font-bold group-hover:text-green-700 transition-colors">남은 동반자 카드 선택 (결과 확인) 권한</span>
                </label>
                <label className="flex items-center gap-3 cursor-pointer group">
                  <input type="checkbox" checked={settings.guestPermissions?.nextHole ?? true} onChange={(e) => setSettings({...settings, guestPermissions: {...settings.guestPermissions, nextHole: e.target.checked}})} className="w-5 h-5 rounded text-green-600 focus:ring-green-500 border-gray-300" />
                  <span className="text-sm text-gray-700 font-bold group-hover:text-green-700 transition-colors">다음 홀 이동 권한</span>
                </label>
              </div>
              <button onClick={() => setIsPermissionModalOpen(false)} className="w-full bg-green-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-green-700 transition-colors active:scale-95">
                설정 완료
              </button>
            </div>
          </div>
        )}
        
        {/* 확인 커스텀 모달 */}
        {confirmModal.isOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
             <div className="bg-white rounded-[1.5rem] p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95 duration-200">
               <AlertCircle className="w-12 h-12 text-red-500 mx-auto mb-4" />
               <h3 className="text-lg font-black text-gray-800 mb-2">기록 수정</h3>
               <p className="text-[13px] text-gray-600 mb-6 break-keep leading-relaxed whitespace-pre-wrap">{confirmModal.message}</p>
               <div className="flex gap-3">
                 <button onClick={() => setConfirmModal({isOpen: false})} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-200 active:scale-95 transition-all">취소</button>
                 <button onClick={confirmModal.onConfirm} className="flex-1 bg-red-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-red-700 active:scale-95 transition-all">수정하기</button>
               </div>
             </div>
          </div>
        )}

        {/* 공용 포트 부족 안내 모달 */}
        {showPotWarning && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
             <div className="bg-white rounded-[1.5rem] p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95 duration-200">
               <AlertCircle className="w-12 h-12 text-orange-500 mx-auto mb-4" />
               <h3 className="text-lg font-black text-gray-800 mb-2">공용 포인트 부족</h3>
               <p className="text-[13px] text-gray-600 mb-6 break-keep leading-relaxed bg-orange-50 p-4 rounded-xl border border-orange-100">
                 공용 포인트가 승리 포인트와 비슷하거나 적어 승리 포인트와 축하금을 온전히 가져가지 못할 수 있습니다.<br/><br/>게임을 원활하게 계속하시려면 설정창에서 초기 납입 포인트를 올리세요. 포인트를 올리지 않으면 남은 포인트 한도 내에서 비율로 삭감되어 지급됩니다.
               </p>
               <button onClick={() => setShowPotWarning(false)} className="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-emerald-700 active:scale-[0.98] transition-all">확인</button>
             </div>
          </div>
        )}

        {/* Course Search Modal */}
        {isCourseModalOpen && (
           <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-[110] p-4 pt-[15vh]">
            <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl flex flex-col max-h-[75vh]">
              <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 shrink-0"><Search className="w-5 h-5 text-emerald-600" /> 골프장 검색</h3>
              <div className="mb-4 shrink-0 flex gap-2">
                <input type="text" placeholder="이름 검색 또는 직접 입력" value={courseSearchTerm} onChange={(e) => setCourseSearchTerm(e.target.value)} className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-[16px] focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"/>
                <button onClick={() => { if(courseSearchTerm.trim()) { const newCourseInfo = { name: courseSearchTerm.trim(), front: '전반', back: '후반' }; setCourseInfo(newCourseInfo); const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole); syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } }); setIsCourseModalOpen(false); setCourseSearchTerm(''); } }} className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-emerald-700 whitespace-nowrap active:scale-95 transition-all">직접입력</button>
              </div>
              <div className="space-y-2 overflow-y-auto flex-1 custom-scroll pr-1">
                {SAMPLE_COURSES.filter(course => course.name.includes(courseSearchTerm)).length > 0 ? (
                  SAMPLE_COURSES.filter(course => course.name.includes(courseSearchTerm)).map(course => (
                    <button key={course.name} onClick={() => { const newCourseInfo = { name: course.name, front: course.courses[0], back: course.courses[1] || course.courses[0] }; setCourseInfo(newCourseInfo); const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole); syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } }); setIsCourseModalOpen(false); setCourseSearchTerm(''); }} className="w-full text-left px-4 py-3 rounded-xl border border-gray-200 hover:bg-emerald-50 hover:border-emerald-500 active:scale-[0.98] transition-all">
                      <div className="font-bold text-gray-800">{course.name}</div><div className="text-xs text-gray-500 mt-1">코스: {course.courses.join(', ')}</div>
                    </button>
                  ))
                ) : (<div className="text-center text-gray-500 py-8 text-sm">검색 결과가 없습니다.</div>)}
              </div>
              <button onClick={() => { setIsCourseModalOpen(false); setCourseSearchTerm(''); }} className="w-full mt-4 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 active:scale-[0.98] transition-all shrink-0">닫기</button>
            </div>
          </div>
        )}

        {/* Caddy Modal */}
        {isCaddyModalOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4">
            <div className="bg-white rounded-[1.5rem] w-full max-w-sm p-6 shadow-2xl relative animate-in zoom-in-95 duration-200">
              <div className="flex justify-between items-center mb-2 border-b border-gray-100 pb-4">
                <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2"><Edit2 className="w-5 h-5 text-emerald-600" /> 스코어 캐디 변경</h3>
                <button onClick={() => setIsCaddyModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1"><X className="w-5 h-5" /></button>
              </div>
              <p className="text-[13px] text-gray-500 mb-5 mt-4 text-center">현재 라운드의 스코어를 입력할 담당자를 선택해 주세요.</p>
              <div className="grid grid-cols-2 gap-3">
                {players.map(p => (
                  <button key={p.id} onClick={() => { setCaddyId(p.id); syncState({ caddyId: p.id }); setIsCaddyModalOpen(false); }} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all active:scale-95 ${caddyId === p.id ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'border-gray-100 hover:border-gray-200 bg-white text-gray-800'}`}>
                    <div className="w-12 h-12 bg-gray-100 rounded-full mb-3 flex items-center justify-center overflow-hidden border border-gray-200"><User className={`w-6 h-6 ${caddyId === p.id ? 'text-emerald-500' : 'text-gray-400'}`} /></div>
                    <span className="font-bold text-[13px]">{p.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Invite Modal */}
        {isInviteModalOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4" onClick={() => setIsInviteModalOpen(false)}>
            <div className="bg-white rounded-[1.5rem] w-full max-w-sm p-6 shadow-2xl relative animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2"><QrCode className="w-5 h-5 text-emerald-600" /> 방 초대하기</h3>
                <button onClick={() => setIsInviteModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1"><X className="w-5 h-5" /></button>
              </div>
              <p className="text-center text-[13px] text-gray-500 mb-6 leading-relaxed">라운드 동반자의 스마트폰 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.</p>
              <div className="bg-gray-50 rounded-2xl p-6 flex justify-center mb-6 border border-gray-100 relative">
                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(shareUrl)}`} alt="Invite QR Code" className="w-44 h-44 mix-blend-multiply" />
              </div>
              <div className="mb-6">
                <label className="block text-[11px] font-bold text-gray-400 mb-1.5 pl-1">초대 URL</label>
                <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 font-medium truncate">{shareUrl}</div>
              </div>
              <div className="flex gap-3 mb-6">
                <button onClick={() => { const textArea = document.createElement("textarea"); textArea.value = shareUrl; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); setCopySuccess(true); setTimeout(() => { setCopySuccess(false); setIsInviteModalOpen(false); }, 800); }} className={`flex-1 py-3.5 rounded-xl border font-bold active:scale-[0.98] transition-all flex items-center justify-center gap-2 ${copySuccess ? 'border-emerald-600 bg-emerald-50 text-emerald-600' : 'border-emerald-600 text-emerald-600 hover:bg-emerald-50'}`}>{copySuccess ? '복사 완료!' : 'URL 복사'}</button>
                <button onClick={() => { if (navigator.share) { navigator.share({ title: '골프 게임 초대', text: '라운드 스코어 기록에 참여하세요!', url: shareUrl }).then(() => { setIsInviteModalOpen(false); }).catch(console.error); } else { window.open(shareUrl, '_blank'); } }} className="flex-1 py-3.5 rounded-xl bg-emerald-600 text-white font-bold shadow-md hover:bg-emerald-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">공유하기</button>
              </div>
            </div>
          </div>
        )}
        </div>
      );
    }

    const AppLoader = () => {
      const [ready, setReady] = useState(false);
      
      useEffect(() => {
        const handleReady = () => {
          if (window.GolfDB && window.GolfDB.ready) {
            setReady(true);
          } else if (window.GolfDB) {
             window.GolfDB.init(() => {
               setReady(true);
             });
          }
        };

        if (window.GolfDB && window.GolfDB.ready) {
           handleReady();
        } else {
           window.addEventListener('golf-db-ready', handleReady);
           const timer = setTimeout(() => setReady(true), 2000); // 2초 후 무조건 렌더링 시작
           return () => {
             window.removeEventListener('golf-db-ready', handleReady);
             clearTimeout(timer);
           };
        }
      }, []);

      if (!ready) {
        return (
          <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center gap-4">
            <div className="w-8 h-8 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
            <div className="text-emerald-600 font-bold text-sm">게임 준비중...</div>
          </div>
        );
      }
      return <App />;
    };

    const rootEl = document.getElementById('root');
    const root = createRoot(rootEl);
    root.render(<AppLoader />);
  </script>
</body>
</html>
