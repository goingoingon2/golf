<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>골프 뽑기 게임</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Fonts & Scrollbar Styles -->
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; 
      -webkit-user-select: none;
      user-select: none;
      background-color: #f9fafb;
      -webkit-tap-highlight-color: transparent;
    }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
  </style>

  <!-- Import Map for ES Modules -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.294.0?external=react",
      "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- React Application Logic -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';
    import { Settings, Users, User, Play, Coins, ChevronRight, RotateCcw, AlertCircle, CheckCircle2, Trophy, Edit2, Zap, Map, Search, QrCode, X, Clock, ChevronDown, ChevronUp, List, ArrowLeft, Download, Share2, Eye } from 'lucide-react';

    // ==========================================
    // 🚨 파이어베이스 설정 (본인 프로젝트 설정으로 변경하세요)
    // ==========================================
    let firebaseConfig;
    
    // 현재 미리보기(캔버스) 환경인 경우 내장된 설정을 사용하고, GitHub Pages 등 외부 환경인 경우 아래 직접 입력한 키를 사용합니다.
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyALzYLoBWl-oHCyLzEr7YefqqySx8ESEjA",
        authDomain: "left-right-6da31.firebaseapp.com",
        projectId: "left-right-6da31",
        storageBucket: "left-right-6da31.firebasestorage.app",
        messagingSenderId: "128347797181",
        appId: "1:128347797181:web:3e1cdfe3e8d2efcde3a9d4"
      };
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // 게임 데이터를 저장할 고유 앱 ID 
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'golf-live-session-v1';

    // --- Utils ---
    const formatNum = (num) => (Number(num) || 0).toLocaleString();
    const parseNum = (str) => Number(String(str).replace(/[^0-9]/g, ''));
    const formatStrokes = (strokes) => {
      const s = Number(strokes) || 0;
      if (s === 0) return 'E';
      return s > 0 ? `+${s}` : `${s}`;
    };

    const getJokerLabel = (val) => {
      switch(String(val)) {
        case 'NONE': return '사용안함';
        case 'RANDOM': return '랜덤';
        case '-2': return '이글';
        case '-1': return '버디';
        case '0': return '파';
        case '1': return '보기';
        case '2': return '더블';
        case '3': return '트리플';
        default: return '파';
      }
    };

    const SAMPLE_COURSES = [
      { 
        name: '표준 파72 (일반 코스)', 
        courses: ['OUT', 'IN', 'EAST', 'WEST', 'SOUTH', 'NORTH'],
        pars: {
          'OUT': [4, 4, 3, 5, 4, 4, 3, 5, 4], 'IN': [4, 5, 3, 4, 4, 4, 3, 5, 4],
          'EAST': [4, 4, 5, 3, 4, 4, 5, 3, 4], 'WEST': [5, 4, 3, 4, 4, 5, 3, 4, 4],
          'SOUTH': [4, 3, 5, 4, 4, 4, 3, 5, 4], 'NORTH': [4, 5, 3, 4, 4, 3, 5, 4, 4]
        }
      },
      { 
        name: '스카이72 골프클럽', 
        courses: ['하늘', '바다', '클래식', '레이크'],
        pars: {
          '하늘': [4, 4, 3, 5, 4, 4, 3, 5, 4], '바다': [4, 5, 3, 4, 4, 4, 3, 5, 4],
          '클래식': [4, 4, 5, 3, 4, 4, 3, 5, 4], '레이크': [5, 4, 3, 4, 4, 4, 3, 5, 4]
        }
      },
      { 
        name: '스카이밸리 CC', 
        courses: ['스카이', '밸리', '레이크', '마운틴'],
        pars: {
          '스카이': [4, 4, 3, 5, 4, 4, 3, 5, 4], '밸리': [4, 5, 3, 4, 4, 4, 3, 5, 4],
          '레이크': [4, 4, 5, 3, 4, 4, 3, 5, 4], '마운틴': [5, 4, 3, 4, 4, 4, 3, 5, 4]
        }
      },
      { 
        name: '베어즈베스트 청라', 
        courses: ['오스트랄아시아', '유럽', '미국'],
        pars: {
          '오스트랄아시아': [4, 4, 3, 5, 4, 4, 3, 5, 4], '유럽': [4, 5, 3, 4, 4, 4, 3, 5, 4], '미국': [4, 4, 5, 3, 4, 4, 3, 5, 4]
        }
      },
      { 
        name: '백제 컨트리클럽', 
        courses: ['사비', '웅진', '한성'],
        pars: {
          '사비': [4, 4, 3, 5, 4, 4, 3, 5, 4], '웅진': [4, 5, 3, 4, 4, 4, 3, 5, 4], '한성': [4, 4, 5, 3, 4, 4, 3, 5, 4]
        }
      }
    ];

    const getHolePar = (courseName, frontCourse, backCourse, holeNum) => {
      const course = SAMPLE_COURSES.find(c => c.name === courseName);
      const defaultPars = [4, 4, 3, 5, 4, 4, 3, 5, 4];
      if (!course || !course.pars) return defaultPars[(holeNum - 1) % 9]; 
      if (holeNum <= 9) return (course.pars[frontCourse] || defaultPars)[holeNum - 1] || 4;
      return (course.pars[backCourse] || defaultPars)[holeNum - 10] || 4;
    };

    const defaultOecdViolations = { ob: false, hazard: false, bunker: false, threePutt: false, tree: false, road: false };

    function App() {
      // URL에서 방 코드(roomId) 파싱하기
      const [roomId, setRoomId] = useState(() => {
        const params = new URLSearchParams(typeof window !== 'undefined' ? window.location.search : '');
        return params.get('room') || '';
      });

      // --- Identity State ---
      const [user, setUser] = useState(null);
      const [myPlayerId, setMyPlayerId] = useState(null); 

      // --- Remote Game State ---
      const [gameState, setGameState] = useState('SETUP'); 
      const [currentHole, setCurrentHole] = useState(1);
      const [commonPot, setCommonPot] = useState(0); 
      const [caddyId, setCaddyId] = useState(1); 
      const [history, setHistory] = useState([]);
      const [drawResult, setDrawResult] = useState(null); 
      
      const [players, setPlayers] = useState([
        { id: 1, name: '타이어 우즈', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 2, name: '로리 맥일로이', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 3, name: '스코티 셔플러', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
        { id: 4, name: '필 미친손', initPoint: 100000, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 },
      ]);

      const [settings, setSettings] = useState({
        basePoint: 10000, potBirdieReward: 10000, potEagleReward: 30000,
        useNear: true, potNearReward: 10000, useLong: false, potLongReward: 10000, 
        birdieReward: 10000, eagleReward: 30000, rewardSource: 'POT',  
        oecdIncludeIndividual: true, exemptSameTeam: false, initialPot: 0, jokerValue: '1',
        oecdLimit: 60000, oecdPenalty: 10000, oecdMaxPenalty: 30000, oecdIncludeRewards: true,
        oecdReleaseEnabled: true, oecdReleaseThreshold: 0, oecdRule: 'POT', 
        oecdConditions: { ob: true, hazard: true, bunker: true, threePutt: true, triple: true, tree: false, road: false },
        doubleConditions: { birdie: true, tie: true, triple: false, threeTieCurrent: false, threeTiePrev: false },
        zeroOutLastHole: false
      });

      const [holeData, setHoleData] = useState({
        par: 4, multiplier: 1, isExcluded: false, manualOverride: false, 
        nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: 4, 2: 4, 3: 4, 4: 4 },
        oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } }
      });

      const [matchState, setMatchState] = useState({ assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 });
      const [courseInfo, setCourseInfo] = useState({ name: '표준 파72 (일반 코스)', front: 'OUT', back: 'IN' });

      // --- UI States ---
      const [isCaddyModalOpen, setIsCaddyModalOpen] = useState(false);
      const [isCourseModalOpen, setIsCourseModalOpen] = useState(false);
      const [courseSearchTerm, setCourseSearchTerm] = useState(''); 
      const [isInviteModalOpen, setIsInviteModalOpen] = useState(false); 
      const [copySuccess, setCopySuccess] = useState(false); 
      const [activeMoneyTab, setActiveMoneyTab] = useState(null); 
      const [activeSettingsTab, setActiveSettingsTab] = useState(null); 
      const [isJokerModalOpen, setIsJokerModalOpen] = useState(false);
      const [elapsedSeconds, setElapsedSeconds] = useState(0);
      const [showScoreboard, setShowScoreboard] = useState(false);
      const [courseTab, setCourseTab] = useState('FRONT');
      const [joinedPlayers, setJoinedPlayers] = useState([]);
      const [showPotWarning, setShowPotWarning] = useState(false);
      const [warnedHole, setWarnedHole] = useState(0);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null });

      const totalInitPoint = players.reduce((sum, player) => sum + (player.initPoint || 0), 0);

      const [maxParOption, setMaxParOption] = useState(5);
      const pressTimer = useRef(null);
      const isLongPress = useRef(false);

      // 이름 입력 포커스 및 첫 타이핑 감지용 참조 변수 & 기본 이름 목록
      const firstEditRef = useRef({ index: -1, isFirst: false });
      const DEFAULT_NAMES = ['타이어 우즈', '로리 맥일로이', '스코티 셔플러', '필 미친손'];

      const getAutoDoubleReason = () => {
        const scoresArray = Object.values(holeData.scores);
        const hasBirdie = scoresArray.some(score => score === holeData.par - 1);
        const hasEagle = scoresArray.some(score => score <= holeData.par - 2);
        const hasTripleOrWorse = scoresArray.some(score => holeData.par === 3 ? score - holeData.par >= 2 : score - holeData.par >= 3);

        const scoreCounts = {};
        scoresArray.forEach(s => scoreCounts[s] = (scoreCounts[s] || 0) + 1);
        const hasThreeTieCurrent = Object.values(scoreCounts).includes(3);

        const prevHoleLog = history.length > 0 ? history[history.length - 1] : null;
        const wasPrevHoleTied = prevHoleLog && prevHoleLog.isTie === true;

        let hasThreeTiePrev = false;
        if (prevHoleLog && prevHoleLog.scores) {
          const prevScoreCounts = {};
          Object.values(prevHoleLog.scores).forEach(s => prevScoreCounts[s] = (prevScoreCounts[s] || 0) + 1);
          hasThreeTiePrev = Object.values(prevScoreCounts).includes(3);
        }

        if (settings.doubleConditions.birdie && (hasBirdie || hasEagle)) return '버디/이글';
        if (settings.doubleConditions.tie && wasPrevHoleTied) return '전홀 무승부';
        if (settings.doubleConditions.threeTiePrev && hasThreeTiePrev) return '전홀 3명동타';
        if (settings.doubleConditions.threeTieCurrent && hasThreeTieCurrent) return '당홀 3명동타';
        if (settings.doubleConditions.triple && hasTripleOrWorse) return holeData.par === 3 ? '파3더블' : '트리플';
        return null;
      };

      const autoDoubleReason = getAutoDoubleReason();
      const displayMultiplier = holeData.isExcluded ? 0 : holeData.manualOverride ? holeData.multiplier : Math.max(holeData.multiplier, autoDoubleReason ? 2 : 1);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !roomId) return;
        
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', roomId);
        const unsub = onSnapshot(roomRef, (snapshot) => {
          if (snapshot.exists()) {
            const data = snapshot.data();
            if (data.gameState) setGameState(data.gameState);
            if (data.players) setPlayers(data.players);
            if (data.settings) setSettings(data.settings);
            if (data.holeData) setHoleData(data.holeData);
            if (data.matchState) setMatchState(data.matchState);
            if (data.currentHole) setCurrentHole(data.currentHole);
            if (data.commonPot !== undefined) setCommonPot(data.commonPot);
            if (data.caddyId) setCaddyId(data.caddyId);
            if (data.history) setHistory(data.history);
            if (data.drawResult) setDrawResult(data.drawResult);
            if (data.courseInfo) setCourseInfo(data.courseInfo);
            if (data.joinedPlayers) setJoinedPlayers(data.joinedPlayers);
          }
        }, (err) => console.error("Firestore Listen Error:", err));
        return () => unsub();
      }, [user, roomId]);

      useEffect(() => {
        let interval = null;
        if (gameState !== 'SETUP' && gameState !== 'WAITING' && gameState !== 'SETTLEMENT') {
          interval = setInterval(() => setElapsedSeconds(prev => prev + 1), 1000);
        }
        return () => clearInterval(interval);
      }, [gameState]);

      useEffect(() => {
        if (gameState === 'PLAYING') {
          const requiredPot = displayMultiplier > 1 ? settings.basePoint * 5 : settings.basePoint * 3; 
          if (commonPot <= requiredPot && warnedHole !== currentHole) {
            setShowPotWarning(true);
            setWarnedHole(currentHole);
          }
        }
      }, [gameState, commonPot, displayMultiplier, settings.basePoint, currentHole, warnedHole]);

      const syncState = async (updates) => {
        if (!user) return;
        
        if (!roomId) {
           if (updates.gameState !== undefined) setGameState(updates.gameState);
           if (updates.players !== undefined) setPlayers(updates.players);
           if (updates.settings !== undefined) setSettings(updates.settings);
           if (updates.holeData !== undefined) setHoleData(updates.holeData);
           if (updates.matchState !== undefined) setMatchState(updates.matchState);
           if (updates.currentHole !== undefined) setCurrentHole(updates.currentHole);
           if (updates.commonPot !== undefined) setCommonPot(updates.commonPot);
           if (updates.caddyId !== undefined) setCaddyId(updates.caddyId);
           if (updates.history !== undefined) setHistory(updates.history);
           if (updates.drawResult !== undefined) setDrawResult(updates.drawResult);
           if (updates.courseInfo !== undefined) setCourseInfo(updates.courseInfo);
           if (updates.joinedPlayers !== undefined) setJoinedPlayers(updates.joinedPlayers);
           return;
        }

        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', roomId);
          await setDoc(roomRef, {
            gameState, players, settings, holeData, matchState, currentHole, commonPot, caddyId, history, drawResult, courseInfo, joinedPlayers,
            ...updates
          }, { merge: true });
        } catch (err) {
          console.error("Sync Error:", err);
        }
      };

      const createRoom = async () => {
        let currentRoomId = roomId;
        
        // 방 코드가 없으면 6자리 랜덤 코드 생성 및 주소표시줄 업데이트
        if (!currentRoomId) {
          const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
          currentRoomId = Array.from({length: 6}, () => chars.charAt(Math.floor(Math.random() * chars.length))).join('');
          setRoomId(currentRoomId);
          
          try {
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('room', currentRoomId);
            window.history.pushState({ path: newUrl.href }, '', newUrl.href);
          } catch (e) {
            // 브라우저의 보안 정책으로 인해 blob URL에서 pushState가 실패할 수 있습니다. 
            // 실제 호스팅 환경에서는 정상 작동합니다.
            console.warn("History API 변경 불가 (미리보기 환경 등에서 발생):", e);
          }
        }

        const initPlayers = players.map(p => ({ ...p, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 }));
        const initialPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, 1);
        
        const updates = {
          gameState: 'WAITING',
          players: initPlayers,
          commonPot: totalInitPoint + settings.initialPot, 
          history: [],
          matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 },
          holeData: { ...holeData, par: initialPar, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: {1:initialPar, 2:initialPar, 3:initialPar, 4:initialPar} },
          currentHole: 1,
          joinedPlayers: [caddyId]
        };

        try {
           await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'sessions', currentRoomId), {
             gameState: updates.gameState,
             players: updates.players,
             settings, 
             holeData: updates.holeData,
             matchState: updates.matchState,
             currentHole: updates.currentHole,
             commonPot: updates.commonPot,
             caddyId, 
             history: updates.history,
             drawResult, 
             courseInfo,
             joinedPlayers: updates.joinedPlayers
           }, { merge: true });
           
           setGameState(updates.gameState);
           setPlayers(updates.players);
           setCommonPot(updates.commonPot);
           setHistory(updates.history);
           setMatchState(updates.matchState);
           setHoleData(updates.holeData);
           setCurrentHole(updates.currentHole);
           setJoinedPlayers(updates.joinedPlayers);
        } catch (err) {
           console.error("Room Create Error:", err);
        }
        
        setIsInviteModalOpen(true);
      };

      const startRound = () => {
        const initialPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, currentHole);
        syncState({ gameState: 'PLAYING', holeData: { ...holeData, par: initialPar, scores: { 1: initialPar, 2: initialPar, 3: initialPar, 4: initialPar } } });
      };

      const handleParChange = (newPar) => {
        const newScores = { 1: newPar, 2: newPar, 3: newPar, 4: newPar };
        syncState({ holeData: { ...holeData, par: newPar, scores: newScores } });
      };

      const startPress = (p) => {
        isLongPress.current = false;
        if (p >= 5) {
          pressTimer.current = setTimeout(() => {
            isLongPress.current = true;
            const nextPar = p >= 7 ? 5 : p + 1;
            setMaxParOption(nextPar);
            handleParChange(nextPar);
          }, 500); 
        }
      };

      const endPress = () => { if (pressTimer.current) clearTimeout(pressTimer.current); };
      const handleParClick = (p) => { if (!isLongPress.current) handleParChange(p); };

      const handleMultiplierChange = (direction) => {
        let currentMult = displayMultiplier;
        let isExcluded = holeData.isExcluded;
        if (direction === 'DOWN') {
          if (isExcluded) return;
          if (currentMult <= 1) isExcluded = true;
          else currentMult -= 1;
        } else if (direction === 'UP') {
          if (isExcluded) { isExcluded = false; currentMult = 1; }
          else currentMult += 1;
        }
        syncState({ holeData: { ...holeData, multiplier: currentMult, isExcluded, manualOverride: true } });
      };

      const handleScoreChange = (id, change) => {
        const newScore = Math.max(1, (holeData.scores[id] || 4) + change);
        const newScores = { ...holeData.scores, [id]: newScore };
        let updates = { scores: newScores };

        if (holeData.nearWinner === id) updates.nearIsReverse = newScore > holeData.par;
        if (holeData.longWinner === id) updates.longIsReverse = newScore > holeData.par;

        syncState({ holeData: { ...holeData, ...updates } });
      };

      const toggleNearWinner = (pId) => {
         if (holeData.nearWinner === pId) {
             syncState({ holeData: { ...holeData, nearWinner: null, nearIsReverse: false } });
         } else {
             const isRev = holeData.scores[pId] > holeData.par;
             syncState({ holeData: { ...holeData, nearWinner: pId, nearIsReverse: isRev } });
         }
      };

      const toggleLongWinner = (pId) => {
         if (holeData.longWinner === pId) {
             syncState({ holeData: { ...holeData, longWinner: null, longIsReverse: false } });
         } else {
             const isRev = holeData.scores[pId] > holeData.par;
             syncState({ holeData: { ...holeData, longWinner: pId, longIsReverse: isRev } });
         }
      };

      const toggleNearReverse = () => {
         if (holeData.nearWinner) {
             syncState({ holeData: { ...holeData, nearIsReverse: !holeData.nearIsReverse } });
         }
      };

      const toggleLongReverse = () => {
         if (holeData.longWinner) {
             syncState({ holeData: { ...holeData, longIsReverse: !holeData.longIsReverse } });
         }
      };

      const toggleOecdViolation = (id, condition) => {
        const v = holeData.oecdViolations[id];
        const newViolations = { ...holeData.oecdViolations, [id]: { ...v, [condition]: !v[condition] } };
        syncState({ holeData: { ...holeData, oecdViolations: newViolations } });
      };

      const startTeamMatching = () => {
        const isJokerUsed = settings.jokerValue !== 'NONE';
        let colors = ['RED', 'RED', 'BLUE', 'BLUE'];
        
        if (isJokerUsed) {
          const removeIdx = Math.floor(Math.random() * 4);
          colors.splice(removeIdx, 1);
          colors.push('JOKER');
        }
        colors.sort(() => Math.random() - 0.5);
        
        const assignedTeams = {};
        players.forEach((p, i) => assignedTeams[p.id] = colors[i]);

        let actualJoker = 0;
        if (isJokerUsed) {
          if (settings.jokerValue === 'RANDOM') {
            const opts = [-2, -1, 0, 1, 2, 3];
            actualJoker = opts[Math.floor(Math.random() * opts.length)];
          } else actualJoker = parseInt(settings.jokerValue);
        }

        syncState({ gameState: 'TEAM_MATCHING', matchState: { assignedTeams, isJokerRevealed: settings.jokerValue !== 'RANDOM', actualJokerValue: actualJoker } });
      };

      const revealJoker = () => syncState({ matchState: { ...matchState, isJokerRevealed: true } });

      const finalizeHoleDirect = (currentMatchState) => {
        const rawTeams = currentMatchState.assignedTeams;
        let redCount = 0, blueCount = 0;
        players.forEach(p => { if (rawTeams[p.id] === 'RED') redCount++; if (rawTeams[p.id] === 'BLUE') blueCount++; });

        const actualTeams = { ...rawTeams };
        let jokerPlayerId = Object.keys(rawTeams).find(id => rawTeams[id] === 'JOKER');
        if (jokerPlayerId) {
          jokerPlayerId = parseInt(jokerPlayerId);
          if (redCount < blueCount) { actualTeams[jokerPlayerId] = 'RED'; redCount++; } 
          else if (blueCount < redCount) { actualTeams[jokerPlayerId] = 'BLUE'; blueCount++; } 
          else { actualTeams[jokerPlayerId] = 'RED'; redCount++; }
        }

        const finalScoresForTeam = { ...holeData.scores };
        if (jokerPlayerId) finalScoresForTeam[jokerPlayerId] = holeData.par + currentMatchState.actualJokerValue;

        let newPlayers = [...players];
        let potChangeThisHole = 0;
        const finalMultiplier = displayMultiplier; 
        let redTotalStrokes = 0, blueTotalStrokes = 0;

        players.forEach(p => {
          let effectiveScore = finalScoresForTeam[p.id];
          if (actualTeams[p.id] === 'RED') redTotalStrokes += effectiveScore;
          if (actualTeams[p.id] === 'BLUE') blueTotalStrokes += effectiveScore;
        });

        const redAvg = redTotalStrokes / redCount;
        const blueAvg = blueTotalStrokes / blueCount;
        const winningTeam = redAvg < blueAvg ? 'RED' : (blueAvg < redAvg ? 'BLUE' : 'TIE');
        const isTie = winningTeam === 'TIE';

        const holeLog = { 
          hole: currentHole, par: holeData.par, multiplier: finalMultiplier, scores: { ...holeData.scores }, 
          oecdViolations: JSON.parse(JSON.stringify(holeData.oecdViolations)), nearWinner: holeData.nearWinner, longWinner: holeData.longWinner,
          nearIsReverse: holeData.nearIsReverse || false, longIsReverse: holeData.longIsReverse || false,
          isTie: isTie, winningTeam: winningTeam,
          teamStats: { RED: { total: redTotalStrokes, avg: redAvg }, BLUE: { total: blueTotalStrokes, avg: blueAvg } },
          transfers: [], specials: [], playersBefore: JSON.parse(JSON.stringify(players)), commonPotBefore: commonPot 
        };

        let totalOecdPenaltyThisHole = 0;
        const oecdPenalties = {};
        players.forEach(p => {
          if (p.isOecd) {
            let penaltyCount = 0;
            const v = holeData.oecdViolations[p.id];
            if (settings.oecdConditions.ob && v.ob) penaltyCount++;
            if (settings.oecdConditions.hazard && v.hazard) penaltyCount++;
            if (settings.oecdConditions.bunker && v.bunker) penaltyCount++;
            if (settings.oecdConditions.threePutt && v.threePutt) penaltyCount++;
            if (settings.oecdConditions.tree && v.tree) penaltyCount++;
            if (settings.oecdConditions.road && v.road) penaltyCount++;
            if (settings.oecdConditions.triple && (holeData.par === 3 ? (holeData.scores[p.id] - holeData.par >= 2) : (holeData.scores[p.id] - holeData.par >= 3))) penaltyCount++;

            if (penaltyCount > 0) {
              let penalty = penaltyCount * settings.oecdPenalty;
              if (settings.oecdMaxPenalty > 0 && penalty > settings.oecdMaxPenalty) penalty = settings.oecdMaxPenalty;
              oecdPenalties[p.id] = penalty;
              totalOecdPenaltyThisHole += penalty;
            }
          }
        });

        let availablePot = commonPot;
        if (settings.oecdRule === 'POT' || isTie) availablePot += totalOecdPenaltyThisHole;

        let totalIntendedPotPayout = 0;
        if (!isTie && finalMultiplier > 0) {
           const winnerCount = winningTeam === 'RED' ? redCount : blueCount;
           totalIntendedPotPayout += settings.basePoint * finalMultiplier * winnerCount;
        }
        
        players.forEach(p => {
           const score = holeData.scores[p.id];
           if (score === holeData.par - 1 && settings.rewardSource === 'POT') totalIntendedPotPayout += settings.potBirdieReward;
           if (score <= holeData.par - 2 && settings.rewardSource === 'POT') totalIntendedPotPayout += settings.potEagleReward;
        });
        
        if (settings.useNear && holeData.par === 3 && holeData.nearWinner && !holeData.nearIsReverse) {
           totalIntendedPotPayout += settings.potNearReward;
        }
        if (settings.useLong && holeData.par >= 5 && holeData.longWinner && !holeData.longIsReverse) {
           totalIntendedPotPayout += settings.potLongReward;
        }

        const potPayoutRatio = totalIntendedPotPayout > availablePot ? availablePot / totalIntendedPotPayout : 1;

        if (!isTie && finalMultiplier > 0) {
          const rawTransfer = settings.basePoint * finalMultiplier;
          const actualTransfer = Math.floor(rawTransfer * potPayoutRatio);
          newPlayers = newPlayers.map(p => {
            if (actualTeams[p.id] === winningTeam) {
              potChangeThisHole -= actualTransfer; 
              holeLog.transfers.push({ to: p.name, amount: actualTransfer, reason: '게임 승리' });
              return { ...p, currentPoint: p.currentPoint + actualTransfer };
            }
            return p; 
          });
        }

        players.forEach(p => {
          const score = holeData.scores[p.id]; 
          let special = null;
          if (score === holeData.par - 1) special = 'BIRDIE';
          else if (score <= holeData.par - 2) special = 'EAGLE'; 

          if (special) {
            if (settings.rewardSource === 'POT') {
              const rawReward = special === 'BIRDIE' ? settings.potBirdieReward : settings.potEagleReward;
              const actualReward = Math.floor(rawReward * potPayoutRatio);
              newPlayers = newPlayers.map(np => {
                if (np.id === p.id) {
                  holeLog.specials.push({ name: p.name, type: `${special}_RECEIVE`, amount: actualReward });
                  return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
                }
                return np;
              });
              potChangeThisHole -= actualReward; 
            } else {
              const reward = special === 'BIRDIE' ? settings.birdieReward : settings.eagleReward;
              const winnerTeam = actualTeams[p.id];
              const payers = newPlayers.filter(np => {
                if (np.id === p.id) return false; 
                if (settings.exemptSameTeam && actualTeams[np.id] === winnerTeam) return false; 
                return true;
              });
              const payerIds = payers.map(payer => payer.id);
              const totalReward = reward * payerIds.length;

              newPlayers = newPlayers.map(np => {
                if (np.id === p.id) {
                  if (totalReward > 0) holeLog.specials.push({ name: p.name, type: `${special}_RECEIVE`, amount: totalReward });
                  const addedToAccumulated = settings.oecdIncludeIndividual ? 0 : totalReward; 
                  return { ...np, currentPoint: np.currentPoint + totalReward, accumulatedRewards: (np.accumulatedRewards || 0) + addedToAccumulated };
                } else if (payerIds.includes(np.id)) {
                  holeLog.specials.push({ name: np.name, type: `${special}_PAY`, amount: reward });
                  return { ...np, currentPoint: np.currentPoint - reward };
                }
                return np;
              });
            }
          }
        });

        if (settings.useNear && holeData.par === 3 && holeData.nearWinner) {
          const isReverse = holeData.nearIsReverse;
          const actualReward = Math.floor(settings.potNearReward * potPayoutRatio);
          
          newPlayers = newPlayers.map(np => {
            if (np.id === holeData.nearWinner) {
              if (isReverse) {
                holeLog.specials.push({ name: np.name, type: 'REVERSE_NEAR', amount: settings.potNearReward });
                return { ...np, currentPoint: np.currentPoint - settings.potNearReward };
              } else {
                holeLog.specials.push({ name: np.name, type: 'NEAR', amount: actualReward });
                return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
              }
            }
            return np;
          });
          if (isReverse) potChangeThisHole += settings.potNearReward;
          else potChangeThisHole -= actualReward;
        }

        if (settings.useLong && holeData.par >= 5 && holeData.longWinner) {
          const isReverse = holeData.longIsReverse;
          const actualReward = Math.floor(settings.potLongReward * potPayoutRatio);
          
          newPlayers = newPlayers.map(np => {
            if (np.id === holeData.longWinner) {
              if (isReverse) {
                holeLog.specials.push({ name: np.name, type: 'REVERSE_LONG', amount: settings.potLongReward });
                return { ...np, currentPoint: np.currentPoint - settings.potLongReward };
              } else {
                holeLog.specials.push({ name: np.name, type: 'LONG', amount: actualReward });
                return { ...np, currentPoint: np.currentPoint + actualReward, accumulatedRewards: (np.accumulatedRewards || 0) + actualReward };
              }
            }
            return np;
          });
          if (isReverse) potChangeThisHole += settings.potLongReward;
          else potChangeThisHole -= actualReward;
        }

        if (totalOecdPenaltyThisHole > 0) {
          newPlayers = newPlayers.map(np => {
             if (oecdPenalties[np.id]) {
                holeLog.specials.push({ name: np.name, type: 'OECD_PAY', amount: oecdPenalties[np.id] });
                return { ...np, currentPoint: np.currentPoint - oecdPenalties[np.id] };
             }
             return np;
          });
          if (settings.oecdRule === 'POT') potChangeThisHole += totalOecdPenaltyThisHole;
          else {
            if (!isTie) {
              const splitAmount = Math.floor(totalOecdPenaltyThisHole / (winningTeam === 'RED' ? redCount : blueCount));
              newPlayers = newPlayers.map(np => {
                if (actualTeams[np.id] === winningTeam) return { ...np, currentPoint: np.currentPoint + splitAmount };
                return np;
              });
            } else potChangeThisHole += totalOecdPenaltyThisHole; 
          }
        }

        if (currentHole === 18 && settings.zeroOutLastHole && !isTie) {
          const provisionalPot = commonPot + potChangeThisHole;
          if (provisionalPot > 0) {
            const winnerCount = winningTeam === 'RED' ? redCount : blueCount;
            const sweepAmount = Math.floor(provisionalPot / winnerCount);
            newPlayers = newPlayers.map(p => {
              if (actualTeams[p.id] === winningTeam) return { ...p, currentPoint: p.currentPoint + sweepAmount, accumulatedRewards: (p.accumulatedRewards || 0) + sweepAmount };
              return p;
            });
            potChangeThisHole -= (sweepAmount * winnerCount);
            holeLog.transfers.push({ to: '승리팀', amount: sweepAmount, reason: '막홀 몰아주기' });
          }
        }

        const initialPoints = {};
        players.forEach(p => initialPoints[p.id] = p.currentPoint);
        const profits = {};
        newPlayers.forEach(p => { profits[p.id] = p.currentPoint - initialPoints[p.id]; });
        holeLog.profits = profits;

        newPlayers = newPlayers.map(p => {
          const totalProfit = p.currentPoint; 
          const oecdProfit = settings.oecdIncludeRewards ? totalProfit : totalProfit - (p.accumulatedRewards || 0);
          const strokesThisHole = holeData.scores[p.id] - holeData.par; 
          const newStrokes = p.currentStrokes + strokesThisHole;
          let isOecd = p.isOecd;
          if (!isOecd && oecdProfit >= settings.oecdLimit) isOecd = true; 
          else if (isOecd && settings.oecdReleaseEnabled && oecdProfit <= settings.oecdReleaseThreshold) isOecd = false; 
          return { ...p, currentStrokes: newStrokes, isOecd };
        });

        syncState({
          players: newPlayers, commonPot: commonPot + potChangeThisHole, history: [...history, holeLog],
          drawResult: { raw: currentMatchState.assignedTeams, actual: actualTeams, winningTeam: winningTeam, isTie: isTie, teamStats: holeLog.teamStats },
          matchState: currentMatchState, gameState: 'SCOREBOARD'
        });
      };

      const finalizeHole = () => finalizeHoleDirect(matchState);

      const nextHole = () => {
        if (history.length >= 18) {
          syncState({ gameState: 'SETTLEMENT' });
        } else {
          const nextH = currentHole === 18 ? 1 : currentHole + 1;
          const nextPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, nextH);
          syncState({
            currentHole: nextH,
            holeData: { par: nextPar, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: nextPar, 2: nextPar, 3: nextPar, 4: nextPar }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
            drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
          });
        }
      };

      const restartGame = () => {
        const resetPlayers = players.map(p => ({ ...p, currentPoint: 0, currentStrokes: 0, isOecd: false, accumulatedRewards: 0 }));
        syncState({
          gameState: 'SETUP', currentHole: 1, players: resetPlayers, commonPot: 0, history: [], drawResult: null,
          matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 },
          holeData: { par: 4, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: 4, 2: 4, 3: 4, 4: 4 }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
          joinedPlayers: []
        });
        setJoinedPlayers([]); 
        setActiveMoneyTab(null);
        setActiveSettingsTab(null);
      };

      const handleEditHole = (targetHole) => {
        const logIndex = history.findIndex(h => h.hole === targetHole);
        if (logIndex === -1) { handleGoToUnplayedHole(targetHole); return; }
        const targetLog = history[logIndex];
        syncState({
           players: targetLog.playersBefore, commonPot: targetLog.commonPotBefore, history: history.slice(0, logIndex), currentHole: targetHole,
           holeData: {
              par: targetLog.par, multiplier: targetLog.multiplier || 1, isExcluded: targetLog.multiplier === 0, manualOverride: true,
              nearWinner: targetLog.nearWinner || null, longWinner: targetLog.longWinner || null, 
              nearIsReverse: targetLog.nearIsReverse || false, longIsReverse: targetLog.longIsReverse || false,
              scores: targetLog.scores, 
              oecdViolations: targetLog.oecdViolations ? JSON.parse(JSON.stringify(targetLog.oecdViolations)) : { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } 
           },
           drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
        });
        setShowScoreboard(false);
      };

      const handleEditHoleRequest = (holeNum) => {
        if (holeNum < currentHole) { 
            setConfirmModal({
                isOpen: true, message: `${holeNum}홀을 수정하면 이후 홀의 기록이 모두 초기화됩니다.\n정말 수정하시겠습니까?`,
                onConfirm: () => { setConfirmModal({ isOpen: false }); handleEditHole(holeNum); }
            });
        } else { handleEditHole(holeNum); }
      };

      const handleGoToUnplayedHole = (targetHole) => {
        if (targetHole === currentHole) { syncState({ gameState: 'PLAYING' }); setShowScoreboard(false); } 
        else {
          const nextPar = getHolePar(courseInfo.name, courseInfo.front, courseInfo.back, targetHole);
          syncState({
            currentHole: targetHole,
            holeData: { par: nextPar, multiplier: 1, isExcluded: false, manualOverride: false, nearWinner: null, longWinner: null, nearIsReverse: false, longIsReverse: false, scores: { 1: nextPar, 2: nextPar, 3: nextPar, 4: nextPar }, oecdViolations: { 1: { ...defaultOecdViolations }, 2: { ...defaultOecdViolations }, 3: { ...defaultOecdViolations }, 4: { ...defaultOecdViolations } } },
            drawResult: null, gameState: 'PLAYING', matchState: { assignedTeams: {}, isJokerRevealed: false, actualJokerValue: 0 }
          });
          setShowScoreboard(false);
        }
      };

      const getPlayerTotals = (playerName) => {
        let received = 0, paid = 0, oecdPaid = 0;
        history.forEach(h => {
          h.specials?.forEach(s => {
            if (s.name === playerName) {
              if (s.type.includes('_RECEIVE') || s.type === 'NEAR' || s.type === 'LONG') received += s.amount;
              else if (s.type === 'BIRDIE_PAY' || s.type === 'EAGLE_PAY' || s.type === 'REVERSE_NEAR' || s.type === 'REVERSE_LONG') paid += s.amount;
              else if (s.type === 'OECD_PAY') oecdPaid += s.amount;
            }
          });
        });
        return { received, paid, oecdPaid };
      };

      const formatTime = (totalSeconds) => {
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        if (hours > 0) return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      };

      // 공유 URL을 안전하게 가져오는 함수 (blob 환경 예외 처리)
      const currentShareUrl = (() => {
        try {
          const url = new URL(window.location.href);
          url.searchParams.set('room', roomId);
          return url.href;
        } catch (e) {
          // 브라우저 미리보기(blob 환경)에서는 현재 도메인을 붙여서 반환
          return window.location.origin + "?room=" + roomId;
        }
      })();

      // === 렌더링 영역 시작 ===
      return (
        <div className="font-pretendard min-h-screen bg-gray-50 flex flex-col items-center select-none pb-10 relative">

        {/* --- SETUP SCREEN --- */}
        {gameState === 'SETUP' && (
          <div className="w-full flex flex-col items-center pb-20">
            <div className="w-full max-w-md bg-emerald-600 p-6 pt-12 text-white rounded-b-3xl shadow-md">
              <h1 className="text-2xl font-bold flex items-center justify-center gap-2">
                <Settings className="w-6 h-6" /> 골프 뽑기 게임 설정
              </h1>
              <p className="text-center text-emerald-100 mt-2 text-sm">라운드 전 설정을 완료해 주세요</p>
            </div>

            <div className="w-full max-w-md px-4 mt-[-20px]">
              {/* Course Settings Card */}
              <div className="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100 relative z-10">
                <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2 mb-4">
                  <Map className="w-4 h-4" /> 골프장 및 코스 설정
                </h2>
                <div className="flex gap-2 mb-3">
                  <input
                    type="text"
                    value={courseInfo.name}
                    readOnly
                    onClick={() => setIsCourseModalOpen(true)}
                    className="flex-1 bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 text-[16px] focus:outline-none font-bold text-gray-700 cursor-pointer"
                    placeholder="골프장 이름 (눌러서 검색)"
                  />
                  <button 
                    onClick={() => setIsCourseModalOpen(true)}
                    className="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-emerald-700 transition flex items-center gap-1 shrink-0"
                  >
                    <Search className="w-4 h-4" /> 검색
                  </button>
                </div>
                <div className="flex gap-2">
                  <div className="flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
                    <span className="text-xs text-gray-500 mr-2 shrink-0">전반</span>
                    <select
                      value={courseInfo.front}
                      onChange={(e) => {
                        const newFront = e.target.value;
                        const newCourseInfo = {...courseInfo, front: newFront};
                        setCourseInfo(newCourseInfo);
                        const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole);
                        syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } });
                      }}
                      className="w-full bg-transparent text-sm font-bold text-gray-700 focus:outline-none"
                    >
                      {(SAMPLE_COURSES.find(c => c.name === courseInfo.name)?.courses || ['OUT', 'IN', 'EAST', 'WEST', 'SOUTH', 'NORTH']).map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  <div className="flex-1 flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
                    <span className="text-xs text-gray-500 mr-2 shrink-0">후반</span>
                    <select
                      value={courseInfo.back}
                      onChange={(e) => {
                        const newBack = e.target.value;
                        const newCourseInfo = {...courseInfo, back: newBack};
                        setCourseInfo(newCourseInfo);
                        const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole);
                        syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } });
                      }}
                      className="w-full bg-transparent text-sm font-bold text-gray-700 focus:outline-none"
                    >
                      {(SAMPLE_COURSES.find(c => c.name === courseInfo.name)?.courses || ['OUT', 'IN', 'EAST', 'WEST', 'SOUTH', 'NORTH']).map(c => <option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                </div>
              </div>

              {/* Players Card */}
              <div className="bg-white rounded-2xl shadow-sm p-5 mb-4 border border-gray-100">
                <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2 mb-4">
                  <Users className="w-4 h-4" /> 플레이어 및 초기 납입 포인트(포트)
                </h2>
                {players.map((p, i) => {
                  const isDefault = DEFAULT_NAMES.includes(p.name);
                  return (
                  <div key={p.id} className="flex items-center gap-2 mb-3">
                    <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-xs shrink-0">
                      {i + 1}
                    </div>
                    
                    <div className="flex-1 flex items-center relative">
                      <input 
                        type="text" 
                        value={p.name}
                        onFocus={(e) => {
                          const target = e.target;
                          // 모바일 환경을 위해 약간의 딜레이 후 커서를 가장 앞으로 이동

                            <input type="checkbox" checked={settings.oecdConditions[key]} onChange={e => setSettings({...settings, oecdConditions: {...settings.oecdConditions, [key]: e.target.checked}})} className="w-4 h-4 rounded text-red-500 focus:ring-red-500 border-gray-300" />
                            <span className="font-medium">{label}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {roomId ? (
                <button onClick={() => syncState({ gameState: history.length > 0 ? 'PLAYING' : 'WAITING' })} className="w-full bg-gray-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-gray-900 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mb-10">
                  {history.length > 0 ? '게임 계속하기' : '설정 완료 (대기실로)'} <ChevronRight className="w-5 h-5" />
                </button>
              ) : (
                <button onClick={createRoom} className="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2 mb-10">
                  방 만들기 (대기실 생성) <ChevronRight className="w-5 h-5" />
                </button>
              )}
            </div>
          </div>
        )}

        {/* WAITING ROOM */}
        {gameState === 'WAITING' && (
          <div className="w-full flex flex-col items-center pb-24">
            <div className="w-full max-w-md bg-emerald-600 px-6 pt-12 pb-8 text-white rounded-b-[2rem] shadow-md relative z-10 text-center">
              <h1 className="text-2xl font-black mb-2">라운드 대기실</h1>
              <p className="text-emerald-100 text-sm">모든 플레이어가 입장하면 게임을 시작할 수 있습니다.</p>
            </div>

            <div className="w-full max-w-md px-4 mt-6">
              <button onClick={() => setIsInviteModalOpen(true)} className="w-full mb-6 bg-white border border-emerald-200 text-emerald-600 font-bold py-3.5 rounded-xl shadow-sm hover:bg-emerald-50 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <QrCode className="w-5 h-5" /> 방 초대 코드 / URL 열기
              </button>

              <div className="grid grid-cols-2 gap-3">
                {players.map(p => {
                  const isJoined = joinedPlayers.includes(p.id);
                  const isHost = p.id === caddyId;
                  return (
                    <div key={p.id} onClick={() => { if (!isJoined) syncState({ joinedPlayers: [...joinedPlayers, p.id] }); }} className={`flex flex-col items-center justify-center p-5 rounded-2xl border-2 transition-all duration-300 ${isJoined ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm transform scale-100' : 'border-dashed border-gray-300 bg-gray-50 text-gray-400 cursor-pointer hover:bg-gray-100 hover:border-gray-400 transform scale-[0.98]'}`}>
                      <div className={`w-14 h-14 rounded-full mb-3 flex items-center justify-center border-2 transition-colors ${isJoined ? 'bg-white border-emerald-200' : 'bg-gray-100 border-gray-200'}`}>
                        {isJoined ? <CheckCircle2 className="w-7 h-7 text-emerald-500" /> : <User className="w-6 h-6 text-gray-300" />}
                      </div>
                      <span className="font-bold text-[14px] text-center w-full truncate px-1">{p.name}</span>
                      <div className="mt-2 h-5 flex items-center justify-center">
                        {isHost ? <span className="bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm">방장(스코어 캐디)</span> : isJoined ? <span className="bg-emerald-200 text-emerald-800 text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm">입장 완료</span> : <span className="text-[10px] bg-gray-200 text-gray-500 px-2 py-0.5 rounded-full font-bold animate-pulse">대기 중... (클릭)</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-200 flex gap-3 w-full max-w-md mx-auto z-10">
              <button onClick={() => { syncState({ gameState: 'SETUP' }); }} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-200 active:scale-[0.98] transition-all">설정으로</button>
              <button onClick={startRound} disabled={joinedPlayers.length < 4} className="flex-[2] bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-emerald-500 active:scale-[0.98] transition-all disabled:bg-gray-300 disabled:text-gray-100 disabled:shadow-none disabled:active:scale-100 flex items-center justify-center gap-2">
                {joinedPlayers.length < 4 ? `${joinedPlayers.length}/4 명 입장완료` : '게임 시작하기'}
                {joinedPlayers.length === 4 && <Play className="w-4 h-4 fill-current" />}
              </button>
            </div>
          </div>
        )}

        {/* --- PLAYING --- */}
        {gameState === 'PLAYING' && (
          <div className="w-full flex flex-col items-center">
            <div className="w-full max-w-md bg-emerald-600 pt-6 pb-14 px-5 text-white rounded-b-[2rem] shadow-md relative z-10">
              <div className="flex justify-between items-center h-10 mb-4">
                <div className="min-w-[100px] flex justify-start">
                  <div className="flex items-center gap-1 bg-emerald-700/50 rounded-xl p-1 border border-emerald-500/30">
                     <span className="text-[10px] font-black px-1.5 text-emerald-200">PAR</span>
                     {[3, 4, maxParOption].map(p => (
                       <button key={p} onTouchStart={() => startPress(p)} onTouchEnd={endPress} onMouseDown={() => startPress(p)} onMouseUp={endPress} onMouseLeave={endPress} onClick={() => handleParClick(p)} className={`w-7 h-7 rounded-lg font-black text-sm transition-colors ${holeData.par === p ? 'bg-white text-emerald-600 shadow' : 'text-white hover:bg-emerald-600'}`}>{p}</button>
                     ))}
                  </div>
                </div>
                <div className="flex items-center justify-center gap-2 flex-1">
                  <span className="text-2xl font-black italic tracking-tighter">{currentHole}H</span>
                  <button onClick={() => setIsInviteModalOpen(true)} className="bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded flex items-center shadow-sm tracking-widest hover:bg-red-600 transition">LIVE</button>
                </div>
                <div className="min-w-[100px] flex justify-end gap-2">
                  <button onClick={() => setShowScoreboard(true)} className="bg-emerald-800/40 p-2 rounded-full hover:bg-emerald-700 border border-emerald-500/30 transition shadow-sm"><List className="w-4 h-4 text-emerald-100" /></button>
                  <button onClick={() => syncState({ gameState: 'SETUP' })} className="bg-emerald-800/40 p-2 rounded-full hover:bg-emerald-700 border border-emerald-500/30 transition shadow-sm"><Settings className="w-4 h-4 text-emerald-100" /></button>
                </div>
              </div>
              
              <div className="absolute left-4 right-4 bottom-[-45px] flex gap-3 h-[90px]">
                <div className="flex-[1] bg-white rounded-2xl shadow-sm p-3 border border-gray-100 flex flex-col justify-between">
                  <div className="text-gray-900 font-black text-[11px] pl-1">현재 공용 포트</div>
                  <div className="flex gap-1 bg-gray-50 p-2 rounded-xl border border-gray-100 items-center justify-center">
                    <span className="font-black text-lg text-emerald-600 truncate">{formatNum(commonPot)}<span className="text-xs"> P</span></span>
                  </div>
                </div>
                <div className="flex-[1.2] bg-white rounded-2xl shadow-sm p-3 border border-gray-100 flex flex-col justify-between">
                  <div className="flex justify-between items-center pl-1">
                    <span className="text-gray-900 font-black text-sm">배수 적용</span>
                    {holeData.isExcluded ? <span className="bg-gray-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold shadow-sm">제외 홀</span> : autoDoubleReason ? <span className="bg-orange-500 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold shadow-sm">{autoDoubleReason}</span> : <span className="w-4 h-4 text-gray-300"><AlertCircle className="w-3 h-3" /></span>}
                  </div>
                  <div className="flex items-center justify-between bg-gray-50 p-1 rounded-xl border border-gray-100">
                    <button onClick={() => handleMultiplierChange('DOWN')} className="w-8 h-[28px] flex items-center justify-center text-gray-400 font-bold hover:bg-gray-200 hover:text-gray-600 active:bg-gray-300 rounded-lg transition-colors">-</button>
                    <span className={`font-black text-lg ${holeData.isExcluded ? 'text-gray-400' : displayMultiplier > 1 ? 'text-red-500' : 'text-gray-700'}`}>{holeData.isExcluded ? '제외' : `x${displayMultiplier}`}</span>
                    <button onClick={() => handleMultiplierChange('UP')} className="w-8 h-[28px] flex items-center justify-center text-gray-400 font-bold hover:bg-gray-200 hover:text-gray-600 active:bg-gray-300 rounded-lg transition-colors">+</button>
                  </div>
                </div>
              </div>
            </div>

            <div className="w-full max-w-md px-4 mt-16 pb-28">
              {/* New Near Card */}
              {settings.useNear && holeData.par === 3 && (
                 <div className="bg-white rounded-2xl shadow-sm p-4 mb-3 border border-gray-100">
                    <div className="flex justify-between items-center mb-3">
                       <div className="text-[13px] font-bold text-gray-800 flex items-center gap-1.5">
                          🎯 니어리스트 <span className="text-[11px] text-gray-400 font-normal">(미선택 가능)</span>
                       </div>
                       <label className="flex items-center gap-1.5 text-[12px] text-gray-600 font-bold cursor-pointer">
                          <input type="checkbox"
                                 checked={holeData.nearIsReverse}
                                 onChange={toggleNearReverse}
                                 disabled={!holeData.nearWinner}
                                 className="w-4 h-4 rounded text-red-500 focus:ring-red-500 disabled:opacity-50 border-gray-300 cursor-pointer" />
                          <span className={holeData.nearIsReverse ? 'text-red-500' : ''}>역니어</span>
                       </label>
                    </div>
                    <div className="flex gap-2">
                       {players.map(p => (
                           <button key={p.id}
                                   onClick={() => toggleNearWinner(p.id)}
                                   className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold border transition-colors truncate px-1 active:scale-95
                                      ${holeData.nearWinner === p.id
                                          ? (holeData.nearIsReverse ? 'bg-red-500 text-white border-red-600 shadow-md' : 'bg-blue-500 text-white border-blue-600 shadow-md')
                                          : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}>
                               {p.name.substring(0, 4)}{p.name.length > 4 ? '..' : ''}
                           </button>
                       ))}
                    </div>
                 </div>
              )}

              {/* New Long Card */}
              {settings.useLong && holeData.par >= 5 && (
                 <div className="bg-white rounded-2xl shadow-sm p-4 mb-3 border border-gray-100">
                    <div className="flex justify-between items-center mb-3">
                       <div className="text-[13px] font-bold text-gray-800 flex items-center gap-1.5">
                          🏌️ 롱기스트 <span className="text-[11px] text-gray-400 font-normal">(미선택 가능)</span>
                       </div>
                       <label className="flex items-center gap-1.5 text-[12px] text-gray-600 font-bold cursor-pointer">
                          <input type="checkbox"
                                 checked={holeData.longIsReverse}
                                 onChange={toggleLongReverse}
                                 disabled={!holeData.longWinner}
                                 className="w-4 h-4 rounded text-red-500 focus:ring-red-500 disabled:opacity-50 border-gray-300 cursor-pointer" />
                          <span className={holeData.longIsReverse ? 'text-red-500' : ''}>역롱기</span>
                       </label>
                    </div>
                    <div className="flex gap-2">
                       {players.map(p => (
                           <button key={p.id}
                                   onClick={() => toggleLongWinner(p.id)}
                                   className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold border transition-colors truncate px-1 active:scale-95
                                      ${holeData.longWinner === p.id
                                          ? (holeData.longIsReverse ? 'bg-red-500 text-white border-red-600 shadow-md' : 'bg-orange-500 text-white border-orange-600 shadow-md')
                                          : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}>
                               {p.name.substring(0, 4)}{p.name.length > 4 ? '..' : ''}
                           </button>
                       ))}
                    </div>
                 </div>
              )}

              {players.map((p, idx) => {
                 const scoreDiff = holeData.scores[p.id] - holeData.par;
                 return (
                  <div key={p.id} className="bg-white rounded-2xl shadow-sm p-4 mb-3 border border-gray-100">
                    <div className="flex justify-between items-center mb-1">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-xs shrink-0">{idx + 1}</div>
                        <div className="flex flex-col">
                          <div className="font-bold text-gray-800 flex items-center gap-1.5">
                            {p.name}
                            {caddyId === p.id && <button onClick={() => setIsCaddyModalOpen(true)} className="w-5 h-5 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center border border-emerald-200" title="스코어 캐디 변경"><Edit2 className="w-2.5 h-2.5" /></button>}
                          </div>
                          <div className="flex flex-wrap gap-1 mt-1.5">
                            {p.isOecd && <span className="bg-red-100 text-red-600 text-[10px] px-1.5 py-0.5 rounded font-bold border border-red-200 flex items-center">OECD</span>}
                          </div>
                        </div>
                      </div>
                      <div className="flex items-center gap-3">
                        <span className={`text-sm font-black w-6 text-center ${scoreDiff > 0 ? 'text-red-500' : scoreDiff < 0 ? 'text-blue-600' : 'text-emerald-600'}`}>{scoreDiff === 0 ? 'E' : scoreDiff > 0 ? `+${scoreDiff}` : `${scoreDiff}`}</span>
                        <button onClick={() => handleScoreChange(p.id, -1)} className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 font-bold hover:bg-gray-200 hover:text-gray-600 active:scale-95 transition-all border border-gray-200">-</button>
                        <span className="text-xl font-black w-5 text-center text-gray-800">{holeData.scores[p.id]}</span>
                        <button onClick={() => handleScoreChange(p.id, 1)} className="w-8 h-8 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold hover:bg-emerald-700 active:scale-95 shadow-sm transition-all">+</button>
                      </div>
                    </div>
                    {p.isOecd && (
                      <div className="flex gap-1.5 mt-3 bg-red-50/50 p-2 rounded-lg border border-red-100 items-center">
                        <span className="text-[10px] font-black text-red-600 px-1 shrink-0">OECD<br/>내역</span>
                        <div className="flex-1 flex flex-wrap gap-1">
                          {settings.oecdConditions.ob && <button onClick={() => toggleOecdViolation(p.id, 'ob')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].ob ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>OB</button>}
                          {settings.oecdConditions.hazard && <button onClick={() => toggleOecdViolation(p.id, 'hazard')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].hazard ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>페널티</button>}
                          {settings.oecdConditions.bunker && <button onClick={() => toggleOecdViolation(p.id, 'bunker')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].bunker ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>벙커</button>}
                          {settings.oecdConditions.threePutt && <button onClick={() => toggleOecdViolation(p.id, 'threePutt')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].threePutt ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>3펏</button>}
                          {settings.oecdConditions.tree && <button onClick={() => toggleOecdViolation(p.id, 'tree')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].tree ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>나무</button>}
                          {settings.oecdConditions.road && <button onClick={() => toggleOecdViolation(p.id, 'road')} className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md transition-colors ${holeData.oecdViolations[p.id].road ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-400 border border-red-200 hover:bg-red-50'}`}>도로</button>}
                          {settings.oecdConditions.triple && <div className={`flex-1 min-w-[30px] py-1.5 text-[10px] font-bold rounded-md flex items-center justify-center transition-colors ${(holeData.par === 3 ? holeData.scores[p.id] - holeData.par >= 2 : holeData.scores[p.id] - holeData.par >= 3) ? 'bg-red-500 text-white shadow-sm' : 'bg-white text-red-300 border border-red-100'}`}>트리플</div>}
                        </div>
                      </div>
                    )}
                  </div>
                 );
              })}
            </div>

            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 w-full max-w-md mx-auto z-20 flex gap-3">
              <div onClick={() => setIsJokerModalOpen(true)} className="flex flex-col flex-[1.2] bg-purple-50 rounded-xl px-3 border border-purple-100 justify-center cursor-pointer hover:bg-purple-100 active:scale-[0.98] transition-all">
                <label className="text-[10px] text-purple-600 font-bold mt-1 mb-0.5 cursor-pointer pointer-events-none">조커(Joker) 설정</label>
                <div className="text-sm font-black text-gray-800 pb-1 flex items-center justify-between pointer-events-none"><span>{getJokerLabel(settings.jokerValue)}</span><ChevronDown className="w-3 h-3 text-purple-400" /></div>
              </div>
              <button onClick={startTeamMatching} className="flex-[2] bg-gray-800 text-white font-bold rounded-xl shadow-lg hover:bg-gray-900 active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-lg">
                <Users className="w-5 h-5" /> 팀 랜덤 매칭
              </button>
            </div>

            {isJokerModalOpen && (
              <div className="fixed inset-0 bg-black/60 flex items-end justify-center z-[70] p-4 pb-10 sm:items-center">
                <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative animate-in slide-in-from-bottom-4 duration-200">
                  <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                    <h3 className="text-lg font-bold text-purple-700 flex items-center gap-2"><span className="text-xl leading-none">🃏</span> 당홀 조커 타수 변경</h3>
                    <button onClick={() => setIsJokerModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1"><X className="w-5 h-5" /></button>
                  </div>
                  <div className="grid grid-cols-4 gap-2 mb-4">
                    {['NONE', 'RANDOM', '-2', '-1', '0', '1', '2', '3'].map(val => (
                      <button key={val} onClick={() => { setSettings({...settings, jokerValue: val}); setIsJokerModalOpen(false); }} className={`py-3 text-[11px] font-bold rounded-xl border transition-all ${settings.jokerValue === val ? 'bg-purple-500 border-purple-600 text-white shadow-md' : 'bg-gray-50 border-gray-200 text-gray-700 hover:bg-gray-100'}`}>{getJokerLabel(val)}</button>
                    ))}
                  </div>
                  <div className="text-[10.5px] text-gray-500 leading-relaxed bg-gray-50 p-3 rounded-lg border border-gray-100 space-y-1.5 text-left mt-2">
                    <p>• 조커로 뽑힌 플레이어는 인원이 부족한 팀에 자동 배치됩니다.</p>
                    <p>• 팀 승패 계산 시, 실제 타수와 무관하게 <strong>'조커 결과(파, 보기 등)'</strong>가 팀 성적으로 반영됩니다.</p>
                    <p className="text-gray-400">• 단, 버디/이글 축하금 및 OECD 벌금 등 개인 정산은 <strong>'본인의 실제 타수'</strong> 기준으로 계산됩니다.</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* --- TEAM_MATCHING --- */}
        {gameState === 'TEAM_MATCHING' && (
          <div className="w-full min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 relative overflow-hidden">
            <h2 className="text-white text-2xl font-bold mb-8 text-center z-10">팀 매칭 결과</h2>
            <div className="flex flex-wrap justify-center content-center gap-4 w-full max-w-[320px] relative z-10 mb-6">
              {players.map((p) => {
                const assignedColor = matchState.assignedTeams[p.id];
                const isJoker = assignedColor === 'JOKER';
                const isRevealed = !isJoker || matchState.isJokerRevealed; 
                let bgClass = 'bg-gray-800 border-gray-600';
                if (isRevealed) bgClass = assignedColor === 'RED' ? 'bg-red-500 border-red-300' : assignedColor === 'BLUE' ? 'bg-blue-500 border-blue-300' : 'bg-purple-600 border-purple-400';
                return (
                  <div key={p.id} className={`w-[40%] aspect-[3/4] rounded-xl flex flex-col items-center justify-center font-black border-4 transition-all duration-700 relative overflow-hidden shadow-xl ${bgClass} ${!isRevealed ? 'animate-pulse' : 'animate-in flip-in-y'}`}>
                    {isRevealed ? (
                      <div className="flex flex-col items-center justify-center w-full h-full">
                        <div className={`text-white font-black mb-1 ${isJoker ? 'text-4xl drop-shadow-[0_0_10px_rgba(255,255,255,0.8)]' : 'text-3xl'}`}>{isJoker ? '🃏' : assignedColor === 'RED' ? 'R' : 'B'}</div>
                        <div className="text-white text-[11px] bg-black/40 px-1.5 py-1 rounded w-[85%] text-center truncate">{p.name}</div>
                      </div>
                    ) : (
