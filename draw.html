                            <div className="flex flex-wrap gap-1 mt-1.5">
                              {received > 0 && <span className="text-[9px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-medium border border-blue-100">축하금 +{formatNum(received)}</span>}
                              {paid > 0 && <span className="text-[9px] bg-red-50 text-red-500 px-1.5 py-0.5 rounded font-medium border border-red-100">지출 -{formatNum(paid)}</span>}
                              {oecdPaid > 0 && <span className="text-[9px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold border border-red-200">OECD -{formatNum(oecdPaid)}</span>}
                            </div>
                          )}
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-[10px] text-gray-500 font-bold mb-0.5">최종 잔여 포인트</div>
                        <div className={`font-black text-xl ${totalBalance > 0 ? 'text-emerald-600' : totalBalance < 0 ? 'text-red-500' : 'text-gray-800'}`}>{formatNum(totalBalance)}<span className="text-sm ml-0.5">P</span></div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="flex gap-3 mt-8">
                <button onClick={() => setShowScoreboard(true)} className="flex-1 bg-gray-100 border border-gray-200 text-gray-600 font-bold py-4 rounded-xl shadow-sm hover:bg-gray-200 active:scale-[0.98] transition-all flex justify-center items-center gap-1.5 text-[13px]"><List className="w-4 h-4" /> 스코어카드</button>
                <button onClick={restartGame} className="flex-[2] bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2"><RotateCcw className="w-5 h-5" /> 새 라운드 시작</button>
              </div>
            </div>
          </div>
        )}

        {/* --- GLOBAL MODALS --- */}
        
        {/* 확인 커스텀 모달 */}
        {confirmModal.isOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
             <div className="bg-white rounded-[1.5rem] p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95 duration-200">
               <AlertCircle className="w-12 h-12 text-red-500 mx-auto mb-4" />
               <h3 className="text-lg font-black text-gray-800 mb-2">기록 수정</h3>
               <p className="text-[13px] text-gray-600 mb-6 break-keep leading-relaxed whitespace-pre-wrap">{confirmModal.message}</p>
               <div className="flex gap-3">
                 <button onClick={() => setConfirmModal({isOpen: false})} className="flex-1 bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl hover:bg-gray-200 active:scale-[0.98] transition-all">취소</button>
                 <button onClick={confirmModal.onConfirm} className="flex-1 bg-red-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-red-700 active:scale-[0.98] transition-all">수정하기</button>
               </div>
             </div>
          </div>
        )}

        {/* 공용 포트 부족 안내 모달 */}
        {showPotWarning && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4">
             <div className="bg-white rounded-[1.5rem] p-6 w-full max-w-sm text-center shadow-2xl animate-in zoom-in-95 duration-200">
               <AlertCircle className="w-12 h-12 text-orange-500 mx-auto mb-4" />
               <h3 className="text-lg font-black text-gray-800 mb-2">공용 포인트 부족</h3>
               <p className="text-[13px] text-gray-600 mb-6 break-keep leading-relaxed bg-orange-50 p-4 rounded-xl border border-orange-100">
                 공용 포인트가 승리 포인트와 비슷하거나 적어 승리 포인트와 축하금을 온전히 가져가지 못할 수 있습니다.<br/><br/>게임을 원활하게 계속하시려면 설정창에서 초기 납입 포인트를 올리세요. 포인트를 올리지 않으면 남은 포인트 한도 내에서 비율로 삭감되어 지급됩니다.
               </p>
               <button onClick={() => setShowPotWarning(false)} className="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-emerald-700 active:scale-[0.98] transition-all">확인</button>
             </div>
          </div>
        )}

        {/* Course Search Modal */}
        {isCourseModalOpen && (
           <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-[110] p-4 pt-[15vh]">
            <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-xl flex flex-col max-h-[75vh]">
              <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 shrink-0"><Search className="w-5 h-5 text-emerald-600" /> 골프장 검색</h3>
              <div className="mb-4 shrink-0 flex gap-2">
                <input type="text" placeholder="이름 검색 또는 직접 입력" value={courseSearchTerm} onChange={(e) => setCourseSearchTerm(e.target.value)} className="flex-1 bg-gray-50 border border-gray-300 rounded-lg px-3 py-2 text-[16px] focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500"/>
                <button onClick={() => { if(courseSearchTerm.trim()) { const newCourseInfo = { name: courseSearchTerm.trim(), front: '전반', back: '후반' }; setCourseInfo(newCourseInfo); const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole); syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } }); setIsCourseModalOpen(false); setCourseSearchTerm(''); } }} className="bg-emerald-600 text-white px-3 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-emerald-700 whitespace-nowrap">직접입력</button>
              </div>
              <div className="space-y-2 overflow-y-auto flex-1 custom-scroll pr-1">
                {SAMPLE_COURSES.filter(course => course.name.includes(courseSearchTerm)).length > 0 ? (
                  SAMPLE_COURSES.filter(course => course.name.includes(courseSearchTerm)).map(course => (
                    <button key={course.name} onClick={() => { const newCourseInfo = { name: course.name, front: course.courses[0], back: course.courses[1] || course.courses[0] }; setCourseInfo(newCourseInfo); const newPar = getHolePar(newCourseInfo.name, newCourseInfo.front, newCourseInfo.back, currentHole); syncState({ courseInfo: newCourseInfo, holeData: { ...holeData, par: newPar, scores: {1:newPar, 2:newPar, 3:newPar, 4:newPar} } }); setIsCourseModalOpen(false); setCourseSearchTerm(''); }} className="w-full text-left px-4 py-3 rounded-xl border border-gray-200 hover:bg-emerald-50 hover:border-emerald-500 transition-colors">
                      <div className="font-bold text-gray-800">{course.name}</div><div className="text-xs text-gray-500 mt-1">코스: {course.courses.join(', ')}</div>
                    </button>
                  ))
                ) : (<div className="text-center text-gray-500 py-8 text-sm">검색 결과가 없습니다.</div>)}
              </div>
              <button onClick={() => { setIsCourseModalOpen(false); setCourseSearchTerm(''); }} className="w-full mt-4 py-3 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition-colors shrink-0">닫기</button>
            </div>
          </div>
        )}

        {/* Caddy Modal */}
        {isCaddyModalOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4">
            <div className="bg-white rounded-[1.5rem] w-full max-w-sm p-6 shadow-2xl relative animate-in zoom-in-95 duration-200">
              <div className="flex justify-between items-center mb-2 border-b border-gray-100 pb-4">
                <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2"><Edit2 className="w-5 h-5 text-emerald-600" /> 스코어 캐디 변경</h3>
                <button onClick={() => setIsCaddyModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1"><X className="w-5 h-5" /></button>
              </div>
              <p className="text-[13px] text-gray-500 mb-5 mt-4 text-center">현재 라운드의 스코어를 입력할 담당자를 선택해 주세요.</p>
              <div className="grid grid-cols-2 gap-3">
                {players.map(p => (
                  <button key={p.id} onClick={() => { setCaddyId(p.id); syncState({ caddyId: p.id }); setIsCaddyModalOpen(false); }} className={`flex flex-col items-center justify-center p-4 rounded-2xl border-2 transition-all ${caddyId === p.id ? 'border-emerald-600 bg-emerald-50 text-emerald-700' : 'border-gray-100 hover:border-gray-200 bg-white text-gray-800'}`}>
                    <div className="w-12 h-12 bg-gray-100 rounded-full mb-3 flex items-center justify-center overflow-hidden border border-gray-200"><User className={`w-6 h-6 ${caddyId === p.id ? 'text-emerald-500' : 'text-gray-400'}`} /></div>
                    <span className="font-bold text-[13px]">{p.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Invite Modal */}
        {isInviteModalOpen && (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4">
            <div className="bg-white rounded-[1.5rem] w-full max-w-sm p-6 shadow-2xl relative animate-in zoom-in-95 duration-200">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-gray-900 flex items-center gap-2"><QrCode className="w-5 h-5 text-emerald-600" /> 방 초대하기</h3>
                <button onClick={() => setIsInviteModalOpen(false)} className="text-gray-400 hover:text-gray-600 p-1"><X className="w-5 h-5" /></button>
              </div>
              <p className="text-center text-[13px] text-gray-500 mb-6 leading-relaxed">라운드 동반자의 스마트폰 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.</p>
              <div className="bg-gray-50 rounded-2xl p-6 flex justify-center mb-6 border border-gray-100">
                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(currentShareUrl)}`} alt="Invite QR Code" className="w-44 h-44 mix-blend-multiply" />
              </div>
              <div className="mb-6">
                <label className="block text-[11px] font-bold text-gray-400 mb-1.5 pl-1">초대 URL</label>
                <div className="bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-700 font-medium truncate">{currentShareUrl}</div>
              </div>
              <div className="flex gap-3 mb-6">
                <button onClick={() => { const textArea = document.createElement("textarea"); textArea.value = currentShareUrl; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); setCopySuccess(true); setTimeout(() => { setCopySuccess(false); setIsInviteModalOpen(false); }, 800); }} className={`flex-1 py-3.5 rounded-xl border font-bold active:scale-[0.98] transition-all flex items-center justify-center gap-2 ${copySuccess ? 'border-emerald-600 bg-emerald-50 text-emerald-600' : 'border-emerald-600 text-emerald-600 hover:bg-emerald-50'}`}>{copySuccess ? '복사 완료!' : 'URL 복사'}</button>
                <button onClick={() => { if (navigator.share) { navigator.share({ title: '골프 게임 초대', text: '라운드 스코어 기록에 참여하세요!', url: currentShareUrl }).then(() => { setIsInviteModalOpen(false); }).catch(console.error); } else { const textArea = document.createElement("textarea"); textArea.value = currentShareUrl; document.body.appendChild(textArea); textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea); setCopySuccess(true); setTimeout(() => { setCopySuccess(false); setIsInviteModalOpen(false); }, 800); } }} className="flex-1 py-3.5 rounded-xl bg-emerald-600 text-white font-bold shadow-md hover:bg-emerald-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">공유하기</button>
              </div>
            </div>
          </div>
        )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
