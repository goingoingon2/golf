<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⛳ 골프 뽑기 게임</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    
    window.FirebaseAPI = {
      initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc,
      getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken
    };

    // 🚀 [필수] 본인의 Firebase 설정값으로 변경하세요!
    window.USER_FIREBASE_CONFIG = {
      apiKey: "",
      authDomain: "",
      projectId: "",
      storageBucket: "",
      messagingSenderId: "",
      appId: ""
    };

    window.dispatchEvent(new Event('FirebaseAPIReady'));
  </script>

  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f9fafb;
      margin: 0; 
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .animate-in { animation-duration: 0.3s; animation-fill-mode: forwards; animation-timing-function: ease-out; }
    .fade-in { animation-name: fadeIn; }
    .zoom-in { animation-name: zoomIn; }
    .slide-in-from-bottom-4 { animation-name: slideUp; animation-duration: 0.5s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const Icons = {
      Settings: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      Users: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      QrCode: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Check: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="20 6 9 17 4 12"/></svg>,
      RotateCcw: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
      RotateCw: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
      Home: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Crown: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>,
      X: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      Link: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
      Loader2: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      ChevronDown: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m6 9 6 6 6-6"/></svg>,
      ChevronUp: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="m18 15-6-6-6 6"/></svg>
    };

    const PHASES = { SETTINGS: 'SETTINGS', WAITING: 'WAITING', SHUFFLE: 'SHUFFLE', DRAW: 'DRAW', RANDOM_JOKER: 'RANDOM_JOKER', RESULT: 'RESULT' };
    const JOKER_OPTIONS = ['사용안함', '랜덤', '이글', '버디', '파', '보기', '더블', '트리플'];
    const RANDOM_JOKER_POOL = ['이글', '버디', '파', '보기', '더블', '트리플'];

    function App() {
      const [phase, setPhase] = useState(PHASES.SETTINGS);
      const [user, setUser] = useState(null);
      const dbRef = useRef(null);
      const appIdRef = useRef('golf-draw-v2');
      
      const [roomDataFound, setRoomDataFound] = useState(null); 
      const [roomId, setRoomId] = useState('');
      const [hostUid, setHostUid] = useState(null);
      const [guestSlots, setGuestSlots] = useState({});
      
      const [players, setPlayers] = useState(['타이어 우즈', '로리 맥일로이', '스코티 셔플러', '필 미친손']);
      const [jokerType, setJokerType] = useState('보기');
      
      const [activeSettingMenu, setActiveSettingMenu] = useState(null); // 'JOKER' | 'PERMISSIONS' | null
      const [isJokerModalOpen, setIsJokerModalOpen] = useState(false);
      const [isInviteOpen, setIsInviteOpen] = useState(false); 
      const [localJokerSpin, setLocalJokerSpin] = useState('...');

      const [joinedStatus, setJoinedStatus] = useState([false, false, false, false]);
      const [actualRoles, setActualRoles] = useState([]);
      const [selectedCards, setSelectedCards] = useState({});
      const [isShuffling, setIsShuffling] = useState(false);
      const [shufflePositions, setShufflePositions] = useState(Array(5).fill({ x: 0, y: 0, r: 0 }));
      const lastShuffleRef = useRef(0);
      const [finalJokerStroke, setFinalJokerStroke] = useState('');
      const [isSpinningJoker, setIsSpinningJoker] = useState(false);
      const [pickLog, setPickLog] = useState('카드를 선택하세요!');

      // 동반자 권한 옵션 추가
      const [guestPermissions, setGuestPermissions] = useState({ finishShuffle: true, autoPick: true, nextHole: true });

      const isHostView = Boolean(user && hostUid === user.uid);
      const MY_PLAYER_INDEX = isHostView ? 0 : (guestSlots[user?.uid] !== undefined ? guestSlots[user?.uid] : -1);

      // --- 1. Auth 및 초기 접속 처리 ---
      useEffect(() => {
        const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseAPI;
        try {
          const config = (typeof window.__firebase_config !== 'undefined') ? JSON.parse(window.__firebase_config) : window.USER_FIREBASE_CONFIG;
          const app = initializeApp(config);
          const auth = getAuth(app);
          dbRef.current = getFirestore(app);
          appIdRef.current = (typeof window.__app_id !== 'undefined') ? window.__app_id : 'golf-draw-v2';

          const initAuth = async () => {
            if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
              await signInWithCustomToken(auth, window.__initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          };
          initAuth();
          onAuthStateChanged(auth, (u) => {
            setUser(u);
            // 인증이 완료된 후에만 쿼리 파라미터 확인
            const params = new URLSearchParams(window.location.search);
            const room = params.get('room');
            if (room) setRoomId(room);
            else setRoomDataFound(true);
          });
        } catch(e) { console.error("Firebase 초기화 에러:", e); }
      }, []);

      // --- 2. 실시간 Firestore 연동 ---
      useEffect(() => {
        if (!user || !roomId || !dbRef.current) return;
        const { doc, onSnapshot } = window.FirebaseAPI;
        const roomDoc = doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', roomId);
        
        const unsubscribe = onSnapshot(roomDoc, (snapshot) => {
          if (snapshot.exists()) {
            setRoomDataFound(true);
            const data = snapshot.data();
            setPhase(data.phase);
            setPlayers(data.players);
            setJokerType(data.jokerType);
            setJoinedStatus(data.joinedStatus || [false,false,false,false]);
            setActualRoles(data.actualRoles || []);
            setSelectedCards(data.selectedCards || {});
            setFinalJokerStroke(data.finalJokerStroke || '');
            setHostUid(data.hostUid);
            setGuestSlots(data.guestSlots || {});
            setIsSpinningJoker(data.isSpinningJoker || false);
            setGuestPermissions(data.guestPermissions || { finishShuffle: true, autoPick: true, nextHole: true });
            if (data.shuffleTrigger && data.shuffleTrigger > lastShuffleRef.current) {
              lastShuffleRef.current = data.shuffleTrigger;
              triggerLocalShuffle(data.shuffleDirection);
            }
          } else {
            setRoomDataFound(false);
          }
        }, (err) => {
          console.error("동기화 에러:", err);
          setRoomDataFound(false);
        });

        return () => unsubscribe();
      }, [user, roomId]);

      // --- 3. 실시간 픽 로그 및 조커 애니메이션 ---
      useEffect(() => {
        const count = Object.keys(selectedCards).length;
        if (count === 0) setPickLog('가장 먼저 카드를 선점하세요!');
        else if (count === 4) setPickLog('✅ 모든 선택이 완료되었습니다!');
        else setPickLog(`💬 ${count}/4 명 선택 완료 (남은 카드를 고르세요)`);
      }, [selectedCards]);

      useEffect(() => {
        let interval;
        if (phase === PHASES.RANDOM_JOKER && isSpinningJoker) {
          let spinCount = 0;
          interval = setInterval(() => {
            setLocalJokerSpin(RANDOM_JOKER_POOL[spinCount % RANDOM_JOKER_POOL.length]);
            spinCount++;
          }, 100);
        }
        return () => clearInterval(interval);
      }, [phase, isSpinningJoker]);

      // --- 4. 액션 함수들 ---
      const updateRoom = async (updates) => {
        if (!roomId || !dbRef.current) return;
        const { doc, updateDoc } = window.FirebaseAPI;
        await updateDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', roomId), updates);
      };

      // 새로고침 없이 즉시 처음 화면으로 되돌리는 함수
      const goHome = () => {
        try { window.history.pushState({}, '', window.location.origin + window.location.pathname); } catch(e) {}
        setRoomId('');
        setRoomDataFound(true);
        setPhase(PHASES.SETTINGS);
        setHostUid(null);
        setGuestSlots({});
        setSelectedCards({});
        setJoinedStatus([false, false, false, false]);
        setIsInviteOpen(false);
        setGuestPermissions({ finishShuffle: true, autoPick: true, nextHole: true });
        setActiveSettingMenu(null);
      };

      const createRoom = () => {
        // 모든 이름이 입력되었는지 확인
        if (players.some(p => p.trim() === '')) {
          alert('모든 플레이어의 이름을 입력해주세요.');
          return;
        }

        // Firebase 연동 상태 확인 (설정 누락 또는 도메인 미승인 시 여기서 걸러짐)
        if (!user) {
          alert('⚠️ 서버(Firebase) 연결을 대기중이거나 설정에 문제가 있습니다.\n\n1. 코드 내의 USER_FIREBASE_CONFIG 값이 정확한지 확인해주세요.\n2. Firebase Console -> Authentication -> Settings -> Authorized domains에 현재 웹사이트 주소가 추가되어 있는지 확인해주세요.');
          return;
        }

        const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        const { doc, setDoc } = window.FirebaseAPI;
        
        // await를 제거하여 DB 저장을 기다리지 않고 즉시 모달을 띄움 (딜레이 완벽 해소)
        setDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', newRoomId), {
          hostUid: user.uid, phase: PHASES.WAITING, players, jokerType, joinedStatus: [true, false, false, false],
          guestSlots: {}, actualRoles: [], selectedCards: {}, finalJokerStroke: '', isSpinningJoker: false, shuffleTrigger: 0,
          guestPermissions
        }).catch(err => console.error("방 생성 실패:", err));
        
        try { window.history.pushState({}, '', `?room=${newRoomId}`); } catch(e) {}
        setRoomId(newRoomId);
        setIsInviteOpen(true);
      };

      const toggleJoin = (index) => {
        if (!user) return;
        const slots = { ...guestSlots };
        const newStatus = [...joinedStatus];
        if (isHostView) {
          if (index === 0) return;
          newStatus[index] = !newStatus[index];
          updateRoom({ joinedStatus: newStatus });
        } else {
          if (slots[user.uid] === index) { newStatus[index] = false; delete slots[user.uid]; }
          else { if (newStatus[index]) return; if (slots[user.uid] !== undefined) newStatus[slots[user.uid]] = false; newStatus[index] = true; slots[user.uid] = index; }
          updateRoom({ joinedStatus: newStatus, guestSlots: slots });
        }
      };

      const startGame = async () => {
        if (!isHostView && !guestPermissions.nextHole) return;
        let roles = jokerType === '사용안함' ? ['R', 'R', 'B', 'B'] : (() => {
          const s = Math.random() > 0.5 ? 'R' : 'B';
          const f = s === 'R' ? 'B' : 'R';
          return [f, f, s, 'J'];
        })();
        await updateRoom({ phase: PHASES.SHUFFLE, actualRoles: roles.sort(() => Math.random() - 0.5), selectedCards: {}, finalJokerStroke: jokerType === '랜덤' ? '' : jokerType, isSpinningJoker: false, shuffleTrigger: 0 });
      };

      const shuffleDeck = (dir) => updateRoom({ shuffleTrigger: Date.now(), shuffleDirection: dir });

      const triggerLocalShuffle = (direction) => {
        setIsShuffling(direction);
        let count = 0;
        const interval = setInterval(() => {
          setShufflePositions(Array.from({length:5}).map(() => ({ x: (Math.random()-0.5)*60+(direction==='left'?-80:80), y:(Math.random()-0.5)*60, r:(Math.random()-0.5)*180+(direction==='left'?-90:90) })));
          if (++count > 8) { clearInterval(interval); setShufflePositions(Array(5).fill({x:0,y:0,r:0})); setIsShuffling(false); }
        }, 100);
      };

      const selectCard = (cardIndex) => {
        if (selectedCards[cardIndex] !== undefined || Object.keys(selectedCards).length >= 4) return;
        if (MY_PLAYER_INDEX === -1) return; 

        // 본인 카드만 선택 가능 (방장 포함)
        const pickedIdxs = Object.values(selectedCards).map(c => c.playerIndex);
        if (pickedIdxs.includes(MY_PLAYER_INDEX)) return; 

        const pickOrder = Object.keys(selectedCards).length;
        const newSelected = { ...selectedCards, [cardIndex]: { playerIndex: MY_PLAYER_INDEX, player: players[MY_PLAYER_INDEX], role: actualRoles[pickOrder] } };
        updateRoom({ selectedCards: newSelected });
      };

      // 방장이 남은 동반자의 카드를 한 번에 무작위 할당하고 결과로 넘기는 함수
      const autoPickRemaining = () => {
        if (!isHostView && !guestPermissions.autoPick) return;
        const pickedPlayers = Object.values(selectedCards).map(c => c.playerIndex);
        const unpickedPlayers = [0, 1, 2, 3].filter(idx => !pickedPlayers.includes(idx));
        
        const pickedCards = Object.keys(selectedCards).map(Number);
        const unpickedCards = [0, 1, 2, 3, 4].filter(idx => !pickedCards.includes(idx));
        
        const newSelected = { ...selectedCards };
        let currentPickOrder = Object.keys(selectedCards).length;
        
        // 남은 카드 목록 섞기
        const shuffledUnpickedCards = [...unpickedCards].sort(() => Math.random() - 0.5);

        unpickedPlayers.forEach(playerIdx => {
          const cardIndex = shuffledUnpickedCards.pop();
          newSelected[cardIndex] = {
            playerIndex: playerIdx,
            player: players[playerIdx],
            role: actualRoles[currentPickOrder]
          };
          currentPickOrder++;
        });

        // 남은 카드를 한 번에 할당하고 즉시 결과 화면으로 이동
        updateRoom({ selectedCards: newSelected, phase: PHASES.RESULT });
      };

      const finishShuffle = () => (isHostView || guestPermissions.finishShuffle) && updateRoom({ phase: PHASES.DRAW });
      const revealTeams = () => (isHostView || guestPermissions.autoPick) && updateRoom({ phase: PHASES.RESULT });
      const executeRandomJoker = () => {
        const jokerCard = Object.values(selectedCards).find(c => c.role === 'J');
        const canExecute = isHostView || (jokerCard && jokerCard.playerIndex === MY_PLAYER_INDEX);
        if (!canExecute) return;
        
        updateRoom({ isSpinningJoker: true, phase: PHASES.RANDOM_JOKER });
        setTimeout(() => {
          const final = RANDOM_JOKER_POOL[Math.floor(Math.random() * RANDOM_JOKER_POOL.length)];
          updateRoom({ finalJokerStroke: final, isSpinningJoker: false, phase: PHASES.RESULT });
        }, 2000);
      };

      // 누락되었던 함수 복구
      const nextHole = () => startGame();
      const endGame = () => {
        if (!isHostView) return;
        updateRoom({
          phase: PHASES.WAITING,
          joinedStatus: [true, false, false, false],
          guestSlots: {},
          selectedCards: {}
        });
      };

      const handleCopyUrl = () => {
        const url = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
        const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
        alert('초대 URL이 복사되었습니다!'); setIsInviteOpen(false);
      };

      const getCardStyle = (role, jokerTeam = null) => {
        if (role === 'R') return 'bg-red-500 text-white shadow-lg';
        if (role === 'B') return 'bg-blue-500 text-white shadow-lg';
        if (role === 'J') {
          if (jokerTeam === 'R') return 'bg-red-500 text-white border-4 border-yellow-400';
          if (jokerTeam === 'B') return 'bg-blue-500 text-white border-4 border-yellow-400';
          return 'bg-purple-600 text-white';
        }
        return 'bg-slate-700 text-slate-300';
      };

      if (roomId && roomDataFound === null) return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><Icons.Loader2 className="w-10 h-10 animate-spin text-green-500" /></div>;

                <div className="bg-slate-800 rounded-2xl p-5 text-center mb-auto shadow-inner border border-slate-700">
                  {isJokerPending ? (
                    canIClickJoker ? <p className="text-yellow-400 font-bold animate-pulse">🃏 조커 카드를 클릭해 확인하세요!</p> : <p className="text-yellow-400 font-bold animate-pulse">🃏 조커 타수 확인 대기중...</p>
                  ) : <p className="text-yellow-400 font-black text-xl">🎉 이긴 팀이 포인트를 가져갑니다! 🎉</p>}
                </div>
                
                {(isHostView || guestPermissions.nextHole) ? (
                  <div className="mt-8 space-y-3 pb-4">
                    <button onClick={nextHole} disabled={isJokerPending} className={`w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform ${isJokerPending ? 'bg-gray-700 text-gray-500' : 'bg-green-600 text-white shadow-lg'}`}><Icons.RotateCcw className="w-5 h-5" /> 다음 홀 이동 (다시 뽑기)</button>
                    {isHostView && <button onClick={endGame} disabled={isJokerPending} className={`w-full py-4 rounded-2xl font-bold active:scale-[0.98] transition-transform ${isJokerPending ? 'bg-slate-800 text-slate-600' : 'bg-slate-700 text-slate-300'}`}>대기실로 돌아가기 (방장 전용)</button>}
                  </div>
                ) : (
                  <div className="mt-8 space-y-3 pb-4">
                    <div className="w-full bg-slate-800 text-slate-400 font-bold py-5 rounded-xl text-center text-lg tracking-tight">다음 홀을 준비중입니다...</div>
                  </div>
                )}
              </div>
            );
          })()}

          {isInviteOpen && (
            <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 animate-in zoom-in text-gray-800 flex flex-col items-center relative">
                <button onClick={() => setIsInviteOpen(false)} className="absolute top-4 right-4 p-2 text-gray-400 hover:bg-gray-100 rounded-full transition"><Icons.X className="w-6 h-6" /></button>
                <div className="flex items-center gap-2 mb-2 w-full"><Icons.QrCode className="w-5 h-5 text-green-600" /><h2 className="text-lg font-bold">방 초대하기</h2></div>
                <p className="text-sm text-gray-500 text-left mb-6 break-keep leading-relaxed w-full">라운드 동반자의 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.</p>
                <div className="w-48 h-48 bg-gray-50 rounded-2xl border mb-6 flex items-center justify-center overflow-hidden shadow-inner">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(`${window.location.origin}${window.location.pathname}?room=${roomId}`)}`} className="w-[85%] h-[85%] mix-blend-multiply" />
                </div>
                <div className="w-full mb-6">
                  <label className="text-xs font-bold text-gray-500 mb-2 block">초대 URL</label>
                  <div className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-xs font-medium text-gray-600 truncate flex items-center gap-2">
                    <Icons.Link className="w-4 h-4 shrink-0 text-gray-400" />
                    <span className="truncate">{window.location.origin}{window.location.pathname}?room={roomId}</span>
                  </div>
                </div>
                <div className="flex gap-3 w-full">
                  <button onClick={handleCopyUrl} className="flex-1 py-3.5 bg-gray-100 text-gray-700 font-bold rounded-2xl hover:bg-gray-200 transition">URL 복사</button>
                  <button onClick={async () => { try { await navigator.share({ title: '⛳ 골프 뽑기 게임', text: '라운드 동반자들과 함께 공정하게 팀을 뽑아보세요!', url: `${window.location.origin}${window.location.pathname}?room=${roomId}` }); setIsInviteOpen(false); } catch(e){} }} className="flex-1 py-3.5 bg-green-600 text-white font-bold rounded-2xl shadow-lg hover:bg-green-700 transition">공유하기</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Main() {
      const [ready, setReady] = React.useState(!!window.FirebaseAPI);
      React.useEffect(() => { if (!ready) { const h = () => setReady(true); window.addEventListener('FirebaseAPIReady', h); return () => window.removeEventListener('FirebaseAPIReady', h); } }, [ready]);
      return ready ? <App /> : <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold">시스템 로딩 중...</div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
  </script>
</body>
</html>
