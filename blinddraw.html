<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 모바일 환경에서 화면 비율 최적화 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⛳ 골프 뽑기 게임</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (브라우저에서 JSX 컴파일) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 💡 Firebase DB 실시간 연동 스크립트 💡 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    
    // React 앱에서 접근할 수 있도록 전역 객체에 할당
    window.FirebaseAPI = {
      initializeApp, getFirestore, doc, setDoc, getDoc, onSnapshot, collection, updateDoc,
      getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken
    };

    // 🚀 [GitHub 업로드 전 필수 세팅] 본인의 Firebase 프로젝트 설정값으로 아래를 변경하세요!
    window.USER_FIREBASE_CONFIG = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.appspot.com",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // API 로드가 완료되었음을 알림
    window.dispatchEvent(new Event('FirebaseAPIReady'));
  </script>

  <!-- 기본 폰트 및 애니메이션 스타일 -->
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    body { 
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f9fafb;
      margin: 0; 
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .animate-in { animation-duration: 0.3s; animation-fill-mode: forwards; animation-timing-function: ease-out; }
    .fade-in { animation-name: fadeIn; }
    .zoom-in { animation-name: zoomIn; }
    .zoom-in-90 { animation-name: zoomIn; }
    .slide-in-from-bottom-4 { animation-name: slideUp; animation-duration: 0.5s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 앱 비즈니스 로직 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 아이콘 모음 (lucide-react 대체용)
    const Icons = {
      Settings: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
      Users: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      QrCode: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      Check: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12"/></svg>,
      RotateCcw: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>,
      RotateCw: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
      Home: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      Crown: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>,
      X: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      Link: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
      Loader2: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      ChevronDown: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6"/></svg>,
      ChevronUp: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m18 15-6-6-6 6"/></svg>,
      Shuffle: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="16 3 21 3 21 8"/><line x1="4" x2="21" y1="20" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" x2="21" y1="15" y2="21"/><line x1="4" x2="9" y1="4" y2="9"/></svg>
    };

    // 게임 진행 단계
    const PHASES = {
      SETTINGS: 'SETTINGS',
      WAITING: 'WAITING',
      SHUFFLE: 'SHUFFLE',
      DRAW: 'DRAW',
      RANDOM_JOKER: 'RANDOM_JOKER',
      RESULT: 'RESULT'
    };

    const JOKER_OPTIONS = ['사용안함', '랜덤', '이글', '버디', '파', '보기', '더블', '트리플'];
    const RANDOM_JOKER_POOL = ['이글', '버디', '파', '보기', '더블', '트리플'];

    function App() {
      const [phase, setPhase] = useState(PHASES.SETTINGS);
      const [user, setUser] = useState(null);
      const dbRef = useRef(null);
      const appIdRef = useRef('default-app-id');
      
      // 실시간 데이터 연동 상태
      const [roomDataFound, setRoomDataFound] = useState(null); 
      const [roomId, setRoomId] = useState('');
      const [hostUid, setHostUid] = useState(null);
      const [guestSlots, setGuestSlots] = useState({});
      
      // 게임 설정 상태
      const [players, setPlayers] = useState(['타이어 우즈', '로리 맥일로이', '스코티 셔플러', '필 미친손']);
      const [jokerType, setJokerType] = useState('보기');
      
      // 로컬 UI 상태
      const [isJokerMenuOpen, setIsJokerMenuOpen] = useState(false);
      const [isJokerModalOpen, setIsJokerModalOpen] = useState(false);
      const [isInviteOpen, setIsInviteOpen] = useState(false); // 초대 모달
      const [localJokerSpin, setLocalJokerSpin] = useState('...');

      // 대기실 및 게임 진행 상태 (Firestore 동기화)
      const [joinedStatus, setJoinedStatus] = useState([false, false, false, false]);
      const [deck] = useState([0, 1, 2, 3, 4]); // 카드는 항상 5장 고정
      const [actualRoles, setActualRoles] = useState([]);
      const [selectedCards, setSelectedCards] = useState({});
      
      const [isShuffling, setIsShuffling] = useState(false);
      const [shufflePositions, setShufflePositions] = useState(Array(5).fill({ x: 0, y: 0, r: 0 }));
      const lastShuffleRef = useRef(0);
      
      const [finalJokerStroke, setFinalJokerStroke] = useState('');
      const [isSpinningJoker, setIsSpinningJoker] = useState(false);
      const [pickLog, setPickLog] = useState('가장 먼저 카드를 선점하세요!');

      // 내가 누구인지 판별
      const isHostView = Boolean(user && hostUid === user.uid);
      const MY_PLAYER_INDEX = isHostView ? 0 : (guestSlots[user?.uid] !== undefined ? guestSlots[user?.uid] : -1);

      // --- Firebase 초기화 및 Auth ---
      useEffect(() => {
        const { initializeApp, getFirestore, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } = window.FirebaseAPI;
        let app, auth, db;
        try {
            let config = window.USER_FIREBASE_CONFIG;
            // 통합 환경(Canvas) 지원을 위한 설정 처리
            if (typeof window.__firebase_config !== 'undefined') {
                config = JSON.parse(window.__firebase_config);
                appIdRef.current = typeof window.__app_id !== 'undefined' ? window.__app_id : 'default-app-id';
            }
            app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            dbRef.current = db;

            const initAuth = async () => {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            const unsub = onAuthStateChanged(auth, setUser);
            return () => unsub();
        } catch(e) {
            console.error("Firebase 초기화 에러:", e);
        }
      }, []);

      // --- URL 파라미터 확인 및 접속 ---
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room');
        if (room) {
            setRoomId(room);
        } else {
            setRoomDataFound(true); // 방장 모드(새로 만들기 준비)
        }
      }, []);

      // --- 실시간 Firestore 동기화 (onSnapshot) ---
      useEffect(() => {
        if (!user || !roomId || !dbRef.current) return;
        const { doc, onSnapshot } = window.FirebaseAPI;
        const roomDoc = doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', roomId);
        
        const unsubscribe = onSnapshot(roomDoc, (snapshot) => {
            if (snapshot.exists()) {
                setRoomDataFound(true);
                const data = snapshot.data();
                
                setPhase(data.phase);
                setPlayers(data.players);
                setJokerType(data.jokerType);
                setJoinedStatus(data.joinedStatus || [false,false,false,false]);
                setActualRoles(data.actualRoles || []);
                setSelectedCards(data.selectedCards || {});
                setFinalJokerStroke(data.finalJokerStroke || '');
                setHostUid(data.hostUid);
                setGuestSlots(data.guestSlots || {});
                setIsSpinningJoker(data.isSpinningJoker || false);
                
                // 타인의 셔플 이벤트를 감지하여 내 화면에서도 카드 섞기 애니메이션 실행
                if (data.shuffleTrigger && data.shuffleTrigger > lastShuffleRef.current) {
                    lastShuffleRef.current = data.shuffleTrigger;
                    triggerLocalShuffle(data.shuffleDirection);
                }
            } else {
                setRoomDataFound(false);
            }
        }, (err) => console.error("동기화 에러:", err));

        return () => unsubscribe();
      }, [user, roomId]);

      // --- 실시간 픽(Pick) 로그 자동 갱신 ---
      useEffect(() => {
          const count = Object.keys(selectedCards).length;
          if (count === 0) setPickLog('가장 먼저 카드를 선점하세요!');
          else if (count === 4) setPickLog('✅ 모든 플레이어가 선택을 마쳤습니다!');
          else setPickLog(`💬 누군가 카드를 골랐습니다. (${count}/4 완료)`);
      }, [selectedCards]);

      // --- 조커 랜덤 애니메이션 연동 ---
      useEffect(() => {
        let interval;
        if (phase === PHASES.RANDOM_JOKER && isSpinningJoker) {
            let spinCount = 0;
            interval = setInterval(() => {
                setLocalJokerSpin(RANDOM_JOKER_POOL[spinCount % RANDOM_JOKER_POOL.length]);
                spinCount++;
            }, 100);
        }
        return () => clearInterval(interval);
      }, [phase, isSpinningJoker]);

      // --- DB 업데이트 공통 헬퍼 ---
      const updateRoom = async (updates) => {
        if (!roomId || !dbRef.current) return;
        const { doc, updateDoc } = window.FirebaseAPI;
        const roomRef = doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', roomId);
        try {
            await updateDoc(roomRef, updates);
        } catch(e) {
            console.error("데이터 업데이트 실패:", e);
        }
      };

      // --- 방장: 방 만들기 ---
      const createRoom = async () => {
        if (players.some(p => p.trim() === '')) return;
        if (!user || !dbRef.current) return;
        
        const newRoomId = Math.random().toString(36).substring(2, 8).toUpperCase();
        const { doc, setDoc } = window.FirebaseAPI;
        const roomRef = doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'rooms', newRoomId);
        
        await setDoc(roomRef, {
            hostUid: user.uid,
            phase: PHASES.WAITING,
            players,
            jokerType,
            joinedStatus: [true, false, false, false], // 방장은 0번 슬롯 자동 입장
            guestSlots: {},
            actualRoles: [],
            selectedCards: {},
            finalJokerStroke: '',
            isSpinningJoker: false,
            shuffleTrigger: 0,
            shuffleDirection: 'left'
        });
        
        try {
            window.history.pushState({}, '', `?room=${newRoomId}`);
        } catch (e) {
            console.warn("현재 환경에서는 주소창 URL을 변경할 수 없습니다.", e);
        }
        
        setRoomId(newRoomId);
        setIsInviteOpen(true);
      };

      // --- 참여자 자리 연동 ---
      const toggleJoin = (index) => {
        if (!user) return;
        const slots = { ...guestSlots };
        const newStatus = [...joinedStatus];

        if (isHostView) {
            // 방장은 어떤 자리든 강제로 끄고 켤 수 있음 (대리 입장)
            if (index === 0) return; // 방장 자리(0번)는 고정
            newStatus[index] = !newStatus[index];
            updateRoom({ joinedStatus: newStatus });
        } else {
            // 참여자 본인의 자리만 컨트롤
            if (slots[user.uid] === index) {
                // 내 자리 취소
                newStatus[index] = false;
                delete slots[user.uid];
            } else {
                if (newStatus[index]) return; // 이미 누가 차지함
                if (slots[user.uid] !== undefined) {
                    newStatus[slots[user.uid]] = false; // 이전 자리 반환
                }
                newStatus[index] = true;
                slots[user.uid] = index; // 새 자리 할당
            }
            updateRoom({ joinedStatus: newStatus, guestSlots: slots });
        }
      };

      // --- 호스트: 조커 설정 실시간 변경 ---
      const updateJokerSettings = (opt) => {
        let roles = [];
        if (opt === '사용안함') {
            roles = ['R', 'R', 'B', 'B'];
        } else {
            const shortTeam = Math.random() > 0.5 ? 'R' : 'B';
            const fullTeam = shortTeam === 'R' ? 'B' : 'R';
            roles = [fullTeam, fullTeam, shortTeam, 'J'];
        }
        updateRoom({ 
            jokerType: opt, 
            actualRoles: roles.sort(() => Math.random() - 0.5),
            finalJokerStroke: opt === '랜덤' ? '' : opt
        });
        setJokerType(opt); // 로컬 선반영
      };

      // --- 게임 흐름 제어 ---
      const startGame = async () => {
        if (!isHostView) return;
        let roles = [];
        if (jokerType === '사용안함') {
          roles = ['R', 'R', 'B', 'B'];
        } else {
          const shortTeam = Math.random() > 0.5 ? 'R' : 'B';
          const fullTeam = shortTeam === 'R' ? 'B' : 'R';
          roles = [fullTeam, fullTeam, shortTeam, 'J'];
        }
        await updateRoom({
          phase: PHASES.SHUFFLE,
          actualRoles: roles.sort(() => Math.random() - 0.5),
          selectedCards: {},
          finalJokerStroke: jokerType === '랜덤' ? '' : jokerType,
          isSpinningJoker: false,
          shuffleTrigger: 0
        });
      };

      // --- 카드 섞기 동기화 ---
      const shuffleDeck = (direction) => {
        updateRoom({ 
            shuffleTrigger: Date.now(), 
            shuffleDirection: direction 
        });
      };

      const triggerLocalShuffle = (direction) => {
        setIsShuffling(direction);
        let count = 0;
        const interval = setInterval(() => {
          setShufflePositions(deck.map(() => {
            const xBias = direction === 'left' ? -80 : 80;
            const rBias = direction === 'left' ? -90 : 90;
            return {
              x: (Math.random() - 0.5) * 60 + xBias,
              y: (Math.random() - 0.5) * 60,
              r: (Math.random() - 0.5) * 180 + rBias
            };
          }));
          count++;
          if (count > 8) {
            clearInterval(interval);
            setShufflePositions(Array(5).fill({ x: 0, y: 0, r: 0 }));
            setIsShuffling(false);
          }
        }, 100);
      };

      // --- 카드 선택 (실시간) ---
      const selectCard = (cardIndex) => {
        if (selectedCards[cardIndex] !== undefined) return;
        if (Object.keys(selectedCards).length >= 4) return;
        if (MY_PLAYER_INDEX === -1) return; // 관전자(자리 안 고른 사람) 차단
        
        // 내가 이미 하나 골랐는지 확인
        const iAlreadyPicked = Object.values(selectedCards).some(c => c.playerIndex === MY_PLAYER_INDEX);
        if (iAlreadyPicked) return;

        const pickOrder = Object.keys(selectedCards).length;
        const assignedRole = actualRoles[pickOrder];
        const playerName = players[MY_PLAYER_INDEX];

        // 객체 전체를 덮어씌워 동시 클릭 시 서버에서 마지막 요청만 승인되도록 보호 (꽝 원천 차단)
        const newSelected = {
          ...selectedCards,
          [cardIndex]: { playerIndex: MY_PLAYER_INDEX, player: playerName, role: assignedRole }
        };
        updateRoom({ selectedCards: newSelected });
      };

      const handlePlayerNameChange = (index, value) => {
        const newPlayers = [...players];
        newPlayers[index] = value;
        setPlayers(newPlayers);
      };

      // --- 기타 진행 함수들 ---
      const finishShuffle = () => isHostView && updateRoom({ phase: PHASES.DRAW });
      const revealTeams = () => isHostView && updateRoom({ phase: PHASES.RESULT });
      
      const executeRandomJoker = () => {
        if (!isHostView) return;
        updateRoom({ isSpinningJoker: true, phase: PHASES.RANDOM_JOKER });
        setTimeout(() => {
            const finalStroke = RANDOM_JOKER_POOL[Math.floor(Math.random() * RANDOM_JOKER_POOL.length)];
            updateRoom({ 
                finalJokerStroke: finalStroke, 
                isSpinningJoker: false, 
                phase: PHASES.RESULT 
            });
        }, 2000);
      };

      const nextHole = () => startGame(); // startGame 재호출로 리셋
      const endGame = () => {
          if (!isHostView) return;
          // 설정값이 유지된 채 대기실로 이동하여 자리 재배치 가능하게 함
          updateRoom({
            phase: PHASES.WAITING,
            joinedStatus: [true, false, false, false],
            guestSlots: {},
            selectedCards: {}
          });
      };

      // --- 공유 기능 ---
      const baseUrl = window.location.origin + window.location.pathname;
      const inviteUrl = roomId ? `${baseUrl}?room=${roomId}` : baseUrl;
      const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(inviteUrl)}`;

      const handleCopyUrl = () => {
        const el = document.createElement('textarea');
        el.value = inviteUrl;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        alert('초대 URL이 복사되었습니다.\n동반자에게 전달해주세요!');
        setIsInviteOpen(false);
      };

      const handleShare = async () => {
        if (navigator.share) {
          try {
            await navigator.share({
              title: '⛳ 골프 뽑기 게임',
              text: '라운드 동반자들과 함께 공정하게 팀을 뽑아보세요!',
              url: inviteUrl,
            });
            setIsInviteOpen(false);
          } catch (error) { setIsInviteOpen(false); }
        } else {
          handleCopyUrl();
        }
      };

      // --- 렌더링 UI 도우미 ---
      const getCardStyle = (role, jokerTeam = null) => {
        if (role === 'R') return 'bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.4)]';
        if (role === 'B') return 'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)]';
        if (role === 'J') {
          if (jokerTeam === 'R') return 'bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.5)] border-2 border-yellow-400';
          if (jokerTeam === 'B') return 'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.5)] border-2 border-yellow-400';
          return 'bg-purple-500 text-white border-2 border-purple-400'; 
        }
        return 'bg-slate-700 text-slate-300 border-2 border-slate-600';
      };

      // 로딩 및 에러 처리
      if (roomId && roomDataFound === null) {
          return <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white"><Icons.Loader2 className="w-10 h-10 animate-spin text-green-500" /></div>;
      }
      if (roomId && roomDataFound === false) {
          return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-6 text-center">
                  <Icons.X className="w-16 h-16 text-red-500 mb-4" />
                  <h2 className="text-2xl font-bold mb-2">존재하지 않는 방입니다.</h2>
                  <p className="text-slate-400 mb-8">이미 종료되었거나 URL이 잘못되었습니다.</p>
                  <button onClick={() => window.location.href = baseUrl} className="bg-green-600 px-6 py-3 rounded-xl font-bold hover:bg-green-500">새 방 만들기</button>
              </div>
          );
      }

      return (
        <div className="w-full">
          {/* 1. 설정 페이지 (방장 전용) */}
          {phase === PHASES.SETTINGS && (
            <div className="min-h-screen bg-gray-50 p-4 max-w-md mx-auto shadow-xl">
              <div className="text-center mt-8 mb-10">
                <h1 className="text-4xl font-black text-green-700 tracking-tighter mb-2 drop-shadow-sm">⛳ 골프 뽑기 게임</h1>
                <p className="text-sm text-gray-500 font-medium break-keep">동반자들과 함께하는 빠르고 공정한 팀 정하기</p>
              </div>
              <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2 tracking-tight">
                <Icons.Settings className="w-6 h-6 text-green-600" /> 게임 설정
              </h2>
              
              <div className="bg-white rounded-xl p-5 shadow-sm mb-6 border border-gray-100">
                <h2 className="text-sm font-semibold text-gray-600 mb-2 flex items-center gap-2"><Icons.Users className="w-4 h-4" /> 플레이어 (4명)</h2>
                <p className="text-xs text-gray-500 mb-4 tracking-tight break-keep">
                  * 선수 이름을 눌러 실제 플레이어들의 이름으로 변경해주세요.
                </p>
                <div className="space-y-3">
                  {players.map((player, idx) => (
                    <div key={idx} className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-green-50 text-green-700 flex items-center justify-center font-bold text-sm shrink-0">{idx + 1}</div>
                      <div className="relative flex-1">
                        <input 
                          type="text" 
                          value={player} 
                          onChange={(e) => handlePlayerNameChange(idx, e.target.value)} 
                          className={`w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition ${idx === 0 ? 'pr-10 border-yellow-300 bg-yellow-50/30' : ''}`} 
                          placeholder={`플레이어 ${idx + 1}`} 
                        />
                        {idx === 0 && (
                          <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" title="방장">
                            <Icons.Crown className="w-5 h-5 fill-yellow-400 text-yellow-500 drop-shadow-sm" />
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm mb-8 border border-gray-100 overflow-hidden">
                <button 
                  onClick={() => setIsJokerMenuOpen(!isJokerMenuOpen)}
                  className="w-full p-5 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors outline-none"
                >
                  <div className="flex items-center gap-2">
                    <h2 className="text-sm font-semibold text-gray-600">🃏 조커(Joker) 설정</h2>
                    <span className="text-xs font-bold text-purple-700 bg-purple-100 border border-purple-200 px-2.5 py-1 rounded-full shadow-sm">
                      {jokerType}
                    </span>
                  </div>
                  {isJokerMenuOpen ? <Icons.ChevronUp className="w-5 h-5 text-gray-400" /> : <Icons.ChevronDown className="w-5 h-5 text-gray-400" />}
                </button>
                
                {isJokerMenuOpen && (
                  <div className="px-5 pb-5 border-t border-gray-50 pt-4 animate-in fade-in slide-in-from-top-2 duration-200">
                    <div className="grid grid-cols-4 gap-2">
                      {JOKER_OPTIONS.map((opt) => (
                        <button key={opt} onClick={() => setJokerType(opt)} className={`py-2 px-1 text-sm rounded-lg border transition-all tracking-tight ${jokerType === opt ? 'bg-purple-100 border-purple-500 text-purple-700 font-bold' : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}`}>
                          {opt}
                        </button>
                      ))}
                    </div>
                    <div className="mt-4 p-3 bg-gray-50 rounded-lg text-xs text-gray-500 leading-relaxed break-keep">

                      * 적용 타수: 팀 승패 계산 시 실제 타수와 무관하게 선택한 타수가 적용됩니다.
                    </div>
                  </div>
                )}
              </div>

              <button onClick={createRoom} className="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-700 transition active:scale-[0.98] text-lg">방 만들기</button>
            </div>
          )}

          {/* 1.5. 방 초대 모달 (어느 화면에서든 띄움) */}
          {isInviteOpen && (
            <div className="fixed inset-0 z-50 bg-gray-800/60 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden flex flex-col relative animate-in fade-in zoom-in duration-200">
                <div className="p-5 flex justify-between items-center border-b border-gray-100">
                  <div className="flex items-center gap-2"><Icons.QrCode className="w-5 h-5 text-green-600" /><h2 className="text-lg font-bold text-gray-800 tracking-tight">방 초대하기</h2></div>
                  <button onClick={() => setIsInviteOpen(false)} className="p-1 hover:bg-gray-100 rounded-full transition"><Icons.X className="w-6 h-6 text-gray-400" /></button>
                </div>
                <div className="p-6 flex flex-col items-center">
                  <p className="text-sm text-gray-500 text-center mb-6 break-keep leading-relaxed">라운드 동반자의 스마트폰 카메라로 스캔하거나<br/>초대 URL을 공유해 참여할 수 있습니다.</p>
                  <div className="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-6 w-48 h-48 flex items-center justify-center shadow-inner">
                    <img src={qrCodeUrl} alt="초대 QR 코드" className="w-full h-full object-contain mix-blend-multiply" />
                  </div>
                  <div className="w-full mb-6">
                    <label className="text-xs font-bold text-gray-500 mb-2 block">초대 URL</label>
                    <div className="bg-gray-50 border border-gray-200 p-3 rounded-lg flex items-center text-sm text-gray-600 truncate"><Icons.Link className="w-4 h-4 mr-2 text-gray-400 shrink-0" /><span className="truncate">{inviteUrl}</span></div>
                  </div>
                  <div className="flex gap-3 w-full">
                    <button onClick={handleCopyUrl} className="flex-1 py-3 border-2 border-green-600 text-green-600 font-bold rounded-xl hover:bg-green-50 transition active:scale-[0.98]">
                      URL 복사
                    </button>
                    <button onClick={handleShare} className="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl shadow-md hover:bg-green-700 transition active:scale-[0.98]">
                      공유하기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 2. 대기실 페이지 */}
          {phase === PHASES.WAITING && (() => {
            const allJoined = joinedStatus.every(s => s);
            return (
              <div className="min-h-screen bg-gray-50 max-w-md mx-auto shadow-xl flex flex-col">
                <div className="p-4">
                  <div className="bg-green-600 text-white p-6 rounded-2xl shadow-md text-center mb-4 relative">
                    <h1 className="text-2xl font-bold mb-2 tracking-tight">라운드 대기실</h1>
                    <p className="text-sm opacity-90 break-keep">
                      {isHostView ? '모든 플레이어가 입장하면 게임을 시작할 수 있습니다.' : '본인의 자리를 선택해주세요. (클릭하여 취소/재선택 가능)'}
                    </p>
                  </div>

                  {isHostView && (
                    <button onClick={() => setIsInviteOpen(true)} className="w-full bg-white border border-green-200 text-green-600 font-bold py-3.5 rounded-xl shadow-sm mb-6 flex items-center justify-center gap-2 hover:bg-green-50 transition tracking-tight text-[15px]"><Icons.QrCode className="w-5 h-5" /> 방 초대 코드 / URL 열기</button>
                  )}

                  <div className="grid grid-cols-2 gap-4">
                    {players.map((player, idx) => {
                      const isJoined = joinedStatus[idx];
                      const isMySlot = idx === MY_PLAYER_INDEX;

                      return (
                        <div 
                          key={idx} 
                          onClick={() => toggleJoin(idx)} 
                          className={`relative p-5 rounded-2xl border flex flex-col items-center justify-center gap-3 transition-all cursor-pointer bg-white ${
                            isJoined 
                              ? (isMySlot ? 'border-green-500 bg-green-50 shadow-[0_0_15px_rgba(34,197,94,0.3)] ring-2 ring-green-400' : 'border-green-400 shadow-[0_4px_20px_-4px_rgba(74,222,128,0.2)]') 
                              : 'border-dashed border-gray-300 hover:bg-gray-50'
                          }`}
                        >
                          {isJoined ? (
                            <>
                              <div className={`relative w-12 h-12 rounded-full flex items-center justify-center shadow-sm ${isMySlot ? 'bg-green-500 text-white' : 'bg-white border border-green-300 text-green-500'}`}>
                                <Icons.Check className="w-6 h-6" />
                              </div>
                              <span className={`font-bold text-[15px] tracking-tight ${isMySlot ? 'text-green-800' : 'text-green-700'}`}>{player}</span>
                              <span className={`text-[11px] font-bold px-3 py-1 rounded-full shadow-sm ${isMySlot ? 'bg-green-700 text-white' : 'bg-green-600 text-white'}`}>
                                {isMySlot ? '내 자리' : (idx === 0 ? '방장(스코어 캐디)' : '입장 완료')}
                              </span>
                              {!isHostView && isMySlot && (
                                <div className="absolute -top-2 -right-2 bg-white border border-gray-200 text-red-500 rounded-full p-1 shadow-md hover:bg-red-50 transition">
                                  <Icons.X className="w-3 h-3" />
                                </div>
                              )}
                            </>
                          ) : (
                            <>
                              <div className="relative w-12 h-12 rounded-full bg-gray-50 border border-gray-200 text-gray-300 flex items-center justify-center"><Icons.Users className="w-5 h-5" /></div>
                              <span className="font-medium text-gray-400 text-[15px] tracking-tight">{player}</span>
                              <span className="text-[11px] bg-gray-100 text-gray-400 px-3 py-1 rounded-full font-medium">대기 중... (클릭)</span>
                            </>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="mt-auto p-4 bg-white border-t border-gray-100 flex gap-3">
                  {isHostView ? (
                    <>
                      <button onClick={() => { /* 설정은 방을 새로 파야 안전함 */ window.location.href = baseUrl; }} className="w-1/3 bg-gray-100 text-gray-600 font-bold py-4 rounded-xl hover:bg-gray-200 transition text-[15px] tracking-tight">처음으로</button>
                      <button disabled={!allJoined} onClick={startGame} className={`w-2/3 font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-[15px] tracking-tight ${allJoined ? 'bg-green-600 text-white hover:bg-green-700 active:scale-[0.98]' : 'bg-gray-300 text-white cursor-not-allowed shadow-none'}`}>{allJoined ? '게임 시작하기' : `${joinedStatus.filter(Boolean).length}/4 명 입장완료`}</button>
                    </>
                  ) : (
                    <button disabled className="w-full bg-gray-100 text-gray-500 font-bold py-4 rounded-xl transition text-[15px] tracking-tight cursor-not-allowed">
                      {allJoined ? '방장의 시작을 기다리는 중...' : '모든 플레이어의 입장을 기다리는 중...'}
                    </button>
                  )}
                </div>
              </div>
            );
          })()}

          {/* 3. 패 섞기 (기리) 페이지 */}
          {phase === PHASES.SHUFFLE && (
            <div className="min-h-screen bg-slate-900 max-w-md mx-auto shadow-xl flex flex-col p-6 text-white relative overflow-hidden">
              <h2 className="text-center text-xl font-bold mb-2 tracking-tight">패 섞기 (기리)</h2>
              <p className="text-center text-slate-400 text-sm mb-4 break-keep">방장이 아니더라도 누구나 섞을 수 있습니다.</p>
              
              {isHostView ? (
                  <button 
                    onClick={() => setIsJokerModalOpen(true)}
                    className="mx-auto mb-8 bg-slate-800 text-slate-300 border border-slate-700 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 hover:bg-slate-700 transition shadow-sm"
                  >
                    🃏 조커 설정: <span className="text-purple-400">{jokerType}</span>
                  </button>
              ) : (
                  <div className="mx-auto mb-8 bg-slate-800/50 text-slate-400 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                    🃏 현재 조커 설정: <span className="text-purple-400/80">{jokerType}</span>
                  </div>
              )}

              <div className="flex flex-wrap justify-center gap-4 flex-1 content-center">
                {deck.map((_, idx) => (
                  <div key={idx} className="w-[28%] aspect-[3/4] bg-slate-800 rounded-2xl border-2 border-slate-700 flex items-center justify-center shadow-2xl relative z-10" style={{ transform: `translate(${shufflePositions[idx]?.x || 0}px, ${shufflePositions[idx]?.y || 0}px) rotate(${shufflePositions[idx]?.r || 0}deg) ${isShuffling ? 'scale(0.95)' : 'scale(1)'}`, transition: 'transform 0.1s ease-in-out', backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px)' }}>
                    <div className="w-10 h-10 rounded-full border-4 border-slate-600 flex items-center justify-center opacity-50"><span className="font-bold text-slate-600 text-lg">?</span></div>
                  </div>
                ))}
              </div>
              <div className="mt-12 flex flex-col gap-3">
                <div className="flex gap-3">
                  <button onClick={() => shuffleDeck('left')} disabled={isShuffling !== false} className="flex-1 bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 hover:bg-slate-600 transition active:scale-[0.98] text-[15px] tracking-tight">
                    <Icons.RotateCcw className={`w-5 h-5 ${isShuffling === 'left' ? 'animate-spin' : ''}`} /> 
                    왼쪽으로 섞기
                  </button>
                  <button onClick={() => shuffleDeck('right')} disabled={isShuffling !== false} className="flex-1 bg-slate-700 text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 hover:bg-slate-600 transition active:scale-[0.98] text-[15px] tracking-tight">
                    오른쪽으로 섞기
                    <Icons.RotateCw className={`w-5 h-5 ${isShuffling === 'right' ? 'animate-spin' : ''}`} /> 
                  </button>
                </div>
                {isHostView ? (
                    <button onClick={finishShuffle} className="w-full bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-600 transition active:scale-[0.98] text-lg tracking-tight">패 섞기 완료</button>
                ) : (
                    <div className="w-full bg-slate-800 text-slate-400 font-bold py-4 rounded-xl text-center text-lg tracking-tight">방장이 섞기를 마칠 때까지 대기중...</div>
                )}
              </div>

              {/* 조커 설정 모달 (방장만 보임) */}
              {isHostView && isJokerModalOpen && (
                <div className="absolute inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex flex-col p-6 items-center justify-center animate-in fade-in zoom-in duration-200">
                  <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative text-gray-800">
                    <button onClick={() => setIsJokerModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600">
                      <Icons.X className="w-6 h-6" />
                    </button>

                      🃏 조커 설정 변경
                    </h3>
                    <div className="grid grid-cols-4 gap-2 mb-6">
                      {JOKER_OPTIONS.map((opt) => (
                        <button 
                          key={opt} 
                          onClick={() => updateJokerSettings(opt)} 
                          className={`py-2 px-1 text-sm rounded-lg border transition-all tracking-tight ${jokerType === opt ? 'bg-purple-100 border-purple-500 text-purple-700 font-bold' : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}`}
                        >
                          {opt}
                        </button>
                      ))}
                    </div>
                    <button onClick={() => setIsJokerModalOpen(false)} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition tracking-tight">
                      설정 완료
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* 4. 패 뽑기 (완전한 실시간 연동) */}

            const isAllDrawn = Object.keys(selectedCards).length >= 4;

            return (
              <div className="min-h-screen bg-slate-900 max-w-md mx-auto shadow-xl flex flex-col p-6 text-white relative">

                      <span className="text-[6rem] leading-none mb-4 drop-shadow-xl">
                        {selectedCards[myCardIndex].role === 'J' ? '🃏' : selectedCards[myCardIndex].role}

                      <div className="bg-black/40 px-6 py-2.5 rounded-full backdrop-blur-md shadow-inner">

                        return (
                          <div 
                            key={idx}

                            className={`w-[28%] aspect-[3/4] rounded-2xl flex flex-col items-center justify-center transition-all duration-300 relative shadow-xl ${
                              !isPicked 
                                ? 'bg-slate-700 border-2 border-green-400 cursor-pointer hover:bg-slate-600 hover:scale-105 shadow-[0_0_15px_rgba(74,222,128,0.2)]' 
                                : 'bg-slate-800/80 border border-slate-600 opacity-60 cursor-not-allowed'
                            }`}
                            style={!isPicked ? { backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px)' } : {}}
                          >
                            {isPicked ? (
                              <>
                                <Icons.Check className="w-8 h-8 text-slate-500 mb-2 opacity-50" />
                                <div className="w-[calc(100%-1rem)] py-1 absolute bottom-2 rounded text-center backdrop-blur-sm bg-black/20">
                                  <span className="text-[10px] text-white/70 font-bold truncate block px-1 tracking-tight">
                                    {pickedData.player}
                                  </span>
                                </div>
                              </>
                            ) : (
                              <div className="w-10 h-10 rounded-full border-4 border-slate-500 flex items-center justify-center">
                                <span className="font-bold text-slate-500 text-lg">?</span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                <div className="mt-auto flex flex-col gap-3">
                  <div className="border border-slate-700 bg-slate-800/80 p-5 rounded-xl text-center shadow-inner backdrop-blur-sm transition-all">
                    <p className={`font-bold text-[15px] tracking-tight mb-3 ${myCardIndex === null ? 'text-green-400 animate-pulse' : 'text-green-300'}`}>
                      {pickLog}
                    </p>
                    <div className="w-full bg-slate-700 h-2.5 rounded-full overflow-hidden">
                      <div className="bg-green-500 h-full transition-all duration-500" style={{ width: `${(Object.keys(selectedCards).length / 4) * 100}%` }}></div>
                    </div>
                    <p className="text-slate-400 text-xs mt-2 font-medium">{Object.keys(selectedCards).length} / 4 명 선택 완료</p>
                  </div>

                  {isAllDrawn && (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                      {isHostView ? (
                          <button 
                            onClick={revealTeams}
                            className="w-full bg-green-500 text-white font-bold py-5 rounded-xl shadow-[0_0_20px_rgba(34,197,94,0.3)] text-xl tracking-tight hover:bg-green-600 transition active:scale-[0.98] flex items-center justify-center gap-2"
                          >
                            <Icons.Check className="w-6 h-6" /> 결과 확인 (전체 공개)
                          </button>
                      ) : (
                          <div className="w-full bg-slate-800 text-slate-400 font-bold py-5 rounded-xl text-center text-xl tracking-tight">방장의 결과 확인을 기다립니다...</div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* 6. 조커 랜덤 추첨 */}
          {phase === PHASES.RANDOM_JOKER && (
            <div className="min-h-screen bg-purple-900 max-w-md mx-auto shadow-xl flex flex-col items-center justify-center p-6 text-white text-center">
              <h2 className="text-2xl font-bold mb-8 text-purple-200 tracking-tight">조커 타수 추첨 중...</h2>
              <div className="w-full bg-purple-800/50 rounded-3xl p-10 border-4 border-purple-500 shadow-[0_0_50px_rgba(168,85,247,0.4)]">
                <span className={`text-6xl font-black ${isSpinningJoker ? 'text-white blur-[1px]' : 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)] scale-110'} transition-all duration-100 inline-block`}>
                  {isSpinningJoker ? localJokerSpin : finalJokerStroke}
                </span>
              </div>
            </div>
          )}

          {/* 7. 최종 결과 공개 */}
          {phase === PHASES.RESULT && (() => {
            const results = Object.values(selectedCards);
            const isJokerPending = jokerType === '랜덤' && !finalJokerStroke;
            
            const rCount = results.filter(r => r.role === 'R').length;
            const jokerTeam = rCount === 1 ? 'R' : 'B';

            return (
              <div className="min-h-screen bg-slate-900 max-w-md mx-auto shadow-xl flex flex-col p-6 text-white relative">
                <h2 className="text-center text-3xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-yellow-200 tracking-tight">팀 매칭 결과</h2>

                <div className="grid grid-cols-2 gap-4 mb-8">
                  {results.map((res, idx) => {
                    // 방장만 클릭하여 돌릴 수 있도록 권한 부여
                    const isClickableJoker = res.role === 'J' && isJokerPending && isHostView;
                    const cardStyle = getCardStyle(res.role, jokerTeam);

                    return (
                      <div 
                        key={idx}
                        onClick={() => isClickableJoker && executeRandomJoker()}
                        className={`relative aspect-[3/4] rounded-3xl flex flex-col items-center p-3 shadow-2xl transition-transform ${cardStyle} ${
                          isClickableJoker ? 'cursor-pointer animate-pulse hover:scale-105' : ''
                        }`}
                      >
                        {isClickableJoker && <span className="absolute -top-3 right-2 bg-yellow-400 text-black text-[12px] font-black px-3 py-1.5 rounded-full animate-bounce shadow-lg z-10 border-2 border-yellow-200">방장 Click!</span>}
                        {res.role === 'J' && isJokerPending && !isHostView && <span className="absolute -top-3 right-2 bg-slate-800 text-white text-[10px] font-bold px-3 py-1.5 rounded-full shadow-lg z-10 border border-slate-600">방장 확인중</span>}

                        <div className="flex-1 flex flex-col items-center justify-center w-full">
                          {res.role === 'J' ? (
                            <div className="flex flex-col items-center pt-2">
                              <span className="text-[5.5rem] leading-none mb-1 drop-shadow-xl">🃏</span>
                              {finalJokerStroke ? (
                                <span className="text-lg font-black text-white bg-black/30 px-4 py-1 rounded-full shadow-inner tracking-tight">
                                  {finalJokerStroke}
                                </span>
                              ) : (
                                <span className="text-lg font-black text-white/50 bg-black/20 px-4 py-1 rounded-full tracking-tight">
                                  미확인
                                </span>
                              )}
                            </div>
                          ) : (
                            <span className="text-8xl font-black drop-shadow-[0_4px_10px_rgba(0,0,0,0.3)]">{res.role}</span>
                          )}
                        </div>

                        <div className="w-full bg-black/30 py-3 rounded-xl text-center backdrop-blur-md mt-auto">
                          <span className="font-bold text-base tracking-tight text-white/95">{res.player}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 text-center mb-8 shadow-inner">
                  {isJokerPending ? (
                    <p className="text-yellow-400 font-bold tracking-tight text-lg animate-pulse">🃏 방장이 조커 카드를 확인중입니다!</p>
                  ) : (
                    <p className="text-yellow-400 font-bold tracking-tight text-lg">🎉 이긴 팀이 포인트를 가져갑니다! 🎉</p>
                  )}
                </div>

                <div className="mt-auto flex flex-col gap-3">
                  {isHostView ? (
                      <>
                        <button onClick={nextHole} disabled={isJokerPending} className={`w-full font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition active:scale-[0.98] text-lg tracking-tight ${isJokerPending ? 'bg-gray-700 text-gray-500 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-500'}`}><Icons.RotateCcw className="w-5 h-5" /> 다음 홀로 이동 (다시 뽑기)</button>
                        <button onClick={endGame} disabled={isJokerPending} className={`w-full font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition active:scale-[0.98] text-lg tracking-tight ${isJokerPending ? 'bg-gray-800 text-gray-600 cursor-not-allowed' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}><Icons.Home className="w-5 h-5" /> 대기실로 돌아가기</button>
                      </>
                  ) : (
                      <div className="w-full bg-slate-800 text-slate-400 font-bold py-5 rounded-xl text-center text-lg tracking-tight">방장이 다음 게임을 준비중입니다...</div>
                  )}
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // Firebase 로드가 완료될 때까지 기다렸다가 React 렌더링
    function Main() {
      const [apiReady, setApiReady] = React.useState(!!window.FirebaseAPI);
      React.useEffect(() => {
        if (!apiReady) {
          const handler = () => setApiReady(true);
          window.addEventListener('FirebaseAPIReady', handler);
          return () => window.removeEventListener('FirebaseAPIReady', handler);
        }
      }, [apiReady]);
      return apiReady ? <App /> : <div className="min-h-screen bg-slate-900 flex items-center justify-center text-white font-bold animate-pulse">시스템 로딩 중...</div>;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Main />);
  </script>
</body>
</html>
