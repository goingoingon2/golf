        const transfers = getTransfers(settlementDetails.map(d => d.final)); 

        return (
          <div className="app-wrapper flex-col bg-[#f4f6f8] min-h-screen pb-[calc(2rem+env(safe-area-inset-bottom))]">
             {/* 1. 헤더 */}
            <div className="bg-[#10b981] text-white p-4 pt-[calc(1rem+env(safe-area-inset-top))] shadow-sm flex items-center justify-between sticky top-0 z-20 shrink-0">
              <button onClick={() => setStep('settlement')} className="p-2 hover:bg-white/10 rounded-full transition active:scale-95">
                <Icon name="ChevronLeft" size={24} />
              </button>
              <h1 className="text-[17px] font-bold flex items-center">최종 이체 내역</h1>
              <div className="w-9"></div>
            </div>
            
            <div className="flex-1 overflow-y-auto p-4 pb-28 space-y-4">
              <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
                <div className="w-16 h-16 bg-[#e5f5ec] text-[#10b981] rounded-full flex items-center justify-center mx-auto mb-3">
                  <Icon name="Check" size={32} />
                </div>
                <h2 className="text-[20px] font-black text-slate-800 mb-1">모든 정산이 완료되었습니다!</h2>
                <p className="text-[14px] text-slate-500 font-medium mt-2">최종적으로 아래의 내역대로 송금해 주세요.</p>
              </div>

              {/* 포인트 이체 상세 내역 */}
              <div className="mt-4">
                <div className="text-center text-[15px] font-bold text-slate-800 mb-4 flex items-center justify-center">
                  누가 누구에게 줘야 하나요?
                </div>
                
                {Object.keys(transfers).length === 0 || !Object.values(transfers).some(g => g.total > 0) ? (
                  <div className="bg-white rounded-[24px] shadow-sm p-8 text-center text-slate-400 font-semibold border border-slate-100">
                    지불할 내역이 없습니다.
                  </div>
                ) : (
                  <div className="space-y-3">
                    {Object.entries(transfers).map(([fromId, data]) => {
                      if (data.total === 0) return null;
                      return (
                        <div key={fromId} className="bg-rose-50/40 rounded-[20px] border border-rose-100 p-4 shadow-sm">
                          <div className="flex justify-between items-center mb-3">
                            <div className="flex items-center gap-2">
                              <div className="w-8 h-8 bg-white rounded-full overflow-hidden shrink-0 border border-rose-100 flex items-center justify-center text-slate-400">
                                <Icon name="User" size={20} />
                              </div>
                              <div>
                                <div className="text-[10px] text-rose-400 font-bold mb-0.5">보내는 사람 (패자)</div>
                                <div className="font-black text-[15px] text-slate-800">{players[fromId]}</div>
                              </div>
                            </div>
                            <div className="text-right">
                              <div className="text-[10px] text-rose-400 font-bold mb-0.5">총 이체 포인트</div>
                              <div className="font-black text-[17px] text-rose-500">{data.total.toLocaleString()}P</div>
                            </div>
                          </div>
                          <div className="bg-white rounded-[12px] p-3 space-y-2 border border-rose-50">
                            {data.details.map((detail, idx) => (
                              <div key={idx} className="flex justify-between items-center text-[13px]">
                                <span className="text-slate-600 font-semibold flex items-center">
                                  <Icon name="ChevronRight" size={14} className="mx-1.5 text-rose-300" /> 
                                  {players[detail.to]} (승자)
                                </span>
                                <span className="font-bold text-blue-500">{detail.amount.toLocaleString()}P</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            <div className="absolute bottom-0 left-0 right-0 max-w-[480px] mx-auto bg-white/80 backdrop-blur-md border-t border-slate-200 p-4 pb-[calc(1rem+env(safe-area-inset-bottom))] z-30 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
              <div className="max-w-md mx-auto flex gap-3">
                <button onClick={handleSegmentReset} className="flex-[1] bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-4 rounded-[20px] transition duration-200 shadow-sm flex items-center justify-center text-[14px] active:scale-[0.98]">
                  중간 정산
                </button>
                <button onClick={handleFullReset} className="flex-[1.5] bg-[#1e293b] hover:bg-[#0f172a] text-white font-bold py-4 rounded-[20px] transition duration-200 shadow-md flex items-center justify-center text-[14px] active:scale-[0.98]">
                  <Icon name="Refresh" size={20} className="mr-2" /> 새 게임 시작
                </button>
              </div>
            </div>
            {renderConfirmModal()}
          </div>
        );
      }

      return null;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
